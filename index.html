/* ─────────────────────────────────────────────────────
   RoomChangeSection
   Shows room history and lets the user split the current
   (last) segment into two when moving to a new room.
───────────────────────────────────────────────────── */
function RoomChangeSection({member,onChange,isFamily}){
  const[showForm,setShowForm]=useState(false);
  const[newRoom,setNewRoom]=useState("");
  const[changeDate,setChangeDate]=useState("");

  const segments=getEffectiveRoomSegments(member);
  const lastSeg=segments[segments.length-1]||null;
  const availSats=lastSeg?getSaturdaysBetween(lastSeg.from,lastSeg.to):[];

  function applyChange(){
    if(!changeDate||!newRoom.trim())return;
    const nextFrom=dateAddDays(changeDate,1);  // Sunday right after the Saturday
    const newHistory=[
      ...segments.slice(0,-1),
      {...lastSeg,to:changeDate},
      {roomNumber:newRoom.trim(),from:nextFrom,to:member.studyEnd},
    ];
    onChange({...member,roomHistory:newHistory,roomNumber:newRoom.trim()});
    setShowForm(false);setNewRoom("");setChangeDate("");
  }

  function cancelLastChange(){
    if(segments.length<=1)return;
    /* Remove last segment, extend second-to-last to studyEnd, restore roomNumber */
    const prev=segments[segments.length-2];
    const newHistory=segments.slice(0,-1).map((s,i,arr)=>
      i===arr.length-1?{...s,to:member.studyEnd}:s
    );
    onChange({...member,roomHistory:newHistory,roomNumber:prev.roomNumber});
  }

  /* LS / button styles inline */
  const S_SEG_ROW={display:"flex",alignItems:"center",gap:8,padding:"4px 8px",borderRadius:5,marginBottom:3,fontSize:11};
  const S_BTN=(col)=>({fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:7,border:"1.5px solid "+col,background:"white",color:col,cursor:"pointer"});

  return(
    <div style={{marginTop:8,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px"}}>
      <div style={{fontSize:10,fontWeight:800,color:"#64748b",marginBottom:6,letterSpacing:.5}}>📍 ROOM HISTORY</div>

      {/* Segment list */}
      {segments.map((seg,i)=>{
        const isCurrent=i===segments.length-1;
        return(
          <div key={i} style={{...S_SEG_ROW,background:isCurrent?"#eff6ff":"#f1f5f9",border:"1px solid "+(isCurrent?"#bfdbfe":"#e2e8f0")}}>
            <span style={{fontWeight:800,color:isCurrent?"#1e40af":"#475569",minWidth:36}}>#{seg.roomNumber}</span>
            <span style={{color:"#6b7280",flex:1}}>{seg.from} <span style={{color:"#94a3b8"}}>→</span> {seg.to}</span>
            {isCurrent&&<span style={{fontSize:9,background:"#1e40af",color:"white",borderRadius:4,padding:"1px 5px"}}>현재</span>}
          </div>
        );
      })}

      {/* Action buttons */}
      {!showForm&&(
        <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
          <button type="button" onClick={()=>{setShowForm(true);setChangeDate("");setNewRoom("");}} style={S_BTN("#0284c7")}>
            🔄 Room Change
          </button>
          {segments.length>1&&(
            <button type="button" onClick={cancelLastChange} style={S_BTN("#dc2626")}>
              ↩ 마지막 변경 취소
            </button>
          )}
        </div>
      )}

      {/* Change form */}
      {showForm&&lastSeg&&(
        <div style={{marginTop:8,background:"white",borderRadius:6,padding:"8px 10px",border:"1px solid #bfdbfe"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1e40af",marginBottom:6}}>
            🔄 #{lastSeg.roomNumber}호 → 새 방으로 이동
          </div>
          {isFamily&&(
            <div style={{fontSize:10,color:"#b45309",background:"#fef9c3",borderRadius:4,padding:"3px 7px",marginBottom:6}}>
              👨‍👩‍👧 Group/Family 카드 — 모든 멤버가 함께 이동합니다
            </div>
          )}
          <label style={{fontSize:11,color:"#374151",fontWeight:600,display:"block",marginBottom:3}}>
            #{lastSeg.roomNumber}호 마지막 날 (토요일)
          </label>
          {availSats.length===0?(
            <div style={{fontSize:11,color:"#dc2626",marginBottom:6}}>이동 가능한 토요일이 없습니다 (기간 부족)</div>
          ):(
            <select value={changeDate} onChange={e=>setChangeDate(e.target.value)}
              style={{width:"100%",padding:"6px 10px",borderRadius:6,border:"1.5px solid #bfdbfe",fontSize:12,marginBottom:8,outline:"none"}}>
              <option value="">— 날짜 선택 (토요일) —</option>
              {availSats.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          )}
          <label style={{fontSize:11,color:"#374151",fontWeight:600,display:"block",marginBottom:3}}>새 방번호</label>
          <input value={newRoom} onChange={e=>setNewRoom(e.target.value)} placeholder="예: 215"
            style={{width:"100%",padding:"6px 10px",borderRadius:6,border:"1.5px solid #bfdbfe",fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          <div style={{display:"flex",gap:6}}>
            <button type="button" onClick={applyChange} disabled={!changeDate||!newRoom.trim()}
              style={{...S_BTN("#0284c7"),background:changeDate&&newRoom.trim()?"#0284c7":"#e2e8f0",
                color:changeDate&&newRoom.trim()?"white":"#9ca3af",flex:1}}>
              ✓ 확인
            </button>
            <button type="button" onClick={()=>{setShowForm(false);setNewRoom("");setChangeDate("");}}
              style={{...S_BTN("#6b7280"),flex:1}}>
              취소
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


/* ═════════════════════════════════════════════════════
   DormitorySheetModal  (read-only dormitory chart)
═════════════════════════════════════════════════════ */
function DormitorySheetModal({kanbanCards,targetRoom,onClose,ghostCardIds}){
  /* ghostCardIds: Set of card IDs that are tentative (from pipeline) — rendered faintly */
  const _ghostIds=ghostCardIds||new Set();
  const scrollRef=React.useRef(null);
  const today=new Date();today.setHours(0,0,0,0);
  const MS_WEEK=7*24*60*60*1000;
  const NUM_WEEKS=72;
  const COL_W=50,LANE_H=27,ROOM_PAD=2,LABEL_W=72,SECTION_H=22,HEADER_H=42;

  const startSunday=React.useMemo(()=>{
    const d=new Date(today);d.setDate(d.getDate()-d.getDay()-8*7);return d;
  },[]);
  const todayWeekIdx=Math.floor((today-startSunday)/MS_WEEK);
  const weeks=React.useMemo(()=>Array.from({length:NUM_WEEKS},(_,i)=>new Date(startSunday.getTime()+i*MS_WEEK)),[startSunday]);

  const cardColorMap=React.useMemo(()=>{
    const map={};let idx=0;
    kanbanCards.forEach(c=>{if(!map[c.id])map[c.id]=DORM_PALETTE[idx++%DORM_PALETTE.length];});
    return map;
  },[kanbanCards]);

  const roomBars=React.useMemo(()=>{
    const rb={};
    const ACTIVE=["registered","current","incoming","leaving","graduated","archived"];
    kanbanCards.filter(c=>ACTIVE.includes(c.status)).forEach(card=>{
      const isFamilyCard=FAMILY_CARD_TYPES.has(card.type);
      function pushBar(roomNumStr,startStr,endStr,label,barKeyBase,extra){
        const rt=(extra&&extra.roomType)||"";
        let roomNum=parseInt(roomNumStr);
        if(isNaN(roomNum)){
          /* Route hotel room types to virtual IDs */
          if(rt.startsWith("Hevea Hotel"))roomNum=9901;
          else if(rt.startsWith("Clover Hotel"))roomNum=9902;
          else return;
        }
        const si=Math.floor((new Date(startStr)-startSunday)/MS_WEEK);
        const ei=Math.floor((new Date(endStr)-startSunday)/MS_WEEK);
        if(ei<0||si>=NUM_WEEKS)return;
        if(!rb[roomNum])rb[roomNum]=[];
        /* For hotel virtual rooms, append the specific room type to the label */
        const hotelSub=HOTEL_VIRTUAL_ROOMS[roomNum]?rt.replace(/^(Hevea|Clover) Hotel ?/,""):"";
        const finalLabel=hotelSub?label+" ["+hotelSub+"]":label;
        rb[roomNum].push({barKey:barKeyBase,label:finalLabel,startDateStr:startStr,endDateStr:endStr,
          startWeekIdx:Math.max(0,si),endWeekIdx:Math.min(NUM_WEEKS-1,ei),...extra});
      }
      if(isFamilyCard){
        const rep=card.members[0]||{};
        const nat=rep.nationality||"";
        const natCode=NAT_CODE[nat]||nat.slice(0,2).toUpperCase()||"";
        const repName=(rep.name||"?");
        const extra=card.members.length-1;
        const label=repName+(extra>0?"+"+extra:"")+(natCode?"("+natCode+")":"");
        const segs=getEffectiveRoomSegments(rep);
        if(segs.length>0){
          segs.forEach((seg,si2)=>pushBar(seg.roomNumber,seg.from,seg.to,label,card.id+"_fam_"+seg.roomNumber+"_s"+si2,{cardId:card.id,isFamily:true,roomType:rep.roomType||""}));
        } else {
          const byRoom={};
          card.members.forEach(m=>{
            const rn=(m.roomNumber||"").trim();
            if(!rn||!m.studyStart||!m.studyEnd)return;
            if(!byRoom[rn])byRoom[rn]={starts:[],ends:[],roomType:m.roomType||""};
            byRoom[rn].starts.push(m.studyStart);byRoom[rn].ends.push(m.studyEnd);
          });
          Object.entries(byRoom).forEach(([rn,{starts,ends,roomType}])=>{
            const startStr=[...starts].sort()[0];const endStr=[...ends].sort().slice(-1)[0];
            pushBar(rn,startStr,endStr,label,card.id+"_fam_"+rn,{cardId:card.id,isFamily:true,roomType});
          });
        }
      } else {
        card.members.forEach((m,mi)=>{
          if(!m.studyStart||!m.studyEnd)return;
          const nat=m.nationality||"";
          const natCode=NAT_CODE[nat]||nat.slice(0,2).toUpperCase()||"";
          const label=(m.name||"?")+(natCode?"("+natCode+")":"");
          const segs=getEffectiveRoomSegments(m);
          segs.forEach((seg,si2)=>pushBar(seg.roomNumber,seg.from,seg.to,label,
            card.id+"_m"+mi+"_"+seg.roomNumber+"_s"+si2,{cardId:card.id,memberId:mi,isFamily:false,roomType:m.roomType||""}));
        });
      }
    });
    return rb;
  },[kanbanCards,startSunday]);

  const monthSpans=React.useMemo(()=>{
    const spans=[];
    weeks.forEach((w,i)=>{
      const m=w.getMonth(),y=w.getFullYear();
      if(!spans.length||spans[spans.length-1].m!==m||spans[spans.length-1].y!==y)
        spans.push({label:w.toLocaleString("en",{month:"short"})+" '"+String(y).slice(2),m,y,start:i,count:0});
      spans[spans.length-1].count++;
    });
    return spans;
  },[weeks]);

  /* Compute row heights to find target room Y position */
  const rowHeights=React.useMemo(()=>{
    const h={};
    DORM_SECTIONS.forEach(({rooms})=>{
      rooms.forEach(roomNum=>{
        const bars=roomBars[roomNum]||[];
        const isFam=FAMILY_ROOM_SET.has(roomNum);
        const numLanes=isFam?assignLanes(bars).numLanes:Math.max(1,bars.length);
        h[roomNum]=numLanes*LANE_H+ROOM_PAD*2;
      });
    });
    return h;
  },[roomBars]);

  React.useEffect(()=>{
    const el=scrollRef.current;if(!el)return;
    /* Horizontal: scroll to 1 week before today */
    const sx=Math.max(0,(todayWeekIdx-1)*COL_W);
    /* Vertical: find target room and center it */
    const targetNum=parseInt(targetRoom);
    let sy=0;
    if(targetNum){
      let cumY=HEADER_H;
      let found=false;
      for(const {section,rooms} of DORM_SECTIONS){
        cumY+=SECTION_H;
        for(const roomNum of rooms){
          const rh=rowHeights[roomNum]||(LANE_H+ROOM_PAD*2);
          if(roomNum===targetNum){
            sy=Math.max(0,cumY+rh/2-el.clientHeight/2);
            found=true;break;
          }
          cumY+=rh;
        }
        if(found)break;
      }
    }
    el.scrollLeft=sx;el.scrollTop=sy;
  },[rowHeights]);

  function fmtDate(s){if(!s)return"";const d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate();}

  const targetNum=parseInt(targetRoom)||0;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:20000,display:"flex",flexDirection:"column",padding:"16px 20px"}} onClick={onClose}>
      <div style={{background:"white",borderRadius:12,display:"flex",flexDirection:"column",flex:1,overflow:"hidden",maxHeight:"calc(100vh - 32px)"}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid #e2e8f0",flexShrink:0,background:"#f8fafc"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16,fontWeight:800,color:"#1e3a8a"}}>🏨 Dormitory Sheet</span>
            {targetNum>0&&<span style={{fontSize:11,background:"#eff6ff",color:"#1e40af",fontWeight:700,padding:"2px 10px",borderRadius:20}}>{HOTEL_VIRTUAL_ROOMS[targetNum]||"Room "+targetNum}</span>}
            <span style={{fontSize:11,color:"#94a3b8"}}>👁 View only</span>
          </div>
          <button onClick={onClose} style={{background:"#f1f5f9",border:"1.5px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:16,color:"#6b7280",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>✕</button>
        </div>
        {/* Chart */}
        <div ref={scrollRef} style={{overflow:"auto",flex:1}}>
          <div style={{display:"inline-block",minWidth:LABEL_W+NUM_WEEKS*COL_W}}>
            {/* Month header */}
            <div style={{display:"flex",background:"#1e3a8a",color:"white",position:"sticky",top:0,zIndex:20}}>
              <div style={{width:LABEL_W,flexShrink:0,fontSize:11,fontWeight:700,padding:"4px 8px",borderRight:"1px solid rgba(255,255,255,.25)",position:"sticky",left:0,zIndex:30,background:"#1e3a8a"}}>Room</div>
              {monthSpans.map((ms,i)=>(
                <div key={i} style={{width:ms.count*COL_W,flexShrink:0,fontSize:11,fontWeight:700,padding:"4px 6px",textAlign:"center",borderRight:"1px solid rgba(255,255,255,.2)",height:22,overflow:"hidden",whiteSpace:"nowrap"}}>{ms.label}</div>
              ))}
            </div>
            {/* Week header */}
            <div style={{display:"flex",background:"#1e40af",color:"white",position:"sticky",top:22,zIndex:20}}>
              <div style={{width:LABEL_W,flexShrink:0,borderRight:"1px solid rgba(255,255,255,.25)",position:"sticky",left:0,zIndex:30,background:"#1e40af"}}/>
              {weeks.map((w,i)=>{
                const isCur=i===todayWeekIdx;
                return(
                  <div key={i} style={{width:COL_W,flexShrink:0,fontSize:9,textAlign:"center",padding:"3px 1px",borderRight:"1px solid rgba(255,255,255,.12)",height:20,fontWeight:isCur?800:400,background:isCur?"#3b82f6":"transparent",overflow:"hidden",lineHeight:"14px"}}>
                    {(w.getMonth()+1)+"/"+w.getDate()}
                  </div>
                );
              })}
            </div>
            {/* Sections */}
            {DORM_SECTIONS.map(({section,rooms})=>{
              const isHotelSection=section==="HEVEA HOTEL"||section==="CLOVER HOTEL";
              return(
              <React.Fragment key={section}>
                <div style={{display:"flex",background:isHotelSection?"#dcfce7":"#f1f5f9",borderTop:"2px solid "+(isHotelSection?"#4ade80":"#94a3b8")}}>
                  <div style={{width:LABEL_W,flexShrink:0,padding:"3px 8px",fontSize:10,fontWeight:800,color:isHotelSection?"#166534":"#475569",borderRight:"1px solid "+(isHotelSection?"#86efac":"#cbd5e1"),height:SECTION_H,display:"flex",alignItems:"center",position:"sticky",left:0,zIndex:5,background:isHotelSection?"#dcfce7":"#f1f5f9"}}>{section}</div>
                  <div style={{flex:1,borderBottom:"1px solid #e2e8f0"}}/>
                </div>
                {rooms.map(roomNum=>{
                  const bars=roomBars[roomNum]||[];
                  const isFamilyRoom=FAMILY_ROOM_SET.has(roomNum);
                  let laned,numLanes;
                  if(isFamilyRoom){const r=assignLanes(bars);laned=r.bars;numLanes=r.numLanes;}
                  else{laned=bars.map((b,i)=>({...b,_lane:i}));numLanes=Math.max(1,bars.length);}
                  const rowH=numLanes*LANE_H+ROOM_PAD*2;
                  const isTarget=roomNum===targetNum;
                  return(
                    <div key={roomNum} style={{display:"flex",borderTop:"1px solid #e2e8f0",minHeight:rowH,position:"relative",background:isTarget?"#fefce8":"transparent"}}>
                      <div style={{width:LABEL_W,flexShrink:0,background:isTarget?"#fef9c3":HOTEL_VIRTUAL_ROOMS[roomNum]?"#f0fdf4":"#f8fafc",borderRight:"2px solid "+(isTarget?"#f59e0b":HOTEL_VIRTUAL_ROOMS[roomNum]?"#86efac":"#cbd5e1"),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"sticky",left:0,zIndex:5,gap:1,padding:"2px 4px"}}>
                        <span style={{fontSize:HOTEL_VIRTUAL_ROOMS[roomNum]?9:12,fontWeight:800,color:isTarget?"#92400e":HOTEL_VIRTUAL_ROOMS[roomNum]?"#166534":"#1e3a8a",textAlign:"center",lineHeight:"1.2"}}>{HOTEL_VIRTUAL_ROOMS[roomNum]||roomNum}</span>
                        {isTarget&&<span style={{fontSize:8,color:"#d97706",fontWeight:700}}>★</span>}
                      </div>
                      <div style={{position:"relative",width:NUM_WEEKS*COL_W,height:rowH,flexShrink:0}}>
                        {weeks.map((_,i)=>(
                          <div key={i} style={{position:"absolute",left:i*COL_W,top:0,width:COL_W,height:"100%",borderRight:"1px solid #f0f4f8",background:i===todayWeekIdx?"#eff6ff":i%2===0?"transparent":"rgba(248,250,252,.5)"}}/>
                        ))}
                        {!isFamilyRoom&&Array.from({length:numLanes-1},(_,li)=>(
                          <div key={li} style={{position:"absolute",left:0,top:ROOM_PAD+(li+1)*LANE_H,width:"100%",height:1,background:"#e2e8f0",zIndex:2}}/>
                        ))}
                        {(()=>{
                          const cap=HOTEL_VIRTUAL_ROOMS[roomNum]?999:FAMILY_ROOM_SET.has(roomNum)?5:Math.max(1,...(bars.length?bars.map(b=>roomCapacity(b.roomType||"")):[1]));
                          const conflicts=computeConflicts(bars,cap);
                          return(<>
                            {laned.map(bar=>{
                              const bc=cardColorMap[bar.cardId]||"#bfdbfe";
                              const x=bar.startWeekIdx*COL_W+1;
                              const bw=(bar.endWeekIdx-bar.startWeekIdx+1)*COL_W-3;
                              const y=ROOM_PAD+bar._lane*LANE_H+2;
                              const isGhost=_ghostIds.has(bar.cardId);
                              return(
                                <div key={bar.barKey}
                                  title={(isGhost?"[임시 배정] ":"")+bar.label+"\n"+fmtDate(bar.startDateStr)+" → "+fmtDate(bar.endDateStr)}
                                  style={{position:"absolute",left:x,top:y,width:Math.max(bw,6),height:LANE_H-5,
                                    background:isGhost?"repeating-linear-gradient(45deg,"+bc+","+bc+" 4px,rgba(255,255,255,.7) 4px,rgba(255,255,255,.7) 8px)":bc,
                                    border:isGhost?"1.5px dashed rgba(0,0,0,.35)":"1.5px solid rgba(0,0,0,.14)",
                                    borderRadius:4,cursor:"default",zIndex:3,
                                    display:"flex",alignItems:"center",padding:"0 5px",overflow:"hidden",
                                    opacity:isGhost?0.55:1,
                                    boxShadow:isGhost?"none":"0 1px 3px rgba(0,0,0,.08)"}}>
                                  <span style={{fontSize:9,fontWeight:700,color:"#1e293b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                                    {isGhost?"⋯ ":""}{bar.label}
                                  </span>
                                </div>
                              );
                            })}
                            {conflicts.map((c,ci)=>(
                              <div key={"cf_"+ci}
                                title="⚠️ Room conflict"
                                style={{position:"absolute",left:c.startWeekIdx*COL_W,top:0,
                                  width:(c.endWeekIdx-c.startWeekIdx+1)*COL_W,height:"100%",
                                  background:"rgba(220,38,38,.18)",
                                  borderLeft:"2px solid rgba(220,38,38,.7)",
                                  borderRight:"2px solid rgba(220,38,38,.7)",
                                  zIndex:10,pointerEvents:"none"}}/>
                            ))}
                          </>);
                        })()}
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* generatePrintHTML — builds full HTML for printing all member ID cards */
function generatePrintHTML(members, cardId, bannerTop, bannerBottom){
  const logo=window.HANA_LOGO_SRC||"";
  const MONTHS=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  function fmtD(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${parseInt(day)} ${MONTHS[parseInt(m)-1]} ${y}`;}
  function oneCard(m){
    const rows=[
      ["Name",m.name?m.name.toUpperCase():"—"],
      ["Gender",m.gender==="M"?"MALE":m.gender==="F"?"FEMALE":"—"],
      ["Position","STUDENT"],
      ["Nationality",m.nationality?m.nationality.toUpperCase():"—"],
      ["Study Period",(m.studyStart&&m.studyEnd)?`${fmtD(m.studyStart)} – ${fmtD(m.studyEnd)}`:"—"],
      ["Nickname",m.nickname?m.nickname.toUpperCase():"—"],
    ];
    const infoHTML=rows.map(([lbl,val])=>`
      <div style="margin-bottom:5px">
        <div style="font-size:9.6px;color:#94a3b8;line-height:1">${lbl}</div>
        <div style="font-size:${lbl==="Name"?14.4:12}px;font-weight:800;color:#0f172a;line-height:1.2;word-break:break-word">${val}</div>
      </div>`).join("");
    const photoHTML=m.photo?`<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover">`
      :`<span style="font-size:36px;color:#cbd5e1">👤</span>`;
    const topHTML=bannerTop
      ?`<img src="${bannerTop}" style="width:100%;display:block;max-height:80px;object-fit:cover">`
      :`<div style="background:linear-gradient(135deg,#0a4a5c,#0d9488);padding:8px 14px;display:flex;align-items:center;gap:10px">
          ${logo?`<img src="${logo}" style="width:40px;height:40px;object-fit:cover;border-radius:8px">`:""}
          <span style="color:white;font-size:20px;font-weight:900;letter-spacing:1px">HANA ACADEMY</span>
        </div>
        <div style="text-align:center;padding:5px 0 3px;background:#f0fdfa;border-bottom:1px solid #ccfbf1">
          <div style="font-size:11px;font-weight:800;color:#0f4c5c">GLOBAL EDUCATION HUB</div>
          <div style="font-size:10px;font-style:italic;color:#64748b">Empowering Learners, Connecting the World</div>
        </div>`;
    const botHTML=bannerBottom
      ?`<img src="${bannerBottom}" style="width:100%;display:block;max-height:90px;object-fit:cover">`
      :`<div style="text-align:center;font-size:13px;font-weight:900;color:rgba(13,148,136,.07);margin-bottom:2px;letter-spacing:2px">Hana Academy</div>
        <div style="background:linear-gradient(135deg,#0a4a5c,#0d9488);padding:8px 10px;display:flex;align-items:center;justify-content:space-between">
          <div style="text-align:center">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=64x64&data=https%3A%2F%2Fclarkhana.com" style="background:white;border-radius:4px;padding:2px;display:block">
            <div style="font-size:8.4px;color:rgba(255,255,255,.85);margin-top:2px">clarkhana.com</div>
          </div>
          <div style="text-align:center;flex:1;padding:0 6px">
            <div style="font-size:9.6px;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:2px">GLOBAL EDUCATION HUB</div>
            <div style="font-size:13.2px;font-weight:900;color:white">HANA ACADEMY</div>
            ${(m.loginId||cardId)?`<div style="font-size:8.4px;color:rgba(255,255,255,.6);margin-top:3px">ID ${m.loginId||cardId}</div>`:""}
          </div>
          <div style="text-align:center">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=64x64&data=https%3A%2F%2Fapp.clarkhana.com" style="background:white;border-radius:4px;padding:2px;display:block">
            <div style="font-size:8.4px;color:rgba(255,255,255,.85);margin-top:2px">app.clarkhana.com</div>
          </div>
        </div>`;
    return `<div style="width:340px;background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.15);font-family:Arial,sans-serif;break-inside:avoid;page-break-inside:avoid">
      ${topHTML}
      <div style="display:flex;padding:12px 14px;gap:12px">
        <div style="width:111px;height:137px;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:6px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center">
          ${photoHTML}
        </div>
        <div style="flex:1;min-width:0">${infoHTML}</div>
      </div>
      <div style="padding:2px 14px 4px;font-size:10.8px;color:#64748b;font-style:italic">
        ID: <span style="font-weight:800;color:#0f172a;font-style:normal">${m.loginId||cardId||"—"}</span>
      </div>
      ${botHTML}
    </div>`;
  }
  const cardsHTML=members.filter(m=>m.name).map(m=>oneCard(m)).join("");
  return `<!DOCTYPE html><html><head><title>Hana Academy ID Cards</title>
    <style>body{margin:0;padding:20px;background:#f3f4f6;display:flex;flex-wrap:wrap;gap:20px;justify-content:center;font-family:Arial,sans-serif}
    @media print{body{background:white;padding:10px;gap:15px}}</style></head>
    <body>${cardsHTML}<script>window.onload=function(){setTimeout(function(){window.print();},600);}<\/script></body></html>`;
}

   StudentIDCard — printable ID card preview

    if(!d)return"—";
    const [y,m,day]=d.split("-");
    return `${parseInt(day)} ${MONTHS[parseInt(m)-1]} ${y}`;
  }
  const idRef1=React.useRef(null);

  React.useEffect(()=>{

  },[bannerBottom]);
  return(
    <div style={{width:340,background:"white",borderRadius:14,overflow:"hidden",
      boxShadow:"0 4px 24px rgba(0,0,0,.18)",fontFamily:"Arial,sans-serif",
      border:"1px solid #cbd5e1",userSelect:"none"}}>
      {/* ── Top banner ── */}
      {bannerTop
        ?<img src={bannerTop} style={{width:"100%",display:"block",maxHeight:80,objectFit:"cover"}}/>
        :<>
          <div style={{background:"linear-gradient(135deg,#0a4a5c 0%,#0d9488 60%,#14b8a6 100%)",
            padding:"8px 14px",display:"flex",alignItems:"center",gap:10,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,.07)"}}/>
            {logo&&<img src={logo} style={{width:40,height:40,objectFit:"cover",borderRadius:8,flexShrink:0,position:"relative"}} alt="logo"/>}
            <span style={{color:"white",fontSize:20,fontWeight:900,letterSpacing:1,position:"relative"}}>HANA ACADEMY</span>
          </div>
          <div style={{textAlign:"center",padding:"5px 0 3px",background:"#f0fdfa",borderBottom:"1px solid #ccfbf1"}}>
            <div style={{fontSize:11,fontWeight:800,color:"#0f4c5c",letterSpacing:.5}}>GLOBAL EDUCATION HUB</div>
            <div style={{fontSize:10,fontStyle:"italic",color:"#64748b"}}>Empowering Learners, Connecting the World</div>
          </div>
        </>
      }
      {/* ── Main info ── */}
      <div style={{display:"flex",padding:"12px 14px",gap:12}}>
        {/* Photo 1.3x: 111×137 */}
        <div style={{width:111,height:137,background:"#f1f5f9",border:"1.5px solid #cbd5e1",
          borderRadius:6,flexShrink:0,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {member.photo
            ?<img src={member.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            :<span style={{fontSize:36,color:"#cbd5e1"}}>👤</span>}
        </div>
        {/* Info fields — text 1.2x */}
        <div style={{flex:1,minWidth:0}}>
          {[
            ["Name",      member.name?(member.name.toUpperCase()):"—"],
            ["Gender",    member.gender==="M"?"MALE":member.gender==="F"?"FEMALE":"—"],
            ["Position",  "STUDENT"],
            ["Nationality", member.nationality?(member.nationality.toUpperCase()):"—"],
            ["Study Period",(member.studyStart&&member.studyEnd)?`${fmtDate(member.studyStart)} – ${fmtDate(member.studyEnd)}`:"—"],
            ["Nickname",  member.nickname?(member.nickname.toUpperCase()):"—"],
          ].map(([label,val])=>(
            <div key={label} style={{marginBottom:5}}>
              <div style={{fontSize:9.6,color:"#94a3b8",lineHeight:1}}>{label}</div>
              <div style={{fontSize:label==="Name"?14.4:12,fontWeight:800,color:"#0f172a",lineHeight:1.2,wordBreak:"break-word"}}>{val}</div>
            </div>
          ))}
        </div>
      </div>
      {/* ── ID row ── */}
      <div style={{padding:"2px 14px 4px",fontSize:10.8,color:"#64748b",fontStyle:"italic"}}>
        ID: <span style={{fontWeight:800,color:"#0f172a",fontStyle:"normal"}}>{member.loginId||cardId||"—"}</span>
      </div>
      {/* ── Bottom banner ── */}
      {bannerBottom
        ?<img src={bannerBottom} style={{width:"100%",display:"block",maxHeight:90,objectFit:"cover"}}/>
        :<>
          <div style={{textAlign:"center",fontSize:13,fontWeight:900,color:"rgba(13,148,136,.07)",marginBottom:2,letterSpacing:2}}>Hana Academy</div>
          <div style={{background:"linear-gradient(135deg,#0a4a5c,#0d9488)",padding:"8px 10px",
            display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{textAlign:"center"}}>
              <div ref={idRef1} style={{background:"white",borderRadius:4,padding:2,display:"inline-block"}}/>
              <div style={{fontSize:8.4,color:"rgba(255,255,255,.85)",marginTop:2}}>clarkhana.com</div>
            </div>
            <div style={{textAlign:"center",flex:1,padding:"0 6px"}}>
              <div style={{fontSize:9.6,fontWeight:700,color:"rgba(255,255,255,.8)",marginBottom:2}}>GLOBAL EDUCATION HUB</div>
              <div style={{fontSize:13.2,fontWeight:900,color:"white"}}>HANA ACADEMY</div>
              {(member.loginId||cardId)&&<div style={{fontSize:8.4,color:"rgba(255,255,255,.6)",marginTop:3}}>ID {member.loginId||cardId}</div>}
            </div>
            <div style={{textAlign:"center"}}>
              <div ref={idRef2} style={{background:"white",borderRadius:4,padding:2,display:"inline-block"}}/>
              <div style={{fontSize:8.4,color:"rgba(255,255,255,.85)",marginTop:2}}>app.clarkhana.com</div>
            </div>
          </div>
        </>
      }
    </div>
  );
}

function AddCardModal({initialCard,onSave,onClose,onDelete,onArchive,isArchived,kanbanCards,agencies,readOnly}){
  const isNewCard=!initialCard?.id; /* true = creating for the first time, never saved yet */
  const[dormSheetRoom,setDormSheetRoom]=useState(null);
  const[shaking,setShaking]=useState(false);
  function tryClose(){
    /* New unsaved cards must be closed via ✕ only */
    if(isNewCard){
      if(shaking)return;
      setShaking(true);
      setTimeout(()=>setShaking(false),420);
      return;
    }
    onClose();
  }
  const BLANK={name:"",gender:"",birthYear:"",birthMonth:"",birthDay:"",nationality:"Korean",studyStart:"",studyEnd:"",course:"",roomType:"",roomNumber:"",roomHistory:[],nickname:"",photo:""};
  const[type,setType]=useState(initialCard?.type||"");
  const[status,setStatus]=useState(initialCard?.status||"registered");
  function sortByAge(ms){
    if(!ms||ms.length<2)return ms;
    /* Manual Guardian pin takes priority; otherwise oldest first */
    const pinned=ms.find(m=>m.isGuardian);
    if(pinned)return[pinned,...ms.filter(m=>!m.isGuardian)];
    return [...ms].sort((a,b)=>{
      const ay=a.birthYear?parseInt(a.birthYear):9999;
      const by=b.birthYear?parseInt(b.birthYear):9999;
      return ay-by;
    });
  }
  const initMembers=initialCard?.members?.length
    ?(initialCard.type==="Group/Family"?sortByAge(initialCard.members):initialCard.members)
    :[{...BLANK}];
  const[members,setMembers]=useState(initMembers);
  const[notes,setNotes]=useState(initialCard?.notes||"");
  const[agencyNat,setAgencyNat]=useState(initialCard?.agencyNat||"");
  const[agencyName,setAgencyName]=useState(initialCard?.agencyName||"");
  const[consultant,setConsultant]=useState(initialCard?.consultant||"");
  const[attachments,setAttachments]=useState(initialCard?.attachments||[]);
  const fileInputRef=React.useRef(null);
  const[activeMemberIdx,setActiveMemberIdx]=useState(0);
  const[showIdPanel,setShowIdPanel]=useState(true);
  const[bannerTop,setBannerTop]=useState(()=>{try{return localStorage.getItem("hana_id_banner_top")||"";}catch(e){return"";}});
  const[bannerBottom,setBannerBottom]=useState(()=>{try{return localStorage.getItem("hana_id_banner_bottom")||"";}catch(e){return"";}});
  const scrollContainerRef=React.useRef(null);
  const observerRef=React.useRef(null);
  React.useEffect(()=>{
    if(!showIdPanel||members.length<=1){setActiveMemberIdx(0);return;}
    if(observerRef.current)observerRef.current.disconnect();
    const timer=setTimeout(()=>{
      const root=scrollContainerRef.current;
      if(!root)return;
      const els=root.querySelectorAll("[data-member-idx]");
      if(!els.length)return;
      const obs=new IntersectionObserver(
        (entries)=>{
          const vis=entries.filter(e=>e.isIntersecting);
          if(!vis.length)return;
          const best=vis.reduce((a,b)=>a.intersectionRatio>b.intersectionRatio?a:b);
          setActiveMemberIdx(parseInt(best.target.getAttribute("data-member-idx")||"0"));
        },
        {root,threshold:[0.1,0.3,0.5,0.7]}
      );
      els.forEach(el=>obs.observe(el));
      observerRef.current=obs;
    },300);
    return()=>{clearTimeout(timer);if(observerRef.current)observerRef.current.disconnect();};
  },[members.length,showIdPanel]);
  function saveBanner(type,data){
    try{localStorage.setItem("hana_id_banner_"+type,data);}catch(e){}
    if(type==="top")setBannerTop(data);else setBannerBottom(data);
  }

  function updateMember(i,m){
    setMembers(p=>{
      /* If this member was just pinned as Guardian, clear pin from others */
      let updated=p.map((x,j)=>j===i?m:(m.isGuardian&&!p[i].isGuardian?{...x,isGuardian:false}:x));
      /* For Group/Family: when member[0] changes period/room fields,
         propagate to other members ONLY if their field is empty or still
         matches the old member[0] value (i.e., was auto-filled, not manually changed) */
      if(isFamily&&i===0){
        const old=p[0];
        const SYNC=["studyStart","studyEnd","roomType","roomNumber"];
        return updated.map((x,j)=>{
          if(j===0)return x;
          const patch={};
          SYNC.forEach(f=>{if(!x[f]||x[f]===old[f])patch[f]=m[f];});
          /* Always sync roomHistory — all family members share the same room segments */
          patch.roomHistory=m.roomHistory||[];
          return{...x,...patch};
        });
      }
      return updated;
    });
  }
  function addMember(){
    setMembers(p=>{
      const first=p[0]||{};
      return[...p,{
        ...BLANK,
        studyStart:first.studyStart||"",
        studyEnd:first.studyEnd||"",
        roomType:first.roomType||"",
        roomNumber:first.roomNumber||"",
      }];
    });
  }
  function removeMember(i){setMembers(p=>p.filter((_,j)=>j!==i));}
  function selectType(t){
    setType(t);
    if(t!=="Group/Family")setMembers(m=>[m[0]||{...BLANK}]);
  }
  const canSave=type&&members.every(m=>m.name.trim());
  function save(){
    if(!canSave)return;
    /* Derive canonical agencyId (e.g. "CESA(KR)") from name+nat fields, or keep existing */
    const computedAgencyId=(agencyName&&agencyNat)
      ?agencyName.trim().toUpperCase()+"("+agencyNat.trim().toUpperCase()+")"
      :(initialCard?.agencyId||"");
    onSave({
      id:initialCard?.id||"card_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
      type,status,notes,attachments,
      agencyNat:agencyNat||"",agencyName:agencyName||"",consultant:consultant||"",
      agencyId:computedAgencyId||initialCard?.agencyId||"",
      members:(type==="Group/Family"?sortByAge(members):members).map(m=>({...m,name:m.name.trim()})),
    });
  }
  const isFamily=type==="Group/Family";
  return(
    <React.Fragment>
      {dormSheetRoom!==null&&kanbanCards&&ReactDOM.createPortal(
        <DormitorySheetModal kanbanCards={kanbanCards} targetRoom={dormSheetRoom} onClose={()=>setDormSheetRoom(null)}/>,
        document.body
      )}
      {ReactDOM.createPortal(
    <div className="ed-bg" ref={scrollContainerRef} onClick={e=>{if(e.target===e.currentTarget)tryClose();}}
      style={{alignItems:"flex-start",overflowY:"auto",paddingTop:20,paddingBottom:20}}>
      {/* Outer wrapper: click-stop + relative anchor for sticky X */}
      <div style={{position:"relative",width:"100%",maxWidth:780,flexShrink:0}} onClick={e=>e.stopPropagation()}>
        {/* ✕ button: sticky to top of wrapper, always visible even when modal is wide */}
        <button onClick={onClose}
          style={{position:"sticky",top:0,float:"right",zIndex:20,background:"white",border:"1.5px solid #e2e8f0",
            borderRadius:8,cursor:"pointer",fontSize:18,color:"#6b7280",lineHeight:1,
            width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",
            marginBottom:4,boxShadow:"0 1px 4px rgba(0,0,0,.12)"}}>✕</button>
        <div style={{clear:"both"}}/>
        <div className={`ed-box${shaking?" modal-shake":""}`}
          style={{maxWidth:"100%",maxHeight:"none",overflowY:"visible",padding:20,marginTop:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{fontSize:15,fontWeight:800,color:readOnly?"#6b21a8":"#1e3a8a"}}>{readOnly?"👁 View Student Card":initialCard?.id?"✏️ Edit Student Card":"➕ New Student"}</h3>
            <button type="button" onClick={()=>setShowIdPanel(p=>!p)}
              title={showIdPanel?"Hide ID card panel":"Show ID card panel"}
              style={{padding:"5px 12px",background:showIdPanel?"#0d9488":"#f1f5f9",color:showIdPanel?"white":"#64748b",border:"1.5px solid",borderColor:showIdPanel?"#0d9488":"#e2e8f0",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              {showIdPanel?"🪪 Hide ID":"🪪 Show ID"}
            </button>
          </div>
          {readOnly&&<div style={{marginBottom:10,padding:"7px 12px",background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:7,fontSize:11,color:"#6b21a8",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
            <span>👁</span><span>읽기 전용 — 내용을 변경할 수 없습니다.</span>
          </div>}
          {!readOnly&&isNewCard&&<div style={{marginBottom:10,padding:"6px 10px",background:"#fef9c3",border:"1px solid #fde047",borderRadius:7,fontSize:11,color:"#713f12"}}>
            💡 정보 입력 중 — 저장하지 않으려면 오른쪽 상단 <strong>✕</strong> 버튼을 누르세요.
          </div>}

        {/* Two-column: form left | ID card right */}
        <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
        <div style={{flex:"0 0 380px",minWidth:0,maxWidth:380}}>
        {/* Form content wrapper — pointer-events blocked in readOnly mode */}
        <div style={{pointerEvents:readOnly?"none":"auto",opacity:readOnly?0.82:1}}>
        {/* Status selector */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",marginBottom:5}}>Status</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {KANBAN_COLS.map(col=>(
              <button key={col.id} onClick={()=>setStatus(col.id)}
                style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
                  border:`1.5px solid ${status===col.id?col.color:"#e2e8f0"}`,
                  background:status===col.id?col.bg:"white",color:status===col.id?col.color:"#374151"}}>
                {col.icon} {col.label.split(" ")[0]}
              </button>
            ))}
          </div>
        </div>

        {/* Type selector */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",marginBottom:5}}>Student Type <span style={{color:"#dc2626"}}>*</span></div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {CARD_TYPES.map(t=>(
              <button key={t} onClick={()=>selectType(t)}
                style={{padding:"6px 14px",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer",
                  border:`2px solid ${t===type?"#1e40af":"#e2e8f0"}`,
                  background:t===type?"#1e40af":"white",color:t===type?"white":"#374151"}}>
                {CARD_TYPE_ICON[t]} {t}
              </button>
            ))}
          </div>
        </div>

        {/* Agency + Consultant */}
        {(()=>{
          const regAgencyId=initialCard?.agencyId||null;
          const agNats=agencies?[...new Set(agencies.map(a=>a.nationality).filter(Boolean))].sort():[];
          const agNames=agencies?(agencyNat?agencies.filter(a=>a.nationality===agencyNat):agencies).map(a=>a.name).filter(Boolean).sort():[];
          return(
            <div style={{marginBottom:12,padding:"10px 12px",background:"#faf5ff",border:"1.5px solid #ddd6fe",borderRadius:8}}>
              {regAgencyId&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,padding:"3px 8px",background:"#f3e8ff",borderRadius:6}}>
                <span style={{fontSize:11}}>🏢</span>
                <span style={{fontSize:11,fontWeight:800,color:"#7c3aed"}}>{regAgencyId}</span>
                <span style={{fontSize:10,color:"#9ca3af"}}>Registered via agency</span>
              </div>}
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:"0 0 100px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#7c3aed",marginBottom:3}}>🌍 Nationality</div>
                  <select value={agencyNat} onChange={e=>{setAgencyNat(e.target.value);setAgencyName("");}}
                    style={{width:"100%",padding:"5px 8px",border:"1.5px solid #ddd6fe",borderRadius:6,fontSize:11,background:"white",color:"#374151"}}>
                    <option value="">— select —</option>
                    {agNats.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#7c3aed",marginBottom:3}}>🏢 Agency</div>
                  <select value={agencyName} onChange={e=>setAgencyName(e.target.value)}
                    style={{width:"100%",padding:"5px 8px",border:"1.5px solid #ddd6fe",borderRadius:6,fontSize:11,background:"white",color:"#374151"}}>
                    <option value="">— select —</option>
                    {agNames.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div style={{flex:"0 0 110px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#7c3aed",marginBottom:3}}>👤 Consultant</div>
                  <input value={consultant} onChange={e=>setConsultant(e.target.value)} placeholder="name"
                    style={{width:"100%",padding:"5px 8px",border:"1.5px solid #ddd6fe",borderRadius:6,fontSize:11,background:"white",color:"#374151",boxSizing:"border-box"}}/>
                </div>
              </div>
            </div>
          );
        })()}
        {/* Notes & Attachments */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",marginBottom:5}}>📝 Notes / Memo</div>
          <textarea
            value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Visa status, special requests, level test results, etc."
            style={{width:"100%",padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:12,
              outline:"none",resize:"vertical",minHeight:72,fontFamily:"inherit",boxSizing:"border-box",color:"#374151"}}
            onFocus={e=>e.target.style.borderColor="#3b82f6"}
            onBlur={e=>e.target.style.borderColor="#e2e8f0"}
          />
        </div>

        {/* File Attachments */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase"}}>
              📎 Attachments {attachments.length>0&&<span style={{background:"#dbeafe",color:"#1d4ed8",borderRadius:10,padding:"1px 7px",marginLeft:4}}>{attachments.length}</span>}
            </div>
            <button onClick={()=>fileInputRef.current?.click()}
              style={{padding:"4px 10px",background:"#eff6ff",color:"#1d4ed8",border:"1px solid #bfdbfe",
                borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>
              ＋ Upload File
            </button>
            <input ref={fileInputRef} type="file" multiple style={{display:"none"}}
              accept=".pdf,.jpg,.jpeg,.png,.gif,.doc,.docx,.xls,.xlsx,.txt,.zip"
              onChange={e=>{
                const files=Array.from(e.target.files||[]);
                files.forEach(file=>{
                  if(file.size>5*1024*1024){alert(file.name+" is over 5MB. For large files, use Supabase Storage.");return;}
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    const att={id:"att_"+Date.now()+"_"+Math.random().toString(36).slice(2,5),
                      name:file.name,size:file.size,ftype:file.type,data:ev.target.result,uploadedAt:new Date().toISOString()};
                    setAttachments(p=>[...p,att]);
                  };
                  reader.readAsDataURL(file);
                });
                e.target.value="";
              }}
            />
          </div>
          {attachments.length===0&&(
            <div style={{border:"1.5px dashed #e2e8f0",borderRadius:7,padding:"12px",textAlign:"center",color:"#9ca3af",fontSize:11}}>
              No files attached. Upload flight tickets, passport copies, level test results, etc.
            </div>
          )}
          {attachments.map(att=>{
            const isImg=att.ftype?.startsWith("image/");
            const isPdf=att.ftype==="application/pdf";
            const icon=isImg?"🖼️":isPdf?"📄":"📁";
            const kb=(att.size/1024).toFixed(0);
            return(
              <div key={att.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
                background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,marginBottom:5}}>
                <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.name}</div>
                  <div style={{fontSize:10,color:"#9ca3af"}}>{kb} KB · {new Date(att.uploadedAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                </div>
                <a href={att.data} download={att.name}
                  style={{padding:"3px 9px",background:"#dbeafe",color:"#1d4ed8",borderRadius:5,fontSize:11,fontWeight:700,textDecoration:"none",whiteSpace:"nowrap"}}>
                  ⬇ Save
                </a>
                {isImg&&(
                  <a href={att.data} target="_blank" rel="noreferrer"
                    style={{padding:"3px 9px",background:"#d1fae5",color:"#166534",borderRadius:5,fontSize:11,fontWeight:700,textDecoration:"none",whiteSpace:"nowrap"}}>
                    👁 View
                  </a>
                )}
                <button onClick={()=>setAttachments(p=>p.filter(a=>a.id!==att.id))}
                  style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:15,lineHeight:1,padding:"2px 4px"}}>✕</button>
              </div>
            );
          })}
          {attachments.length>0&&(
            <div style={{fontSize:10,color:"#94a3b8",marginTop:4}}>
              💡 Files stored locally. For long-term cloud storage, connect Supabase Storage.
            </div>
          )}
        </div>

        {/* Member forms */}
        {type&&(
          <div>
            <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",marginBottom:6}}>
              {isFamily?"Family Members":"Student Information"}
            </div>
            {members.map((m,i)=>(
              <MemberForm key={i} index={i} member={m} isFamily={isFamily}
                onChange={m2=>updateMember(i,m2)}
                showRemove={isFamily&&members.length>1}
                onRemove={()=>removeMember(i)}
                siblings={isFamily?members.filter((_,j)=>j!==i):[]}
                onDormSheet={kanbanCards?rn=>setDormSheetRoom(rn):null}/>
            ))}
            {isFamily&&(
              <button onClick={addMember}
                style={{width:"100%",padding:"8px",border:"1.5px dashed #3b82f6",borderRadius:8,background:"#eff6ff",color:"#1d4ed8",cursor:"pointer",fontSize:12,fontWeight:600,marginBottom:8}}>
                ＋ Add Family Member
              </button>
            )}
          </div>
        )}

        </div>{/* end readOnly form wrapper */}
        {readOnly?(
          <div style={{marginTop:10}}>
            <button onClick={onClose} style={{width:"100%",padding:11,background:"#7c3aed",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>✕ 닫기</button>
          </div>
        ):(
          <>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={save} disabled={!canSave}
              style={{flex:1,padding:10,background:canSave?"#1e40af":"#cbd5e1",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:canSave?"pointer":"not-allowed",fontSize:14}}>
              {initialCard?.id?"Save Changes":"Add to Board"}
            </button>
            <button onClick={onClose} style={{padding:"10px 18px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:13}}>Cancel</button>
          </div>
          {(onDelete||onArchive)&&(
            <div style={{display:"flex",justifyContent:"center",gap:20,marginTop:8,paddingTop:8,borderTop:"1px solid #f1f5f9"}}>
              {onArchive&&(
                <button onClick={()=>{onClose();onArchive();}}
                  style={{background:"none",border:"none",color:isArchived?"#1d4ed8":"#64748b",cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4,padding:"4px 8px",borderRadius:6,transition:"background .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=isArchived?"#eff6ff":"#f1f5f9"}
                  onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  {isArchived?"↩ Unarchive":"📦 Archive"}
                </button>
              )}
              {onDelete&&(
                <button onClick={()=>{onClose();onDelete();}}

              </label>
              <label title="Upload bottom banner" style={{padding:"3px 8px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:5,fontSize:10,fontWeight:700,color:"#1d4ed8",cursor:"pointer",whiteSpace:"nowrap"}}>
                ⬆ Bot<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>saveBanner("bottom",ev.target.result);r.readAsDataURL(f);e.target.value="";}}/>
              </label>
              {bannerTop&&<button type="button" onClick={()=>saveBanner("top","")} style={{padding:"3px 6px",background:"none",border:"1px solid #fca5a5",borderRadius:5,fontSize:10,color:"#dc2626",cursor:"pointer"}}>✕T</button>}
              {bannerBottom&&<button type="button" onClick={()=>saveBanner("bottom","")} style={{padding:"3px 6px",background:"none",border:"1px solid #fca5a5",borderRadius:5,fontSize:10,color:"#dc2626",cursor:"pointer"}}>✕B</button>}
            </div>
          </div>
          {members.length>1&&<div style={{fontSize:10,color:"#64748b",marginBottom:6,textAlign:"center",padding:"3px 8px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0"}}>
            Showing Member {activeMemberIdx+1} / {members.length} — scroll to switch
          </div>}
          <StudentIDCard member={members[activeMemberIdx]||members[0]||{}} cardId={initialCard?.id||""} bannerTop={bannerTop} bannerBottom={bannerBottom}/>
          <button type="button"
            onClick={()=>{
              const printHtml=generatePrintHTML(members,initialCard?.id||"",bannerTop,bannerBottom);
              const w=window.open("","_blank","width=520,height=720");
              w.document.write(printHtml);
              w.document.close();
            }}
            style={{marginTop:10,width:"100%",padding:"9px",background:"#0d9488",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
            🖨️ Print All ID Cards ({members.filter(m=>m.name).length})
          </button>

        </div>{/* end flex row */}
        </div>{/* end ed-box */}
      </div>{/* end outer wrapper */}
    </div>,
    document.body
      )}
    </React.Fragment>
  );
}

/* ═════════════════════════════════════════════════════
   CurrentStudentListPage  — individual member rows with filters
═════════════════════════════════════════════════════ */
function CurrentStudentListPage({kanbanCards}){
  const CURRENT_STATUSES=["current","leaving"];
  /* Flatten all members from current/leaving cards into individual rows */
  const allMembers=React.useMemo(()=>{
    const rows=[];
    kanbanCards.filter(c=>CURRENT_STATUSES.includes(c.status)).forEach(card=>{
      (card.members||[]).forEach(m=>{
        if(!m.name)return;
        const age=m.birthYear?new Date().getFullYear()-parseInt(m.birthYear):null;
        rows.push({
          cardId:card.id,
          cardType:card.type,
          name:m.name,
          birthYear:m.birthYear||"",
          birthMonth:m.birthMonth||"",
          birthDay:m.birthDay||"",
          age,
          nationality:m.nationality||"",
          studyStart:m.studyStart||"",
          studyEnd:m.studyEnd||"",
          course:m.course||"",
          roomType:m.roomType||"",
          roomNumber:m.roomNumber||"",
          status:card.status,
          gender:m.gender||"",
          loginId:m.loginId||"",
          loginPassword:m.loginPassword||"hana123",
        });
      });
    });
    return rows; /* sorting handled by sortedFiltered below */
  },[kanbanCards]);

  /* Collect unique filter options */
  const nationalities=React.useMemo(()=>[...new Set(allMembers.map(r=>r.nationality).filter(Boolean))].sort(),[allMembers]);
  const courses=React.useMemo(()=>[...new Set(allMembers.map(r=>r.course).filter(Boolean))].sort(),[allMembers]);
  const roomTypes=React.useMemo(()=>[...new Set(allMembers.map(r=>r.roomType).filter(Boolean))].sort(),[allMembers]);

  /* Filter state */
  const[search,setSearch]=React.useState("");
  const[fNat,setFNat]=React.useState("");
  const[fCourse,setFCourse]=React.useState("");
  const[fRoomType,setFRoomType]=React.useState("");
  const[fRoomNo,setFRoomNo]=React.useState("");
  const[fAgeMin,setFAgeMin]=React.useState("");
  const[fAgeMax,setFAgeMax]=React.useState("");
  const[fPeriodFrom,setFPeriodFrom]=React.useState(""); /* YYYY-MM-DD — range start (any day, snapped to Sun) */
  const[fPeriodTo,setFPeriodTo]=React.useState("");     /* YYYY-MM-DD — range end   (any day, snapped to Sat) */
  const[sortDir,setSortDir]=React.useState("desc");     /* "desc" = newest first, "asc" = oldest first */

  /* Snap a date string to the Sunday of its week (local time) */
  function toSunday(dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr+"T00:00:00");
    if(isNaN(d))return null;
    d.setDate(d.getDate()-d.getDay());
    d.setHours(0,0,0,0);
    return d;
  }
  /* Snap a date string to the Saturday of its week (local time) */
  function toSaturday(dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr+"T00:00:00");
    if(isNaN(d))return null;
    d.setDate(d.getDate()+(6-d.getDay()));
    d.setHours(23,59,59,999);
    return d;
  }
  function parseDate(str){
    if(!str)return null;
    const d=new Date(str+"T00:00:00");
    return isNaN(d)?null:d;
  }
  /* Display the Sunday of a studyStart date (local time) */
  function studySunday(dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr+"T00:00:00");
    if(isNaN(d))return null;
    d.setDate(d.getDate()-d.getDay());
    return d;
  }
  /* Display the Saturday of a studyEnd date (local time) */
  function studySaturday(dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr+"T00:00:00");
    if(isNaN(d))return null;
    d.setDate(d.getDate()+(6-d.getDay()));
    return d;
  }
  /* Total weeks between a Sunday and Saturday (inclusive) */
  function calcWeeks(sunDate,satDate){
    if(!sunDate||!satDate)return null;
    const days=Math.round((satDate-sunDate)/(86400000));
    return Math.round((days+1)/7);
  }
  function fmtDate(d){
    if(!d)return"—";
    return d.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});
  }

  const rangeFrom=React.useMemo(()=>toSunday(fPeriodFrom),[fPeriodFrom]);
  const rangeTo  =React.useMemo(()=>toSaturday(fPeriodTo),[fPeriodTo]);

  const filtered=React.useMemo(()=>{
    const q=search.toLowerCase();
    return allMembers.filter(r=>{
      if(q&&!r.name.toLowerCase().includes(q))return false;
      if(fNat&&r.nationality!==fNat)return false;
      if(fCourse&&r.course!==fCourse)return false;
      if(fRoomType&&r.roomType!==fRoomType)return false;
      if(fRoomNo&&!r.roomNumber.toLowerCase().includes(fRoomNo.toLowerCase()))return false;
      if(fAgeMin&&(r.age===null||r.age<parseInt(fAgeMin)))return false;
      if(fAgeMax&&(r.age===null||r.age>parseInt(fAgeMax)))return false;
      const start=parseDate(r.studyStart);
      const end  =parseDate(r.studyEnd);
      /* rangeFrom only: student must not have ended before rangeFrom */
      if(rangeFrom&&!rangeTo){
        if(end&&end<rangeFrom)return false;
      }
      /* rangeTo only: student must have started by rangeTo */
      if(!rangeFrom&&rangeTo){
        if(start&&start>rangeTo)return false;
      }
      /* both: student period overlaps [rangeFrom, rangeTo] */
      if(rangeFrom&&rangeTo){
        if(start&&start>rangeTo)return false;
        if(end&&end<rangeFrom)return false;
      }
      return true;
    });
  },[allMembers,search,fNat,fCourse,fRoomType,fRoomNo,fAgeMin,fAgeMax,rangeFrom,rangeTo]);

  const sortedFiltered=React.useMemo(()=>{
    return [...filtered].sort((a,b)=>{
      const da=a.studyStart?new Date(a.studyStart+"T00:00:00"):null;
      const db=b.studyStart?new Date(b.studyStart+"T00:00:00"):null;
      if(!da&&!db)return 0;
      if(!da)return 1;
      if(!db)return -1;
      return sortDir==="desc"?db-da:da-db;
    });
  },[filtered,sortDir]);

  const STATUS_COLOR={current:"#d1fae5",leaving:"#fef3c7"};
  const STATUS_TEXT={current:"재학중",leaving:"졸업예정"};

  function clearFilters(){
    setSearch("");setFNat("");setFCourse("");setFRoomType("");
    setFRoomNo("");setFAgeMin("");setFAgeMax("");setFPeriodFrom("");setFPeriodTo("");
  }
  const hasFilter=search||fNat||fCourse||fRoomType||fRoomNo||fAgeMin||fAgeMax||fPeriodFrom||fPeriodTo;

  return(
    <div>
      <div className="pg-wrap">
        <span className="pg-badge" style={{background:"#dbeafe",color:"#1d4ed8"}}>STUDENT ROSTER</span>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <h2 className="pg-title">Current Student List</h2>
            <p className="pg-sub"><span style={{fontWeight:700,color:"#0d9488"}}>{sortedFiltered.length}</span> of <span style={{fontWeight:700}}>{allMembers.length}</span> students shown</p>
          </div>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{background:"white",border:"none",borderRadius:16,padding:"16px 18px",marginBottom:18,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {/* Name search */}
          <input className="sb" placeholder="🔍 Search name…" value={search} onChange={e=>setSearch(e.target.value)}
            style={{maxWidth:180,fontSize:12}}/>

          {/* Nationality */}
          <select className="flt" value={fNat} onChange={e=>setFNat(e.target.value)}>
            <option value="">All Nationalities</option>
            {nationalities.map(n=><option key={n} value={n}>{n}</option>)}
          </select>

          {/* Course */}
          <select className="flt" value={fCourse} onChange={e=>setFCourse(e.target.value)}>
            <option value="">All Courses</option>
            {courses.map(c=><option key={c} value={c}>{c}</option>)}
          </select>

          {/* Room Type */}
          <select className="flt" value={fRoomType} onChange={e=>setFRoomType(e.target.value)}>
            <option value="">All Room Types</option>
            {roomTypes.map(r=><option key={r} value={r}>{r}</option>)}
          </select>

          {/* Room Number */}
          <input className="flt" placeholder="Room #" value={fRoomNo} onChange={e=>setFRoomNo(e.target.value)}
            style={{width:70}}/>

          {/* Age range */}
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <input className="flt" type="number" placeholder="Age min" value={fAgeMin} onChange={e=>setFAgeMin(e.target.value)}
              style={{width:72}}/>
            <span style={{fontSize:12,color:"#9ca3af"}}>–</span>
            <input className="flt" type="number" placeholder="Age max" value={fAgeMax} onChange={e=>setFAgeMax(e.target.value)}
              style={{width:72}}/>
          </div>

          {/* Study period range filter */}
          <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"#6b7280",fontWeight:600,whiteSpace:"nowrap"}}>Study period:</span>
            <div style={{display:"flex",alignItems:"center",gap:3}}>
              <CalendarPicker snapTo="sunday" value={fPeriodFrom} onChange={v=>setFPeriodFrom(v)} placeholder="From (Sun)"
                style={{padding:"7px 10px",border:"1.5px solid #e2e8f0",borderRadius:"7px",fontSize:"12px",background:"white",color:"#374151",width:"130px",cursor:"pointer"}}/>
              <span style={{fontSize:12,color:"#9ca3af"}}>–</span>
              <CalendarPicker snapTo="saturday" value={fPeriodTo} onChange={v=>setFPeriodTo(v)} placeholder="To (Sat)"
                style={{padding:"7px 10px",border:"1.5px solid #e2e8f0",borderRadius:"7px",fontSize:"12px",background:"white",color:"#374151",width:"130px",cursor:"pointer"}}/>
            </div>
          </div>

          {hasFilter&&(
            <button onClick={clearFilters}
              style={{padding:"7px 12px",border:"1.5px solid #fca5a5",borderRadius:7,background:"#fef2f2",
                color:"#dc2626",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              ✕ Clear
            </button>
          )}
        </div>

        {(rangeFrom||rangeTo)&&(
          <div style={{marginTop:8,fontSize:11,color:"#6b7280"}}>
            {rangeFrom&&rangeTo
              ?<>Showing students enrolled between: <strong>{fmtDate(rangeFrom)} – {fmtDate(rangeTo)}</strong></>
              :rangeFrom
              ?<>Showing students enrolled from: <strong>{fmtDate(rangeFrom)}</strong> onwards</>
              :<>Showing students enrolled up to: <strong>{fmtDate(rangeTo)}</strong></>
            }
          </div>
        )}
      </div>

      {/* Table */}
      <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table className="lt" style={{minWidth:700}}>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th style={{whiteSpace:"nowrap"}}>ID / PW</th>
                <th>Gender</th>
                <th>Birthday</th>
                <th>Nationality</th>
                <th style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}}
                  onClick={()=>setSortDir(d=>d==="desc"?"asc":"desc")}>
                  Start date {sortDir==="desc"?"↓":"↑"}
                </th>
                <th>End date</th>
                <th style={{textAlign:"center"}}>Total weeks</th>
                <th>Course</th>
                <th>Room Type</th>
                <th>Room #</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {sortedFiltered.length===0?(
                <tr><td colSpan={13} style={{textAlign:"center",padding:32,color:"#9ca3af",fontSize:13}}>
                  No students match the current filters.
                </td></tr>
              ):sortedFiltered.map((r,i)=>(
                <tr key={r.cardId+"-"+r.name}>
                  <td style={{color:"#9ca3af",fontSize:11}}>{i+1}</td>
                  <td style={{fontWeight:700,color:"#1e3a8a"}}>{r.name}</td>
                  <td style={{fontSize:11}}>{r.loginId?<><code style={{fontWeight:700,color:"#1e40af"}}>{r.loginId}</code><span style={{color:"#6b7280",marginLeft:4}}>/ {r.loginPassword||"hana123"}</span></>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                  <td style={{textAlign:"center"}}>
                    {r.gender==="M"?<span style={{display:"inline-block",padding:"2px 7px",borderRadius:8,background:"#eff6ff",color:"#1d4ed8",fontSize:11,fontWeight:700}}>♂ M</span>
                    :r.gender==="F"?<span style={{display:"inline-block",padding:"2px 7px",borderRadius:8,background:"#fdf2f8",color:"#db2777",fontSize:11,fontWeight:700}}>♀ F</span>
                    :<span style={{color:"#d1d5db"}}>—</span>}
                  </td>
                  <td style={{whiteSpace:"nowrap"}}>
                    {(()=>{
                      const MSHORT=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                      const y=r.birthYear,mo=r.birthMonth?MSHORT[parseInt(r.birthMonth)]:"",dy=r.birthDay?parseInt(r.birthDay):"";
                      if(!y&&!mo&&!dy)return<span style={{color:"#d1d5db"}}>—</span>;
                      const md=[mo,dy].filter(Boolean).join(" ");
                      const dateStr=[y,md].filter(Boolean).join(" · ");
                      return(
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:"#374151"}}>{dateStr}</div>
                          {r.age!==null&&<div style={{fontSize:10,color:"#6b7280",marginTop:1}}>{r.age} yrs</div>}
                        </div>
                      );
                    })()}
                  </td>
                  <td>{r.nationality||"—"}</td>
                  {(()=>{
                    const sun=studySunday(r.studyStart);
                    const sat=studySaturday(r.studyEnd);
                    const wks=calcWeeks(sun,sat);
                    return(<>
                      <td style={{fontSize:11,color:"#374151",whiteSpace:"nowrap"}}>
                        {sun?<div><div style={{fontWeight:600}}>{sun.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"})}</div><div style={{fontSize:10,color:"#9ca3af"}}>Sun</div></div>:"—"}
                      </td>
                      <td style={{fontSize:11,color:"#374151",whiteSpace:"nowrap"}}>
                        {sat?<div><div style={{fontWeight:600}}>{sat.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"})}</div><div style={{fontSize:10,color:"#9ca3af"}}>Sat</div></div>:"—"}
                      </td>
                      <td style={{textAlign:"center"}}>
                        {wks!==null?<span style={{display:"inline-block",padding:"2px 8px",borderRadius:8,background:"#eff6ff",color:"#1d4ed8",fontSize:11,fontWeight:700}}>{wks}w</span>:"—"}
                      </td>
                    </>);
                  })()}
                  <td>
                    {r.course?(
                      <span style={{display:"inline-block",padding:"2px 8px",borderRadius:8,
                        background:getCourseColor(r.course),fontSize:11,fontWeight:600}}>

                      </span>
                    ):"—"}
                  </td>
                  <td>{r.roomType||"—"}</td>
                  <td style={{fontWeight:600}}>{r.roomNumber||"—"}</td>
                  <td>
                    <span style={{display:"inline-block",padding:"2px 8px",borderRadius:8,
                      background:STATUS_COLOR[r.status]||"#f1f5f9",fontSize:11,fontWeight:700,
                      color:r.status==="current"?"#166534":r.status==="leaving"?"#92400e":"#374151"}}>
                      {STATUS_TEXT[r.status]||r.status}
                    </span>
                  </td>
                </tr>
              ))}
