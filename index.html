<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hana Academy LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f8f6;min-height:100vh;zoom:0.97;}
    body.pan-active{cursor:grabbing!important;}
    body.pan-active *{cursor:grabbing!important;user-select:none!important;}

    /* ── Page header pattern (website-style) ── */
    .pg-wrap{margin-bottom:28px;}
    .pg-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:10.5px;font-weight:800;letter-spacing:.9px;margin-bottom:10px;text-transform:uppercase;}
    .pg-title{font-size:22px;font-weight:800;color:#0f172a;margin-bottom:5px;line-height:1.25;}
    .pg-sub{font-size:13px;color:#64748b;line-height:1.5;}
    .pg-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px;}

    /* ── Schedule tables ── */
    .sw{overflow-x:auto;border-radius:14px;box-shadow:0 3px 20px rgba(0,0,0,.08);}
    .st{border-collapse:collapse;font-size:11px;min-width:100%;}
    .st th{padding:8px 6px;border:1px solid rgba(255,255,255,.2);white-space:nowrap;text-align:center;font-weight:700;}
    .st td{border:1px solid #e2e8f0;padding:0;height:38px;vertical-align:middle;position:relative;}
    .cn{min-width:135px;padding:5px 10px;font-weight:600;font-size:12px;position:sticky;left:0;z-index:5;text-align:left;border-right:2px solid #e2e8f0;}
    .cn-t{background:#f0fdfa;} .cn-s{background:#f0fdf4;} .cn-absent{background:#fef2f2!important;}
    .ct{cursor:pointer;transition:background .12s;}
    .ce{background:#fff;} .ce:hover{background:#f8fafc;}
    .cst{background:#dbeafe;} .cst:hover{background:#bfdbfe;}
    .cgr{background:#d1fae5;} .cgr:hover{background:#a7f3d0;}
    .csp{background:#fef9c3;font-style:italic;} .csp:hover{background:#fef08a;}
    .cab{background:#fee2e2!important;opacity:.55;}
    .csub{background:#fef3c7!important;border:2px solid #f59e0b!important;}
    .ci{padding:3px 5px;text-align:center;line-height:1.3;user-select:none;}
    .sub-b{font-size:9px;font-weight:800;color:#b45309;}
    .orig-s{text-decoration:line-through;color:#9ca3af;font-size:10px;}

    /* ── Dropdown ── */
    .ddp{position:fixed;z-index:9999;background:white;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.16);width:230px;overflow:hidden;}
    .ddsw{padding:8px 8px 4px;border-bottom:1px solid #f1f5f9;}
    .dds{width:100%;padding:6px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;}
    .dds:focus{border-color:#0d9488;}
    .ddl{max-height:200px;overflow-y:auto;padding:4px;}
    .ddi{display:block;width:100%;text-align:left;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;border:none;background:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ddi:hover{background:#f0fdfa;color:#0d9488;}
    .ddi.dda{font-weight:700;color:#0d9488;background:#f0fdfa;}
    .ddi.ddc{color:#ef4444;} .ddi.ddc:hover{background:#fef2f2;color:#ef4444;}
    .ddi.fill{color:#0d9488;font-weight:700;} .ddi.fill:hover{background:#f0fdfa;color:#0d9488;}
    .ddsp{border:none;border-top:1px solid #f1f5f9;margin:3px 0;}
    .ddgh{font-size:10px;color:#94a3b8;font-weight:700;padding:5px 10px 2px;letter-spacing:.5px;}
    .ddem{padding:10px;color:#9ca3af;font-size:12px;text-align:center;}
    .ddm{background:#fef08a;border-radius:2px;}
    .ddl::-webkit-scrollbar{width:4px;}
    .ddl::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px;}

    /* ── Absence ── */
    .bad-abs{font-size:9px;font-weight:800;color:#dc2626;background:#fee2e2;border-radius:4px;padding:1px 5px;margin-left:4px;}

    /* ── Nav & tabs ── */
    .page-nav{display:flex;gap:5px;margin-bottom:0;flex-wrap:wrap;position:sticky;top:var(--header-h,54px);z-index:40;background:white;padding:10px 20px;margin-left:-20px;margin-right:-20px;border-bottom:1.5px solid #e2f4f0;box-shadow:0 2px 12px rgba(13,148,136,.07);}
    .pnb{padding:8px 18px;border:1.5px solid #e2e8f0;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;background:white;color:#64748b;transition:all .18s;}
    .pnb:hover{background:#f0fdfa;color:#0d9488;border-color:#99f6e4;}
    .pnb.act{background:#0d9488;color:white;border-color:#0d9488;box-shadow:0 3px 12px rgba(13,148,136,.3);}
    .tab-bar{display:flex;gap:2px;border-bottom:2px solid #e2e8f0;margin-bottom:16px;}
    .tbb{padding:10px 20px;font-size:14px;font-weight:700;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;}
    .day-tab{padding:7px 14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}

    /* ── Cards ── */
    .card{background:white;border-radius:16px;padding:20px;border:none;box-shadow:0 2px 20px rgba(0,0,0,.07);}

    /* ── Classroom pages ── */
    .rm-tbl{border-collapse:collapse;min-width:100%;font-size:11px;}
    .rm-tbl th{padding:8px 5px;text-align:center;font-weight:700;white-space:nowrap;border:1px solid rgba(255,255,255,.2);}
    .rm-tbl td{border:1px solid #e2e8f0;padding:0;height:40px;vertical-align:middle;position:relative;}
    .rm-name{min-width:60px;font-weight:700;font-size:13px;text-align:center;padding:0 8px;background:#f8fafc;border-right:2px solid #e2e8f0;position:sticky;left:0;z-index:5;}
    .gc-cell{padding:3px 5px;text-align:center;font-size:10px;line-height:1.4;}
    .ct-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;margin-top:1px;}
    .drag-over{background:#bfdbfe!important;outline:2px dashed #3b82f6!important;}
    .drag-over-conflict{background:#fee2e2!important;outline:2px dashed #ef4444!important;cursor:no-drop!important;}
    .dragging{opacity:.45;}
    .cell-meta{font-size:9px;font-weight:700;color:#0d9488;line-height:1.2;margin-bottom:1px;}
    .cell-sub-meta{font-size:9px;color:#9ca3af;line-height:1.2;}

    /* ── Group room popup ── */
    .grp-pop{position:fixed;z-index:9999;background:white;border:1px solid #cbd5e1;border-radius:14px;box-shadow:0 15px 40px rgba(0,0,0,.2);width:280px;padding:16px;}
    .ct-btn{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#374151;margin:3px 2px;}
    .ct-btn.act{background:#0d9488;color:white;border-color:#0d9488;}

    /* ── Teacher popup modal ── */
    .t-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 16px;}
    .t-modal{background:white;border-radius:16px;padding:26px;max-width:500px;width:100%;max-height:none;overflow-y:visible;box-shadow:0 25px 60px rgba(0,0,0,.22);}
    .t-modal h3{font-size:17px;font-weight:800;color:#0f172a;margin-bottom:16px;}
    .t-modal-wrap{position:relative;width:100%;max-width:500px;}
    .t-modal-close{position:sticky;top:0;float:right;z-index:20;background:white;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:18px;color:#6b7280;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;box-shadow:0 1px 4px rgba(0,0,0,.12);}
    .t-tbl{width:100%;border-collapse:collapse;}
    .t-tbl th{padding:9px 12px;font-size:12px;color:#0d9488;font-weight:700;border-bottom:2px solid #e2e8f0;text-align:left;background:#f0fdfa;}
    .t-tbl td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f1f5f9;}
    .t-tbl tr:last-child td{border-bottom:none;}
    .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;line-height:1;}

    /* ── List pages ── */
    .lt{width:100%;border-collapse:collapse;}
    .lt th{padding:11px 14px;text-align:left;font-size:11.5px;font-weight:700;color:#0d9488;background:#f0fdfa;border-bottom:2px solid #ccfbf1;}
    .lt td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;}
    .lt tr:hover td{background:#f0fdfa;}
    .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:1px;}
    .tag-t{background:#dbeafe;color:#1d4ed8;} .tag-s{background:#d1fae5;color:#166534;} .tag-g{background:#e9d5ff;color:#6b21a8;}
    .sb{width:100%;max-width:300px;padding:9px 14px;border:1.5px solid #e2e8f0;border-radius:20px;font-size:13px;outline:none;font-family:inherit;}
    .sb:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.1);}

    /* ── Personal schedule ── */
    .ps-t{width:100%;border-collapse:collapse;}
    .ps-t th{padding:9px 14px;font-size:13px;text-align:left;}
    .ps-t td{padding:9px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;}
    .ps-t tr:last-child td{border-bottom:none;}

    /* ── Login ── */
    .lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#0d9488);}
    .lc{background:white;border-radius:20px;padding:40px;width:390px;box-shadow:0 25px 60px rgba(0,0,0,.25);}
    .li{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #d1d5db;font-size:14px;outline:none;font-family:inherit;}
    .li:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.12);}
    .lb{width:100%;padding:12px;background:#0d9488;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
    .lb:hover{background:#0f766e;}
    .ldot{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:4px;border:1px solid #e2e8f0;}
    .name-link{cursor:pointer;border-bottom:1px dashed #5eead4;transition:color .15s;}
    .name-link:hover{color:#0d9488;}
    /* ── Student list ── */
    .flt{padding:8px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:12px;outline:none;background:white;color:#374151;cursor:pointer;font-family:inherit;}
    .flt:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.1);}
    .sched-btn{padding:4px 10px;background:#f0fdfa;color:#0d9488;border:1px solid #99f6e4;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .sched-btn:hover{background:#ccfbf1;}
    .edit-btn{padding:3px 8px;background:#f8fafc;color:#6b7280;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;cursor:pointer;}
    .edit-btn:hover{background:#f0fdfa;color:#0d9488;}
    .rst-btn{padding:6px 12px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;}
    /* ── Edit modal ── */
    .ed-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px;}
    .ed-box{background:white;border-radius:16px;padding:26px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.22);}
    .ed-box::-webkit-scrollbar{width:5px;} .ed-box::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px;}
    @keyframes modal-shake{0%,100%{transform:translateX(0) scale(1)}15%{transform:translateX(-7px) scale(1.01)}35%{transform:translateX(7px) scale(1.01)}55%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .modal-shake{animation:modal-shake .4s ease;}
    .fl{display:flex;gap:14px;flex-wrap:wrap;}
    .fg{flex:1;min-width:140px;margin-bottom:12px;}
    .fl label,.fg label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
    .fi{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;outline:none;font-family:inherit;}
    .fi:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.1);}
    .week-b{display:inline-block;background:#ccfbf1;color:#0d9488;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-left:8px;}
    .course-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;}
    /* ── Kanban ── */
    .kb-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;}
    .kb-col{min-width:230px;max-width:250px;flex:0 0 230px;border-radius:14px;overflow:hidden;border:1.5px solid #e2e8f0;transition:box-shadow .2s,border-color .2s;display:flex;flex-direction:column;height:calc(100vh - var(--header-h,54px) - 160px);box-shadow:0 2px 12px rgba(0,0,0,.05);}
    .kb-col.kb-col-drag-over{border-color:#0d9488;box-shadow:0 0 0 3px #99f6e4;}
    .kb-col-hdr{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid rgba(0,0,0,.05);flex-shrink:0;}
    .kb-cards{padding:8px;min-height:60px;transition:background .15s;overflow-y:scroll;flex:1;}
    .kb-cards::-webkit-scrollbar{width:5px;}
    .kb-cards::-webkit-scrollbar-track{background:transparent;}
    .kb-cards::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
    .kb-cards::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
    .kb-cards::-webkit-scrollbar-thumb:active{background:#475569;}
    .kb-cards.kb-cards-drag-over{background:rgba(13,148,136,.04);}
    .kb-card{background:white;border-radius:10px;padding:12px 13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f1f5f9;cursor:grab;transition:box-shadow .15s,opacity .15s,transform .15s;}
    .kb-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);border-color:#e2e8f0;}
    .kb-card:active{cursor:grabbing;}
    .kb-card.kb-dragging{opacity:.35;transform:scale(.97);box-shadow:none!important;}
    .kb-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
    .kb-add-btn{width:26px;height:26px;border-radius:8px;border:1.5px solid currentColor;background:white;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:700;}
    .kb-move-btn{padding:2px 7px;border:1px solid #e2e8f0;border-radius:5px;background:white;cursor:pointer;font-size:11px;color:#6b7280;line-height:1;}
    .kb-move-btn:hover{background:#f0fdfa;color:#0d9488;}
    .kb-drop-line{height:3px;border-radius:2px;background:#0d9488;margin:0 2px 6px;box-shadow:0 0 6px #5eead4;animation:dropline .25s ease;}
    .kb-drop-zone{height:56px;border-radius:10px;border:2px dashed #5eead4;background:#f0fdfa;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#0d9488;font-weight:600;animation:dropzone .2s ease;}
    @keyframes dropline{from{transform:scaleX(.5);opacity:0}to{transform:scaleX(1);opacity:1}}
    @keyframes dropzone{from{opacity:0;transform:scaleY(.8)}to{opacity:1;transform:scaleY(1)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .member-form{padding:12px;background:#f8fafc;border-radius:10px;margin-bottom:8px;position:relative;border:1px solid #e2e8f0;}
  </style>
</head>
<body>
<div id="root"></div>
<div id="global-err" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#fff1f2;border-bottom:3px solid #dc2626;padding:12px 20px;font-family:monospace">
  <strong style="color:#dc2626;font-size:13px">⚠️ Global JS Error (아래 내용을 복사해 주세요):</strong>
  <pre style="margin:6px 0 0;font-size:11px;color:#1e293b;white-space:pre-wrap;word-break:break-all;max-height:160px;overflow:auto"></pre>
  <button onclick="this.parentNode.style.display='none'" style="margin-top:6px;padding:3px 10px;background:#dc2626;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px">닫기</button>
</div>
<script>
/* LOA letterhead & signature images (outside Babel to avoid parser limits) */
/* ─── Supabase Storage 이미지 URL (lms-assets 버킷에 미리 업로드 필요) ─── */
window.LOA_BANNER_URL = "https://ummzxtfjfwwdvzpsrpym.supabase.co/storage/v1/object/public/lms-assets/loa-banner.jpg"; /* LOA 서류 상단 배너 */
window.LOA_SIG_URL    = "https://ummzxtfjfwwdvzpsrpym.supabase.co/storage/v1/object/public/lms-assets/loa-signature.png"; /* LOA 서명 이미지 */
</script>

<script>
window.HANA_LOGO_SRC  = "https://ummzxtfjfwwdvzpsrpym.supabase.co/storage/v1/object/public/lms-assets/hana-logo.jpg"; /* 학원 로고 (ID카드 등) */
</script>
<script type="text/babel">
/* ── Supabase Cloud Sync Configuration (MUST BE FIRST) ── */
const SUPABASE_URL = 'https://ummzxtfjfwwdvzpsrpym.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtbXp4dGZqZnd3ZHZ6cHNycHltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzU3ODMsImV4cCI6MjA5MzE1MTc4M30.9u4gpsjBtvyPA6qvyUYTiAVoOsj8vez9JetzOWx0Zt8';
const _sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const HANA_SYNC_KEYS = [
  "hana_kanban_v1","hana_sched_v1","hana_week_meta","hana_draft_week","hana_archives",
  "hana_celldata_v1","hana_rooms1on1_v1","hana_grouprosters_v1","hana_absentsets_v1",
  "hana_subsbyday_v1","hana_messages_v1","hana_agencies_v1","hana_agency_pipe_v1",
  "hana_teacher_meta","hana_lunch_period","hana_passwords_v1",
  "hana_meal_plan_v1","hana_meal2_current","hana_meal2_draft","hana_meal2_archives","hana_food_db_custom_v1",
  "hana_id_banner_top","hana_id_banner_bottom"
];

let _syncTimer = null;

async function syncToSupabase() {
  try {
    if(!_sb){console.warn('Supabase not available — skipping sync');return;}
    const data = {};
    HANA_SYNC_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v != null) data[k] = v; });
    const { error } = await _sb.from('app_data').upsert({ id: 'hana_main', data, updated_at: new Date().toISOString() });
    if (error) console.error('Supabase sync error:', error.message);
    else console.log('✅ Synced to Supabase at', new Date().toLocaleTimeString());
  } catch(e) { console.error('Supabase sync failed:', e); }
}

async function loadFromSupabase() {
  try {
    if(!_sb){console.warn('Supabase not available — using local data');return false;}
    const { data, error } = await _sb.from('app_data').select('data').eq('id', 'hana_main').single();
    if (error || !data) { console.log('No cloud data yet — using local data'); return false; }
    let count = 0;
    HANA_SYNC_KEYS.forEach(k => { if (data.data[k] != null) { localStorage.setItem(k, data.data[k]); count++; } });
    console.log('✅ Loaded', count, 'keys from Supabase');
    return true;
  } catch(e) { console.error('Supabase load failed:', e); return false; }
}

/* triggerSync: call this anywhere to schedule a Supabase sync in 3s */
function triggerSync(){
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToSupabase, 3000);
}

/* Auto-sync: override localStorage.setItem for Chrome/Firefox.

function generateLoginId(name,studyStart){
  const words=name.trim().toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(Boolean);
  if(!words.length)return'stu';
  let prefix='';
  if(words.length===1){
    prefix=words[0].slice(0,3);
    while(prefix.length<3)prefix+=words[0].slice(-1)||'x';
  }else{
    prefix=words.map(w=>w[0]).join('').slice(0,3);
    if(prefix.length<3){for(let i=0;i<words.length&&prefix.length<3;i++)if(words[i].length>1)prefix+=words[i][1];}
    prefix=prefix.slice(0,3);
  }
  let datePart='';
  if(studyStart){const m=studyStart.match(/(\d{4})[^\d](\d{2})[^\d](\d{2})/);if(m)datePart=m[1].slice(2)+m[2]+m[3];}
  return prefix+datePart;
}

/* RoomTypeSelector — reusable two-step picker for hotel subtypes
   Uses local state for the primary selection so that choosing
   "Hevea Hotel" keeps the sub-dropdown visible even before a
   sub-type is picked (without resetting parent value to ""). */
function RoomTypeSelector({value,onChange,style}){
  const initCat=getHotelCategory(value);
  const[primary,setPrimary]=useState(initCat||(value||""));
  /* Sync primary when parent resets value externally (e.g. new entry) */
  useEffect(()=>{
    const c=getHotelCategory(value);
    if(c)setPrimary(c);
    else setPrimary(value||"");
  },[value]);
  const activeCat=HOTEL_SUBTYPES[primary]?primary:null;
  const S=style||{width:"100%",padding:"6px 9px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:12,outline:"none",boxSizing:"border-box",background:"white"};
  function onPrimary(ev){
    const v=ev.target.value;
    setPrimary(v);
    if(!HOTEL_SUBTYPES[v])onChange(v); // non-hotel: propagate immediately
    // hotel: wait for sub-selection before propagating
  }
  function onSub(ev){onChange(ev.target.value);}
  return(
    <div>
      <select style={S} value={primary} onChange={onPrimary}>
        <option value="">— Select room type —</option>
        {ROOM_TYPES.map(r=><option key={r} value={r}>{r}</option>)}
      </select>
      {activeCat&&(
        <select style={{...S,marginTop:4,borderColor:"#a5b4fc",background:"#f5f3ff"}} value={value||""} onChange={onSub}>
          <option value="">— Select room option —</option>
          {HOTEL_SUBTYPES[activeCat].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      )}
    </div>
  );
}

/* assignLanes: given an array of bars {startWeekIdx,endWeekIdx,...},
   returns {bars:[{...bar,_lane:number}], numLanes:number}
   such that overlapping bars are placed in different horizontal lanes */
function assignLanes(bars){
  if(!bars||!bars.length)return{bars:[],numLanes:1};
  const sorted=[...bars].sort((a,b)=>a.startWeekIdx-b.startWeekIdx||(a.barKey||"").localeCompare(b.barKey||""));
  const laneEnds=[];/* laneEnds[i] = first weekIdx that is FREE in lane i */
  const result=sorted.map(bar=>{
    let assigned=-1;
    for(let li=0;li<laneEnds.length;li++){
      if(laneEnds[li]<=bar.startWeekIdx){assigned=li;laneEnds[li]=bar.endWeekIdx+1;break;}
    }
    if(assigned===-1){laneEnds.push(bar.endWeekIdx+1);assigned=laneEnds.length-1;}
    return{...bar,_lane:assigned};
  });
  return{bars:result,numLanes:Math.max(1,laneEnds.length)};
}
/* computeConflicts: returns array of {startWeekIdx,endWeekIdx} spans where
   more than `cap` bars overlap simultaneously */
function computeConflicts(bars,cap){
  if(!bars||!bars.length||cap>=999)return[];
  const minW=Math.min(...bars.map(b=>b.startWeekIdx));
  const maxW=Math.max(...bars.map(b=>b.endWeekIdx));
  const conflicts=[];
  let inConflict=false,cStart=-1;
  for(let w=minW;w<=maxW;w++){
    const cnt=bars.filter(b=>b.startWeekIdx<=w&&b.endWeekIdx>=w).length;
    if(cnt>cap){if(!inConflict){inConflict=true;cStart=w;}}
    else{if(inConflict){conflicts.push({startWeekIdx:cStart,endWeekIdx:w-1});inConflict=false;}}
  }
  if(inConflict)conflicts.push({startWeekIdx:cStart,endWeekIdx:maxW});
  return conflicts;
}

function weekRangeLabel(startISO){const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];const s=new Date(startISO+"T12:00:00");const e=new Date(startISO+"T12:00:00");e.setDate(e.getDate()+4);return`${MO[s.getMonth()]} ${s.getDate()} – ${MO[e.getMonth()]} ${e.getDate()}, ${s.getFullYear()}`;}
function weekShortLabel(startISO){const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];const s=new Date(startISO+"T12:00:00");const e=new Date(startISO+"T12:00:00");e.setDate(e.getDate()+4);return`${MO[s.getMonth()]} ${s.getDate()}–${e.getDate()}`;}

function getMealRowOptions(row,customDb){
  const base=row.dbCat==="nightSnack"?FOOD_DB.nightSnack:(FOOD_DB[row.dbCat]?.[row.dbField]||[]);
  if(!customDb)return base;
  const custom=row.dbCat==="nightSnack"?(customDb.nightSnack||[]):(customDb[row.dbCat]?.[row.dbField]||[]);
  const merged=[...base];
  custom.forEach(c=>{if(!merged.includes(c))merged.push(c);});
  return merged;
}

/* Format a Date as YYYY-MM-DD using LOCAL time (not UTC).
   d.toISOString() returns UTC and shifts the date in UTC+9, so we format manually. */
function localDateStr(d){
  const mm=String(d.getMonth()+1).padStart(2,"0");
  const dd=String(d.getDate()).padStart(2,"0");
  return d.getFullYear()+"-"+mm+"-"+dd;
}
/* Normalize member data to a list of room segments.
   Each segment: {roomNumber, from, to}
   If no roomHistory, returns a single segment using the member's own fields. */
function getEffectiveRoomSegments(member){
  if(member.roomHistory&&member.roomHistory.length>0)return member.roomHistory;
  if(!member.studyStart||!member.studyEnd)return[];
  /* Hotel members have no numeric room number — still return a segment so pushBar can route by roomType */
  const rt=member.roomType||"";
  const isHotel=rt.startsWith("Hevea Hotel")||rt.startsWith("Clover Hotel");
  if(!member.roomNumber&&!isHotel)return[];
  return[{roomNumber:member.roomNumber||"",from:member.studyStart,to:member.studyEnd}];
}
/* Add n calendar days to a YYYY-MM-DD string — returns LOCAL date string */
function dateAddDays(dateStr,n){
  const d=new Date(dateStr+"T00:00:00"); // parse as local midnight
  d.setDate(d.getDate()+n);
  return localDateStr(d);               // format in local time (avoids UTC shift)
}
/* Return every Saturday (YYYY-MM-DD) strictly between fromStr and toStr (exclusive).
   Uses local time throughout so dates are correct in any timezone. */
function getSaturdaysBetween(fromStr,toStr){
  const end=new Date(toStr+"T00:00:00");
  const sats=[];
  const d=new Date(fromStr+"T00:00:00");
  d.setDate(d.getDate()+1);           // start the day after fromStr
  while(d<end){
    if(d.getDay()===6)sats.push(localDateStr(d)); // local day-of-week + local date string
    d.setDate(d.getDate()+1);
  }
  return sats;
}

function cellCls(v){if(!v)return"ce";if(GROUPS.includes(v))return"cgr";if(SPECIALS.includes(v))return"csp";return"cst";}
function buildStudentSched(sched){
  const out={};
  /* Build a lookup keyed by sorted-lowercase-words so "KIM DAM" ↔ "DAM KIM" both match */
  const sortKey=s=>s.toLowerCase().split(/\s+/).sort().join(' ');
  const knownKeys=new Set([...STUDENTS,...STUDENTS_INITIAL].map(sortKey));
  for(const[t,ps]of Object.entries(sched)){
    for(const[p,a]of Object.entries(ps)){
      if(!a||typeof a!=='string')continue;
      if(!knownKeys.has(sortKey(a)))continue; /* skip group/activity/non-student values */
      if(!out[a])out[a]={};
      out[a][p]=t;
    }
  }
  return out;
}
/* Flexible name resolver: matches "KIM DAM" ↔ "DAM KIM" (same words, different order) */
function resolveSchedName(targetName,stuSched){
  if(stuSched[targetName])return targetName;
  const sortKey=s=>s.toLowerCase().split(/\s+/).sort().join(' ');
  const tk=sortKey(targetName);
  return Object.keys(stuSched).find(k=>sortKey(k)===tk)||targetName;
}
function freeStudents(sched,pidx,excTeacher){
  const key=pk(pidx),busy=new Set();
  for(const[t,ps]of Object.entries(sched)){if(t===excTeacher)continue;const a=ps[key];if(a&&STUDENTS.includes(a))busy.add(a);}
  return STUDENTS.filter(s=>!busy.has(s));
}
function freeTeachers(sched,pidx,currTeacher,daySubs,absentSet){
  const key=pk(pidx),busy=new Set();
  for(const[t,ps]of Object.entries(sched)){if(t===currTeacher)continue;if(ps[key])busy.add(t);}
  if(daySubs){for(const[,sp]of Object.entries(daySubs)){if(sp[key])busy.add(sp[key]);}}
  return TEACHERS.filter(t=>!busy.has(t)&&!(absentSet&&absentSet.has(t)));
}
function freeSubs(sched,pidx,absentT,daySubs,absentSet){
  const key=pk(pidx),busy=new Set();
  for(const[t,ps]of Object.entries(sched)){if(t===absentT)continue;if(ps[key])busy.add(t);}
  if(daySubs){for(const[at,sp]of Object.entries(daySubs)){if(at===absentT)continue;if(sp[key])busy.add(sp[key]);}}
  return TEACHERS.filter(t=>t!==absentT&&!busy.has(t)&&!(absentSet&&absentSet.has(t)));
}
function findRoom1on1(teacher,pidx,rooms1on1){
  const key=pk(pidx);
  for(const[rm,ps]of Object.entries(rooms1on1)){if(ps[key]===teacher)return rm;}
  return null;
}

/* ═════════════════════════════════════════════════════
   Highlight
═════════════════════════════════════════════════════ */
function HL({text,q}){
  if(!q)return<span>{text}</span>;
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return<span>{text}</span>;
  return<span>{text.slice(0,i)}<mark className="ddm">{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</span>;
}

/* ═════════════════════════════════════════════════════
   DropdownCell  (reusable schedule cell with search)
   fillAll: if true, onSelect also gets called with all periods (1-11)
═════════════════════════════════════════════════════ */
function DropdownCell({value,subValue,options,optionGroups,onSelect,isAbsentOrig,isSub,readOnly,fillAllLabel,onFillAll,extraStyle}){
  const[open,setOpen]=useState(false);
  const[q,setQ]=useState("");
  const cellRef=useRef(null),popRef=useRef(null),srRef=useRef(null);
  const[pos,setPos]=useState({top:0,left:0});
  function openDD(){
    if(readOnly)return;
    const r=cellRef.current.getBoundingClientRect();
    const zoom=parseFloat(window.getComputedStyle(document.body).zoom)||1;
    const rBottom=r.bottom/zoom;
    const rTop=r.top/zoom;
    const rLeft=r.left/zoom;
    const vH=window.innerHeight/zoom;
    const vW=window.innerWidth/zoom;
    const POPUP_H=280;
    const POPUP_W=260;
    const top=vH-rBottom>=POPUP_H?rBottom+4:Math.max(4,rTop-POPUP_H-4);
    const left=Math.max(4,Math.min(rLeft,vW-POPUP_W-4));
    setPos({top,left});
    setQ("");setOpen(true);
  }
  useEffect(()=>{if(!open)return;if(srRef.current)srRef.current.focus();const f=e=>{if(popRef.current&&!popRef.current.contains(e.target)&&cellRef.current&&!cellRef.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",f);return()=>document.removeEventListener("mousedown",f);},[open]);
  const qL=q.trim().toLowerCase();
  const fi=items=>qL?items.filter(x=>x.toLowerCase().includes(qL)):items;
  const fo=options?fi(options):null;
  const fg=optionGroups?optionGroups.map(g=>({...g,items:fi(g.items)})):null;
  const hasR=(fo&&fo.length>0)||(fg&&fg.some(g=>g.items.length>0));
  const baseCls=isSub?"csub":isAbsentOrig?"cab":cellCls(value);
  const dv=isSub?subValue:value;
  return(
    <td className={`${baseCls}${readOnly?"":" ct"}`} ref={cellRef} onClick={openDD} style={extraStyle||undefined}>
      <div className="ci">
        {isSub&&<div className="sub-b">SUB</div>}
        {isAbsentOrig&&!isSub&&value&&<div className="orig-s">{value}</div>}
        <span style={{fontSize:11}}>{dv||<span style={{color:"#d1d5db"}}>—</span>}</span>
      </div>
      {open&&ReactDOM.createPortal(
        <div ref={popRef} className="ddp" style={{top:pos.top,left:pos.left}}>
          <div className="ddsw">
            <input ref={srRef} className="dds" placeholder="🔍 Search..." value={q} onChange={e=>setQ(e.target.value)} onClick={e=>e.stopPropagation()}/>
          </div>
          <div className="ddl">
            {(value||subValue)&&!qL&&<><button className="ddi ddc" onClick={e=>{e.stopPropagation();onSelect(null);setOpen(false);}}>✕ Clear</button><hr className="ddsp"/></>}
            {fillAllLabel&&!qL&&onFillAll&&<><div className="ddgh">📌 전체 교시 배정</div>{TEACHERS.map(t=><button key={t} className="ddi fill" onClick={e=>{e.stopPropagation();onFillAll(t);setOpen(false);}}>📌 {t} → 전 교시</button>)}<hr className="ddsp"/><div className="ddgh">개별 배정</div></>}
            {fo&&fo.map(o=><button key={o} className={`ddi${o===dv?" dda":""}`} onClick={e=>{e.stopPropagation();onSelect(o);setOpen(false);}}>{o===dv?"✓ ":""}<HL text={o} q={q}/></button>)}
            {fg&&fg.map(g=>g.items.length===0?null:<React.Fragment key={g.label}><div className="ddgh">{g.label}</div>{g.items.map(o=><button key={o} className={`ddi${o===dv?" dda":""}`} onClick={e=>{e.stopPropagation();onSelect(o);setOpen(false);}}>{o===dv?"✓ ":""}<HL text={o} q={q}/></button>)}</React.Fragment>)}
            {!hasR&&<div className="ddem">"{q}" 에 해당 없음</div>}
          </div>
        </div>,document.body
      )}
    </td>
  );
}

function GroupRoomCell({value,onSave,roomLetter,period,studentData}){
  const[open,setOpen]=useState(false);
  const[teacherType,setTeacherType]=useState("Filipino");
  const[classType,setClassType]=useState("");

  function openModal(){
    setTeacherType(value?.teacherType||"Filipino");

    setStudents(value?.students||[]);
    setTQ("");setSQ("");setOpen(true);

  const ageInfo=useMemo(()=>classType?CLASS_TYPE_AGE[classType]:null,[classType]);

  const typeList=useMemo(()=>teacherType==="Native"?NATIVE_TEACHERS:FILIPINO_TEACHERS,[teacherType]);
  const tList=tQ?typeList.filter(t=>t.toLowerCase().includes(tQ.toLowerCase())):typeList;

  const currentYear=new Date().getFullYear();
  const eligibleStudents=useMemo(()=>{
    if(!classType||!ageInfo||(ageInfo.min===null&&ageInfo.max===null))return STUDENTS;
    return STUDENTS.filter(s=>{
      const by=studentData?.[s]?.birthYear;if(!by)return true;
      const age=currentYear-parseInt(by);
      if(ageInfo.min!==null&&age<ageInfo.min)return false;
      if(ageInfo.max!==null&&age>ageInfo.max)return false;
      return true;
    });
  },[classType,studentData]);
  const sList=sQ?eligibleStudents.filter(s=>s.toLowerCase().includes(sQ.toLowerCase())):eligibleStudents;

  function toggleTeacher(t){if(teachers.includes(t)){setTeachers(teachers.filter(x=>x!==t));}else if(teachers.length<maxT){setTeachers([...teachers,t]);}}
  function toggleStudent(s){if(students.includes(s)){setStudents(students.filter(x=>x!==s));}else if(students.length<maxS){setStudents([...students,s]);}}
  function doSave(){
    if(!classType&&teachers.length===0&&students.length===0){onSave(null);}
    else{onSave({teacherType,classType,teachers,students});}
    setOpen(false);

  const bgColor=(value?.classType&&CLASS_TYPE_COLOR[value.classType])||"#fff";

  return(

        {dS.length>0&&<div style={{fontSize:9,color:"#6b7280",marginTop:1}}>👤 {dS.length} student{dS.length>1?"s":""}</div>}
      </div>
      {open&&ReactDOM.createPortal(
        <div className="ed-bg" onClick={e=>{if(e.target===e.currentTarget)setOpen(false);}}>
          <div className="ed-box" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

              <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#6b7280",lineHeight:1}}>✕</button>
            </div>

            {/* ① Teacher Type */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:7}}>① Teacher Type</div>
              <div style={{display:"flex",gap:8}}>
                {[{v:"Filipino",icon:"🇵🇭"},{v:"Native",icon:"🌎"}].map(({v,icon})=>(
                  <button key={v} onClick={()=>{setTeacherType(v);setTeachers([]);}}
                    style={{padding:"8px 22px",borderRadius:8,border:`2px solid ${teacherType===v?"#1e40af":"#e2e8f0"}`,
                      background:teacherType===v?"#1e40af":"white",color:teacherType===v?"white":"#374151",
                      fontWeight:700,cursor:"pointer",fontSize:13}}>
                    {icon} {v}
                  </button>
                ))}
              </div>
            </div>

            {/* ② Class Type */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:7}}>② Class Type</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {CLASS_TYPES.map(c=>(
                  <button key={c} onClick={()=>{setClassType(c===classType?"":c);setStudents([]);}}
                    style={{padding:"5px 11px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
                      border:`1.5px solid ${c===classType?"#1e40af":"#e2e8f0"}`,
                      background:c===classType?"#1e40af":CLASS_TYPE_COLOR[c]||"white",
                      color:c===classType?"white":"#374151"}}>
                    {c}
                  </button>
                ))}
              </div>
              {ageInfo&&(ageInfo.min!==null||ageInfo.max!==null)&&(
                <div style={{marginTop:6,fontSize:11,color:"#7c3aed",fontWeight:600,background:"#f5f3ff",padding:"4px 10px",borderRadius:6,display:"inline-block"}}>

            {/* ③ Teachers + ④ Students side-by-side */}
            <div style={{display:"flex",gap:12}}>
              <div style={{flex:1,minWidth:0}}>

                  {teachers.length>0&&<span style={{background:"#dbeafe",color:"#1d4ed8",borderRadius:10,padding:"1px 7px",fontWeight:700}}>{teachers.length}/{maxT}</span>}
                </div>
                <input className="dds" placeholder="🔍 Search..." value={tQ} onChange={e=>setTQ(e.target.value)} style={{width:"100%",marginBottom:4}}/>
                <div style={{maxHeight:170,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:6}}>
                  {tList.map(t=>{const sel=teachers.includes(t);const dis=!sel&&teachers.length>=maxT;return(
                    <button key={t} onClick={()=>toggleTeacher(t)}
                      style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",fontSize:12,border:"none",

                      {sel?"✓ ":""}{t}{dis&&!sel?" ✕":""}
                    </button>
                  );})}
                  {tList.length===0&&<div style={{padding:10,color:"#9ca3af",fontSize:11,textAlign:"center"}}>No results</div>}
                </div>
              </div>

              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:5}}>
                  ④ Students&nbsp;
                  {students.length>0&&<span style={{background:"#d1fae5",color:"#166534",borderRadius:10,padding:"1px 7px",fontWeight:700}}>{students.length}/{maxS}</span>}
                </div>
                <input className="dds" placeholder="🔍 Search..." value={sQ} onChange={e=>setSQ(e.target.value)} style={{width:"100%",marginBottom:4}}/>
                <div style={{maxHeight:170,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:6}}>
                  {!classType&&<div style={{padding:12,color:"#9ca3af",fontSize:11,textAlign:"center"}}>Select class type first</div>}
                  {classType&&sList.map(s=>{
                    const sel=students.includes(s);const dis=!sel&&students.length>=maxS;

                    return(
                      <button key={s} onClick={()=>toggleStudent(s)}

                        {sel?"✓ ":""}{s}{age!==null?<span style={{color:"#94a3b8",marginLeft:4,fontSize:10}}>({age}y)</span>:null}

/* Map full day name → short meal plan key */
function dayToMealKey(d){return{Monday:"Mon",Tuesday:"Tue",Wednesday:"Wed",Thursday:"Thu",Friday:"Fri",Saturday:"Sat",Sunday:"Sun"}[d]||d.slice(0,3);}

  const myPs=sched[teacher]||{};

                  const sub=mySubs[pkey];
                  const room=findRoom1on1(teacher,p.i,rooms1on1);
                  const isStudent=STUDENTS.includes(assign);
                  const course=isStudent?studentCourses[assign]:null;

            {icon:"🌅",label:"Breakfast",time:"7:30 – 8:30",menu:[dayMeal.breakfast?.items,dayMeal.breakfast?.soup].filter(Boolean).join(" · ")||null},
            {icon:"☀️",label:"Lunch",time:"12:40 – 1:25",menu:(()=>{const d=dayMeal.lunch||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.fruit)p.push(`[Fruit] ${d.fruit}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()},
            {icon:"🌙",label:"Dinner",time:"4:50 – 5:35",menu:(()=>{const d=dayMeal.dinner||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()},
          ];
          const hasAny=slots.some(s=>s.menu);
          if(!hasAny)return null;
          return(
            <div style={{marginTop:14,borderTop:"2px solid #f0fdfa",paddingTop:12}}>
              <div style={{fontSize:11,fontWeight:800,color:"#0d9488",textTransform:"uppercase",letterSpacing:.7,marginBottom:8}}>🍽️ Today's Meals</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {slots.map(s=>(
                  <div key={s.label} style={{flex:"1 1 160px",background:"#f0fdfa",border:"1.5px solid #99f6e4",borderRadius:10,padding:"8px 11px"}}>
                    <div style={{fontSize:11,fontWeight:800,color:"#0d9488",marginBottom:3}}>{s.icon} {s.label} <span style={{fontSize:9,color:"#64748b",fontWeight:600}}>{s.time}</span></div>
                    <div style={{fontSize:10.5,color:"#374151",lineHeight:1.6}}>{s.menu||<span style={{color:"#9ca3af",fontStyle:"italic"}}>미설정</span>}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:14,gap:8}}>
          <div style={{fontSize:11,color:"#94a3b8"}}>Room numbers are assigned in the 1on1 Classrooms page.</div>
          {hasCls&&(
            <button onClick={()=>{
              if(!window.confirm(`${teacher} 선생님의 스케줄을 전부 삭제하시겠습니까?`))return;
              const n=JSON.parse(JSON.stringify(sched));
              delete n[teacher];
              pushSnap({sched:n});
              onClose();
            }} style={{padding:"6px 14px",background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fecaca",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>
              🗑 스케줄 전체 삭제
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   TeacherCellModal  — click any teacher schedule cell
═════════════════════════════════════════════════════ */
function TeacherCellModal({teacher,period,selDay,sched,subsByDay,rooms1on1,absentSet,cellData,groupRosters,studentData,pushSnap,onClose,isAdmin,messages,onOpenMessenger}){
  const key=pk(period.i);
  const isAbsent=absentSet.has(teacher);
  const origAssign=sched[teacher]?.[key]||null;
  const daySubs=subsByDay[selDay]||{};
  const currentSub=daySubs[teacher]?.[key]||null;
  /* Read from selDay first; fallback to any day (migration safety) */
  const currentMeta=cellData?.[selDay]?.[teacher]?.[key]
    ||DAYS.reduce((found,d)=>found||cellData?.[d]?.[teacher]?.[key],null)||{};
  const teacherType=teacher.includes("(N)")?"Native":"Filipino";
  const room1on1=findRoom1on1(teacher,period.i,rooms1on1);

  const[assign,setAssign]=useState(origAssign||"");
  const[classType,setClassType]=useState(currentMeta.classType||"");
  const[subType,setSubType]=useState(currentMeta.subType||"");
  const[studentSearch,setStudentSearch]=useState("");
  const[groupRoom,setGroupRoom]=useState(currentMeta.groupRoom||"");
  const[activityGroup,setActivityGroup]=useState(currentMeta.activityGroup||"");
  const[activitySchedule,setActivitySchedule]=useState(currentMeta.activitySchedule||{});
  const[gradeLevel,setGradeLevel]=useState(currentMeta.gradeLevel||"");
  const[kinderCoTeachers,setKinderCoTeachers]=useState(()=>{
    const arr=["","","","",""];
    let stored=currentMeta.kinderCoTeachers||[];
    /* If not stored in cellData, scan sched for other teachers with KINDERGARTEN at same period */
    if(!stored.length&&(currentMeta.classType==="Kindergarten"||(origAssign==="KINDERGARTEN"||origAssign==="Kindergarten"))){
      for(const[t,tData]of Object.entries(sched)){
        if(t===teacher)continue;
        const v=tData[key];
        if(v==="KINDERGARTEN"||v==="Kindergarten")stored.push(t);
      }
    }
    stored.forEach((t,i)=>{if(i<5)arr[i]=t||"";});
    return arr;
  });
  const[activityCoTeachers,setActivityCoTeachers]=useState(()=>{
    const arr=["",""];
    let stored=currentMeta.activityCoTeachers||[];
    /* If not stored, scan sched for other ACTIVITY CLASS teachers at same period */
    if(!stored.length&&currentMeta.classType==="Activity Class"){
      for(const[t,tData]of Object.entries(sched)){
        if(t===teacher)continue;
        if(tData[key]==="ACTIVITY CLASS")stored.push(t);
      }
    }
    stored.forEach((t,i)=>{if(i<2)arr[i]=t||"";});
    return arr;
  });
  const[groupStudents,setGroupStudents]=useState(()=>{
    if(currentMeta.classType==="Group Class"&&currentMeta.groupRoom)
      return groupRosters?.["Group "+currentMeta.groupRoom]?.[key]||[];
    if(currentMeta.classType==="Activity Class"&&currentMeta.activityGroup)
      return groupRosters?.["Activity "+currentMeta.activityGroup]?.[key]||[];
    if(currentMeta.classType==="Kindergarten")
      return groupRosters?.["Kindergarten"]?.[key]||[];
    return[];
  });
  const[studentQ,setStudentQ]=useState("");
  const[sub,setSub]=useState(currentSub||"");
  const availSubs=useMemo(()=>freeSubs(sched,period.i,teacher,daySubs,absentSet),[]);

  /* ── helper: label style ── */
  const LS={display:"block",fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:5,textTransform:"uppercase",letterSpacing:".4px"};

  /* ── eligible students for group/activity/kinder class ── */
  const eligibleStudents=useMemo(()=>{
    /* Build set of students already occupied at this period from ALL sources,
       excluding the room currently being edited (those are the currently-selected students). */
    const editingRoomKey=
      classType==="Group Class"&&groupRoom?"Group "+groupRoom
      :classType==="Activity Class"&&activityGroup?"Activity "+activityGroup
      :classType==="Kindergarten"?"Kindergarten":null;
    const busySet=new Set();
    // 1on1 conflicts from sched (skip current teacher)
    for(const[t,ps]of Object.entries(sched)){
      if(t===teacher)continue;
      const a=ps[key];
      if(a&&STUDENTS.includes(a))busySet.add(a);
    }
    // group/activity/kinder conflicts from groupRosters (skip the room we're editing)
    for(const[roomKey,periods]of Object.entries(groupRosters||{})){
      if(roomKey===editingRoomKey)continue;
      const roster=periods[key];
      if(Array.isArray(roster))roster.forEach(s=>busySet.add(s));
    }
    // A student is available if not busy, OR already selected in the current group
    const isAvail=s=>!busySet.has(s)||groupStudents.includes(s);

    if(classType==="Group Class"){
      if(subType==="Junior Group"){
        const base=STUDENTS.filter(s=>{
          if(!isAvail(s))return false;
          const sd=studentData?.[s];
          const age=getKoreanAge(sd?.birthYear);
          if(age===null)return !sd?.isAdult;
          return age>=6&&age<=19;
        });
        if(gradeLevel){
          const gl=GRADE_LEVELS.find(g=>g.label===gradeLevel);
          if(!gl)return base;
          return base.filter(s=>{
            const sd=studentData?.[s];
            const age=getKoreanAge(sd?.birthYear);
            if(age===null)return !sd?.isAdult;
            return age>=gl.min&&age<=gl.max;
          });
        }
        return base;
      }
      if(subType==="Adult ESL Group"){
        return STUDENTS.filter(s=>{
          if(!isAvail(s))return false;
          const sd=studentData?.[s];
          const age=getKoreanAge(sd?.birthYear);
          if(age===null)return !!(sd?.isAdult);
          return age>=18;
        });
      }
    }
    if(classType==="Activity Class"&&activityGroup){
      return STUDENTS.filter(s=>isAvail(s));
    }
    if(classType==="Kindergarten"){
      const base=STUDENTS.filter(s=>{
        if(!isAvail(s))return false;
        const sd=studentData?.[s];
        const age=getKoreanAge(sd?.birthYear);
        if(age===null)return !sd?.isAdult;
        return age>=2&&age<=8;
      });
      if(subType){
        const kl=KINDER_LEVELS.find(k=>k.label===subType);
        if(!kl)return base;
        return base.filter(s=>{
          const sd=studentData?.[s];
          const age=getKoreanAge(sd?.birthYear);
          if(age===null)return !sd?.isAdult;
          return age>=kl.min&&age<=kl.max;
        });
      }
      return base;
    }
    return[];
  },[classType,subType,gradeLevel,activityGroup,groupRoom,studentData,groupStudents,sched,groupRosters,period,teacher,key]);

  const filteredStudents=studentQ?eligibleStudents.filter(s=>s.toLowerCase().includes(studentQ.toLowerCase())):eligibleStudents;
  const showGroupPicker=classType==="Group Class"&&(subType==="Adult ESL Group"||subType==="Junior Group");
  const showActivityPicker=classType==="Activity Class"&&!!activityGroup;
  const showKinderPicker=classType==="Kindergarten";
  const maxGroupStudents=classType==="Activity Class"?20:classType==="Kindergarten"?20:subType==="Adult ESL Group"?8:6;

  function toggleStudent(s){
    if(groupStudents.includes(s))setGroupStudents(groupStudents.filter(x=>x!==s));
    else if(groupStudents.length<maxGroupStudents)setGroupStudents([...groupStudents,s]);
  }
  function getAvailCoTeachers(slotIdx){
    const busy=new Set([teacher]);
    for(const[t,ps]of Object.entries(sched)){if(ps[key])busy.add(t);}
    kinderCoTeachers.forEach((t,i)=>{if(i!==slotIdx&&t)busy.add(t);});
    const cur=kinderCoTeachers[slotIdx];
    if(cur)busy.delete(cur);
    return TEACHERS.filter(t=>!busy.has(t));
  }
  function getAvailActCoTeachers(slotIdx){
    const busy=new Set([teacher]);
    for(const[t,ps]of Object.entries(sched)){if(ps[key])busy.add(t);}
    activityCoTeachers.forEach((t,i)=>{if(i!==slotIdx&&t)busy.add(t);});
    const cur=activityCoTeachers[slotIdx];
    if(cur)busy.delete(cur);
    return TEACHERS.filter(t=>!busy.has(t));
  }

  /* ── class type selection ── */
  function selectClassType(ct){
    const next=ct===classType?"":ct;
    setClassType(next);setSubType("");setGroupRoom("");setActivityGroup("");setActivitySchedule({});setGradeLevel("");setStudentQ("");setActivityCoTeachers(["",""]);
    if(next==="Kindergarten"){
      setAssign("KINDERGARTEN");
      setGroupStudents(groupRosters?.["Kindergarten"]?.[key]||[]);
    } else {
      setGroupStudents([]);
      if(next==="Activity Class")setAssign("ACTIVITY CLASS");
      else if(next==="Office Hour")setAssign("office hour");
      else if(next==="Training")setAssign("training IELTS");
      else if(!next)setAssign(origAssign||"");
      else setAssign(origAssign||"");
    }
  }
  function selectGroupRoom(r){
    const next=r===groupRoom?"":r;
    setGroupRoom(next);
    setGroupStudents(next?groupRosters?.["Group "+next]?.[key]||[]:[]);
    if(next)setAssign(`Group ${next}`);
    else setAssign(origAssign||"");
  }
  function selectSubType(g){
    const next=g===subType?"":g;
    setSubType(next);setGradeLevel("");setGroupStudents([]);setStudentQ("");
  }
  function selectGradeLevel(gl){
    const next=gl===gradeLevel?"":gl;
    setGradeLevel(next);setGroupStudents([]);setStudentQ("");
  }

  /* ── save ── */
  function doSave(){
    const changes={};
    /* 1. sched assignment */
    const newAssign=assign||null;
    const ns=JSON.parse(JSON.stringify(sched));
    if(!ns[teacher])ns[teacher]={};
    if(newAssign===null)delete ns[teacher][key];
    else ns[teacher][key]=newAssign;
    changes.sched=ns;
    /* 2. sub */
    const newSub=sub||null;
    if(newSub!==currentSub){
      const ns2=JSON.parse(JSON.stringify(subsByDay));
      if(!ns2[selDay])ns2[selDay]={};
      if(!ns2[selDay][teacher])ns2[selDay][teacher]={};
      if(!newSub)delete ns2[selDay][teacher][key];
      else ns2[selDay][teacher][key]=newSub;
      changes.subsByDay=ns2;
    }
    /* 3. cellData */
    const newCoList=kinderCoTeachers.filter(Boolean);
    const newActCoList=activityCoTeachers.filter(Boolean);
    /* For 1on1 class types (not Group/Activity/Kindergarten), clear meta if no student assigned */
    const isGroupType2=classType==="Group Class"||classType==="Activity Class"||classType==="Kindergarten";
    const effectiveMeta=(classType&&(isGroupType2||newAssign))?{
      classType,
      ...(subType?{subType}:{}),
      ...(groupRoom?{groupRoom}:{}),
      ...(activityGroup?{activityGroup}:{}),
      ...(Object.keys(activitySchedule).length?{activitySchedule}:{}),
      ...(gradeLevel?{gradeLevel}:{}),
      ...(classType==="Kindergarten"&&newCoList.length?{kinderCoTeachers:newCoList}:{}),
      ...(classType==="Activity Class"&&newActCoList.length?{activityCoTeachers:newActCoList}:{}),
    }:null;
    const newMeta=effectiveMeta;
    const nc=JSON.parse(JSON.stringify(cellData||{}));
    DAYS.forEach(day=>{
      if(!nc[day])nc[day]={};
      if(!nc[day][teacher])nc[day][teacher]={};
      if(newMeta)nc[day][teacher][key]=newMeta;
      else delete nc[day]?.[teacher]?.[key];
    });
    /* 4. Kindergarten co-teachers: propagate to their sched + cellData */
    if(classType==="Kindergarten"){
      const oldCoList=(currentMeta.kinderCoTeachers||[]).filter(Boolean);
      /* remove from old co-teachers that are no longer assigned */
      oldCoList.forEach(t=>{
        if(!newCoList.includes(t)){
          if(ns[t]?.[key]==="KINDERGARTEN"||ns[t]?.[key]==="Kindergarten"){
            delete ns[t][key];
          }
          DAYS.forEach(day=>{
            if(nc[day]?.[t]?.[key]?.classType==="Kindergarten")delete nc[day][t][key];
          });
        }
      });
      /* add/update new co-teachers — give each their own perspective of the group */
      newCoList.forEach(t=>{
        if(!ns[t])ns[t]={};
        ns[t][key]="KINDERGARTEN";
        const theirCoList=[teacher,...newCoList.filter(x=>x!==t)];
        DAYS.forEach(day=>{
          if(!nc[day])nc[day]={};
          if(!nc[day][t])nc[day][t]={};
          nc[day][t][key]={classType:"Kindergarten",kinderCoTeachers:theirCoList};
        });
      });
    }
    /* 4b. Activity co-teachers: propagate to their sched + cellData */
    if(classType==="Activity Class"&&activityGroup){
      const oldActCoList=(currentMeta.activityCoTeachers||[]).filter(Boolean);
      /* remove old co-teachers no longer assigned */
      oldActCoList.forEach(t=>{
        if(!newActCoList.includes(t)){
          if(ns[t]?.[key]==="ACTIVITY CLASS")delete ns[t][key];
          DAYS.forEach(day=>{if(nc[day]?.[t]?.[key]?.classType==="Activity Class")delete nc[day][t][key];});
        }
      });
      /* add/update new co-teachers */
      newActCoList.forEach(t=>{
        if(!ns[t])ns[t]={};
        ns[t][key]="ACTIVITY CLASS";
        const theirCoList=[teacher,...newActCoList.filter(x=>x!==t)];
        DAYS.forEach(day=>{
          if(!nc[day])nc[day]={};
          if(!nc[day][t])nc[day][t]={};
          nc[day][t][key]={classType:"Activity Class",activityGroup,...(theirCoList.length?{activityCoTeachers:theirCoList}:{})};
        });
      });
    }
    changes.cellData=nc;
    /* 5. groupRosters */
    const colId=classType==="Group Class"&&groupRoom?"Group "+groupRoom
               :classType==="Activity Class"&&activityGroup?"Activity "+activityGroup
               :classType==="Kindergarten"?"Kindergarten":null;
    if(colId){
      const nr=JSON.parse(JSON.stringify(groupRosters||{}));
      if(!nr[colId])nr[colId]={};
      if(groupStudents.length>0)nr[colId][key]=groupStudents;
      else delete nr[colId][key];
      changes.groupRosters=nr;
    }
    if(Object.keys(changes).length)pushSnap(changes);
    onClose();
  }
  const[showCopyPanel,setShowCopyPanel]=useState(false);
  const[copyToPeriods,setCopyToPeriods]=useState(new Set());

  function doClear(){
    setAssign("");setClassType("");setSubType("");setGroupRoom("");
    setActivityGroup("");setActivitySchedule({});
    setGradeLevel("");setGroupStudents([]);setSub("");setStudentQ("");
    setKinderCoTeachers(["","","","",""]);setActivityCoTeachers(["",""]);
    setShowCopyPanel(false);setCopyToPeriods(new Set());
  }

  /* Cancel the lingering sub assignment immediately (no full save needed) */
  function doCancelSub(){
    const ns2=JSON.parse(JSON.stringify(subsByDay));
    if(ns2[selDay]?.[teacher]?.[key]){
      delete ns2[selDay][teacher][key];
      if(!Object.keys(ns2[selDay][teacher]).length)delete ns2[selDay][teacher];
    }
    pushSnap({subsByDay:ns2});
    setSub("");
    onClose();
  }

  function doCopyPeriods(){
    if(!copyToPeriods.size)return;
    const isKinder=classType==="Kindergarten";
    const isActivity=classType==="Activity Class";
    const newCoList=isKinder?kinderCoTeachers.filter(Boolean):isActivity?activityCoTeachers.filter(Boolean):[];
    const allTeachers=[teacher,...newCoList];
    const ns=JSON.parse(JSON.stringify(sched));
    const nc=JSON.parse(JSON.stringify(cellData||{}));
    const nr=JSON.parse(JSON.stringify(groupRosters||{}));
    copyToPeriods.forEach(pidx=>{
      const pkey=pk(pidx);
      /* assign all teachers */
      allTeachers.forEach(t=>{
        if(!ns[t])ns[t]={};
        ns[t][pkey]=isKinder?"KINDERGARTEN":"ACTIVITY CLASS";
      });
      /* set cellData per teacher perspective */
      DAYS.forEach(day=>{
        if(!nc[day])nc[day]={};
        allTeachers.forEach(t=>{
          if(!nc[day][t])nc[day][t]={};
          const isMain=t===teacher;
          const theirCoList=isMain?newCoList:[teacher,...newCoList.filter(x=>x!==t)];
          if(isKinder){
            nc[day][t][pkey]={classType:"Kindergarten",
              ...(subType?{subType}:{}),
              ...(theirCoList.length?{kinderCoTeachers:theirCoList}:{})};
          } else if(isActivity){
            nc[day][t][pkey]={classType:"Activity Class",activityGroup,
              ...(theirCoList.length?{activityCoTeachers:theirCoList}:{})};
          }
        });
      });
      /* copy students */
      if(isKinder){
        if(!nr["Kindergarten"])nr["Kindergarten"]={};
        if(groupStudents.length>0)nr["Kindergarten"][pkey]=groupStudents;
      } else if(isActivity&&activityGroup){
        const roomKey="Activity "+activityGroup;
        if(!nr[roomKey])nr[roomKey]={};
        if(groupStudents.length>0)nr[roomKey][pkey]=groupStudents;
      }
    });
    pushSnap({sched:ns,cellData:nc,groupRosters:nr});
    setShowCopyPanel(false);
    setCopyToPeriods(new Set());
  }

  return ReactDOM.createPortal(
    <div className="t-modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="t-modal-wrap" onClick={e=>e.stopPropagation()}>
        {/* Sticky ✕ — always visible regardless of modal width */}
        <button className="t-modal-close" onClick={onClose}>✕</button>
        <div style={{clear:"both"}}/>
        <div className="t-modal">

        {/* ── Header ── */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:isAbsent?"#dc2626":"#1e3a8a"}}>
              {isAbsent?"🚫":teacherType==="Native"?"🌎":"🇵🇭"} {teacher}
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>
              {period.label} Period · {period.time}
              {room1on1&&<span style={{marginLeft:8,color:"#7c3aed",fontWeight:600}}>· {roomLabel(room1on1)}</span>}
            </div>
          </div>
        </div>

        {isAbsent?(
          /* ── Absent teacher: sub assignment ── */
          <div>
            <div style={{background:"#fef2f2",borderRadius:8,padding:"10px 14px",marginBottom:14,borderLeft:"3px solid #dc2626"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#dc2626"}}>⚠ Marked as ABSENT</div>
              {origAssign&&<div style={{marginTop:4,fontSize:12}}>Original: <span style={{textDecoration:"line-through",color:"#9ca3af"}}>{origAssign}</span></div>}
            </div>
            <div style={{marginBottom:14}}>
              <label style={LS}>Substitute Teacher</label>
              <select className="fi" value={sub} onChange={e=>setSub(e.target.value)}>
                <option value="">— No substitute —</option>
                {availSubs.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              {room1on1&&<div style={{marginTop:6,fontSize:11,color:"#7c3aed",fontWeight:600}}>📍 Sub uses {teacher}'s room: {roomLabel(room1on1)}</div>}
            </div>
          </div>
        ):(
          /* ── Present teacher: full editing ── */
          <>
            {/* ── Lingering substitute warning (absent mark removed but sub still set) ── */}
            {currentSub&&(
              <div style={{marginBottom:12,padding:"10px 14px",background:"#fef9c3",borderRadius:8,border:"1.5px solid #fbbf24"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#92400e",marginBottom:4}}>
                  🔄 Substitute still assigned: <b style={{color:"#b45309"}}>{currentSub}</b>
                </div>
                <div style={{fontSize:11,color:"#a16207",marginBottom:8}}>
                  {teacher} is no longer marked absent, but a substitute remains scheduled.
                </div>
                <button onClick={doCancelSub}
                  style={{padding:"5px 14px",background:"#dc2626",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700}}>
                  ✕ Cancel Substitute
                </button>
              </div>
            )}

            {/* Class Type pills */}
            <div style={{marginBottom:12}}>
              <label style={LS}>Class Type</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {CELL_TYPES.map(ct=>(
                  <button key={ct} onClick={()=>selectClassType(ct)}
                    style={{padding:"5px 11px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
                      border:`1.5px solid ${ct===classType?"#1e40af":"#e2e8f0"}`,
                      background:ct===classType?(CELL_TYPE_COLOR[ct]||"#dbeafe"):"white",
                      color:ct===classType?"#1e3a8a":"#374151"}}>
                    {ct}
                  </button>
                ))}
              </div>
            </div>

            {/* ── 1on1: lesson sub-type ── */}
            {classType==="1on1"&&(
              <div style={{marginBottom:12,padding:"10px 12px",background:"#eff6ff",borderRadius:8}}>
                <label style={{...LS,marginBottom:6}}>Lesson Type</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {TYPES_1ON1.map(t=>(
                    <button key={t} onClick={()=>setSubType(t===subType?"":t)}
                      style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
                        border:`1.5px solid ${t===subType?"#7c3aed":"#e2e8f0"}`,
                        background:t===subType?"#7c3aed":"white",
                        color:t===subType?"white":"#374151"}}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* ── Student search + Assignment (combo list+search, 1on1 only) ── */}
            {classType==="1on1"?(()=>{
              const LESSON_AGE={"Junior":{min:6,max:18},"KET/PET":{min:6,max:17},"ESL":{min:18,max:null},"TOEIC":{min:18,max:null},"IELTS":{min:13,max:null},"Senior":{min:45,max:null}};
              const range=subType?LESSON_AGE[subType]:null;
              const isAfternoon=period.i>=7; // periods 7,8,9 = afternoon
              const KINDER_COURSES=["HANA KINDERGARTEN (FULL DAY)","HANA KINDERGARTEN (HALF DAY)"];
              const adultTypes=["ESL","TOEIC","IELTS","Senior"];
              /* Build conflict set: students already assigned this period anywhere (except current teacher/assignment) */
              const busy1on1=new Set();
              for(const[t,ps]of Object.entries(sched)){
                if(t===teacher)continue;
                const a=ps[key];
                if(a&&STUDENTS.includes(a))busy1on1.add(a);
              }
              for(const[,periods]of Object.entries(groupRosters||{})){
                const roster=periods[key];
                if(Array.isArray(roster))roster.forEach(s=>busy1on1.add(s));
              }
              /* Course matching for strict-filter lesson types */
              function courseMatchesLesson(course,lessonType){
                if(!course)return false;
                const c=course.toLowerCase();
                if(lessonType==="TOEIC")return c.includes("toeic");
                if(lessonType==="IELTS")return c.includes("ielts");
                if(lessonType==="Senior")return c.includes("senior");
                return true;
              }
              const strictCourseTypes=["TOEIC","IELTS","Senior"];
              const ageFiltered=STUDENTS.filter(s=>{
                /* Exclude students already in another class this period (keep current assignment) */
                if(busy1on1.has(s)&&s!==assign)return false;
                const sd=studentData?.[s];
                const age=getKoreanAge(sd?.birthYear);
                /* Afternoon periods: include kindergarten-course students ONLY if not an adult lesson type */
                if(isAfternoon&&KINDER_COURSES.includes(sd?.course)&&!adultTypes.includes(subType))return true;
                if(!range)return true;
                if(subType==="Junior"){
                  if(sd?.isGuardian)return false;
                  if(age!==null&&age>=19)return false;
                  if(age===null&&sd?.isAdult)return false;
                  return age===null||(age>=range.min&&age<=range.max);
                }
                /* TOEIC / IELTS / Senior: strictly only show students with matching course */
                if(strictCourseTypes.includes(subType)){
                  if(!courseMatchesLesson(sd?.course,subType))return false;
                  if(age===null)return !!sd?.isAdult;
                  return age>=range.min&&(range.max===null||age<=range.max);
                }
                /* Adult-targeted lessons: unknown-age students must have isAdult=true */
                if(age===null) return adultTypes.includes(subType)?!!sd?.isAdult:true;
                return age>=range.min&&(range.max===null||age<=range.max);
              });
              const q=studentSearch.toLowerCase().trim();
              const displayList=q?ageFiltered.filter(s=>s.toLowerCase().includes(q)):ageFiltered;
              return(
                <div style={{marginBottom:12}}>
                  <label style={LS}>
                    Assignment
                    {isAfternoon&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,background:"#d1fae5",color:"#065f46",padding:"1px 6px",borderRadius:6}}>PM+KG</span>}
                  </label>
                  {/* Selected badge */}
                  {assign&&(
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"6px 10px",background:"#eff6ff",border:"1.5px solid #93c5fd",borderRadius:7}}>
                      <span style={{fontSize:12,fontWeight:700,color:"#1e40af",flex:1}}>{assign}</span>
                      <button onClick={()=>setAssign("")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#6b7280",padding:0,lineHeight:1,flexShrink:0}}>✕</button>
                    </div>
                  )}
                  {/* Save / Cancel row above search */}
                  <div style={{display:"flex",gap:6,marginBottom:8}}>
                    <button onClick={doSave} style={{flex:1,padding:"7px 0",background:"#1e40af",color:"white",border:"none",borderRadius:7,fontWeight:700,cursor:"pointer",fontSize:13}}>Save</button>
                    <button onClick={onClose} style={{padding:"7px 14px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:7,cursor:"pointer",fontSize:12}}>Cancel</button>
                    {(origAssign||classType||currentSub)&&(
                      <button onClick={doClear} style={{padding:"7px 12px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:7,cursor:"pointer",fontSize:12}}>Clear</button>
                    )}
                  </div>
                  {/* Search input */}
                  <div style={{position:"relative",marginBottom:0}}>
                    <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#9ca3af",pointerEvents:"none"}}>🔍</span>
                    <input
                      type="text"
                      className="fi"
                      placeholder={strictCourseTypes.includes(subType)?`이름 검색 (${subType} course only)…`:range?`이름 검색 (${subType})…`:"이름 검색…"}
                      value={studentSearch}
                      onChange={e=>setStudentSearch(e.target.value)}
                      style={{paddingLeft:28,fontSize:12,borderRadius:"7px 7px 0 0",borderBottom:"none"}}
                      autoComplete="off"
                    />
                    {studentSearch&&(
                      <button onClick={()=>setStudentSearch("")}
                        style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#9ca3af",padding:0,lineHeight:1}}>
                        ✕
                      </button>
                    )}
                  </div>
                  {/* Combined list — always visible, filtered by search */}
                  <div style={{border:"1px solid #d1d5db",borderRadius:"0 0 7px 7px",background:"white",maxHeight:180,overflowY:"auto"}}>
                    {displayList.length===0&&(
                      <div style={{padding:"8px 12px",fontSize:11,color:"#9ca3af",fontStyle:"italic"}}>검색 결과 없음</div>
                    )}
                    {displayList.map(s=>{
                      const sd=studentData?.[s];
                      const age=sd?.birthYear?getKoreanAge(sd.birthYear):null;
                      const isKG=KINDER_COURSES.includes(sd?.course);
                      const sel=s===assign;
                      const matchIdx=q?s.toLowerCase().indexOf(q):-1;
                      return(
                        <button key={s} onMouseDown={e=>{e.preventDefault();setAssign(s===assign?"":s);setStudentSearch("");}}
                          style={{display:"flex",alignItems:"center",width:"100%",textAlign:"left",padding:"6px 11px",fontSize:12,
                            background:sel?"#dbeafe":"white",color:sel?"#1e40af":"#374151",
                            border:"none",borderBottom:"1px solid #f1f5f9",cursor:"pointer",gap:4}}>
                          {sel&&<span style={{fontSize:10,color:"#1e40af",flexShrink:0}}>✓</span>}
                          <span style={{flex:1,fontWeight:sel?700:400}}>
                            {matchIdx>=0
                              ?<>{s.slice(0,matchIdx)}<strong style={{color:"#1d4ed8",background:"#dbeafe"}}>{s.slice(matchIdx,matchIdx+q.length)}</strong>{s.slice(matchIdx+q.length)}</>
                              :s}
                          </span>
                          {isKG&&<span style={{fontSize:9,color:"#065f46",background:"#d1fae5",padding:"1px 4px",borderRadius:4,flexShrink:0}}>KG</span>}
                          {age!==null&&<span style={{fontSize:10,color:"#9ca3af",flexShrink:0}}>{age}세</span>}
                        </button>
                      );
                    })}
                  </div>
                  {q&&<div style={{fontSize:10,color:"#6b7280",marginTop:3,paddingLeft:2}}>{displayList.length}명</div>}
                </div>
              );

                {/* Student picker — shows as soon as group type is selected */}

                        <span style={{marginLeft:6,background:"#d1fae5",color:"#166534",borderRadius:10,padding:"1px 7px",fontWeight:700,fontSize:10}}>

                      {groupStudents.length>0&&(
                        <button onClick={()=>setGroupStudents([])} style={{fontSize:10,color:"#dc2626",background:"none",border:"none",cursor:"pointer"}}>Clear all</button>
                      )}
                    </div>
                    {/* Save / Cancel row above search */}
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      <button onClick={doSave} style={{flex:1,padding:"7px 0",background:"#1e40af",color:"white",border:"none",borderRadius:7,fontWeight:700,cursor:"pointer",fontSize:13}}>Save</button>
                      <button onClick={onClose} style={{padding:"7px 14px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:7,cursor:"pointer",fontSize:12}}>Cancel</button>
                      {(origAssign||classType||currentSub)&&(
                        <button onClick={doClear} style={{padding:"7px 12px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:7,cursor:"pointer",fontSize:12}}>Clear</button>
                      )}
                    </div>
                    <input className="dds" placeholder="🔍 Search student..." value={studentQ} onChange={e=>setStudentQ(e.target.value)} style={{width:"100%",marginBottom:4}}/>
                    <div style={{maxHeight:160,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:6}}>
                      {filteredStudents.length===0&&(
                        <div style={{padding:12,color:"#9ca3af",fontSize:11,textAlign:"center"}}>
                          {gradeLevel?`No available students for ${gradeLevel}`:"No available students"}
                        </div>
                      )}
                      {filteredStudents.map(s=>{
                        const sel=groupStudents.includes(s);
                        const dis=!sel&&groupStudents.length>=maxGroupStudents;
                        const age=getKoreanAge(studentData?.[s]?.birthYear);
                        return(
                          <button key={s} onClick={()=>toggleStudent(s)}
                            style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",fontSize:11,border:"none",
                              background:sel?"#f0fdf4":"transparent",color:sel?"#166534":dis?"#d1d5db":"#374151",
                              cursor:dis?"not-allowed":"pointer",fontWeight:sel?700:400}}>
                            {sel?"✓ ":""}{s}
                            {age!==null&&<span style={{color:"#94a3b8",marginLeft:5,fontSize:10}}>{age}y</span>}
                            {dis&&!sel&&<span style={{color:"#fca5a5",marginLeft:4,fontSize:9}}>max {maxGroupStudents}</span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── Activity Class ── */}
            {classType==="Activity Class"&&(
              <div style={{marginBottom:12,padding:"12px",background:"#eff6ff",borderRadius:8}}>
                {/* Step 1: pick Activity Group A-E */}
                <div style={{marginBottom:activityGroup?10:0}}>
                  <label style={{...LS,marginBottom:6}}>Activity Group</label>
                  <div style={{display:"flex",gap:6}}>
                    {ACTIVITY_GROUPS.map(g=>(
                      <button key={g} onClick={()=>{
                        const ng=g===activityGroup?"":g;
                        setActivityGroup(ng);setActivitySchedule({});
                        setGroupStudents(ng?groupRosters?.["Activity "+ng]?.[key]||[]:[]);
                        setStudentQ("");
                      }}
                        style={{flex:1,padding:"7px 0",borderRadius:7,fontSize:13,fontWeight:800,cursor:"pointer",
                          border:`2px solid ${g===activityGroup?"#1e40af":"#e2e8f0"}`,
                          background:g===activityGroup?"#1e40af":"white",
                          color:g===activityGroup?"white":"#374151"}}>
                        {g}
                      </button>
                    ))}
                  </div>
                </div>
                {/* Selected students preview — between group buttons and weekly schedule */}
                {/* Activity Co-teachers */}
                {activityGroup&&(
                  <div style={{marginBottom:10,padding:"8px 10px",background:"white",borderRadius:7,border:"1.5px solid #93c5fd"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>
                      Co-Teachers
                      <span style={{marginLeft:6,background:"#dbeafe",color:"#1e40af",border:"1px solid #93c5fd",borderRadius:10,padding:"1px 7px",fontWeight:700,fontSize:10}}>
                        {activityCoTeachers.filter(Boolean).length+1}/3
                      </span>
                      <span style={{fontSize:9,fontWeight:400,color:"#3b82f6",marginLeft:5}}>auto-assigned on Save</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{padding:"3px 10px",background:"#dbeafe",borderRadius:20,fontSize:11,fontWeight:700,color:"#1e40af",border:"1.5px solid #93c5fd"}}>
                        👤 {teacher}
                      </span>
                      <span style={{fontSize:10,color:"#3b82f6",fontWeight:600}}>+ assign up to 2 more:</span>
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      {activityCoTeachers.map((ct,i)=>(
                        <select key={i} value={ct} onChange={e=>{const next=[...activityCoTeachers];next[i]=e.target.value;setActivityCoTeachers(next);}}
                          style={{flex:1,padding:"5px 6px",borderRadius:6,fontSize:11,border:`1.5px solid ${ct?"#93c5fd":"#e5e7eb"}`,
                            background:ct?"#eff6ff":"white",color:ct?"#1e40af":"#9ca3af",fontWeight:ct?700:400}}>
                          <option value="">— slot {i+1} —</option>
                          {getAvailActCoTeachers(i).map(t=><option key={t} value={t}>{t}</option>)}
                        </select>

                {activityGroup&&groupStudents.length>0&&(
                  <div style={{marginBottom:10,padding:"8px 12px",background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:8}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:5}}>

                    </div>
