/* ═════════════════════════════════════════════════════
   KanbanCard
═════════════════════════════════════════════════════ */
/* Nationality → short code */
const NAT_CODE={
  "Korean":"KR","Japanese":"JP","Taiwanese":"TW","Chinese":"CN",
  "Vietnamese":"VN","Thai":"TH","Indonesian":"ID","Malaysian":"MY",
  "Saudi":"AR","Russian":"RU","Mongolian":"MN","Other":""
};
/* Format "Mar 7" from YYYY-MM-DD */
function fmtMD(dateStr){
  if(!dateStr)return"";
  const MONS=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const parts=dateStr.split("-");
  if(parts.length<3)return"";
  const mo=parseInt(parts[1]);
  const dy=parseInt(parts[2]);
  return MONS[mo]+" "+dy;
}

function KanbanCard({card,onMove,onEdit,colIdx,isDragging,onDragStart,onDragEnd,onDragOver}){
  const isFamily=card.type==="Group/Family";
  /* Always display oldest member as Guardian — sort by birthYear ascending */
  const _members=card.members||[];
  const sortedForDisplay=isFamily&&_members.length>1
    ?(()=>{
      const pinned=_members.find(m=>m.isGuardian);
      if(pinned)return[pinned,..._members.filter(m=>!m.isGuardian)];
      return [..._members].sort((a,b)=>(a.birthYear?parseInt(a.birthYear):9999)-(b.birthYear?parseInt(b.birthYear):9999));
    })()
    :_members;
  const g=sortedForDisplay[0]||{};
  const nat=g.nationality||"";
  const natCode=NAT_CODE[nat]||nat.slice(0,2).toUpperCase()||"";
  const rt=g.roomType||"";
  const rn=g.roomNumber||"";
  /* Study period from guardian (longest/guardian's dates) */
  const allWeeks=_members.map(m=>weekCount(m.studyStart,m.studyEnd)).filter(w=>w>0);
  const maxWeeks=allWeeks.length?Math.max(...allWeeks):0;
  /* Find the member with maxWeeks for period display */
  const periodMember=_members.find(m=>weekCount(m.studyStart,m.studyEnd)===maxWeeks)||g;
  const ps=fmtMD(periodMember.studyStart);
  const pe=fmtMD(periodMember.studyEnd);
  const periodStr=ps&&pe?ps+" – "+pe:ps||pe||"";

  return(
    <div
      className={`kb-card${isDragging?" kb-dragging":""}`}
      data-card-id={card.id}
      draggable
      onDragStart={onDragStart}
      onDragEnd={onDragEnd}
      onDragOver={onDragOver}
      onClick={()=>onEdit(card)}
    >
      {/* Row 1: Type badge + period */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,gap:4}}>
        <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:7,background:CARD_TYPE_COLOR[card.type]||"#f1f5f9",color:"#374151",whiteSpace:"nowrap"}}>
          {CARD_TYPE_ICON[card.type]} {card.type}
        </span>
        <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0}}>
          {periodStr&&<span style={{fontSize:9,color:"#6b7280",whiteSpace:"nowrap"}}>{periodStr}</span>}
          {maxWeeks>0&&<span style={{fontSize:9,fontWeight:800,background:"#e0f2fe",color:"#0369a1",borderRadius:5,padding:"1px 5px",whiteSpace:"nowrap"}}>({maxWeeks}w)</span>}
          <span style={{fontSize:11,color:"#d1d5db",cursor:"grab",lineHeight:1,flexShrink:0}}>⠿</span>
        </div>
      </div>

      {/* Row 2: Name + nationality code */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,gap:6}}>
        <div style={{fontSize:13,fontWeight:700,color:"#1e293b",lineHeight:1.3,minWidth:0}}>
          {isFamily
            ?<>{g.name||"—"} <span style={{fontWeight:400,color:"#6b7280"}}>+{(card.members||[]).length-1}</span></>
            :(g.name||"—")}
        </div>
        {natCode&&<span style={{fontSize:10,fontWeight:800,color:"#1d4ed8",background:"#eff6ff",borderRadius:5,padding:"1px 6px",whiteSpace:"nowrap",flexShrink:0}}>{natCode}</span>}
      </div>

      {/* Row 3: Room type + number */}
      {rt&&(
        <div style={{fontSize:11,fontWeight:700,color:"#374151",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,padding:"4px 8px",marginBottom:6,textAlign:"center"}}>
          🏠 {rt}{rn&&<span style={{marginLeft:5,color:"#1d4ed8"}}>#{rn}</span>}
        </div>
      )}

      {/* Row 4: Other family members */}
      {(card.members||[]).length>1&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:4,paddingTop:5,borderTop:"1px solid #f1f5f9"}}>
          {sortedForDisplay.slice(1).map((m,i)=>(
            <span key={i} style={{fontSize:10,fontWeight:600,color:"#374151",background:"#f1f5f9",borderRadius:5,padding:"1px 6px"}}>{m.name||"—"}</span>
          ))}
        </div>
      )}

      {/* Row 5: Notes / attachments */}
      {(card.notes||(card.attachments?.length>0))&&(
        <div style={{display:"flex",gap:6,marginTop:5,paddingTop:4,borderTop:"1px solid #f1f5f9",flexWrap:"wrap"}}>
          {card.notes&&<span style={{fontSize:10,color:"#6b7280",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📝 {card.notes}</span>}
          {card.attachments?.length>0&&<span style={{fontSize:10,background:"#fef3c7",color:"#92400e",borderRadius:5,padding:"1px 6px",fontWeight:700,whiteSpace:"nowrap"}}>📎 {card.attachments.length}</span>}
        </div>
      )}
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   DateField  — locale-safe date input (YYYY-MM-DD, English only)
═════════════════════════════════════════════════════ */
function DateField({value,onChange,style,required}){
  const[raw,setRaw]=React.useState(value||"");
  /* Sync when parent changes value externally */
  React.useEffect(()=>{setRaw(value||"");},[value]);

  function handleChange(e){
    /* Strip non-numeric, then insert dashes at positions 4 and 7 */
    let digits=e.target.value.replace(/\D/g,"").slice(0,8);
    let formatted=digits;
    if(digits.length>4) formatted=digits.slice(0,4)+"-"+digits.slice(4);
    if(digits.length>6) formatted=digits.slice(0,4)+"-"+digits.slice(4,6)+"-"+digits.slice(6);
    setRaw(formatted);
    /* Only propagate a complete, valid date */
    if(/^\d{4}-\d{2}-\d{2}$/.test(formatted)){
      onChange(formatted);
    } else if(formatted===""){
      onChange("");
    }
  }

  function handleBlur(){
    /* If incomplete, clear so parent isn't left with partial string */
    if(raw&&!/^\d{4}-\d{2}-\d{2}$/.test(raw)){
      setRaw("");onChange("");
    }
  }

  const valid=raw===""||/^\d{4}-\d{2}-\d{2}$/.test(raw);
  return(
    <input
      type="text"
      inputMode="numeric"
      lang="en"
      autoComplete="off"
      maxLength={10}
      placeholder="YYYY-MM-DD"
      value={raw}
      onChange={handleChange}
      onBlur={handleBlur}
      style={{...style,borderColor:valid?"#e2e8f0":"#ef4444",outline:"none"}}
    />

/* ═════════════════════════════════════════════════════
   CalendarPicker  — click to open calendar, snaps to Sun (start) or Sat (end)
═════════════════════════════════════════════════════ */
function CalendarPicker({value,onChange,snapTo,style,placeholder}){
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  function pv(v){return v?new Date(v+"T00:00:00"):null;}
  function toStr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dy=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${dy}`;}
  function getSun(d){const s=new Date(d);s.setDate(d.getDate()-d.getDay());return s;}
  function snapped(d){
    if(snapTo==="sunday"){const s=new Date(d);s.setDate(d.getDate()-d.getDay());return s;}
    else{const s=new Date(d);s.setDate(d.getDate()+(6-d.getDay()));return s;}
  }
  const init=()=>{const d=pv(value)||new Date();return{y:d.getFullYear(),m:d.getMonth()};};
  const[open,setOpen]=React.useState(false);
  const[vy,setVy]=React.useState(()=>init().y);
  const[vm,setVm]=React.useState(()=>init().m);
  const[hovSun,setHovSun]=React.useState(null);
  const wRef=React.useRef(null);
  const pRef=React.useRef(null);
  const[pos,setPos]=React.useState({top:0,left:0});
  React.useEffect(()=>{if(value){const d=pv(value);setVy(d.getFullYear());setVm(d.getMonth());}},[value]);
  function openPicker(){
    const r=wRef.current.getBoundingClientRect();
    /* body has zoom:1.3 — getBoundingClientRect() returns screen px (post-zoom).
       position:fixed coords are CSS px (pre-zoom), so divide by zoom factor. */
    const zoom=parseFloat(window.getComputedStyle(document.body).zoom)||1;
    const rTop   =r.top   /zoom;
    const rBottom=r.bottom/zoom;
    const rLeft  =r.left  /zoom;
    const vW=window.innerWidth /zoom;
    const vH=window.innerHeight/zoom;
    const POPUP_H=252;
    const POPUP_W=240;
    /* Show below if enough space, otherwise above */
    const TOP=vH-rBottom>=POPUP_H?rBottom+4:Math.max(4,rTop-POPUP_H-4);
    const LEFT=Math.max(4,Math.min(rLeft,vW-POPUP_W-4));
    setPos({top:TOP,left:LEFT});
    setOpen(true);
  }
  React.useEffect(()=>{
    if(!open)return;
    function h(e){if(!wRef.current?.contains(e.target)&&!pRef.current?.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",h,true);
    return()=>document.removeEventListener("mousedown",h,true);
  },[open]);
  function prevM(){if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);}
  function nextM(){if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);}
  function selectDay(d){const s=snapped(d);onChange(toStr(s));setVy(s.getFullYear());setVm(s.getMonth());setOpen(false);}
  function buildGrid(){
    const first=new Date(vy,vm,1);
    const cells=[];
    for(let i=0;i<42;i++)cells.push(new Date(vy,vm,1-first.getDay()+i));
    return cells;
  }
  const cells=buildGrid();
  const selDate=pv(value);
  const accentCol=snapTo==="sunday"?0:6;
  const today=toStr(new Date());
  const popup=open&&ReactDOM.createPortal(
    <div ref={pRef} style={{position:"fixed",top:pos.top,left:pos.left,zIndex:99999,background:"white",
      border:"1px solid #cbd5e1",borderRadius:10,boxShadow:"0 12px 36px rgba(0,0,0,.18)",width:232,
      padding:"10px 8px 8px",userSelect:"none"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,padding:"0 2px"}}>
        <button onClick={prevM} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#374151",padding:"1px 7px",borderRadius:4,lineHeight:1}}>‹</button>
        <span style={{fontSize:13,fontWeight:700,color:"#1e3a8a"}}>{MONTHS[vm]} {vy}</span>
        <button onClick={nextM} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#374151",padding:"1px 7px",borderRadius:4,lineHeight:1}}>›</button>
      </div>
      {/* DOW headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:3}}>
        {DOW.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,padding:"2px 0",
          color:i===accentCol?"#1e40af":"#94a3b8"}}>{d}</div>)}
      </div>
      {/* Day cells */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
        {cells.map((d,idx)=>{
          const inMonth=d.getMonth()===vm;
          const snp=snapped(d);
          const snpStr=toStr(snp);
          const isSelected=value&&snpStr===value;
          const isSameSnap=toStr(d)===snpStr;
          const sunStr=toStr(getSun(d));
          const isHov=hovSun&&sunStr===hovSun;
          const isToday=toStr(d)===today;
          const isAccent=d.getDay()===accentCol;
          let bg="transparent",fg=inMonth?"#374151":"#d1d5db",fw=400,br="none";
          if(isHov&&inMonth)bg="#eff6ff";
          if(isHov&&isAccent&&inMonth)bg="#dbeafe";
          if(isSelected&&isSameSnap){bg="#1e40af";fg="white";fw=700;}
          if(isToday&&!(isSelected&&isSameSnap))br="1.5px solid #93c5fd";
          return(
            <div key={idx} onClick={()=>selectDay(d)}
              onMouseEnter={()=>setHovSun(sunStr)}
              onMouseLeave={()=>setHovSun(null)}
              style={{textAlign:"center",fontSize:11,padding:"4px 0",borderRadius:5,
                cursor:"pointer",background:bg,color:fg,fontWeight:fw,border:br,lineHeight:1.5}}>
              {d.getDate()}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:6,padding:"4px 2px 0",borderTop:"1px solid #f1f5f9",fontSize:9,color:"#94a3b8",textAlign:"center"}}>
        {snapTo==="sunday"?"Any click → snaps to Sunday (week start)":"Any click → snaps to Saturday (week end)"}
      </div>
    </div>,document.body
  );
  return(
    <div ref={wRef} style={{position:"relative",...style}}>
      <div onClick={openPicker} style={{padding:"6px 10px",border:"1.5px solid #e2e8f0",borderRadius:6,
        fontSize:12,cursor:"pointer",background:"white",display:"flex",alignItems:"center",
        justifyContent:"space-between",color:value?"#374151":"#9ca3af",boxSizing:"border-box",outline:"none"}}>
        <span>{value||(placeholder||"Select date")}</span>
        <span style={{fontSize:12,color:"#94a3b8",marginLeft:4}}>📅</span>
      </div>
      {popup}
    </div>
  );
}

              </div>
            ))}
          </div>
          {(()=>{const cs=member.customSpec||{};const sp=getEffectiveSpec(member)||{ph:0,na:0,pg:0,ng:0,act:0};return(
            <div style={{marginTop:6,fontSize:10,color:"#166534",fontWeight:600}}>
              Total: {(sp.ph||0)} PH + {(sp.na||0)} NA + {(sp.pg||0)} PG + {(sp.ng||0)} NG + {(sp.act||0)} Act
            </div>
          );})()}
        </div>
      )}



      {/* ── Donate 1on1 to family (any course, any member) ── */}
      {isFamily&&(siblings||[]).filter(s=>s.name).length>0&&(
        <div style={{marginBottom:6}}>
          <button type="button"
            onClick={()=>onChange({...member,showDonate:!member.showDonate})}

              background:member.showDonate?"#fdf4ff":"#f8fafc",
              border:`1.5px solid ${member.showDonate?"#c4b5fd":"#e2e8f0"}`,
              borderRadius:6,padding:"6px 10px",cursor:"pointer",fontSize:11,
              fontWeight:700,color:member.showDonate?"#6b21a8":"#6b7280"}}>
            <span>🎁 Donate 1on1 classes to family</span>
            <span style={{fontSize:12}}>{member.showDonate?"▲":"▼"}</span>
          </button>
          {member.showDonate&&(
            <div style={{marginTop:3,background:"#fdf4ff",borderRadius:"0 0 6px 6px",padding:"8px 10px",border:"1px solid #e9d5ff",borderTop:"none"}}>
              <div style={{fontSize:9,color:"#9ca3af",marginBottom:6}}>Group classes cannot be transferred · 1on1 only</div>
              {(siblings||[]).filter(s=>s.name).map((sib,si)=>{
                const tr=(member.noClassTransfers||[]).find(t=>t.toName===sib.name)||{toName:sib.name,ph:0,na:0};
                function upd(field,val){
                  const cur=(member.noClassTransfers||[]).filter(t=>t.toName!==sib.name);
                  onChange({...member,showDonate:true,noClassTransfers:[...cur,{...tr,[field]:Math.max(0,parseInt(val)||0)}]});
                }
                const sibList=siblings.filter(s=>s.name);
                return(
                  <div key={si} style={{display:"flex",alignItems:"center",gap:6,marginBottom:si<sibList.length-1?4:0,background:"white",borderRadius:5,padding:"5px 8px"}}>
                    <span style={{fontSize:11,fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sib.name}</span>
                    <span style={{fontSize:9,color:"#b45309",fontWeight:700}}>PH</span>
                    <input type="number" min="0" max="10" style={{width:44,padding:"3px 6px",border:"1.5px solid #fcd34d",borderRadius:5,fontSize:11,outline:"none",textAlign:"center"}}
                      value={tr.ph} onChange={e=>upd("ph",e.target.value)}/>
                    <span style={{fontSize:9,color:"#6b21a8",fontWeight:700}}>NA</span>
                    <input type="number" min="0" max="10" style={{width:44,padding:"3px 6px",border:"1.5px solid #c4b5fd",borderRadius:5,fontSize:11,outline:"none",textAlign:"center"}}
                      value={tr.na} onChange={e=>upd("na",e.target.value)}/>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <label style={LS}>Room Type <span style={{color:"#dc2626"}}>*</span></label>
      <RoomTypeSelector value={member.roomType} onChange={v=>onChange({...member,roomType:v})} style={FI}/>
      <label style={LS}>Room Number</label>
      <input style={FI} value={member.roomNumber} onChange={e=>onChange({...member,roomNumber:e.target.value})} placeholder="e.g. 201 (optional)"/>

      {onDormSheet&&(
        <button type="button" onClick={()=>{
            const rt=member.roomType||"";
            const hotelVirt=rt.startsWith("Hevea Hotel")?9901:rt.startsWith("Clover Hotel")?9902:null;
            onDormSheet(member.roomNumber||(hotelVirt?String(hotelVirt):""));
          }}
          style={{width:"100%",marginBottom:6,padding:"6px 10px",background:"#1e3a8a",border:"none",borderRadius:6,
            fontSize:11,fontWeight:700,cursor:"pointer",color:"white",textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
          <span>🏨</span><span>Dormitory Sheet</span>
          {member.roomNumber&&<span style={{marginLeft:"auto",background:"rgba(255,255,255,.2)",borderRadius:10,padding:"1px 8px",fontSize:10}}>Room {member.roomNumber}</span>}
          {!member.roomNumber&&(member.roomType||"").startsWith("Hevea Hotel")&&<span style={{marginLeft:"auto",background:"rgba(255,255,255,.2)",borderRadius:10,padding:"1px 8px",fontSize:10}}>Hevea Hotel</span>}
          {!member.roomNumber&&(member.roomType||"").startsWith("Clover Hotel")&&<span style={{marginLeft:"auto",background:"rgba(255,255,255,.2)",borderRadius:10,padding:"1px 8px",fontSize:10}}>Clover Hotel</span>}
        </button>
      )}

      {/* ── Room Change History ── */}
      {member.roomNumber&&member.studyStart&&member.studyEnd&&(
        <RoomChangeSection member={member} onChange={onChange} isFamily={isFamily}/>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────────────
   RoomChangeSection
   Shows room history and lets the user split the current
   (last) segment into two when moving to a new room.
───────────────────────────────────────────────────── */
function RoomChangeSection({member,onChange,isFamily}){
  const[showForm,setShowForm]=useState(false);
  const[newRoom,setNewRoom]=useState("");
  const[changeDate,setChangeDate]=useState("");

  const segments=getEffectiveRoomSegments(member);
  const lastSeg=segments[segments.length-1]||null;
  const availSats=lastSeg?getSaturdaysBetween(lastSeg.from,lastSeg.to):[];

  function applyChange(){
    if(!changeDate||!newRoom.trim())return;
    const nextFrom=dateAddDays(changeDate,1);  // Sunday right after the Saturday
    const newHistory=[
      ...segments.slice(0,-1),
      {...lastSeg,to:changeDate},
      {roomNumber:newRoom.trim(),from:nextFrom,to:member.studyEnd},
    ];
    onChange({...member,roomHistory:newHistory,roomNumber:newRoom.trim()});
    setShowForm(false);setNewRoom("");setChangeDate("");
  }

  function cancelLastChange(){
    if(segments.length<=1)return;
    /* Remove last segment, extend second-to-last to studyEnd, restore roomNumber */
    const prev=segments[segments.length-2];
    const newHistory=segments.slice(0,-1).map((s,i,arr)=>
      i===arr.length-1?{...s,to:member.studyEnd}:s
    );
    onChange({...member,roomHistory:newHistory,roomNumber:prev.roomNumber});
  }

  /* LS / button styles inline */
  const S_SEG_ROW={display:"flex",alignItems:"center",gap:8,padding:"4px 8px",borderRadius:5,marginBottom:3,fontSize:11};
  const S_BTN=(col)=>({fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:7,border:"1.5px solid "+col,background:"white",color:col,cursor:"pointer"});

  return(
    <div style={{marginTop:8,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px"}}>
      <div style={{fontSize:10,fontWeight:800,color:"#64748b",marginBottom:6,letterSpacing:.5}}>📍 ROOM HISTORY</div>

      {/* Segment list */}
      {segments.map((seg,i)=>{
        const isCurrent=i===segments.length-1;
        return(
          <div key={i} style={{...S_SEG_ROW,background:isCurrent?"#eff6ff":"#f1f5f9",border:"1px solid "+(isCurrent?"#bfdbfe":"#e2e8f0")}}>
            <span style={{fontWeight:800,color:isCurrent?"#1e40af":"#475569",minWidth:36}}>#{seg.roomNumber}</span>
            <span style={{color:"#6b7280",flex:1}}>{seg.from} <span style={{color:"#94a3b8"}}>→</span> {seg.to}</span>
            {isCurrent&&<span style={{fontSize:9,background:"#1e40af",color:"white",borderRadius:4,padding:"1px 5px"}}>현재</span>}
          </div>
        );
      })}

      {/* Action buttons */}
      {!showForm&&(
        <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
          <button type="button" onClick={()=>{setShowForm(true);setChangeDate("");setNewRoom("");}} style={S_BTN("#0284c7")}>
            🔄 Room Change
          </button>
          {segments.length>1&&(
            <button type="button" onClick={cancelLastChange} style={S_BTN("#dc2626")}>
              ↩ 마지막 변경 취소
            </button>
          )}
        </div>
      )}

      {/* Change form */}
      {showForm&&lastSeg&&(
        <div style={{marginTop:8,background:"white",borderRadius:6,padding:"8px 10px",border:"1px solid #bfdbfe"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1e40af",marginBottom:6}}>
            🔄 #{lastSeg.roomNumber}호 → 새 방으로 이동
          </div>
          {isFamily&&(
            <div style={{fontSize:10,color:"#b45309",background:"#fef9c3",borderRadius:4,padding:"3px 7px",marginBottom:6}}>
              👨‍👩‍👧 Group/Family 카드 — 모든 멤버가 함께 이동합니다
            </div>
          )}
          <label style={{fontSize:11,color:"#374151",fontWeight:600,display:"block",marginBottom:3}}>
            #{lastSeg.roomNumber}호 마지막 날 (토요일)
          </label>
          {availSats.length===0?(
            <div style={{fontSize:11,color:"#dc2626",marginBottom:6}}>이동 가능한 토요일이 없습니다 (기간 부족)</div>
          ):(
            <select value={changeDate} onChange={e=>setChangeDate(e.target.value)}
              style={{width:"100%",padding:"6px 10px",borderRadius:6,border:"1.5px solid #bfdbfe",fontSize:12,marginBottom:8,outline:"none"}}>
              <option value="">— 날짜 선택 (토요일) —</option>
              {availSats.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          )}
          <label style={{fontSize:11,color:"#374151",fontWeight:600,display:"block",marginBottom:3}}>새 방번호</label>
          <input value={newRoom} onChange={e=>setNewRoom(e.target.value)} placeholder="예: 215"
            style={{width:"100%",padding:"6px 10px",borderRadius:6,border:"1.5px solid #bfdbfe",fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          <div style={{display:"flex",gap:6}}>
            <button type="button" onClick={applyChange} disabled={!changeDate||!newRoom.trim()}
              style={{...S_BTN("#0284c7"),background:changeDate&&newRoom.trim()?"#0284c7":"#e2e8f0",
                color:changeDate&&newRoom.trim()?"white":"#9ca3af",flex:1}}>
              ✓ 확인
            </button>
            <button type="button" onClick={()=>{setShowForm(false);setNewRoom("");setChangeDate("");}}
              style={{...S_BTN("#6b7280"),flex:1}}>
              취소
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


/* ═════════════════════════════════════════════════════
   DormitorySheetModal  (read-only dormitory chart)
═════════════════════════════════════════════════════ */
function DormitorySheetModal({kanbanCards,targetRoom,onClose,ghostCardIds}){
  /* ghostCardIds: Set of card IDs that are tentative (from pipeline) — rendered faintly */
  const _ghostIds=ghostCardIds||new Set();
  const scrollRef=React.useRef(null);
  /* drag-to-scroll state — plain ref to avoid re-renders on every mousemove */
  const dragRef=React.useRef({active:false,startX:0,startScroll:0,moved:false});
  const today=new Date();today.setHours(0,0,0,0);
  const MS_WEEK=7*24*60*60*1000;
  const NUM_WEEKS=72;
  const COL_W=50,LANE_H=27,ROOM_PAD=2,LABEL_W=72,SECTION_H=22,HEADER_H=42;

  const startSunday=React.useMemo(()=>{
    const d=new Date(today);d.setDate(d.getDate()-d.getDay()-8*7);return d;
  },[]);
  const todayWeekIdx=Math.floor((today-startSunday)/MS_WEEK);
  const weeks=React.useMemo(()=>Array.from({length:NUM_WEEKS},(_,i)=>new Date(startSunday.getTime()+i*MS_WEEK)),[startSunday]);

  const cardColorMap=React.useMemo(()=>{
    const map={};let idx=0;
    (kanbanCards||[]).forEach(c=>{if(!map[c.id])map[c.id]=DORM_PALETTE[idx++%DORM_PALETTE.length];});
    return map;
  },[kanbanCards]);

  const roomBars=React.useMemo(()=>{
    const rb={};
    const ACTIVE=["registered","current","incoming","leaving","graduated","archived"];
    (kanbanCards||[]).filter(c=>ACTIVE.includes(c.status)).forEach(card=>{
      const isFamilyCard=FAMILY_CARD_TYPES.has(card.type);
      function pushBar(roomNumStr,startStr,endStr,label,barKeyBase,extra){
        const rt=(extra&&extra.roomType)||"";
        let roomNum=parseInt(roomNumStr);
        if(isNaN(roomNum)){
          /* Route hotel room types to virtual IDs */
          if(rt.startsWith("Hevea Hotel"))roomNum=9901;
          else if(rt.startsWith("Clover Hotel"))roomNum=9902;
          else return;
        }
        const si=Math.floor((new Date(startStr)-startSunday)/MS_WEEK);
        const ei=Math.floor((new Date(endStr)-startSunday)/MS_WEEK);
        if(ei<0||si>=NUM_WEEKS)return;
        if(!rb[roomNum])rb[roomNum]=[];
        /* For hotel virtual rooms, append the specific room type to the label */
        const hotelSub=HOTEL_VIRTUAL_ROOMS[roomNum]?rt.replace(/^(Hevea|Clover) Hotel ?/,""):"";
        const finalLabel=hotelSub?label+" ["+hotelSub+"]":label;
        rb[roomNum].push({barKey:barKeyBase,label:finalLabel,startDateStr:startStr,endDateStr:endStr,
          startWeekIdx:Math.max(0,si),endWeekIdx:Math.min(NUM_WEEKS-1,ei),...extra});
      }
      if(isFamilyCard){
        const _cardMem=card.members||[];
        /* prefer explicitly marked guardian; fall back to first member */
        const rep=_cardMem.find(m=>m.isGuardian)||_cardMem[0]||{};
        const nat=rep.nationality||"";
        const natCode=NAT_CODE[nat]||nat.slice(0,2).toUpperCase()||"";
        const repName=(rep.name||"?");
        const extra=_cardMem.length-1;
        /* "KANG MOCHUL +2" style label */
        const label=repName+(extra>0?" +"+extra:"")+(natCode?" ("+natCode+")":"");
        const cardLink=card.trelloUrl||card.link||"";
        const segs=getEffectiveRoomSegments(rep);
        if(segs.length>0){
          segs.forEach((seg,si2)=>pushBar(seg.roomNumber,seg.from,seg.to,label,card.id+"_fam_"+seg.roomNumber+"_s"+si2,{cardId:card.id,isFamily:true,roomType:rep.roomType||"",cardLink}));
        } else {
          const byRoom={};
          (card.members||[]).forEach(m=>{
            const rn=(m.roomNumber||"").trim();
            if(!rn||!m.studyStart||!m.studyEnd)return;
            if(!byRoom[rn])byRoom[rn]={starts:[],ends:[],roomType:m.roomType||""};
            byRoom[rn].starts.push(m.studyStart);byRoom[rn].ends.push(m.studyEnd);
          });
          Object.entries(byRoom).forEach(([rn,{starts,ends,roomType}])=>{
            const startStr=[...starts].sort()[0];const endStr=[...ends].sort().slice(-1)[0];
            pushBar(rn,startStr,endStr,label,card.id+"_fam_"+rn,{cardId:card.id,isFamily:true,roomType,cardLink});
          });
        }
      } else {
        (card.members||[]).forEach((m,mi)=>{
          if(!m.studyStart||!m.studyEnd)return;
          const nat=m.nationality||"";
          const natCode=NAT_CODE[nat]||nat.slice(0,2).toUpperCase()||"";
          const label=(m.name||"?")+(natCode?" ("+natCode+")":"");
          const cardLink=card.trelloUrl||card.link||"";
          const segs=getEffectiveRoomSegments(m);
          segs.forEach((seg,si2)=>pushBar(seg.roomNumber,seg.from,seg.to,label,
            card.id+"_m"+mi+"_"+seg.roomNumber+"_s"+si2,{cardId:card.id,memberId:mi,isFamily:false,roomType:m.roomType||"",cardLink}));
        });
      }
    });
    return rb;
  },[kanbanCards,startSunday]);

  const monthSpans=React.useMemo(()=>{
    const spans=[];
    weeks.forEach((w,i)=>{
      const m=w.getMonth(),y=w.getFullYear();
      if(!spans.length||spans[spans.length-1].m!==m||spans[spans.length-1].y!==y)
        spans.push({label:w.toLocaleString("en",{month:"short"})+" '"+String(y).slice(2),m,y,start:i,count:0});
      spans[spans.length-1].count++;
    });
    return spans;
  },[weeks]);

  /* Compute row heights to find target room Y position */
  const rowHeights=React.useMemo(()=>{
    const h={};
    DORM_SECTIONS.forEach(({rooms})=>{
      rooms.forEach(roomNum=>{
        const bars=roomBars[roomNum]||[];
        const isFam=FAMILY_ROOM_SET.has(roomNum);
        const numLanes=isFam?assignLanes(bars).numLanes:Math.max(1,bars.length);
        h[roomNum]=numLanes*LANE_H+ROOM_PAD*2;
      });
    });
    return h;
  },[roomBars]);

  React.useEffect(()=>{
    const el=scrollRef.current;if(!el)return;
    /* Horizontal: scroll to 1 week before today */
    const sx=Math.max(0,(todayWeekIdx-1)*COL_W);
    /* Vertical: find target room and center it */
    const targetNum=parseInt(targetRoom);
    let sy=0;
    if(targetNum){
      let cumY=HEADER_H;
      let found=false;
      for(const {section,rooms} of DORM_SECTIONS){
        cumY+=SECTION_H;
        for(const roomNum of rooms){
          const rh=rowHeights[roomNum]||(LANE_H+ROOM_PAD*2);
          if(roomNum===targetNum){
            sy=Math.max(0,cumY+rh/2-el.clientHeight/2);
            found=true;break;
          }
          cumY+=rh;
        }
        if(found)break;
      }
    }
    el.scrollLeft=sx;el.scrollTop=sy;
  },[rowHeights]);

  function fmtDate(s){if(!s)return"";const d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate();}

  /* ── Drag-to-scroll handlers ── */
  function onScrollMouseDown(e){
    if(e.button!==0)return;
    const el=scrollRef.current;if(!el)return;
    dragRef.current={active:true,startX:e.clientX,startScroll:el.scrollLeft,moved:false};
    el.style.cursor="grabbing";
    e.preventDefault(); /* prevent text selection */
  }
  function onScrollMouseMove(e){
    const dr=dragRef.current;if(!dr.active)return;
    const dx=e.clientX-dr.startX;
    if(Math.abs(dx)>4)dr.moved=true;
    if(dr.moved&&scrollRef.current)scrollRef.current.scrollLeft=dr.startScroll-dx;
  }
  function onScrollMouseUp(){
    dragRef.current.active=false;
    if(scrollRef.current)scrollRef.current.style.cursor="grab";
  }
  function onScrollMouseLeave(){
    dragRef.current.active=false;
    if(scrollRef.current)scrollRef.current.style.cursor="grab";
  }

  const targetNum=parseInt(targetRoom)||0;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:20000,display:"flex",flexDirection:"column",padding:"16px 20px"}} onClick={onClose}>
      <div style={{background:"white",borderRadius:12,display:"flex",flexDirection:"column",flex:1,overflow:"hidden",maxHeight:"calc(100vh - 32px)"}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid #e2e8f0",flexShrink:0,background:"#f8fafc"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16,fontWeight:800,color:"#1e3a8a"}}>🏨 Dormitory Sheet</span>
            {targetNum>0&&<span style={{fontSize:11,background:"#eff6ff",color:"#1e40af",fontWeight:700,padding:"2px 10px",borderRadius:20}}>{HOTEL_VIRTUAL_ROOMS[targetNum]||"Room "+targetNum}</span>}
            <span style={{fontSize:11,color:"#94a3b8"}}>👁 View only</span>
          </div>
          <button onClick={onClose} style={{background:"#f1f5f9",border:"1.5px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:16,color:"#6b7280",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>✕</button>
        </div>
        {/* Chart — drag-to-scroll enabled on empty space */}
        <div ref={scrollRef}
          onMouseDown={onScrollMouseDown}
          onMouseMove={onScrollMouseMove}
          onMouseUp={onScrollMouseUp}
          onMouseLeave={onScrollMouseLeave}
          style={{overflow:"auto",flex:1,cursor:"grab",userSelect:"none"}}>
          <div style={{display:"inline-block",minWidth:LABEL_W+NUM_WEEKS*COL_W}}>
            {/* Month header */}
            <div style={{display:"flex",background:"#1e3a8a",color:"white",position:"sticky",top:0,zIndex:20}}>
              <div style={{width:LABEL_W,flexShrink:0,fontSize:11,fontWeight:700,padding:"4px 8px",borderRight:"1px solid rgba(255,255,255,.25)",position:"sticky",left:0,zIndex:30,background:"#1e3a8a"}}>Room</div>
              {monthSpans.map((ms,i)=>(
                <div key={i} style={{width:ms.count*COL_W,flexShrink:0,fontSize:11,fontWeight:700,padding:"4px 6px",textAlign:"center",borderRight:"1px solid rgba(255,255,255,.2)",height:22,overflow:"hidden",whiteSpace:"nowrap"}}>{ms.label}</div>
              ))}
            </div>
            {/* Week header */}
            <div style={{display:"flex",background:"#1e40af",color:"white",position:"sticky",top:22,zIndex:20}}>
              <div style={{width:LABEL_W,flexShrink:0,borderRight:"1px solid rgba(255,255,255,.25)",position:"sticky",left:0,zIndex:30,background:"#1e40af"}}/>
              {weeks.map((w,i)=>{
                const isCur=i===todayWeekIdx;
                return(
                  <div key={i} style={{width:COL_W,flexShrink:0,fontSize:9,textAlign:"center",padding:"3px 1px",borderRight:"1px solid rgba(255,255,255,.12)",height:20,fontWeight:isCur?800:400,background:isCur?"#3b82f6":"transparent",overflow:"hidden",lineHeight:"14px"}}>
                    {(w.getMonth()+1)+"/"+w.getDate()}
                  </div>
                );
              })}
            </div>
            {/* Sections */}
            {DORM_SECTIONS.map(({section,rooms})=>{
              const isHotelSection=section==="HEVEA HOTEL"||section==="CLOVER HOTEL";
              return(
              <React.Fragment key={section}>
                <div style={{display:"flex",background:isHotelSection?"#dcfce7":"#f1f5f9",borderTop:"2px solid "+(isHotelSection?"#4ade80":"#94a3b8")}}>
                  <div style={{width:LABEL_W,flexShrink:0,padding:"3px 8px",fontSize:10,fontWeight:800,color:isHotelSection?"#166534":"#475569",borderRight:"1px solid "+(isHotelSection?"#86efac":"#cbd5e1"),height:SECTION_H,display:"flex",alignItems:"center",position:"sticky",left:0,zIndex:5,background:isHotelSection?"#dcfce7":"#f1f5f9"}}>{section}</div>
                  <div style={{flex:1,borderBottom:"1px solid #e2e8f0"}}/>
                </div>
                {rooms.map(roomNum=>{
                  const bars=roomBars[roomNum]||[];
                  const isFamilyRoom=FAMILY_ROOM_SET.has(roomNum);
                  let laned,numLanes;
                  if(isFamilyRoom){const r=assignLanes(bars);laned=r.bars;numLanes=r.numLanes;}
                  else{laned=bars.map((b,i)=>({...b,_lane:i}));numLanes=Math.max(1,bars.length);}
                  const rowH=numLanes*LANE_H+ROOM_PAD*2;
                  const isTarget=roomNum===targetNum;
                  return(
                    <div key={roomNum} style={{display:"flex",borderTop:"1px solid #e2e8f0",minHeight:rowH,position:"relative",background:isTarget?"#fefce8":"transparent"}}>
                      <div style={{width:LABEL_W,flexShrink:0,background:isTarget?"#fef9c3":HOTEL_VIRTUAL_ROOMS[roomNum]?"#f0fdf4":"#f8fafc",borderRight:"2px solid "+(isTarget?"#f59e0b":HOTEL_VIRTUAL_ROOMS[roomNum]?"#86efac":"#cbd5e1"),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"sticky",left:0,zIndex:5,gap:1,padding:"2px 4px"}}>
                        <span style={{fontSize:HOTEL_VIRTUAL_ROOMS[roomNum]?9:12,fontWeight:800,color:isTarget?"#92400e":HOTEL_VIRTUAL_ROOMS[roomNum]?"#166534":"#1e3a8a",textAlign:"center",lineHeight:"1.2"}}>{HOTEL_VIRTUAL_ROOMS[roomNum]||roomNum}</span>
                        {isTarget&&<span style={{fontSize:8,color:"#d97706",fontWeight:700}}>★</span>}
                      </div>
                      <div style={{position:"relative",width:NUM_WEEKS*COL_W,height:rowH,flexShrink:0}}>
                        {weeks.map((_,i)=>(
                          <div key={i} style={{position:"absolute",left:i*COL_W,top:0,width:COL_W,height:"100%",borderRight:"1px solid #f0f4f8",background:i===todayWeekIdx?"#eff6ff":i%2===0?"transparent":"rgba(248,250,252,.5)"}}/>
                        ))}
                        {!isFamilyRoom&&Array.from({length:numLanes-1},(_,li)=>(
                          <div key={li} style={{position:"absolute",left:0,top:ROOM_PAD+(li+1)*LANE_H,width:"100%",height:1,background:"#e2e8f0",zIndex:2}}/>
                        ))}
                        {(()=>{
                          const cap=HOTEL_VIRTUAL_ROOMS[roomNum]?999:FAMILY_ROOM_SET.has(roomNum)?5:Math.max(1,...(bars.length?bars.map(b=>roomCapacity(b.roomType||"")):[1]));
                          const conflicts=computeConflicts(bars,cap);
                          return(<>
                            {laned.map(bar=>{
                              const bc=cardColorMap[bar.cardId]||"#bfdbfe";

                                  onClick={(e)=>{
                                    /* if the mouse moved during drag, treat as scroll — not a click */
                                    if(dragRef.current.moved){e.stopPropagation();return;}
                                    if(hasLink)window.open(bar.cardLink,"_blank","noopener");
                                    else alert("이 카드에 연결된 링크가 없습니다.\n카드 편집 화면에서 🔗 External Link 필드를 입력하세요.");

                                    borderRadius:4,cursor:hasLink?"pointer":"grab",zIndex:3,
                                    display:"flex",alignItems:"center",padding:"0 5px",overflow:"hidden",
                                    opacity:isGhost?0.55:1,
                                    boxShadow:isGhost?"none":"0 1px 3px rgba(0,0,0,.08)"}}>
                                  <span style={{fontSize:9,fontWeight:700,color:"#1e293b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                                    {isGhost?"⋯ ":""}{hasLink?"🔗 ":""}{bar.label}
                                  </span>
                                </div>
                              );
                            })}
                            {conflicts.map((c,ci)=>(
                              <div key={"cf_"+ci}
                                title="⚠️ Room conflict"
                                style={{position:"absolute",left:c.startWeekIdx*COL_W,top:0,

                                  borderRight:"2px solid rgba(220,38,38,.7)",
                                  zIndex:10,pointerEvents:"none"}}/>
                            ))}
                          </>);
                        })()}
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function AddCardModal({initialCard,onSave,onClose,onDelete,onArchive,isArchived,kanbanCards,agencies,readOnly}){
  const isNewCard=!initialCard?.id; /* true = creating for the first time, never saved yet */
  const[dormSheetRoom,setDormSheetRoom]=useState(null);
  const[shaking,setShaking]=useState(false);
  function tryClose(){
    /* New unsaved cards must be closed via ✕ only */
    if(isNewCard){
      if(shaking)return;
      setShaking(true);
      setTimeout(()=>setShaking(false),420);
      return;
    }
    onClose();
  }
  const BLANK={name:"",gender:"",birthYear:"",birthMonth:"",birthDay:"",nationality:"Korean",studyStart:"",studyEnd:"",course:"",roomType:"",roomNumber:"",roomHistory:[],nickname:"",photo:""};
  const[type,setType]=useState(initialCard?.type||"");
  const[status,setStatus]=useState(initialCard?.status||"registered");
  function sortByAge(ms){
    if(!ms||ms.length<2)return ms;
    /* Manual Guardian pin takes priority; otherwise oldest first */
    const pinned=ms.find(m=>m.isGuardian);
    if(pinned)return[pinned,...ms.filter(m=>!m.isGuardian)];
    return [...ms].sort((a,b)=>{
      const ay=a.birthYear?parseInt(a.birthYear):9999;
      const by=b.birthYear?parseInt(b.birthYear):9999;
      return ay-by;
    });
  }
  const initMembers=initialCard?.members?.length
    ?(initialCard.type==="Group/Family"?sortByAge(initialCard.members):initialCard.members)
    :[{...BLANK}];
  const[members,setMembers]=useState(initMembers);
  const[notes,setNotes]=useState(initialCard?.notes||"");
  const[cardLink,setCardLink]=useState(initialCard?.trelloUrl||initialCard?.link||"");
  const[agencyNat,setAgencyNat]=useState(initialCard?.agencyNat||"");
  const[agencyName,setAgencyName]=useState(initialCard?.agencyName||"");
  const[consultant,setConsultant]=useState(initialCard?.consultant||"");
  const[attachments,setAttachments]=useState(initialCard?.attachments||[]);
  const[attUploading,setAttUploading]=useState(false);
  const fileInputRef=React.useRef(null);
  const cardIdRef=React.useRef(initialCard?.id||("new_"+Date.now()));
  async function uploadAttachment(file){
    const MAX_MB=50;
    if(file.size>MAX_MB*1024*1024){alert(file.name+" exceeds "+MAX_MB+"MB limit.");return;}
    const ts=Date.now();
    const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
    const path="cards/"+cardIdRef.current+"/"+ts+"_"+safeName;
    try{
      setAttUploading(true);
      const{error:upErr}=await _sb.storage.from("hana-attachments").upload(path,file,{contentType:file.type});
      if(upErr)throw upErr;
      const{data:{publicUrl}}=_sb.storage.from("hana-attachments").getPublicUrl(path);
      const att={id:"att_"+ts,name:file.name,size:file.size,ftype:file.type,url:publicUrl,storagePath:path,uploadedAt:new Date().toISOString()};
      setAttachments(p=>[...p,att]);
    }catch(e){
      alert("Upload failed: "+e.message+"\n\nMake sure 'hana-attachments' public bucket exists in Supabase Storage.");
    }finally{setAttUploading(false);}
  }
  async function removeAttachment(att){
    if(att.storagePath){
      try{await _sb.storage.from("hana-attachments").remove([att.storagePath]);}catch(e){console.warn("Storage delete failed:",e.message);}
    }
    setAttachments(p=>p.filter(a=>a.id!==att.id));
  }
  const[activeMemberIdx,setActiveMemberIdx]=useState(0);
  const[showIdPanel,setShowIdPanel]=useState(true);
  const[bannerTop,setBannerTop]=useState(()=>{try{return localStorage.getItem("hana_id_banner_top")||"";}catch(e){return""}});
  const[bannerUploading,setBannerUploading]=useState(null);
  const[bannerBottom,setBannerBottom]=useState(()=>{try{return localStorage.getItem("hana_id_banner_bottom")||"";}catch(e){return"";}});
  const scrollContainerRef=React.useRef(null);
  const observerRef=React.useRef(null);
  React.useEffect(()=>{
    if(!showIdPanel||members.length<=1){setActiveMemberIdx(0);return;}
    if(observerRef.current)observerRef.current.disconnect();
    const timer=setTimeout(()=>{
      const root=scrollContainerRef.current;
      if(!root)return;
      const els=root.querySelectorAll("[data-member-idx]");
      if(!els.length)return;
      const obs=new IntersectionObserver(
        (entries)=>{
          const vis=entries.filter(e=>e.isIntersecting);
          if(!vis.length)return;
          const best=vis.reduce((a,b)=>a.intersectionRatio>b.intersectionRatio?a:b);
          setActiveMemberIdx(parseInt(best.target.getAttribute("data-member-idx")||"0"));
        },
        {root,threshold:[0.1,0.3,0.5,0.7]}
      );
      els.forEach(el=>obs.observe(el));
      observerRef.current=obs;
    },300);
    return()=>{clearTimeout(timer);if(observerRef.current)observerRef.current.disconnect();};
  },[members.length,showIdPanel]);
  async function saveBanner(type,file){
    if(!file){
      try{localStorage.setItem("hana_id_banner_"+type,"");}catch(e){}
      if(type==="top")setBannerTop("");else setBannerBottom("");
      return;
    }
    try{
      setBannerUploading(type);
      const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
      const path="id-banner-"+type+"."+ext;
      const{error:upErr}=await _sb.storage.from("hana-banners").upload(path,file,{upsert:true,contentType:file.type});
      if(upErr)throw upErr;
      const{data:{publicUrl}}=_sb.storage.from("hana-banners").getPublicUrl(path);
      const url=publicUrl+"?v="+Date.now();
      try{localStorage.setItem("hana_id_banner_"+type,url);}catch(e){}
      if(type==="top")setBannerTop(url);else setBannerBottom(url);
    }catch(e){
      alert("업로드 실패: "+e.message+"\n\nSupabase Storage에 'hana-banners' public 버킷이 있는지 확인하세요.");
    }finally{
      setBannerUploading(null);
    }
  }

  function updateMember(i,m){
    setMembers(p=>{
      /* If this member was just pinned as Guardian, clear pin from others */
      let updated=p.map((x,j)=>j===i?m:(m.isGuardian&&!p[i].isGuardian?{...x,isGuardian:false}:x));
      /* For Group/Family: when member[0] changes period/room fields,
         propagate to other members ONLY if their field is empty or still
         matches the old member[0] value (i.e., was auto-filled, not manually changed) */
      if(isFamily&&i===0){
        const old=p[0];
        const SYNC=["studyStart","studyEnd","roomType","roomNumber"];
        return updated.map((x,j)=>{
          if(j===0)return x;
          const patch={};
          SYNC.forEach(f=>{if(!x[f]||x[f]===old[f])patch[f]=m[f];});
          /* Always sync roomHistory — all family members share the same room segments */
          patch.roomHistory=m.roomHistory||[];
          return{...x,...patch};
        });
      }
      return updated;
    });
  }
  function addMember(){
    setMembers(p=>{
      const first=p[0]||{};
      return[...p,{
        ...BLANK,
        studyStart:first.studyStart||"",
        studyEnd:first.studyEnd||"",
        roomType:first.roomType||"",
        roomNumber:first.roomNumber||"",
      }];
    });
  }
  function removeMember(i){setMembers(p=>p.filter((_,j)=>j!==i));}
  function selectType(t){
    setType(t);
    if(t!=="Group/Family")setMembers(m=>[m[0]||{...BLANK}]);
  }
  const canSave=type&&members.every(m=>m.name.trim());
  function save(){
    if(!canSave)return;
    /* Derive canonical agencyId (e.g. "CESA(KR)") from name+nat fields, or keep existing */
    const computedAgencyId=(agencyName&&agencyNat)
      ?agencyName.trim().toUpperCase()+"("+agencyNat.trim().toUpperCase()+")"
      :(initialCard?.agencyId||"");
    onSave({
      id:initialCard?.id||"card_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
