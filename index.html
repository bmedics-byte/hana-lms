                    <td style={{color:"#6b7280"}}>{p.time}</td>
                    <td>{room?<span style={{fontWeight:700,color:"#b45309"}}>{roomLabel(room)}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                    <td>

                    <td><span style={{background:"#fed7aa",color:"#9a3412",padding:"2px 8px",borderRadius:10,fontWeight:700,fontSize:12}}>Substituting</span></td>
                  </tr>
                );
              }

              /* ── Regular own assignment ── */
              const sub=mySubs[pkey];
              const room=findRoom1on1(name,p.i,rooms1on1);
              const isStudent=STUDENTS.includes(assign);
              const cKey=isStudent?convKey(name,assign):null;
              const unread=cKey?getUnreadCount(messages||{},cKey,name):0;
              return(
                <tr key={p.i} style={{background:absent&&sub?"#fef9c3":"white"}}>
                  <td style={{fontWeight:700}}>{p.label}</td><td style={{color:"#6b7280"}}>{p.time}</td>
                  <td>{room?<span style={{fontWeight:700,color:"#7c3aed"}}>{roomLabel(room)}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                  <td>
                    {isStudent?(
                      <button onClick={()=>onOpenMessenger&&onOpenMessenger({teacher:name,student:assign})}
                        style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:6}}>

                </tr>
              );

/* ── Guardian helper: find children of a guardian in family cards ── */
function getGuardianChildren(name,kanbanCards){
  if(!kanbanCards)return[];
  const out=[];
  kanbanCards.forEach(card=>{
    if(card.type!=="Group/Family")return;
    const isGuard=card.members.some(m=>m.name===name&&m.isGuardian);
    if(!isGuard)return;
    card.members.forEach(m=>{if(m.name!==name)out.push(m.name);});
  });
  return out;
}

/* ═════════════════════════════════════════════════════
   PersonalStudentView
═════════════════════════════════════════════════════ */
function PersonalStudentView({name,sched,absentSets,subsByDay,rooms1on1,groupRosters,selDay,setSelDay,messages,onOpenMessenger,kanbanCards,onChangePassword,mealPlan,mealSkips,setMealSkips}){
  const stuSched=useMemo(()=>buildStudentSched(sched),[sched]);
  const absentSet=absentSets[selDay]||new Set();
  const daySubs=subsByDay[selDay]||{};
  const guardianChildren=useMemo(()=>getGuardianChildren(name,kanbanCards),[name,kanbanCards]);
  const isGuardian=guardianChildren.length>0;
  const [activeTab,setActiveTab]=useState(name);

  /* Find the student's current assigned room from kanban cards.
     Normalizes "SEO,BOEUN" ↔ "SEO BOEUN" etc. for matching. */
  function getStudentRoom(sName){
    if(!kanbanCards||!sName)return null;
    const nn=(sName||"").toLowerCase().replace(/[,\s]+/g," ").trim();
    const today=new Date().toISOString().slice(0,10);
    for(const card of kanbanCards){
      for(const m of card.members||[]){
        const mn=(m.name||"").toLowerCase().replace(/[,\s]+/g," ").trim();
        if(mn!==nn)continue;
        /* Check roomHistory segments first, then fall back to roomNumber */
        const segs=getEffectiveRoomSegments(m);
        const cur=segs.find(s=>s.from<=today&&s.to>=today);
        const rn=cur?.roomNumber||m.roomNumber||null;
        if(rn)return rn;
        /* Hotel students have no room number — return hotel name from roomType */
        const rt=m.roomType||"";
        if(rt.startsWith("Hevea Hotel"))return"Hevea Hotel";
        if(rt.startsWith("Clover Hotel"))return"Clover Hotel";
        return null;
      }
    }
    return null;
  }

  /* Shared schedule-table renderer for self AND guardian children */
  function renderScheduleTable(studentName,guardianView){
    /* Use flexible resolver so "KIM DAM" ↔ "DAM KIM" both work */
    const resolvedName=resolveSchedName(studentName,stuSched);
    const ps=stuSched[resolvedName]||{};
    /* Also resolve group/activity assignments for this student */
    const grpAssign=buildGroupAssignments(resolvedName,sched,groupRosters);
    const headerBg=guardianView?"#0f766e":"#166534";
    const hasSomething=Object.keys(ps).length>0||Object.keys(grpAssign).length>0;
    const studentRoom=guardianView?getStudentRoom(studentName):null; /* guardian only — own room shown in header */
    return(
      <>
      {studentRoom&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"7px 14px",background:"#dbeafe",borderRadius:10,fontSize:13,fontWeight:700,color:"#1e40af"}}>
          🏠 Room {studentRoom}
          <span style={{fontSize:11,fontWeight:400,color:"#3b82f6"}}>(current assignment)</span>
        </div>
      )}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <table className="ps-t">
          <thead>
            <tr style={{background:headerBg,color:"white"}}>
              <th>Period</th><th>Time</th><th>Class</th><th>Room</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            {!hasSomething&&(
              <tr><td colSpan={5} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No classes assigned.</td></tr>
            )}
            {PERIODS.map(p=>{
              const pkey=pk(p.i);
              const teacher=ps[pkey];
              const grp=grpAssign[pkey];
              if(!teacher&&!grp)return null;

              /* ── 1:1 class row ── */
              if(teacher){
                const isAbs=absentSet.has(teacher);
                const sub=daySubs[teacher]?.[pkey];
                const room=rooms1on1?findRoom1on1(teacher,p.i,rooms1on1):null;
                const cKey=convKey(resolvedName,teacher);
                const unread=getUnreadCount(messages||{},cKey,resolvedName);
                const totalMsgs=(messages||{})[cKey]?.length||0;
                return(
                  <tr key={p.i} style={{background:isAbs&&sub?"#fef9c3":isAbs&&!sub?"#fef2f2":"white"}}>
                    <td style={{fontWeight:700}}>{p.label}</td>
                    <td style={{color:"#6b7280"}}>{p.time}</td>
                    <td>
                      <button
                        onClick={()=>onOpenMessenger&&onOpenMessenger(
                          guardianView
                            ?{teacher,student:resolvedName,isGuardian:true,guardianName:name}
                            :{teacher,student:resolvedName}
                        )}
                        style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"inline-flex",alignItems:"center",gap:5}}>
                        {isAbs&&sub
                          ?<span><span className="orig-s" style={{marginRight:6}}>{teacher}</span><b style={{color:"#b45309"}}>{sub}</b></span>
                          :<span style={{fontWeight:600,color:"#1e40af",textDecoration:"underline",textDecorationColor:"#93c5fd",fontSize:13}}>{teacher}</span>
                        }
                        {guardianView
                          ?totalMsgs>0
                            ?<span style={{background:"#e0e7ff",color:"#3730a3",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px",lineHeight:1.4,flexShrink:0}}>💬{totalMsgs}</span>
                            :<span style={{color:"#c7d2fe",fontSize:12,flexShrink:0}}>💬</span>
                          :unread>0
                            ?<span style={{background:"#dc2626",color:"white",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px",lineHeight:1.4,flexShrink:0}}>{unread}</span>
                            :<span style={{color:"#93c5fd",fontSize:12,flexShrink:0}}>💬</span>
                        }
                      </button>
                    </td>
                    <td>{room?<span style={{fontWeight:700,color:isAbs&&sub?"#b45309":"#7c3aed",fontSize:12}}>{roomLabel(room)}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                    <td>{isAbs&&sub?<span style={{background:"#fef9c3",color:"#b45309",padding:"2px 8px",borderRadius:10,fontWeight:700,fontSize:12}}>🔄 Sub</span>:isAbs&&!sub?<span style={{color:"#dc2626",fontSize:12}}>⚠ TBD</span>:<span style={{color:"#16a34a",fontSize:12}}>✓</span>}</td>
                  </tr>
                );
              }

              /* ── Group / Activity / Kindergarten class row ── */
              if(grp){
                const{kind,roomKey,teacher:grpTeacher,label}=grp;
                const isAct=kind==="activity";
                const isKdr=kind==="kinder";
                const rowBg=isAct?"#f0fdf4":isKdr?"#fdf4ff":"#eff6ff";
                const badgeBg=isAct?"#059669":isKdr?"#7c3aed":"#2563eb";
                const gk=grpKey(roomKey,pkey);
                const unread=getUnreadCount(messages||{},gk,resolvedName);
                const members=(groupRosters||{})[roomKey]?.[pkey]||[];
                const allMembers=grpTeacher?[...members,grpTeacher]:members;
                return(
                  <tr key={p.i} style={{background:rowBg}}>
                    <td style={{fontWeight:700}}>{p.label}</td>
                    <td style={{color:"#6b7280"}}>{p.time}</td>
                    <td>
                      <button
                        onClick={()=>onOpenMessenger&&onOpenMessenger({
                          isGroup:true,
                          groupKey:gk,
                          groupLabel:label,
                          groupMembers:allMembers,
                        })}
                        style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"inline-flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{background:badgeBg,color:"white",borderRadius:6,fontSize:10,fontWeight:800,padding:"2px 7px",flexShrink:0}}>{isAct?"Activity":isKdr?"Kinder":"Group"}</span>
                        <span style={{fontWeight:600,color:badgeBg,fontSize:13}}>{label}</span>
                        {grpTeacher&&<span style={{fontSize:11,color:"#64748b",flexShrink:0}}>👤 {grpTeacher}</span>}
                        {unread>0
                          ?<span style={{background:"#dc2626",color:"white",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px",lineHeight:1.4,flexShrink:0}}>{unread}</span>
                          :<span style={{color:"#93c5fd",fontSize:12,flexShrink:0}}>💬</span>
                        }
                      </button>
                    </td>
                    <td><span style={{color:"#d1d5db"}}>—</span></td>
                    <td><span style={{color:"#16a34a",fontSize:12}}>✓</span></td>
                  </tr>
                );
              }
              return null;
            })}
          </tbody>
        </table>
      </div>
      </>
    );
  }

  const ownResolvedName=resolveSchedName(name,stuSched);
  const ownPs=stuSched[ownResolvedName]||{};
  const ownHasAbs=Object.values(ownPs).some(t=>absentSet.has(t));

  /* ── Family tab bar (guardian + children) ── */
  const familyTabs=isGuardian?[{key:name,label:"👑 "+name,isParent:true},...guardianChildren.map(c=>({key:c,label:"👤 "+c,isParent:false}))]:[];
  const tabPerson=isGuardian?activeTab:name;
  const tabIsParent=isGuardian&&activeTab===name;

  /* Absence badge for a given person */
  function personHasAbs(pName){
    const r=resolveSchedName(pName,stuSched);
    const ps=stuSched[r]||{};
    return Object.values(ps).some(t=>absentSet.has(t));
  }

  return(
    <div>
      {/* ── Header card ── */}
      <div className="card" style={{marginBottom:16,background:isGuardian?"#eff6ff":"white"}}>
        <div style={{fontSize:20,fontWeight:800,color:isGuardian?"#1e40af":"#166534"}}>
          {isGuardian?"👨‍👩‍👧 Welcome, "+name+" (Guardian)":"📚 Welcome, "+name}
        </div>
        <ChangePasswordWidget name={name} onChangePassword={onChangePassword}/>
        {!isGuardian&&(()=>{
          const room=getStudentRoom(name);
          return room
            ?<div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:8,background:"#dbeafe",color:"#1e40af",borderRadius:10,padding:"5px 14px",fontSize:14,fontWeight:800}}>
                🏠 Room {room}
              </div>
            :null;
        })()}
        {isGuardian
          ?<p style={{marginTop:6,color:"#4b5563",fontSize:14}}>
              Family account — {selDay}
            </p>
          :ownHasAbs
            ?<p style={{marginTop:6,color:"#b45309",fontWeight:600,fontSize:14}}>⚠ Your teacher is absent today. Please check for a substitute.</p>
            :<p style={{marginTop:6,color:"#6b7280",fontSize:14}}>{selDay} class schedule.</p>
        }
      </div>

      {/* ── Family tab bar (guardian mode only) ── */}
      {isGuardian&&(
        <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
          {familyTabs.map(tab=>{
            const active=activeTab===tab.key;
            const hasAbs=personHasAbs(tab.key);
            const tabRoom=getStudentRoom(tab.key); // show room for both guardian + children
            return(
              <button key={tab.key} onClick={()=>setActiveTab(tab.key)}
                style={{
                  padding:"7px 14px",borderRadius:"8px 8px 0 0",border:"1.5px solid",
                  borderColor:active?(tab.isParent?"#1e40af":"#0f766e"):"#e2e8f0",
                  borderBottom:active?"none":"1.5px solid #e2e8f0",
                  background:active?(tab.isParent?"#eff6ff":"#f0fdfa"):"white",
                  color:active?(tab.isParent?"#1e40af":"#0f766e"):"#6b7280",
                  fontWeight:active?800:500,fontSize:13,cursor:"pointer",
                  display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",
                  boxShadow:active?"0 -2px 6px rgba(0,0,0,.06)":"none",
                  position:"relative",top:active?1:0
                }}>
                {tab.label}
                {tabRoom&&<span style={{fontSize:10,background:active?"#bfdbfe":"#e0e7ff",color:"#1e40af",borderRadius:5,padding:"1px 6px",fontWeight:800}}>🏠{tabRoom}</span>}
                {hasAbs&&<span style={{fontSize:10,background:"#fee2e2",color:"#dc2626",borderRadius:5,padding:"1px 5px",fontWeight:700}}>⚠</span>}
              </button>
            );
          })}
        </div>
      )}

      <DayBar selDay={selDay} setSelDay={setSelDay} color={isGuardian?(tabIsParent?"#1e40af":"#0f766e"):"#166534"}/>

      {/* ── Meal schedule — shows on all tabs (parent + child) ── */}
      {(()=>{
        const mKey=dayToMealKey(selDay);
        const dayMeal=mealPlan?.plan?.[mKey]||{};
        /* tabPerson = child name when guardian views child tab; own name otherwise */
        const mealStudent=tabPerson;
        const card=kanbanCards?.find(c=>c.members?.some(m=>m.name===mealStudent));
        const isJunior=card?.type==="Junior Camp";
        const isWeekend=selDay==="Saturday"||selDay==="Sunday";
        const skips=(mealSkips?.[mKey]?.[mealStudent])||{};
        function toggleSkip(slot){
          if(!setMealSkips)return;
          setMealSkips(prev=>{
            const n=JSON.parse(JSON.stringify(prev));
            if(!n[mKey])n[mKey]={};if(!n[mKey][mealStudent])n[mKey][mealStudent]={};
            n[mKey][mealStudent][slot]=!n[mKey][mealStudent][slot];
            return n;
          });
        }
        const slots=[];
        if(!isWeekend){
          /* ── Weekday meals ── */
          slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"7:30 – 8:30",menu:(()=>{const p=[dayMeal.breakfast?.items,dayMeal.breakfast?.soup].filter(Boolean);p.push("+ Bread & Jam");return p.join(" · ");})()});
          slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:isJunior?"11:50 – 12:35":"12:35 – 1:25",menu:(()=>{const d=dayMeal.lunch||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.fruit)p.push(`[Fruit] ${d.fruit}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:35 – 6:15",menu:(()=>{const d=dayMeal.dinner||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          if(isJunior)slots.push({key:"eveningSnack",icon:"🍕",label:"Evening Snack",time:"7:50 – 8:30",menu:dayMeal.nightSnack||null});
        }else if(isJunior){
          /* ── JC weekend: all 4 meals ── */
          slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"8:00 – 9:00 am",menu:dayMeal.breakfast?.soup?`Rice, Soup & Kimchi · ${dayMeal.breakfast.soup} · + Bread & Jam`:"Rice, Soup & Kimchi · + Bread & Jam"});
          slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",menu:dayMeal.brunchSoup?`Rice, Soup & Kimchi · ${dayMeal.brunchSoup}`:"Rice, Soup & Kimchi"});
          slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:"12:00 – 1:00 pm",menu:(()=>{const d=dayMeal.lunch||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:00 – 6:00 pm",menu:(()=>{const d=dayMeal.dinner||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
        }else{
          /* ── Regular weekend: brunch only ── */
          slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",menu:dayMeal.brunchSoup?`Rice, Soup & Kimchi · ${dayMeal.brunchSoup}`:"Rice, Soup & Kimchi"});
        }
        if(slots.length===0)return null;
        return(
          <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#0d9488",marginBottom:10}}>🍽️ Today's Meals</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {slots.map(s=>{
                const skipped=!!skips[s.key];
                return(
                  <div key={s.key} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,background:skipped?"#f9fafb":"#f0fdfa",border:`1.5px solid ${skipped?"#e2e8f0":"#99f6e4"}`,opacity:skipped?.7:1,transition:"all .15s"}}>
                    <span style={{fontSize:16,flexShrink:0}}>{s.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                        <span style={{fontSize:12,fontWeight:800,color:skipped?"#9ca3af":"#0d9488"}}>{s.label}</span>
                        <span style={{fontSize:10,color:"#64748b",background:"#e2e8f0",padding:"1px 7px",borderRadius:8}}>{s.time}</span>
                        {skipped&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fee2e2",padding:"1px 7px",borderRadius:8}}>SKIP</span>}
                      </div>
                      <div style={{fontSize:11,color:skipped?"#9ca3af":"#374151"}}>{s.menu||<span style={{fontStyle:"italic",color:"#9ca3af"}}>Menu not set</span>}</div>
                    </div>
                    {!isJunior&&(
                    <button onClick={()=>toggleSkip(s.key)}
                      style={{flexShrink:0,padding:"4px 10px",borderRadius:8,border:`1.5px solid ${skipped?"#6b7280":"#f87171"}`,background:skipped?"#6b7280":"white",color:skipped?"white":"#dc2626",fontSize:10.5,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
                      {skipped?"↩ Undo":"Skip"}
                    </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── Schedule content: either own (non-guardian) or active tab (guardian) ── */}
      {!isGuardian&&renderScheduleTable(name,false)}
      {isGuardian&&renderScheduleTable(tabPerson,!tabIsParent)}
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   Legend
═════════════════════════════════════════════════════ */
function Legend(){
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:10,fontSize:11,color:"#6b7280",marginBottom:10}}>
      {[{bg:"#dbeafe",l:"Individual"},{bg:"#d1fae5",l:"Group"},{bg:"#fef9c3",l:"Special / Other"},{bg:"#fef3c7",l:"Substitute"},{bg:"#fee2e2",l:"Absent / Unassigned"}].map(x=><span key={x.l} style={{display:"flex",alignItems:"center"}}><span className="ldot" style={{background:x.bg}}/>{x.l}</span>)}
      <span style={{marginLeft:6,color:"#94a3b8"}}>· Click any cell → edit popup (class type, assignment, sub) | Drag cell ↕ to move to empty slot in same period | Teacher name → schedule popup | Student name → daily schedule</span>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   MessengerModal
   • 1:1 mode: teacher ↔ student
   • Group mode (isGroup=true): all class members share one room
   • File sharing: images / docs / video ≤ 500 KB (base64)
   isAdmin=true → read-only view for admin oversight
═════════════════════════════════════════════════════ */
function MessengerModal({currentUser,otherUser,isAdmin,isGroup,groupKey,groupLabel,groupMembers,messages,onSend,onMarkRead,onClose,convOverride}){
  const cKey=isGroup?groupKey:(convOverride||convKey(currentUser,otherUser));
  const conv=messages[cKey]||[];
  const[text,setText]=useState("");
  const[filePreview,setFilePreview]=useState(null); // {name,type,data,size}
  const[fileTooLarge,setFileTooLarge]=useState(false);
  const bottomRef=React.useRef(null);
  const fileRef=React.useRef(null);

  React.useEffect(()=>{if(!isAdmin&&onMarkRead)onMarkRead(cKey,currentUser);},[]);
  React.useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[conv.length]);

  function handleFile(e){
    const file=e.target.files?.[0];if(!file)return;
    setFileTooLarge(false);
    if(file.size>500*1024){setFileTooLarge(true);e.target.value="";return;}
    const reader=new FileReader();
    reader.onload=()=>setFilePreview({name:file.name,type:file.type,data:reader.result,size:file.size});
    reader.readAsDataURL(file);
    e.target.value="";
  }

  function sendMsg(){
    if(!text.trim()&&!filePreview)return;
    onSend(cKey,currentUser,text.trim()||null,filePreview||null);
    setText("");setFilePreview(null);setFileTooLarge(false);
  }

  const headerBg=isGroup?"#0d9488":"#1e40af";

  function renderMsgBubble(msg){
    const self=msg.from===currentUser;
    const isImg=msg.file&&msg.file.type.startsWith("image/");
    const isVid=msg.file&&msg.file.type.startsWith("video/");
    return(
      <div key={msg.id} style={{display:"flex",flexDirection:"column",alignItems:self?"flex-end":"flex-start",maxWidth:"100%"}}>
        {(!self||isGroup)&&<div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:2,paddingLeft:2,paddingRight:2}}>{msg.from}</div>}
        <div style={{
          maxWidth:260,overflow:"hidden",
          borderRadius:self?"16px 16px 4px 16px":"16px 16px 16px 4px",
          background:self?"#1e40af":"white",
          color:self?"white":"#1e293b",
          boxShadow:"0 1px 4px rgba(0,0,0,.1)",
          fontSize:13,lineHeight:1.45,wordBreak:"break-word"
        }}>
          {isImg&&<img src={msg.file.data} alt={msg.file.name} style={{display:"block",maxWidth:220,maxHeight:200,width:"100%",objectFit:"contain"}}/>}
          {isVid&&<video src={msg.file.data} controls style={{display:"block",maxWidth:220,maxHeight:160,width:"100%"}}/>}
          {msg.file&&!isImg&&!isVid&&(
            <div style={{padding:"9px 13px"}}>
              <a href={msg.file.data} download={msg.file.name} style={{color:self?"#bfdbfe":"#1e40af",textDecoration:"underline",fontSize:12}}>
                📎 {msg.file.name} <span style={{opacity:.7}}>({Math.round(msg.file.size/1024)}KB)</span>
              </a>
            </div>
          )}
          {msg.text&&<div style={{padding:"9px 13px"}}>{msg.text}</div>}
        </div>
        <div style={{fontSize:9,color:"#94a3b8",marginTop:2,paddingLeft:2,paddingRight:2}}>
          {new Date(msg.ts).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}
          {isAdmin&&<span style={{marginLeft:6,fontWeight:600}}>{msg.from}</span>}
        </div>
      </div>
    );
  }

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:2000,display:"flex",alignItems:"flex-end",justifyContent:"flex-end",padding:24}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:380,maxHeight:"82vh",display:"flex",flexDirection:"column",background:"white",borderRadius:18,boxShadow:"0 12px 48px rgba(0,0,0,.3)",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"14px 16px",background:headerBg,color:"white",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexShrink:0}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:14,fontWeight:800}}>
              {isGroup?"👥 "+groupLabel:isAdmin?`💬 ${currentUser} ↔ ${otherUser}`:"💬 Chat with "+otherUser}
            </div>
            <div style={{fontSize:11,opacity:.8,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {isAdmin?"👁 Admin — read only":isGroup?(groupMembers||[]).join(", "):currentUser}
            </div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",fontSize:18,cursor:"pointer",borderRadius:8,padding:"4px 8px",lineHeight:1,flexShrink:0}}>✕</button>
        </div>
        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"14px 12px",display:"flex",flexDirection:"column",gap:6,background:"#f1f5f9"}}>
          {conv.length===0&&(
            <div style={{textAlign:"center",color:"#94a3b8",fontSize:12,marginTop:50,fontStyle:"italic"}}>아직 메시지가 없습니다</div>
          )}
          {conv.map(msg=>renderMsgBubble(msg))}
          <div ref={bottomRef}/>
        </div>
        {/* File preview strip */}
        {filePreview&&(
          <div style={{padding:"8px 12px",background:"#f8fafc",borderTop:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            {filePreview.type.startsWith("image/")?<img src={filePreview.data} style={{width:40,height:40,objectFit:"cover",borderRadius:6}}/>:<span style={{fontSize:22}}>📎</span>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{filePreview.name}</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>{Math.round(filePreview.size/1024)}KB</div>
            </div>
            <button onClick={()=>setFilePreview(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#9ca3af",flexShrink:0,padding:0}}>✕</button>
          </div>
        )}
        {fileTooLarge&&(
          <div style={{padding:"6px 14px",background:"#fef2f2",borderTop:"1px solid #fecaca",fontSize:11,color:"#dc2626",flexShrink:0}}>
            ⚠ 파일이 500KB를 초과합니다. Google Drive 또는 링크로 공유해주세요.
          </div>
        )}
        {/* Input — hidden for admin */}
        {!isAdmin&&(
          <div style={{padding:"10px 12px",borderTop:"1px solid #e2e8f0",display:"flex",gap:8,background:"white",flexShrink:0,alignItems:"center"}}>
            <input type="file" ref={fileRef} onChange={handleFile} accept="image/*,video/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt" style={{display:"none"}}/>
            <button onClick={()=>fileRef.current?.click()} title="파일 첨부 (최대 500KB)"
              style={{background:"#f1f5f9",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"7px 9px",cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0,color:"#64748b"}}>📎</button>
            <input

              전송
            </button>
          </div>
        )}
      </div>
    </div>,
    document.body
  );
}

function makeLoaText(entry){
  const MON=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const MONFULL=["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  const names=entry.members.map(m=>(m.name||"").toUpperCase()).filter(Boolean).join(" / ")||"___";
  const dobs=entry.members.map(m=>{
    if(!m.birthMonth&&!m.birthDay&&!m.birthYear)return"N/A";
    const mon=MON[(parseInt(m.birthMonth)||1)-1]||"";
    return`${mon},${String(m.birthDay||"").padStart(2,"0")},${m.birthYear||""}`;
  }).join(" / ");
  const country=(entry.members[0]?.nationality||"TAIWAN").toUpperCase();
  function fmtD(s){if(!s)return"___";const[y,mo,d]=s.split("-");return`${MONFULL[(parseInt(mo)||1)-1]},${parseInt(d)},${y}`;}
  const prog=[...new Set(entry.members.map(m=>m.course).filter(Boolean))].join(", ").toUpperCase()||"___";
  const{start:_s,end:_e}=entryDates(entry);
  const start=fmtD(_s);const end=fmtD(_e);
  return`NAME OF STUDENT : ${names}
DATE OF BIRTH : ${dobs}
COUNTRY : ${country}

This document certifies that the above mentioned applicant has been into HANA for the following program;

Program: ${prog}
Duration: ${start} ~ ${end}

We look forward to seeing you as a student of HANA. If you have any questions, please do not hesitate to contact us.

HANA Academy. Lot 3-2a CutCut. Friendship Highway. Angeles City. Philippines
Tel. 0926 727 4196

Sincerely,`;
}

function makePickupText(entry){
  const fl=entry.flightInfo||{};
  const names=entry.members.map(m=>m.name||"").filter(Boolean);
  const disp=(names[0]||"___")+(names.length>1?`+${names.length-1}`:"");
  const AIRPORTS={"Clark":"clark airport","Manila1":"NAIA Terminal 1","Manila2":"NAIA Terminal 2","Manila3":"NAIA Terminal 3"};
  const airLabel=AIRPORTS[fl.airport]||fl.airport||"___";
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let dateDisp=fl.arrivalDate||"___";
  if(fl.arrivalDate){const d=new Date(fl.arrivalDate+"T00:00:00");dateDisp=`${fl.arrivalDate} (${DAYS[d.getDay()]})`;}
  return`[ Pick-up Information ]

Flight info Arrival Time and Date\t${fl.flightNumber||"___"} / ${dateDisp} ${fl.arrivalTime||""} / ${airLabel}
PERSONAL INFORMATION\t${disp}

Welcome To HANA Academy
Contact : 0926 727 4196 (Mr Bryan,Ko) 0966 633 8642 (Driver, Joel)`;
}

/* Compute overall date range across all members (member dates take priority over entry-level) */
function entryDates(e){
  const starts=(e.members||[]).map(m=>m.studyStart).filter(Boolean).sort();
  const ends=(e.members||[]).map(m=>m.studyEnd).filter(Boolean).sort();
  return{
    start:starts[0]||e.studyStart||"",
    end:ends[ends.length-1]||e.studyEnd||""
  };
}
function getSteps(e){
  const{start,end}=entryDates(e);
  const s1=!!(start&&end&&e.members?.some(m=>m.name));
  const s2=!!e.acceptanceLetter?.confirmed;
  const s3=e.flightInfo?.pickupRequired?!!e.pickupLetter?.confirmed:!!(e.flightInfo?.arrivalDate);
  const s4=!!e.kanbanCardId;
  return[s1,s2,s3,s4];
}

/* ── AgencyListItem (top-level to prevent remount) ── */
function ListItem({e,selId,setSelId,isAdmin}){
  const steps=getSteps(e);
  const active=selId===e.id;
  const names=e.members?.map(m=>m.name).filter(Boolean).join(", ")||"(no name)";
  const doneCount=steps.filter(Boolean).length;
  const allDone=doneCount===4;
  return(
    <div onClick={()=>setSelId(e.id)}
      style={{padding:"11px 14px",borderBottom:"1px solid #e8eaf2",cursor:"pointer",
        background:active?AG_NAVY:"white",
        borderLeft:`3px solid ${active?AG_GOLD:"transparent"}`,transition:"background .12s,border-color .12s"}}
      onMouseEnter={ev=>{if(!active)ev.currentTarget.style.background="#f4f5fa";}}
      onMouseLeave={ev=>{if(!active)ev.currentTarget.style.background="white";}}>
      {isAdmin&&<div style={{fontSize:8,fontWeight:700,color:active?AG_GOLD:"#9da3c8",marginBottom:2,letterSpacing:".04em"}}>{e.agencyId||"—"}</div>}
      <div style={{fontSize:12,fontWeight:700,color:active?"white":"#1a1f3c",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:2}}>{names}</div>
      {(()=>{const{start,end}=entryDates(e);return<div style={{fontSize:10,color:active?"#8b92b8":"#94a3b8",marginBottom:6}}>{start||"?"} ~ {end||"?"}</div>;})()}
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        {steps.map((done,i)=>(
          <div key={i} style={{width:17,height:17,borderRadius:"50%",
            background:done?(active?AG_GOLD:STEP_COLORS[i]):(active?"rgba(255,255,255,.1)":"#e8eaf2"),
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,
            color:done?"white":(active?"rgba(255,255,255,.35)":"#94a3b8"),fontWeight:800}}>
            {done?"✓":(i+1)}
          </div>
        ))}
        <span style={{fontSize:9,marginLeft:3,fontWeight:600,
          color:active?(allDone?AG_GOLD:"#8b92b8"):(allDone?"#16a34a":"#94a3b8")}}>
          {doneCount}/4{allDone?" ✓":""}
        </span>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   MealCellPopup — inline edit popup for table cell
═══════════════════════════════════════════════════════ */
function MealCellPopup({value,options,onSave,onClose,onAddToDb,accentColor}){
  const[q,setQ]=useState("");
  const[val,setVal]=useState(value||"");
  const ref=useRef(null);
  const accent=accentColor||"#0d9488";
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))onClose();}
    setTimeout(()=>document.addEventListener("mousedown",h),0);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const filtered=q?options.filter(o=>o.toLowerCase().includes(q.toLowerCase())):options;
  const valTrimmed=val.trim();
  const isNewItem=valTrimmed&&!options.includes(valTrimmed);
  return(
    <div ref={ref} style={{position:"absolute",top:"100%",left:0,zIndex:500,background:"white",border:"1.5px solid #e2e8f0",borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.18)",minWidth:240,maxWidth:310,padding:8}}>
      <input value={val} onChange={e=>setVal(e.target.value)} placeholder="Type or select…"
        style={{width:"100%",padding:"5px 8px",borderRadius:6,border:`1.5px solid ${accent}`,fontSize:11.5,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:5}}
        onKeyDown={e=>{if(e.key==="Enter"){onSave(val);onClose();}if(e.key==="Escape")onClose();}}
        autoFocus/>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search DB…"
        style={{width:"100%",padding:"4px 8px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:11,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:4,color:"#6b7280"}}/>
      <div style={{maxHeight:150,overflowY:"auto"}}>
        {filtered.length===0&&<div style={{padding:"6px 8px",color:"#9ca3af",fontSize:11}}>No results</div>}
        {filtered.map(o=>(
          <button key={o} onClick={()=>{setVal(o);}}
            style={{display:"block",width:"100%",textAlign:"left",padding:"5px 8px",border:"none",borderRadius:5,background:val===o?`${accent}18`:"white",color:val===o?accent:"#374151",fontSize:11,cursor:"pointer",fontWeight:val===o?700:400}}>
            {val===o?"✓ ":""}{o}
          </button>
        ))}
      </div>
      {isNewItem&&onAddToDb&&(
        <div style={{margin:"5px 0 2px",padding:"4px 8px",background:"#f0fdf4",borderRadius:6,fontSize:10.5,color:"#166534",display:"flex",alignItems:"center",gap:6}}>
          <span style={{flex:1}}>Add <b>"{valTrimmed}"</b> to DB?</span>
          <button onClick={()=>{onAddToDb(valTrimmed);onSave(valTrimmed);onClose();}}
            style={{padding:"2px 8px",borderRadius:5,border:"1px solid #86efac",background:"#dcfce7",color:"#166534",fontSize:10,cursor:"pointer",fontWeight:700}}>+ Add & Save</button>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:5,gap:4}}>
        <button onClick={()=>{onSave("");onClose();}} style={{padding:"3px 10px",borderRadius:6,border:"1px solid #fecaca",background:"white",color:"#dc2626",fontSize:10.5,cursor:"pointer",fontWeight:700}}>✕ Clear</button>
        <button onClick={()=>{onSave(val);onClose();}} style={{padding:"3px 10px",borderRadius:6,border:"none",background:accent,color:"white",fontSize:10.5,cursor:"pointer",fontWeight:700}}>Save</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   AddToDbPopup — small popover to add a new item to a DB category
═══════════════════════════════════════════════════════ */
function AddToDbPopup({row,onAdd,onClose,accent}){
  const[val,setVal]=useState("");
  const ref=useRef(null);
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))onClose();}
    setTimeout(()=>document.addEventListener("mousedown",h),0);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const catLabel=row.dbCat==="nightSnack"?"Night Snack":row.dbCat.charAt(0).toUpperCase()+row.dbCat.slice(1);
  const fieldLabel=row.dbField||"";
  return(
    <div ref={ref} style={{position:"absolute",top:"100%",left:0,zIndex:600,background:"white",border:`2px solid ${accent}`,borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,.18)",minWidth:220,padding:10,marginTop:2}}>
      <div style={{fontSize:10.5,fontWeight:800,color:accent,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>
        ＋ Add to DB — {catLabel}{fieldLabel?` · ${fieldLabel}`:""}
      </div>
      <input value={val} onChange={e=>setVal(e.target.value)} placeholder="New item name…" autoFocus
        style={{width:"100%",padding:"5px 8px",borderRadius:6,border:`1.5px solid ${accent}`,fontSize:11.5,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:6}}
        onKeyDown={e=>{
          if(e.key==="Enter"&&val.trim()){onAdd(val.trim());onClose();}
          if(e.key==="Escape")onClose();
        }}/>
      <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"3px 10px",borderRadius:6,border:"1px solid #e2e8f0",background:"white",color:"#374151",fontSize:10.5,cursor:"pointer"}}>Cancel</button>
        <button onClick={()=>{if(val.trim()){onAdd(val.trim());onClose();}}}
          style={{padding:"3px 10px",borderRadius:6,border:"none",background:accent,color:"white",fontSize:10.5,cursor:"pointer",fontWeight:700}}>＋ Add</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MealPage  ─ weekly table view with archive/draft/cycle
═══════════════════════════════════════════════════════ */
function MealPage({mealPlan,setMealPlan,mealDraft,setMealDraft,mealArchives,setMealArchives,kanbanCards,teacherMeta,mealSkips}){
  const[viewing,setViewing]=useState("current"); // "current"|"draft"|index(archive)
  const[editCell,setEditCell]=useState(null); // {day,rowId}
  const[showArchives,setShowArchives]=useState(false);
  const[addDbRow,setAddDbRow]=useState(null); // row.id of open + popup
  const[skipTooltip,setSkipTooltip]=useState(null); // {names, top, left}
  const[customFoodDb,setCustomFoodDbRaw]=useState(lsGetFoodDbCustom);
  function addToFoodDb(row,item){
    if(!item?.trim())return;
    setCustomFoodDbRaw(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(row.dbCat==="nightSnack"){
        if(!Array.isArray(next.nightSnack))next.nightSnack=[];
        if(!next.nightSnack.includes(item))next.nightSnack.push(item);
      }else{
        if(!next[row.dbCat])next[row.dbCat]={};
        if(!Array.isArray(next[row.dbCat][row.dbField]))next[row.dbCat][row.dbField]=[];
        if(!next[row.dbCat][row.dbField].includes(item))next[row.dbCat][row.dbField].push(item);
      }
      lsSaveFoodDbCustom(next);
      return next;
    });
  }
  function getRowOptions(row){return getMealRowOptions(row,customFoodDb);}

  /* ── Headcount calculation ── */
  const{mealCounts,mealSkippers}=useMemo(()=>{
    if(!kanbanCards)return{mealCounts:{},mealSkippers:{}};
    const currentCards=kanbanCards.filter(c=>c.status==="current");
    let totalNonCommuter=0,jcEsa=0,regularNonCommuter=0;
    currentCards.forEach(card=>{
      const isJCESA=card.type==="Junior Camp"||card.type==="ESA";
      (card.members||[]).forEach(m=>{
        if(m.roomType!=="Commuter"){
          totalNonCommuter++;
          if(isJCESA)jcEsa++;else regularNonCommuter++;
        }
      });
    });
    let tBf=0,tLu=0,tDi=0;
    Object.entries(teacherMeta||{}).forEach(([t,meta])=>{
      if(!meta)return;
      const st=meta.status||"active";
      if(st!=="active")return;
      if(meta.meals?.breakfast)tBf++;
      if(meta.meals?.lunch)tLu++;
      if(meta.meals?.dinner)tDi++;
    });
    const counts={};
    const skippers={};
    MEAL_DAYS.forEach(mKey=>{
      const isWknd=MEAL_WEEKEND.includes(mKey);
      const daySkips=mealSkips?.[mKey]||{};
      const sp={breakfast:[],lunch:[],dinner:[],snack:[],brunch:[]};
      Object.entries(daySkips).forEach(([person,slots])=>{
        if(slots.breakfast)sp.breakfast.push(person);
        if(slots.lunch)sp.lunch.push(person);
        if(slots.dinner)sp.dinner.push(person);
        if(slots.eveningSnack)sp.snack.push(person);
        if(slots.brunch)sp.brunch.push(person);
      });
      skippers[mKey]=sp;
      if(!isWknd){
        counts[mKey]={
          breakfast:Math.max(0,tBf+totalNonCommuter-sp.breakfast.length),
          lunch:Math.max(0,tLu+totalNonCommuter-sp.lunch.length),
          dinner:Math.max(0,tDi+totalNonCommuter-sp.dinner.length),
          snack:Math.max(0,jcEsa-sp.snack.length),
          brunch:0,
        };
      }else{
        counts[mKey]={
          breakfast:jcEsa,
          lunch:jcEsa,
          dinner:jcEsa,
          snack:0,
          brunch:Math.max(0,regularNonCommuter-sp.brunch.length),
        };
      }
    });
    return{mealCounts:counts,mealSkippers:skippers};
  },[kanbanCards,teacherMeta,mealSkips]);

  /* Map row.group to counts / skippers key */
  function getCountForRow(row,day){
    const c=mealCounts[day];
    if(!c)return null;
    if(row.group==="breakfast")return c.breakfast;
    if(row.group==="lunch")return c.lunch;
    if(row.group==="dinner")return c.dinner;
    if(row.group==="snack")return c.snack;
    if(row.group==="brunch")return c.brunch;
    return null;
  }
  function getSkippersForRow(row,day){
    const s=mealSkippers[day];
    if(!s)return[];
    if(row.group==="breakfast")return s.breakfast;
    if(row.group==="lunch")return s.lunch;
    if(row.group==="dinner")return s.dinner;
    if(row.group==="snack")return s.snack;
    if(row.group==="brunch")return s.brunch;
    return[];
  }

  const displayPlan=viewing==="current"?mealPlan:viewing==="draft"?mealDraft:(mealArchives[viewing]||null);
  const isEditable=viewing==="current"||(viewing==="draft"&&!!mealDraft);
  const isDraft=viewing==="draft";

  /* Day date header */
  function getWeekDates(weekStart){
    if(!weekStart)return{};
    const base=new Date(weekStart+"T12:00:00");
    const out={};
    MEAL_DAYS.forEach((d,i)=>{
      const dt=new Date(base);dt.setDate(base.getDate()+i);
      out[d]=`${dt.getMonth()+1}/${dt.getDate()}`;
    });
    return out;
  }
  const dates=getWeekDates(displayPlan?.weekStart);

  function getCell(day,path){
    const dd=displayPlan?.plan?.[day];
    if(!dd)return"";
    if(!path.includes("."))return dd[path]||"";
    const[a,b]=path.split(".");
    return dd[a]?.[b]||"";
  }
  function setCell(day,path,val){
    if(!isEditable)return;
    const setter=isDraft?setMealDraft:setMealPlan;
    setter(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(!n.plan[day])n.plan[day]=emptyMealDay();
      if(!path.includes("."))n.plan[day][path]=val;
      else{const[a,b]=path.split(".");if(!n.plan[day][a])n.plan[day][a]={};n.plan[day][a][b]=val;}
      return n;
    });
  }

  /* Archive current & promote draft */
  function doArchive(){
    if(!mealPlan)return;
    if(!window.confirm(`${mealPlan.weekStart} Archive meal plan for this week?`))return;
    const archived={...mealPlan,archivedAt:new Date().toISOString()};
    setMealArchives(prev=>[...prev,archived]);
    if(mealDraft){
      setMealPlan(mealDraft);
      setMealDraft(null);
    }else{
      const nextStart=addDaysISO(mealPlan.weekStart,7);
      setMealPlan(emptyWeekMeal(nextStart));
    }
    setViewing("current");
  }

  /* Create draft for next week */
  function doCreateDraft(){
    if(mealDraft&&!window.confirm("Overwrite existing draft?"))return;
    const nextStart=addDaysISO(mealPlan.weekStart,7);
    setMealDraft(emptyWeekMeal(nextStart));
    setViewing("draft");
  }

  /* Load archive as template */
  function loadCyclePlan(arcIdx){
    const arc=mealArchives[arcIdx];
    if(!arc)return;
    const target=isDraft
      ?{...arc,weekStart:mealDraft?.weekStart||addDaysISO(mealPlan.weekStart,7)}
      :{...arc,weekStart:mealPlan.weekStart};
    if(!window.confirm(`${arc.weekStart} Load ${isDraft?"draft":"current week"}?`))return;
    if(isDraft)setMealDraft(target);else setMealPlan(target);
  }

  /* Column style based on day + row */
  function cellStyle(row,day){
    const isWknd=MEAL_WEEKEND.includes(day);
    if(isWknd){
      if(row.wkndDisabled)return{bg:"#f1f5f9",color:"#9ca3af",disabled:true};
      return{bg:row.wkndBg||"#fef9c3",color:row.wkndColor||"#92400e",disabled:false};
    }else{
      if(row.wdDisabled)return{bg:"#f1f5f9",color:"#9ca3af",disabled:true};
      return{bg:row.wdBg||"#f8fafc",color:row.wdColor||"#374151",disabled:false};
    }
  }

  /* 4-week cycle: find archive ~4 weeks ago */
  const cycleArchives=useMemo(()=>{
    if(!mealArchives.length||!displayPlan?.weekStart)return[];
    const currentMs=new Date(displayPlan.weekStart+"T12:00:00").getTime();
    return mealArchives
      .map((a,i)=>({...a,idx:i,diffWeeks:Math.round((currentMs-new Date(a.weekStart+"T12:00:00").getTime())/(7*86400000))}))
      .filter(a=>a.diffWeeks>=3&&a.diffWeeks<=5)
      .slice(-2);
  },[mealArchives,displayPlan]);

  return(
    <div>
      <div className="pg-wrap">
        <div><span className="pg-badge" style={{background:"#f0fdf4",color:"#166534",border:"1.5px solid #bbf7d0"}}>MEAL PLAN</span>
          {isDraft&&<span className="pg-badge" style={{background:"#fef9c3",color:"#92400e",border:"1.5px solid #fde68a",marginLeft:6}}>DRAFT</span>}
          {typeof viewing==="number"&&<span className="pg-badge" style={{background:"#f1f5f9",color:"#475569",border:"1.5px solid #cbd5e1",marginLeft:6}}>ARCHIVED</span>}
        </div>
        <div className="pg-title">Weekly Meal Schedule</div>
        <div className="pg-sub">{displayPlan?.weekStart||"—"} wk · Bread/Jam: Mon–Fri (all) / Sat–Sun (JC only) · Gray=All · Yellow=JC only · Cyan=Regular wknd</div>
      </div>

      {/* ── Toolbar ── */}
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {/* View switcher */}
        <button onClick={()=>setViewing("current")}
          style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${viewing==="current"?"#0d9488":"#e2e8f0"}`,background:viewing==="current"?"#f0fdfa":"white",color:viewing==="current"?"#0d9488":"#374151",fontWeight:viewing==="current"?800:600,fontSize:12,cursor:"pointer"}}>
          {mealPlan?.weekStart||"Current"} (Current)
        </button>
        <button onClick={()=>mealDraft?setViewing("draft"):doCreateDraft()}
          style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${viewing==="draft"?"#f59e0b":"#e2e8f0"}`,background:viewing==="draft"?"#fef9c3":"white",color:viewing==="draft"?"#92400e":"#374151",fontWeight:viewing==="draft"?800:600,fontSize:12,cursor:"pointer"}}>
          {mealDraft?`📝 ${mealDraft.weekStart} (Draft)`:"➕ Create Next Week Draft"}
        </button>
        <button onClick={()=>setShowArchives(v=>!v)}
          style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid #e2e8f0",background:"white",color:"#374151",fontSize:12,cursor:"pointer",fontWeight:600}}>
          📦 Archives ({mealArchives.length})
        </button>
        <div style={{flex:1}}/>
        {isEditable&&!isDraft&&(
          <button onClick={doArchive}
            style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid #6b7280",background:"white",color:"#374151",fontSize:12,cursor:"pointer",fontWeight:700}}>
            📦 Archive This Week
          </button>
        )}
        {!mealDraft&&viewing==="current"&&(
          <button onClick={doCreateDraft}
            style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid #f59e0b",background:"#fffbeb",color:"#92400e",fontSize:12,cursor:"pointer",fontWeight:700}}>
            📝 Create Next Week Draft
          </button>
        )}
      </div>

      {/* ── Archives panel ── */}
      {showArchives&&mealArchives.length>0&&(
        <div style={{background:"white",borderRadius:12,border:"1.5px solid #e2e8f0",padding:"12px 16px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:800,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>📦 Archived Meal Plans</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[...mealArchives].reverse().map((a,ri)=>{
              const idx=mealArchives.length-1-ri;
              const isViewing=viewing===idx;
              const diffW=mealPlan?.weekStart?Math.round((new Date(mealPlan.weekStart+"T12:00:00")-new Date(a.weekStart+"T12:00:00"))/(7*86400000)):null;
              return(
                <div key={idx} style={{display:"flex",alignItems:"center",gap:4}}>
                  <button onClick={()=>setViewing(isViewing?"current":idx)}
                    style={{padding:"4px 12px",borderRadius:10,border:`1.5px solid ${isViewing?"#0d9488":"#e2e8f0"}`,background:isViewing?"#f0fdfa":"white",color:isViewing?"#0d9488":"#374151",fontSize:11,cursor:"pointer",fontWeight:isViewing?800:600}}>
                    {a.weekStart}{diffW?` (${diffW}wk ago)`:""}
                  </button>
                  <button onClick={()=>loadCyclePlan(idx)} title="Load this plan"
                    style={{padding:"3px 8px",borderRadius:8,border:"1.5px solid #c7d2fe",background:"#eff6ff",color:"#3730a3",fontSize:10,cursor:"pointer",fontWeight:700}}>
                    ↩ Use
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── 4-week cycle suggestion ── */}
      {cycleArchives.length>0&&isEditable&&(
        <div style={{background:"#fffbeb",border:"1.5px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#92400e"}}>🔄 4-Week Cycle:</span>
          {cycleArchives.map(a=>(
            <button key={a.idx} onClick={()=>loadCyclePlan(a.idx)}
              style={{padding:"5px 12px",borderRadius:10,border:"1.5px solid #f59e0b",background:"white",color:"#92400e",fontSize:11,cursor:"pointer",fontWeight:700}}>
              {a.weekStart} ({a.diffWeeks}wk ago) Load Plan
            </button>
          ))}
        </div>
      )}

      {/* ── Main table ── */}
      {displayPlan?(
        <div style={{overflowX:"auto",borderRadius:12,border:"1.5px solid #e2e8f0",boxShadow:"0 2px 16px rgba(0,0,0,.06)"}}>
          <table style={{borderCollapse:"collapse",minWidth:900,width:"100%",fontSize:11.5}}>
            <thead>
              <tr>
                <th style={{width:90,padding:"10px 10px",background:"#0d9488",color:"white",fontWeight:800,fontSize:11,textAlign:"left",position:"sticky",left:0,zIndex:10,borderRight:"2px solid #0f766e"}}>Meal</th>
                {MEAL_DAYS.map(d=>{
                  const isWknd=MEAL_WEEKEND.includes(d);
                  return(
                    <React.Fragment key={d}>
                      <th style={{padding:"8px 6px",background:isWknd?"#0891b2":"#0d9488",color:"white",fontWeight:800,fontSize:11,textAlign:"center",minWidth:110,borderLeft:"1px solid rgba(255,255,255,.2)"}}>
                        <div>{d}</div>
                        <div style={{fontSize:10,fontWeight:500,opacity:.85}}>{dates[d]||""}</div>
                      </th>
                      <th style={{padding:"4px 3px",background:isWknd?"#0777a0":"#0b7a72",color:"rgba(255,255,255,.75)",fontWeight:700,fontSize:9,textAlign:"center",width:28,borderLeft:"1px solid rgba(255,255,255,.15)",letterSpacing:.3}}>No</th>
                    </React.Fragment>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {MEAL_TABLE_ROWS.map((row,ri)=>{
                const isGroupStart=row.gLabel;
                const prevGroup=ri>0?MEAL_TABLE_ROWS[ri-1].group:null;
                const showSep=prevGroup&&prevGroup!==row.group;
                return(
                  <React.Fragment key={row.id}>
                    {showSep&&<tr><td colSpan={15} style={{height:3,background:"#e2e8f0",padding:0}}></td></tr>}
                    <tr>
                      <td style={{padding:"6px 8px",background:"#f8fafc",fontWeight:isGroupStart?800:500,fontSize:10.5,color:isGroupStart?"#0d9488":"#64748b",whiteSpace:"nowrap",borderRight:"2px solid #e2e8f0",position:"sticky",left:0,borderBottom:"1px solid #f1f5f9",borderTop:showSep?"1px solid #e2e8f0":"none",position:"relative"}}>
                        {row.gLabel?<span style={{display:"block",color:"#0d9488",fontWeight:800,marginBottom:1}}>{row.gLabel}</span>:null}
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{color:isGroupStart?"#374151":"#94a3b8"}}>{row.label}</span>
                          {isEditable&&(
                            <button
                              onClick={e=>{e.stopPropagation();setAddDbRow(addDbRow===row.id?null:row.id);setEditCell(null);}}
                              title={`Add to ${row.dbCat} DB`}
                              style={{flexShrink:0,width:16,height:16,borderRadius:4,border:"1px solid #cbd5e1",background:addDbRow===row.id?"#0d9488":"#f1f5f9",color:addDbRow===row.id?"white":"#64748b",fontSize:10,lineHeight:1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,padding:0}}>
                              +
                            </button>
                          )}
                        </div>
                        {addDbRow===row.id&&isEditable&&(
                          <AddToDbPopup
                            row={row}
                            accent={isGroupStart?"#0d9488":"#64748b"}
                            onAdd={item=>addToFoodDb(row,item)}
                            onClose={()=>setAddDbRow(null)}
                          />
                        )}
                      </td>
                      {MEAL_DAYS.map(day=>{
                        const{bg,color,disabled}=cellStyle(row,day);
                        const val=getCell(day,row.path);
                        const isOpen=editCell?.day===day&&editCell?.rowId===row.id;
                        const isWknd=MEAL_WEEKEND.includes(day);
                        const rowCount=isGroupStart?getCountForRow(row,day):null;
                        return(
                          <React.Fragment key={day}>
                          <td style={{padding:"4px 5px",background:bg,borderLeft:"1px solid rgba(0,0,0,.05)",borderBottom:"1px solid rgba(0,0,0,.04)",position:"relative",verticalAlign:"top"}}>
                            {disabled?(
                              <div style={{padding:"5px 6px",color:"#d1d5db",fontSize:10,textAlign:"center"}}>—</div>
                            ):(
                              <>
                                <div
                                  onClick={()=>{if(!isEditable)return;setEditCell(isOpen?null:{day,rowId:row.id});}}
                                  style={{padding:"4px 6px",borderRadius:6,minHeight:24,cursor:isEditable?"pointer":"default",border:`1px solid ${isOpen?"#0d9488":"transparent"}`,background:isOpen?"white":"transparent",display:"flex",alignItems:"center",gap:4}}>
                                  {val?(
                                    <span style={{color,fontWeight:600,lineHeight:1.35}}>{val}</span>
                                  ):(
                                    <span style={{color:"#d1d5db",fontStyle:"italic",fontSize:10.5}}>{isEditable?"Click to edit":"—"}</span>
                                  )}
                                  {isEditable&&<span style={{marginLeft:"auto",color:"#94a3b8",fontSize:9,flexShrink:0}}>✎</span>}
                                </div>
                                {isOpen&&(
                                  <MealCellPopup
                                    value={val}
                                    options={getRowOptions(row)}
                                    accentColor={isWknd?"#0891b2":"#0d9488"}
                                    onSave={v=>setCell(day,row.path,v)}
                                    onClose={()=>setEditCell(null)}
                                    onAddToDb={item=>addToFoodDb(row,item)}
                                  />
                                )}
                              </>
                            )}
                          </td>
                          {(()=>{
                            const rowSkippers=isGroupStart?getSkippersForRow(row,day):[];
                            const hasSkips=rowSkippers.length>0;
                            return(
                              <td style={{textAlign:"center",padding:"3px 2px",background:isWknd?"#e0f2fe":"#f0fdf4",borderLeft:"1px solid #e2e8f0",borderBottom:"1px solid rgba(0,0,0,.04)",verticalAlign:"middle",width:28,position:"relative",cursor:hasSkips?"help":"default"}}
                                onMouseEnter={e=>{if(!isGroupStart||!hasSkips)return;const r=e.currentTarget.getBoundingClientRect();setSkipTooltip({names:rowSkippers,top:r.bottom+6,left:Math.min(r.left,window.innerWidth-200)});}}
                                onMouseLeave={()=>setSkipTooltip(null)}>
                                {rowCount!==null?(
                                  <span style={{fontSize:11,fontWeight:800,color:isWknd?"#0369a1":"#0d9488",display:"flex",alignItems:"center",justifyContent:"center",gap:2}}>
                                    {rowCount}
                                    {hasSkips&&<span style={{fontSize:8,color:"#dc2626",fontWeight:900,lineHeight:1}}>↓</span>}
                                  </span>
                                ):(
                                  <span style={{fontSize:9,color:"#e2e8f0"}}>·</span>
                                )}
                              </td>
                            );
                          })()}
                          </React.Fragment>
                        );
                      })}
                    </tr>
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      ):(
        <div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>No meal plan</div>
      )}

      {/* ── Legend ── */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:12,fontSize:11,color:"#6b7280",padding:"10px 14px",background:"white",borderRadius:10,border:"1.5px solid #e2e8f0"}}>
        <span style={{fontWeight:700,color:"#374151"}}>Legend:</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:3,display:"inline-block"}}></span>Gray = All students (Mon–Fri)</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,background:"#fef9c3",border:"1px solid #fde68a",borderRadius:3,display:"inline-block"}}></span>Yellow = Junior Camp only</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,background:"#cffafe",border:"1px solid #a5f3fc",borderRadius:3,display:"inline-block"}}></span>Cyan = Regular student weekend brunch</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:3,display:"inline-block"}}></span>Green = Lunch</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,background:"#faf5ff",border:"1px solid #e9d5ff",borderRadius:3,display:"inline-block"}}></span>Purple = Dinner</span>
      </div>

      {/* ── Skip tooltip (portal) ── */}
      {skipTooltip&&ReactDOM.createPortal(
        <div style={{position:"fixed",top:skipTooltip.top,left:skipTooltip.left,zIndex:99999,background:"#1e293b",color:"white",borderRadius:10,padding:"10px 14px",fontSize:11.5,maxWidth:240,pointerEvents:"none",boxShadow:"0 6px 24px rgba(0,0,0,.35)"}}>
          <div style={{fontWeight:800,marginBottom:6,color:"#f87171",fontSize:11}}>⛔ Skipped ({skipTooltip.names.length})</div>
          {skipTooltip.names.map(n=>(
            <div key={n} style={{padding:"2px 0",borderBottom:"1px solid rgba(255,255,255,.08)",color:"#e2e8f0"}}>• {n}</div>
          ))}
        </div>,document.body
      )}
    </div>
  );
}

function AgencyPage({agencyId,isAdmin,agencyPipeline,setAgencyPipeline,kanbanCards,pushSnap,agencies,setAgencies}){
  const[selId,setSelId]=useState(null);
  const[tab,setTab]=useState("pipeline");
  const[filterAgency,setFilterAgency]=useState("all");
  const[viewCard,setViewCard]=useState(null);

  /* Helper: resolve canonical agencyId from a kanban card.
     Cards saved via AddCardModal store agencyName+agencyNat separately;
     cards from pipeline have agencyId directly. Support both. */
  const cardAgencyId=c=>c.agencyId||(c.agencyName&&c.agencyNat
    ?c.agencyName.trim().toUpperCase()+"("+c.agencyNat.trim().toUpperCase()+")"
    :"");

  const myPipe=isAdmin?agencyPipeline:agencyPipeline.filter(e=>e.agencyId===agencyId);
  /* For admin filtered by a specific agency, cross-ref pipeline kanbanCardIds too */
  const filteredAgencyId=isAdmin?(filterAgency!=="all"?filterAgency:null):agencyId;
  const myPipeCardIds=new Set(
    (filteredAgencyId
      ? agencyPipeline.filter(e=>e.agencyId===filteredAgencyId)
      : myPipe
    ).filter(e=>e.kanbanCardId).map(e=>e.kanbanCardId)
  );
  const myCards=isAdmin
    ?(filteredAgencyId
      ? kanbanCards.filter(c=>cardAgencyId(c)===filteredAgencyId||myPipeCardIds.has(c.id))
      : kanbanCards.filter(c=>{const cid=cardAgencyId(c);return !!cid&&cid!=="DIRECT"&&cid!=="Direct";}))
    :kanbanCards.filter(c=>cardAgencyId(c)===agencyId||myPipeCardIds.has(c.id));
  /* agencyIds: union of pipeline entries + registered agencies + cards with agency assigned */
  const agencyIds=[...new Set([
    ...agencyPipeline.map(e=>e.agencyId).filter(Boolean),
    ...(agencies||[]).map(a=>a.id).filter(Boolean),
    ...kanbanCards.map(c=>cardAgencyId(c)).filter(id=>id&&id!=="Direct"&&id!=="DIRECT"),
  ])].sort();
  const[newAgNat,setNewAgNat]=useState("");
  const[newAgName,setNewAgName]=useState("");
  const[newAgPw,setNewAgPw]=useState("hana123");
  const[newAgContract,setNewAgContract]=useState(null);
  const contractRef=React.useRef(null);
  function addAgency(){
    if(!newAgNat.trim()||!newAgName.trim())return;
    const id=newAgName.trim().toUpperCase()+"("+newAgNat.trim().toUpperCase()+")";
    const entry={id,nationality:newAgNat.trim().toUpperCase(),name:newAgName.trim().toUpperCase(),password:newAgPw||"hana123",contract:newAgContract};
    const updated=[...(agencies||[]).filter(a=>a.id!==id),entry];
    setAgencies(updated);lsSaveAgencies(updated);
    setNewAgNat("");setNewAgName("");setNewAgPw("hana123");setNewAgContract(null);
  }
  function removeAgency(id){
    if(!confirm("Remove agency "+id+"?"))return;
    const updated=(agencies||[]).filter(a=>a.id!==id);
    setAgencies(updated);lsSaveAgencies(updated);
  }
  const filteredPipe=(isAdmin&&filterAgency!=="all")?myPipe.filter(e=>e.agencyId===filterAgency):myPipe;
  /* Under Registration count: exclude entries that already have a linked kanban card (registration completed) */
  const underRegCount=filteredPipe.filter(e=>!e.kanbanCardId||!kanbanCards.find(c=>c.id===e.kanbanCardId)).length;
  const selected=selId?agencyPipeline.find(e=>e.id===selId):null;

  function newEntry(){
    const e={
      id:"ap_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
      agencyId:isAdmin?(filterAgency!=="all"?filterAgency:""):agencyId,
      createdAt:new Date().toISOString(),
      cardType:"",
      consultant:"",
      members:[{name:"",birthYear:"",birthMonth:"",birthDay:"",nationality:"Taiwanese",course:"",roomType:"",roomNumber:"",studyStart:"",studyEnd:"",passportPhoto:null,specialRequests:""}],
      studyStart:"",studyEnd:"",
      acceptanceLetter:{text:"",confirmed:false,confirmedAt:null},
      flightInfo:{pickupRequired:true,flightNumber:"",airport:"Clark",arrivalDate:"",arrivalTime:""},
      pickupLetter:{text:"",confirmed:false,confirmedAt:null},
      kanbanCardId:null,
    };
    setAgencyPipeline(p=>{const n=[...p,e];lsSaveAgencyPipe(n);return n;});
    setSelId(e.id);
  }

  function save(updated){
    setAgencyPipeline(p=>{const n=p.map(x=>x.id===updated.id?updated:x);lsSaveAgencyPipe(n);return n;});
  }

  function del(id){
    if(!confirm("Delete this registration?"))return;
    setAgencyPipeline(p=>{const n=p.filter(x=>x.id!==id);lsSaveAgencyPipe(n);return n;});
    if(selId===id)setSelId(null);
  }

  function createCard(entry){
    if(!confirm("Create student card?"))return;
    /* Derive agency nationality and name from agencies list */
    const agObj=(agencies||[]).find(a=>a.id===entry.agencyId)||null;
    const agencyNat=agObj?.nationality||"";
    const agencyName=agObj?.name||entry.agencyId||"";
    const newCard={
      id:"card_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
      type:entry.cardType||"Individual",
      status:"registered",
      agencyId:entry.agencyId||"Direct",
      agencyNat,
      agencyName,
      consultant:entry.consultant||"",
      notes:entry.members.filter(m=>m.specialRequests).map((m,i)=>`Student ${i+1} (${m.name||"?"}): ${m.specialRequests}`).join("\n")||"",
      agencyFlightInfo:entry.flightInfo,
      attachments:[
        ...(entry.acceptanceLetter?.text?[{id:"att_loa",name:"Letter_of_Acceptance.txt",ftype:"text/plain",data:"data:text/plain;base64,"+btoa(unescape(encodeURIComponent(entry.acceptanceLetter.text))),size:entry.acceptanceLetter.text.length,uploadedAt:new Date().toISOString()}]:[]),
        ...((entry.pickupLetter?.text&&entry.flightInfo?.pickupRequired)?[{id:"att_pu",name:"Pickup_Confirmation.txt",ftype:"text/plain",data:"data:text/plain;base64,"+btoa(unescape(encodeURIComponent(entry.pickupLetter.text))),size:entry.pickupLetter.text.length,uploadedAt:new Date().toISOString()}]:[]),
        ...entry.members.filter(m=>m.passportPhoto).map((m,i)=>({id:"att_pp_"+i,name:`Passport_${(m.name||"Student").replace(/,/g,"_")}.jpg`,ftype:"image/jpeg",data:m.passportPhoto,size:0,uploadedAt:new Date().toISOString()})),
      ],
      members:entry.members.map(m=>({
        name:m.name,gender:"",birthYear:m.birthYear,birthMonth:m.birthMonth,birthDay:m.birthDay,
        nationality:m.nationality,
        studyStart:m.studyStart||entry.studyStart,
        studyEnd:m.studyEnd||entry.studyEnd,
        course:m.course,roomType:m.roomType,roomNumber:m.roomNumber||"",roomHistory:[],
        loginId:generateLoginId(m.name||"",m.studyStart||entry.studyStart||""),
        loginPassword:"hana123",
      })),
    };
    pushSnap({kanbanCards:[...kanbanCards,newCard]});
    save({...entry,kanbanCardId:newCard.id});
    alert("✅ Student card created in the Registered column!");
  }

  /* Derive initials for avatar */
  const agInitials=(isAdmin?"HQ":agencyId||"AG").replace(/\(.*\)/,"").trim().slice(0,2).toUpperCase();

    <div>
      {/* ── Prestige Navy Header ── */}

        {/* Left: avatar + agency name */}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:9,background:AG_GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:AG_NAVY,flexShrink:0}}>
            {agInitials}
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"white",lineHeight:1.2}}>{agLabel}</div>
            <div style={{fontSize:11,color:"#8b92b8",marginTop:1}}>{isAdmin?"Admin · Full Access":"Agency Portal"}</div>
          </div>
        </div>
        {/* Right: nav buttons */}
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {isAdmin&&agencyIds.length>0&&(
            <select value={filterAgency} onChange={ev=>setFilterAgency(ev.target.value)}
              style={{padding:"6px 10px",borderRadius:7,border:`1px solid ${AG_GOLD_BORDER}`,fontSize:12,cursor:"pointer",background:"rgba(255,255,255,.08)",color:"white",fontWeight:600}}>
              <option value="all" style={{background:AG_NAVY}}>All Agencies ({myPipe.length})</option>
              {agencyIds.map(a=>{
                const pipeCount=myPipe.filter(e=>e.agencyId===a).length;
                const cardCount=kanbanCards.filter(c=>c.agencyId===a).length;
                const label=pipeCount>0?`${a} (${pipeCount})`:`${a} (카드 ${cardCount})`;
                return<option key={a} value={a} style={{background:AG_NAVY}}>{label}</option>;
              })}
            </select>

          {tab!=="agencies"&&<button onClick={newEntry}
            style={{padding:"7px 16px",borderRadius:7,background:AG_GOLD,color:AG_NAVY,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
            ＋ New Students Registration

          <button onClick={()=>setTab("pipeline")}
            style={{padding:"7px 14px",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",border:`1px solid ${tab==="pipeline"?AG_GOLD_BORDER:"rgba(255,255,255,.12)"}`,background:tab==="pipeline"?AG_GOLD_BG:"transparent",color:tab==="pipeline"?AG_GOLD:"#8b92b8"}}>

          {isAdmin&&<button onClick={()=>setTab("agencies")}

                          {/* Contract download */}

        </div>
        );
      })()}

      {tab==="pipeline"&&(

   LocalStorage persistence — kanban cards survive code reloads

const LS_KEY="hana_kanban_v1";
const LS_PASSWORDS_KEY="hana_passwords_v1";
function lsLoadPasswords(){try{return JSON.parse(localStorage.getItem(LS_PASSWORDS_KEY)||"{}");}catch(e){return{};}}
function lsSavePasswords(p){try{localStorage.setItem(LS_PASSWORDS_KEY,JSON.stringify(p));}catch(e){}}
function lsLoad(){
  try{const r=localStorage.getItem(LS_KEY);if(r)return lsMigrate(JSON.parse(r));}catch(e){}return null;
}
function lsSave(cards){
  try{localStorage.setItem(LS_KEY,JSON.stringify(cards));}catch(e){}
}
/* One-time migration: merge known family members into Group/Family cards */
function lsMigrate(cards){
  const MIG_KEY="hana_mig_v1";
  if(!cards||typeof localStorage==="undefined")return cards;
  const done=localStorage.getItem(MIG_KEY);
  /* Define families to auto-merge: each entry = {id, memberNames[], status} */
  const FAMILIES=[
    {id:"family_chien_huang",
     names:["ANN HUANG","CHENG YEH CHIEN","CHENY YING CHIEN"],
     preferStatus:"current"},
  ];
  let result=[...cards];
  let changed=false;
  FAMILIES.forEach(fam=>{
    /* Skip if a Group/Family card already contains any of these names */
    const alreadyGrouped=result.some(c=>
      c.type==="Group/Family"&&
      c.members.some(m=>fam.names.includes(m.name))
    );
    if(alreadyGrouped)return;
    /* Find the individual cards */
    const indivCards=result.filter(c=>
      c.type==="Individual"&&
      c.members.length===1&&
      fam.names.includes(c.members[0].name)
    );
    if(indivCards.length<2)return; /* need at least 2 to merge */
    /* Build merged Group/Family card, preserving each member's existing data */
    const orderedMembers=fam.names
      .map(n=>indivCards.find(c=>c.members[0].name===n))
      .filter(Boolean)
      .map(c=>c.members[0]);
    const status=indivCards.find(c=>c.status===fam.preferStatus)?.status
      ||indivCards[0].status;
    const newCard={
      id:fam.id+"_"+Date.now(),
      type:"Group/Family",
      status,
      members:orderedMembers,
    };
    /* Remove individual cards and add family card */
    const indivIds=new Set(indivCards.map(c=>c.id));
    result=result.filter(c=>!indivIds.has(c.id));
    result.push(newCard);
    changed=true;
  });
  if(changed){
    /* Persist the merged result immediately */
    try{localStorage.setItem(LS_KEY,JSON.stringify(result));}catch(e){}
  }
  try{localStorage.setItem(MIG_KEY,"1");}catch(e){}

  /* ── Migration v2: re-sort Group/Family members oldest-first ── */
  const MIG2_KEY="hana_mig_v2";
  if(!localStorage.getItem(MIG2_KEY)){
    let changed2=false;
    result=result.map(card=>{
      if(card.type!=="Group/Family"||!card.members||card.members.length<2)return card;
      /* Respect manual Guardian pin; otherwise sort oldest first */
      const pinned=card.members.find(m=>m.isGuardian);
      const sorted=pinned
        ?[pinned,...card.members.filter(m=>!m.isGuardian)]
        :[...card.members].sort((a,b)=>{
          const ay=a.birthYear?parseInt(a.birthYear):9999;
          const by=b.birthYear?parseInt(b.birthYear):9999;
          return ay-by;
        });
      /* Only flag changed if order actually differs */
      const orderSame=sorted.every((m,i)=>m===card.members[i]);
      if(orderSame)return card;
      changed2=true;
      return{...card,members:sorted};
    });
    if(changed2){
      try{localStorage.setItem(LS_KEY,JSON.stringify(result));}catch(e){}
    }
    try{localStorage.setItem(MIG2_KEY,"1");}catch(e){}
  }

  /* ── Migration v3: shift studyStart +1 if Saturday → Sunday,
                       shift studyEnd   +1 if Friday  → Saturday ── */
  const MIG3_KEY="hana_mig_v3";
  if(!localStorage.getItem(MIG3_KEY)){
    let changed3=false;
    result=result.map(card=>{
      if(!card.members)return card;
      const newMembers=card.members.map(m=>{
        let ss=m.studyStart||"";
        let se=m.studyEnd||"";
        if(ss){
          const d=new Date(ss+"T00:00:00");
          if(!isNaN(d)&&d.getDay()===6){
            d.setDate(d.getDate()+1);
            ss=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
            changed3=true;
          }
        }
        if(se){
          const d=new Date(se+"T00:00:00");
          if(!isNaN(d)&&d.getDay()===5){
            d.setDate(d.getDate()+1);
            se=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
            changed3=true;
          }
        }
        return(ss!==m.studyStart||se!==m.studyEnd)?{...m,studyStart:ss,studyEnd:se}:m;
      });
      return changed3?{...card,members:newMembers}:card;
    });
    if(changed3){try{localStorage.setItem(LS_KEY,JSON.stringify(result));}catch(e){}}
    try{localStorage.setItem(MIG3_KEY,"1");}catch(e){}
  }

  result=result.map(card=>({...card,members:(card.members||[]).map(m=>{
    if(m.loginId)return{...m,loginPassword:m.loginPassword||"hana123"};
    const id=m.studyStart&&m.name?generateLoginId(m.name,m.studyStart):"";
    return{...m,loginId:id,loginPassword:"hana123"};
  })}));

  return result;
}
