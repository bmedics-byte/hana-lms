];
/* Virtual room IDs for hotel accommodations (no physical room number) */
const HOTEL_VIRTUAL_ROOMS={9901:"Hevea Hotel",9902:"Clover Hotel"};
/* Family rooms: shared by a single family unit — no stranger-sharing */
const FAMILY_ROOM_SET=new Set([107,114,115,205,207,213,215]);
/* Card types that indicate a family/group booking */
const FAMILY_CARD_TYPES=new Set(["Family","Group/Family","Group"]);

function assignLanes(bars){
  const sorted=[...bars].map((b,i)=>({...b,_origIdx:i})).sort((a,b)=>a.startWeekIdx-b.startWeekIdx);
  const laneEnds=[];
  sorted.forEach(bar=>{
    let lane=-1;
    for(let li=0;li<laneEnds.length;li++){if(laneEnds[li]<bar.startWeekIdx){lane=li;break;}}
    if(lane===-1){lane=laneEnds.length;laneEnds.push(0);}
    laneEnds[lane]=bar.endWeekIdx;
    bar._lane=lane;
  });
  return{bars:sorted,numLanes:Math.max(1,laneEnds.length)};
}

/* Parse room capacity from roomType string.
   "Room for 3" → 3, "Room for 2" → 2, "Hotel Single" → 1, "Hotel Double" → 2, default → 1 */
function roomCapacity(rt){
  if(!rt)return 1;
  const lower=rt.toLowerCase();
  if(lower.includes("single"))return 1;
  if(lower.includes("double"))return 2;
  const m=rt.match(/(\d+)/);
  return m?parseInt(m[1]):1;
}

/* Compute conflict spans: weeks where concurrent occupants exceed capacity.
   capacity=1 means any 2 overlapping bars = conflict (old behavior).
   capacity=3 means up to 3 simultaneous occupants is fine; 4+ triggers red. */
function computeConflicts(bars,capacity){
  const cap=capacity||1;
  if(bars.length<=cap)return[];
  /* Count occupants per week */
  const NUM_W=72;
  const counts=new Uint8Array(NUM_W);
  bars.forEach(b=>{
    for(let w=b.startWeekIdx;w<=Math.min(b.endWeekIdx,NUM_W-1);w++)counts[w]++;
  });
  /* Merge weeks where count > cap into spans */
  const merged=[];
  for(let w=0;w<NUM_W;w++){
    if(counts[w]>cap){
      if(merged.length&&w===merged[merged.length-1].endWeekIdx+1)
        merged[merged.length-1].endWeekIdx=w;
      else merged.push({startWeekIdx:w,endWeekIdx:w});
    }
  }
  return merged;
}

/* Stable palette: each cardId gets a consistent color */
const DORM_PALETTE=["#bfdbfe","#bbf7d0","#fef08a","#fecaca","#ddd6fe","#fed7aa","#a5f3fc","#f9a8d4","#d1fae5","#fce7f3","#cffafe","#e0e7ff"];

function DormitoryPage({kanbanCards,pushSnap,agencyPipeline,agencies}){
  const[openModalCard,setOpenModalCard]=useState(null);

  const today=new Date();today.setHours(0,0,0,0);
  const startSunday=useMemo(()=>{
    const d=new Date(today);
    d.setDate(d.getDate()-d.getDay()-8*7);
    return d;
  },[]);
  const NUM_WEEKS=72;
  const MS_WEEK=7*24*60*60*1000;

  const weeks=useMemo(()=>Array.from({length:NUM_WEEKS},(_,i)=>{
    const d=new Date(startSunday.getTime()+i*MS_WEEK);
    return d;
  }),[startSunday]);

  /* Ghost cards: pipeline entries with room assigned but not yet confirmed as kanban card */
  const ghostCards=useMemo(()=>{
    if(!agencyPipeline)return[];
    return agencyPipeline.flatMap(entry=>{
      if(entry.kanbanCardId)return[]; /* already confirmed */
      return entry.members
        .filter(m=>(m.roomNumber||m.roomType?.startsWith("Hevea Hotel")||m.roomType?.startsWith("Clover Hotel"))&&(m.studyStart||entry.studyStart)&&(m.studyEnd||entry.studyEnd))
        .map((m,mi)=>({
          id:"ghost_"+entry.id+"_m"+mi,
          type:entry.cardType||"Individual",
          status:"current",
          _isGhost:true,
          members:[{
            name:(m.name||"(Pending)"),
            nationality:m.nationality||"",
            studyStart:m.studyStart||entry.studyStart,
            studyEnd:m.studyEnd||entry.studyEnd,
            roomNumber:m.roomNumber,
            roomType:m.roomType||"",
            roomHistory:[],
          }],
        }));
    });
  },[agencyPipeline]);
  const ghostIdSet=useMemo(()=>new Set(ghostCards.map(g=>g.id)),[ghostCards]);
  const allCards=useMemo(()=>[...kanbanCards,...ghostCards],[kanbanCards,ghostCards]);

  /* Assign stable color per card id */
  const cardColorMap=useMemo(()=>{
    const map={};
    let idx=0;
    allCards.forEach(c=>{if(!map[c.id])map[c.id]=DORM_PALETTE[idx++%DORM_PALETTE.length];});
    return map;
  },[allCards]);

  const roomBars=useMemo(()=>{
    const rb={};
    const ACTIVE=["registered","current","incoming","leaving","graduated","archived"];
    allCards.filter(c=>ACTIVE.includes(c.status)).forEach(card=>{
      const isFamilyCard=FAMILY_CARD_TYPES.has(card.type);

      /* Helper: push one bar segment into rb */
      function pushBar(roomNumStr,startStr,endStr,label,barKeyBase,extra){
        const rt=(extra&&extra.roomType)||"";
        let roomNum=parseInt(roomNumStr);
        if(isNaN(roomNum)){
          /* Route hotel room types to virtual IDs */
          if(rt.startsWith("Hevea Hotel"))roomNum=9901;
          else if(rt.startsWith("Clover Hotel"))roomNum=9902;
          else return;
        }
        const si=Math.floor((new Date(startStr)-startSunday)/MS_WEEK);
        const ei=Math.floor((new Date(endStr)-startSunday)/MS_WEEK);
        if(ei<0||si>=NUM_WEEKS)return;
        if(!rb[roomNum])rb[roomNum]=[];
        /* For hotel virtual rooms, append the specific room type to the label */
        const hotelSub=HOTEL_VIRTUAL_ROOMS[roomNum]?rt.replace(/^(Hevea|Clover) Hotel ?/,""):"";
        const finalLabel=hotelSub?label+" ["+hotelSub+"]":label;
        rb[roomNum].push({barKey:barKeyBase,label:finalLabel,
          startDateStr:startStr,endDateStr:endStr,
          startWeekIdx:Math.max(0,si),endWeekIdx:Math.min(NUM_WEEKS-1,ei),
          ...extra});
      }

      if(isFamilyCard){
        /* Family/Group: one label for the whole card */
        const rep=card.members[0]||{};
        const nat=rep.nationality||"";
        const natCode=NAT_CODE[nat]||nat.slice(0,2).toUpperCase()||"";
        const repName=(rep.name||"?");
        const extra=card.members.length-1;
        const label=repName+(extra>0?"+"+extra:"")+(natCode?"("+natCode+")":"");
        /* Use roomHistory of first member if available; otherwise aggregate by room */
        const segs=getEffectiveRoomSegments(rep);
        if(segs.length>0){
          segs.forEach((seg,si2)=>{
            pushBar(seg.roomNumber,seg.from,seg.to,label,
              card.id+"_fam_"+seg.roomNumber+"_s"+si2,
              {cardId:card.id,isFamily:true,roomType:rep.roomType||""});
          });
        } else {
          /* Fallback: old behavior — aggregate member rooms */
          const byRoom={};
          card.members.forEach(m=>{
            const rn=(m.roomNumber||"").trim();
            if(!rn||!m.studyStart||!m.studyEnd)return;
            if(!byRoom[rn])byRoom[rn]={starts:[],ends:[],roomType:m.roomType||""};
            byRoom[rn].starts.push(m.studyStart);
            byRoom[rn].ends.push(m.studyEnd);
          });
          Object.entries(byRoom).forEach(([rn,{starts,ends,roomType}])=>{
            const startStr=[...starts].sort()[0];
            const endStr=[...ends].sort().slice(-1)[0];
            pushBar(rn,startStr,endStr,label,card.id+"_fam_"+rn,{cardId:card.id,isFamily:true,roomType});
          });
        }
      } else {
        /* Individual: one bar PER MEMBER, respecting roomHistory segments */
        card.members.forEach((m,mi)=>{
          if(!m.studyStart||!m.studyEnd)return;
          const nat=m.nationality||"";
          const natCode=NAT_CODE[nat]||nat.slice(0,2).toUpperCase()||"";
          const label=(m.name||"?")+(natCode?"("+natCode+")":"");
          const segs=getEffectiveRoomSegments(m);
          segs.forEach((seg,si2)=>{
            pushBar(seg.roomNumber,seg.from,seg.to,label,
              card.id+"_m"+mi+"_"+seg.roomNumber+"_s"+si2,
              {cardId:card.id,memberId:mi,isFamily:false,roomType:m.roomType||""});
          });
        });
      }
    });
    return rb;
  },[allCards,startSunday]);

  const monthSpans=useMemo(()=>{
    const spans=[];
    weeks.forEach((w,i)=>{
      const m=w.getMonth(),y=w.getFullYear();
      if(!spans.length||spans[spans.length-1].m!==m||spans[spans.length-1].y!==y)
        spans.push({label:w.toLocaleString("en",{month:"short"})+" '"+String(y).slice(2),m,y,start:i,count:0});
      spans[spans.length-1].count++;
    });
    return spans;
  },[weeks]);

  function fmtDate(s){
    if(!s)return"";
    const d=new Date(s+"T00:00:00");
    return(d.getMonth()+1)+"/"+d.getDate();
  }

  const COL_W=50;
  const LANE_H=27;
  const ROOM_PAD=2;
  const LABEL_W=72;
  const SECTION_H=22;
  const todayWeekIdx=Math.floor((today-startSunday)/MS_WEEK);

  return(
    <div>
      <div className="pg-wrap">
        <span className="pg-badge" style={{background:"#d1fae5",color:"#065f46"}}>ACCOMMODATION</span>
        <h2 className="pg-title">Dormitory Management</h2>
        <p className="pg-sub">Room allocation timeline — click any bar to view student details</p>
      </div>

      {/* Card edit modal */}
      {openModalCard&&(
        <AddCardModal
          initialCard={{...openModalCard}}
          onSave={c=>{pushSnap({kanbanCards:kanbanCards.map(x=>x.id===c.id?c:x)});setOpenModalCard(null);}}
          onClose={()=>setOpenModalCard(null)}
          onDelete={null}
          onArchive={null}
          isArchived={false}
          kanbanCards={kanbanCards}
          agencies={agencies}
        />
      )}

      <div style={{overflow:"auto",maxHeight:"calc(100vh - 180px)",border:"none",borderRadius:16,boxShadow:"0 3px 20px rgba(13,148,136,.1)"}}>
        <div style={{display:"inline-block",minWidth:LABEL_W+NUM_WEEKS*COL_W}}>
          {/* Month header */}
          <div style={{display:"flex",background:"#0d9488",color:"white",position:"sticky",top:0,zIndex:20}}>
            <div style={{width:LABEL_W,flexShrink:0,fontSize:11,fontWeight:700,padding:"4px 8px",borderRight:"1px solid rgba(255,255,255,.25)",position:"sticky",left:0,zIndex:30,background:"#0d9488"}}>Room</div>
            {monthSpans.map((ms,i)=>(
              <div key={i} style={{width:ms.count*COL_W,flexShrink:0,fontSize:11,fontWeight:700,padding:"4px 6px",textAlign:"center",borderRight:"1px solid rgba(255,255,255,.2)",height:22,overflow:"hidden",whiteSpace:"nowrap"}}>
                {ms.label}
              </div>
            ))}
          </div>
          {/* Week header */}
          <div style={{display:"flex",background:"#0f766e",color:"white",position:"sticky",top:22,zIndex:20}}>
            <div style={{width:LABEL_W,flexShrink:0,borderRight:"1px solid rgba(255,255,255,.25)",position:"sticky",left:0,zIndex:30,background:"#0f766e"}}/>
            {weeks.map((w,i)=>{
              const isCur=i===todayWeekIdx;
              return(
                <div key={i} style={{width:COL_W,flexShrink:0,fontSize:9,textAlign:"center",padding:"3px 1px",borderRight:"1px solid rgba(255,255,255,.12)",height:20,fontWeight:isCur?800:400,background:isCur?"#3b82f6":"transparent",overflow:"hidden",lineHeight:"14px"}}>
                  {(w.getMonth()+1)+"/"+w.getDate()}
                </div>
              );
            })}
          </div>
          {/* Sections */}
          {DORM_SECTIONS.map(({section,rooms})=>{
            const isHotelSection=section==="HEVEA HOTEL"||section==="CLOVER HOTEL";
            return(
            <React.Fragment key={section}>
              <div style={{display:"flex",background:isHotelSection?"#dcfce7":"#f1f5f9",borderTop:"2px solid "+(isHotelSection?"#4ade80":"#94a3b8")}}>
                <div style={{width:LABEL_W,flexShrink:0,padding:"3px 8px",fontSize:10,fontWeight:800,color:isHotelSection?"#166534":"#475569",borderRight:"1px solid "+(isHotelSection?"#86efac":"#cbd5e1"),height:SECTION_H,display:"flex",alignItems:"center",position:"sticky",left:0,zIndex:5,background:isHotelSection?"#dcfce7":"#f1f5f9"}}>{section}</div>
                <div style={{flex:1,borderBottom:"1px solid #e2e8f0"}}/>
              </div>
              {rooms.map(roomNum=>{
                const bars=roomBars[roomNum]||[];
                const isFamilyRoom=FAMILY_ROOM_SET.has(roomNum);

                /* Lane logic:
                   • Family rooms → time-based packing (1 bar per booking, no strangers)
                   • Other rooms  → 1 dedicated lane per occupant (same person always in same row) */
                let laned,numLanes;
                if(isFamilyRoom){
                  const r=assignLanes(bars);laned=r.bars;numLanes=r.numLanes;
                } else {
                  laned=bars.map((b,i)=>({...b,_lane:i}));
                  numLanes=Math.max(1,bars.length);
                }

                const rowH=numLanes*LANE_H+ROOM_PAD*2;
                return(
                  <div key={roomNum} style={{display:"flex",borderTop:"1px solid #e2e8f0",minHeight:rowH,position:"relative"}}>
                    {/* Room label — show capacity hint */}
                    <div style={{width:LABEL_W,flexShrink:0,background:HOTEL_VIRTUAL_ROOMS[roomNum]?"#f0fdf4":"#f8fafc",borderRight:"2px solid "+(HOTEL_VIRTUAL_ROOMS[roomNum]?"#86efac":"#cbd5e1"),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"sticky",left:0,zIndex:5,gap:1,padding:"2px 4px"}}>
                      <span style={{fontSize:HOTEL_VIRTUAL_ROOMS[roomNum]?9:12,fontWeight:700,color:HOTEL_VIRTUAL_ROOMS[roomNum]?"#166534":"#1e3a8a",textAlign:"center",lineHeight:"1.2"}}>{HOTEL_VIRTUAL_ROOMS[roomNum]||roomNum}</span>
                      {!isFamilyRoom&&!HOTEL_VIRTUAL_ROOMS[roomNum]&&numLanes>1&&(
                        <span style={{fontSize:8,color:"#94a3b8",fontWeight:600}}>{numLanes}/{isFamilyRoom?5:3}</span>
                      )}
                    </div>
                    <div style={{position:"relative",width:NUM_WEEKS*COL_W,height:rowH,flexShrink:0}}>
                      {/* Column grid */}
                      {weeks.map((_,i)=>(
                        <div key={i} style={{position:"absolute",left:i*COL_W,top:0,width:COL_W,height:"100%",borderRight:"1px solid #f0f4f8",background:i===todayWeekIdx?"#eff6ff":i%2===0?"transparent":"rgba(248,250,252,.5)"}}/>
                      ))}
                      {/* Lane dividers for non-family rooms */}
                      {!isFamilyRoom&&Array.from({length:numLanes-1},(_,li)=>(
                        <div key={li} style={{position:"absolute",left:0,top:ROOM_PAD+(li+1)*LANE_H,width:"100%",height:1,background:"#e2e8f0",zIndex:2}}/>
                      ))}
                      {/* Bars */}
                      {(()=>{
                        const cap=HOTEL_VIRTUAL_ROOMS[roomNum]?999:FAMILY_ROOM_SET.has(roomNum)?5:Math.max(1,...(bars.length?bars.map(b=>roomCapacity(b.roomType||"")):[1]));
                        const conflicts=computeConflicts(bars,cap);
                        return(<>
                          {laned.map(bar=>{
                            const bc=cardColorMap[bar.cardId]||"#bfdbfe";
                            const x=bar.startWeekIdx*COL_W+1;
                            const bw=(bar.endWeekIdx-bar.startWeekIdx+1)*COL_W-3;
                            const y=ROOM_PAD+bar._lane*LANE_H+2;
                            const isGhost=ghostIdSet.has(bar.cardId);
                            const tooltip=(isGhost?"[임시 배정] ":"")+bar.label+"\n"+fmtDate(bar.startDateStr)+" → "+fmtDate(bar.endDateStr)+(isGhost?"":"\nClick to open card");
                            return(
                              <div key={bar.barKey}
                                onClick={e=>{if(isGhost)return;e.stopPropagation();const card=kanbanCards.find(c=>c.id===bar.cardId);if(card)setOpenModalCard(card);}}
                                title={tooltip}
                                style={{position:"absolute",left:x,top:y,width:Math.max(bw,6),height:LANE_H-5,
                                  background:isGhost
                                    ?"repeating-linear-gradient(45deg,"+bc+","+bc+" 4px,rgba(255,255,255,.7) 4px,rgba(255,255,255,.7) 8px)"
                                    :bc,
                                  border:isGhost?"1.5px dashed rgba(0,0,0,.3)":"1.5px solid rgba(0,0,0,.14)",
                                  borderRadius:4,cursor:isGhost?"default":"pointer",
                                  zIndex:3,display:"flex",alignItems:"center",padding:"0 5px",
                                  overflow:"hidden",opacity:isGhost?0.6:1,
                                  boxShadow:isGhost?"none":"0 1px 3px rgba(0,0,0,.08)"}}>
                                <span style={{fontSize:9,fontWeight:700,color:"#1e293b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                                  {isGhost?"⋯ ":""}{bar.label}
                                </span>
                              </div>
                            );
                          })}
                          {/* Conflict overlays — red band across full row height */}
                          {conflicts.map((c,ci)=>{
                            const cx=c.startWeekIdx*COL_W;
                            const cw=(c.endWeekIdx-c.startWeekIdx+1)*COL_W;
                            return(
                              <div key={"conflict_"+ci}
                                title={"⚠️ Room conflict: "+fmtDate(weeks[c.startWeekIdx]?.toISOString?.()?.slice(0,10)||"")+" ~ "+fmtDate(weeks[c.endWeekIdx]?.toISOString?.()?.slice(0,10)||"")}
                                style={{position:"absolute",left:cx,top:0,width:cw,height:"100%",
                                  background:"rgba(220,38,38,.18)",
                                  borderLeft:"2px solid rgba(220,38,38,.7)",
                                  borderRight:"2px solid rgba(220,38,38,.7)",
                                  zIndex:10,pointerEvents:"none"}}/>
                            );
                          })}
                        </>);
                      })()}
                    </div>
                  </div>
                );
              })}
            </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   DATA TOOLS PAGE (Export / Import for testing)
═════════════════════════════════════════════════════ */
const HANA_LS_KEYS=[
  "hana_kanban_v1","hana_sched_v1","hana_week_meta","hana_draft_week","hana_archives",
  "hana_celldata_v1","hana_rooms1on1_v1","hana_grouprosters_v1","hana_absentsets_v1",
  "hana_subsbyday_v1","hana_messages_v1","hana_agencies_v1","hana_agency_pipe_v1",
  "hana_teacher_meta","hana_lunch_period",
];
function DataToolsPage(){
  const[importStatus,setImportStatus]=useState(null);
  const fileRef=React.useRef(null);

  function handleExport(){
    const data={_exported:new Date().toISOString(),_version:"1"};
    HANA_LS_KEYS.forEach(k=>{
      const v=localStorage.getItem(k);
      if(v!=null)data[k]=v;
    });
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="hana_data_"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        let count=0;
        HANA_LS_KEYS.forEach(k=>{
          if(data[k]!=null){localStorage.setItem(k,data[k]);count++;}
        });
        setImportStatus({ok:true,msg:"✅ "+count+" data keys imported. Reloading..."});
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){
        setImportStatus({ok:false,msg:"❌ Invalid file: "+err.message});
      }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  const cardStyle={background:"white",border:"1.5px solid #e2e8f0",borderRadius:12,padding:20,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,.06)"};
  const btnPrimary={display:"inline-flex",alignItems:"center",gap:8,padding:"10px 20px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,fontWeight:700};

  return(
    <div style={{maxWidth:640,margin:"0 auto"}}>
      <h2 style={{fontSize:18,fontWeight:800,color:"#1e3a8a",marginBottom:4}}>💾 Data Tools</h2>
      <p style={{fontSize:13,color:"#6b7280",marginBottom:20}}>Export all app data for backup or sharing with another person for testing. The recipient opens the HTML file and imports the JSON.</p>

      {/* Export */}
      <div style={cardStyle}>
        <div style={{fontSize:15,fontWeight:800,color:"#1e3a8a",marginBottom:6}}>📤 Export Data</div>
        <p style={{fontSize:13,color:"#475569",marginBottom:14}}>Download all student records, schedules, dormitory assignments, agency pipeline, and settings as a single JSON file. Send this file alongside <code>schedule.html</code> to share the full app state.</p>
        <button onClick={handleExport} style={{...btnPrimary,background:"#1e3a8a",color:"white"}}>⬇ Download hana_data.json</button>
      </div>

      {/* Import */}
      <div style={cardStyle}>
        <div style={{fontSize:15,fontWeight:800,color:"#0f766e",marginBottom:6}}>📥 Import Data</div>
        <p style={{fontSize:13,color:"#475569",marginBottom:14}}>Restore data from a previously exported JSON file. <strong>This will overwrite current data</strong> and reload the page.</p>
        <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current?.click()} style={{...btnPrimary,background:"#0f766e",color:"white"}}>⬆ Select JSON file to import</button>
        {importStatus&&(
          <div style={{marginTop:12,padding:"8px 14px",borderRadius:8,background:importStatus.ok?"#dcfce7":"#fee2e2",color:importStatus.ok?"#166534":"#991b1b",fontSize:13,fontWeight:600}}>
            {importStatus.msg}
          </div>
        )}
      </div>

      {/* Instructions */}
      <div style={{...cardStyle,background:"#fffbeb",border:"1.5px solid #fde68a"}}>
        <div style={{fontSize:14,fontWeight:800,color:"#92400e",marginBottom:8}}>📧 How to share for testing</div>
        <ol style={{margin:0,paddingLeft:20,fontSize:13,color:"#78350f",lineHeight:1.8}}>
          <li>Click <strong>"Download hana_data.json"</strong> above</li>
          <li>Email both <code>schedule.html</code> and <code>hana_data.json</code> to the tester</li>
          <li>Tester opens <code>schedule.html</code> in a browser (Chrome recommended)</li>
          <li>Tester logs in as admin → Data Tools → <strong>"Select JSON file to import"</strong></li>
          <li>Page reloads with all data — tester can now see everything</li>
        </ol>
        <div style={{marginTop:10,fontSize:12,color:"#92400e",background:"#fef3c7",borderRadius:6,padding:"6px 10px"}}>
          💡 <strong>Tip:</strong> Data is stored in the browser's localStorage, so it's device-specific. The JSON export/import is the only way to move data between computers.
        </div>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   APP
═════════════════════════════════════════════════════ */
function App(){
  /* ── Undo / Redo history (covers sched + rooms + absent + subs) ── */
  const[{hist,hIdx},setHist]=useState(()=>{
    const savedCards=lsLoad();
    const savedSched=lsGetSched();
    const savedCellData=lsGetCellData();
    const savedRooms1on1=lsGetRooms1on1();
    const savedGroupRosters=lsGetGroupRosters();
    const savedAbsentSets=lsGetAbsentSets();
    const savedSubsByDay=lsGetSubsByDay();
    const snap={sched:savedSched||{},rooms1on1:(savedRooms1on1&&Object.keys(savedRooms1on1).length>0)?savedRooms1on1:SEED_ROOMS1ON1,roomsGroup:{},absentSets:savedAbsentSets||{},subsByDay:savedSubsByDay||{},cellData:savedCellData||{},groupRosters:savedGroupRosters||{},
      kanbanCards:savedCards||INIT_KANBAN_CARDS};
    return{hist:[snap],hIdx:0};
  });
  const snap=hist[hIdx];
  const sched=snap.sched;
  const rooms1on1=snap.rooms1on1;
  const roomsGroup=snap.roomsGroup;
  const absentSets=snap.absentSets;
  const subsByDay=snap.subsByDay;
  const cellData=snap.cellData||{};
  const groupRosters=snap.groupRosters||{};
  const kanbanCards=snap.kanbanCards||[];
  /* Persist kanban cards + sched + rooms + rosters + absent/subs to localStorage on every change */
  React.useEffect(()=>{lsSave(kanbanCards);},[kanbanCards]);
  React.useEffect(()=>{lsSaveSched(sched);},[sched]);
  React.useEffect(()=>{lsSaveCellData(cellData);},[cellData]);
  React.useEffect(()=>{lsSaveRooms1on1(rooms1on1);},[rooms1on1]);
  React.useEffect(()=>{lsSaveGroupRosters(groupRosters);},[groupRosters]);
  React.useEffect(()=>{lsSaveAbsentSets(absentSets);},[absentSets]);
  React.useEffect(()=>{lsSaveSubsByDay(subsByDay);},[subsByDay]);
  /* ── Active students: draft view uses current+incoming; regular view uses current+leaving ── */
  const activeStudents=useMemo(()=>{
    const statuses=isDraftView?["current","incoming"]:["current","leaving","incoming"];
    const names=kanbanCards
      .filter(c=>statuses.includes(c.status))
      .flatMap(c=>c.members.map(m=>m.name).filter(Boolean));
    return[...new Set(names)];
  },[kanbanCards,isDraftView]);
  /* Update global STUDENTS so helper functions (freeStudents, buildStudentSched) work */
  STUDENTS=activeStudents.length?activeStudents:STUDENTS_INITIAL;
  /* ── Teacher meta: specialties + extra teachers ── */
  const[teacherMeta,setTeacherMeta]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("hana_teacher_meta")||"{}");}catch{return{};}
  });
  React.useEffect(()=>{
    try{localStorage.setItem("hana_teacher_meta",JSON.stringify(teacherMeta));}catch(e){}
    /* Rebuild global TEACHERS: base + any extras added via UI */
    const extras=Object.keys(teacherMeta).filter(t=>teacherMeta[t]?.isExtra&&!TEACHERS_BASE.includes(t));
    TEACHERS=[...TEACHERS_BASE,...extras];
    /* Rebuild TEACHER_CODE for extras */
    const maxCode=Math.max(...Object.values(TEACHER_CODE),...extras.map(t=>teacherMeta[t]?.code||0));
    extras.forEach(t=>{if(!TEACHER_CODE[t])TEACHER_CODE[t]=teacherMeta[t]?.code||maxCode+1;});
  },[teacherMeta]);
  function pushSnap(changes){
    setHist(({hist,hIdx})=>{
      const next={...hist[hIdx],...changes};
      const trimmed=hist.slice(0,hIdx+1);
      const newHist=[...trimmed,next].slice(-60);
      return{hist:newHist,hIdx:newHist.length-1};
    });
  }
  function setSched(fn){pushSnap({sched:typeof fn==='function'?fn(sched):fn});}
  function setRooms1on1(fn){pushSnap({rooms1on1:typeof fn==='function'?fn(rooms1on1):fn});}
  /* Setter that routes to draft or main snap depending on current view mode */
  function setDisplayRooms1on1(fn){
    if(isArchiveView)return; // archive is read-only
    if(isDraftView){
      setDraftWeek(prev=>{
        if(!prev)return prev;
        const cur=prev.rooms1on1||rooms1on1;
        const next=typeof fn==='function'?fn(cur):fn;
        return{...prev,rooms1on1:next};
      });
    }else{
      pushSnap({rooms1on1:typeof fn==='function'?fn(rooms1on1):fn});
    }
  }
  function setRoomsGroup(fn){pushSnap({roomsGroup:typeof fn==='function'?fn(roomsGroup):fn});}
  function setAbsentSets(fn){pushSnap({absentSets:typeof fn==='function'?fn(absentSets):fn});}
  function setSubsByDay(fn){pushSnap({subsByDay:typeof fn==='function'?fn(subsByDay):fn});}
  function setCellData(fn){pushSnap({cellData:typeof fn==='function'?fn(cellData):fn});}
  function setGroupRosters(fn){pushSnap({groupRosters:typeof fn==='function'?fn(groupRosters):fn});}
  const canUndo=hIdx>0;
  const canRedo=hIdx<hist.length-1;
  function undo(){setHist(h=>({...h,hIdx:Math.max(0,h.hIdx-1)}));}
  function redo(){setHist(h=>({...h,hIdx:Math.min(h.hist.length-1,h.hIdx+1)}));}
  useEffect(()=>{
    function onKey(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.ctrlKey&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
      if(e.ctrlKey&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
    }
    document.addEventListener('keydown',onKey);return()=>document.removeEventListener('keydown',onKey);
  },[]);
  useEffect(()=>{
    if(!showArchiveMenu)return;
    function onClickOut(e){if(!e.target.closest('[data-archive-menu]'))setShowArchiveMenu(false);}
    document.addEventListener('mousedown',onClickOut);return()=>document.removeEventListener('mousedown',onClickOut);
  },[showArchiveMenu]);

  const[studentData,setStudentData]=useState(INITIAL_STUDENT_DATA);
  const studentCourses=useMemo(()=>Object.fromEntries(Object.entries(studentData).map(([s,d])=>[s,d.course])),[studentData]);
  /* Derive studentData overlay from kanban cards — must be BEFORE early return */
  const kanbanStudentData=useMemo(()=>{
    const out={};
    kanbanCards.forEach(card=>{
      card.members.forEach(m=>{
        if(!m.name)return;
        out[m.name]={birthYear:m.birthYear||"",nationality:m.nationality||"Korean",studyStart:m.studyStart||"",studyEnd:m.studyEnd||"",course:m.course||"",roomType:m.roomType||"",roomNumber:m.roomNumber||"",customSpec:m.customSpec||null,campLevel:m.campLevel||"",isGuardian:!!(m.isGuardian),isAdult:!!(m.isAdult)};
      });
    });
    return out;
  },[kanbanCards]);
  const mergedStudentData=useMemo(()=>({...studentData,...kanbanStudentData}),[studentData,kanbanStudentData]);
  const[user,setUser]=useState(null);
  const[page,setPage]=useState("management");
  const[schedTab,setSchedTab]=useState("teacher");
  const[selDay,setSelDay]=useState(DAYS.includes(TODAY_WEEKDAY)?TODAY_WEEKDAY:"Monday");
  const[teacherPopup,setTeacherPopup]=useState(null);
  const[studentDailyPopup,setStudentDailyPopup]=useState(null);
  const[showAutoAssign,setShowAutoAssign]=useState(false);
  /* ── Messenger ── */
  const[messages,setMessagesRaw]=useState(lsGetMessages);
  const[passwords,setPasswordsRaw]=useState(lsLoadPasswords);
  function changePassword(name,newPwd){setPasswordsRaw(prev=>{const n={...prev,[name]:newPwd};lsSavePasswords(n);return n;});}
  const[agencies,setAgenciesRaw]=useState(lsGetAgencies);
  const[agencyPipeline,setAgencyPipelineRaw]=useState(lsGetAgencyPipe);
  function setAgencyPipeline(fn){setAgencyPipelineRaw(prev=>typeof fn==='function'?fn(prev):fn);}
  const[mealPlan,setMealPlanRaw]=useState(lsGetMeal2Current);
  function setMealPlan(fn){setMealPlanRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;lsSaveMeal2Current(next);return next;});}
  const[mealDraft,setMealDraftRaw]=useState(lsGetMeal2Draft);
  function setMealDraft(fn){setMealDraftRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;lsSaveMeal2Draft(next);return next;});}
  const[mealArchives,setMealArchivesRaw]=useState(lsGetMeal2Archives);
  function setMealArchives(fn){setMealArchivesRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;lsSaveMeal2Archives(next);return next;});}
  const[mealSkips,setMealSkipsRaw]=useState(()=>{try{const r=localStorage.getItem("hana_meal_skips_v1");return r?JSON.parse(r):{};}catch(e){return{};}});
  function setMealSkips(fn){setMealSkipsRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;try{localStorage.setItem("hana_meal_skips_v1",JSON.stringify(next));}catch(e){}return next;});}
  const[messengerOpen,setMessengerOpen]=useState(null); // {teacher, student, isAdmin?}
  function sendMessage(cKey,fromUser,text,file){
    setMessagesRaw(prev=>{
      const msg={id:Date.now()+"_"+Math.random().toString(36).slice(2),from:fromUser,ts:Date.now(),readBy:[fromUser]};
      if(text)msg.text=text;
      if(file)msg.file=file;
      const next={...prev,[cKey]:[...(prev[cKey]||[]),msg]};
      lsSaveMessages(next);
      return next;
    });
  }
  function markRead(cKey,forUser){
    setMessagesRaw(prev=>{
      const conv=prev[cKey];if(!conv)return prev;
      let changed=false;
      const updated=conv.map(m=>{
        if(m.from!==forUser&&!(m.readBy||[]).includes(forUser)){changed=true;return{...m,readBy:[...(m.readBy||[]),forUser]};}
        return m;
      });
      if(!changed)return prev;
      const next={...prev,[cKey]:updated};
      lsSaveMessages(next);
      return next;
    });
  }

  /* ── Week workflow state ── */
  const[weekMeta,setWeekMetaState]=useState(lsGetWeekMeta);
  const weekStart=weekMeta.weekStart;
  const weekStatus=weekMeta.weekStatus; // "active" | "confirmed"
  function setWeekStart(ws){setWeekMetaState(m=>{const n={...m,weekStart:ws};lsSaveWeekMeta(n);return n;});}
  function setWeekStatus(ws){setWeekMetaState(m=>{const n={...m,weekStatus:ws};lsSaveWeekMeta(n);return n;});}

  const[draftWeek,setDraftWeekRaw]=useState(lsGetDraft); // null | {weekStart,status,sched,rooms1on1,groupRosters}
  function setDraftWeek(fn){setDraftWeekRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;lsSaveDraft(next);return next;});}

  const[archives,setArchivesRaw]=useState(lsGetArchives); // [{weekStart,weekEnd,label,archivedAt,sched,...}]
  function setArchives(fn){setArchivesRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;lsSaveArchives(next);return next;});}

  const[viewMode,setViewMode]=useState("current"); // "current" | "draft" | number (archive idx)
  const[showArchiveMenu,setShowArchiveMenu]=useState(false);

  /* Derived: which sched + pushSnap to use based on viewMode */
  const isArchiveView=typeof viewMode==="number";
  const isDraftView=viewMode==="draft";
  const displaySched=isArchiveView?(archives[viewMode]?.sched||{}):isDraftView?(draftWeek?.sched||{}):sched;
  const displayCellData=isArchiveView?(archives[viewMode]?.cellData||{}):isDraftView?(draftWeek?.cellData||{}):cellData;
  const displayRooms1on1=isArchiveView?(archives[viewMode]?.rooms1on1||rooms1on1):isDraftView?(draftWeek?.rooms1on1||rooms1on1):rooms1on1;
  const displayGroupRosters=isArchiveView?(archives[viewMode]?.groupRosters||groupRosters):isDraftView?(draftWeek?.groupRosters||groupRosters):groupRosters;

  function pushDraftSnap(changes){
    /* Draft-related fields go into draftWeek; everything else (absent, subs, kanban) to main snap */
    const draftFields={};
    const mainFields={};
    Object.entries(changes).forEach(([k,v])=>{
      if(k==="sched"||k==="cellData"||k==="rooms1on1"||k==="groupRosters")draftFields[k]=v;
      else mainFields[k]=v;
    });
    if(Object.keys(draftFields).length>0){
      setDraftWeek(prev=>{if(!prev)return prev;return{...prev,...draftFields};});
    }
    if(Object.keys(mainFields).length>0)pushSnap(mainFields);
  }
  const activePushSnap=isDraftView?pushDraftSnap:pushSnap;
  const activeSetSched=isDraftView
    ?(fn=>setDraftWeek(prev=>{if(!prev)return prev;const s=typeof fn==='function'?fn(prev.sched):fn;return{...prev,sched:s};}))
    :setSched;

  /* ── Workflow actions ── */
  function doConfirmWeek(){
    setWeekStatus("confirmed");
  }
  function doCreateDraft(){
    if(weekStatus!=="confirmed"){
      alert("Please confirm this week's schedule first before creating a draft.");
      return;
    }
    if(draftWeek&&!window.confirm("A draft already exists. Overwrite it?"))return;
    const nextStart=addDaysISO(weekStart,7);
    /* Remove leaving AND graduated students — use sorted-words key for fuzzy name match
       (handles "JIWON BAIK" vs "BAIK JIWON" etc.) */
    const _sortKey=s=>s.toLowerCase().split(/\s+/).sort().join(' ');
    const removedNames=new Set(kanbanCards.filter(c=>c.status==="leaving"||c.status==="graduated").flatMap(c=>c.members.map(m=>m.name).filter(Boolean)));
    const removedKeys=new Set([...removedNames].map(_sortKey));
    const _isRemoved=name=>removedNames.has(name)||removedKeys.has(_sortKey(name));
    const schedCopy=JSON.parse(JSON.stringify(sched));
    Object.keys(schedCopy).forEach(t=>{Object.keys(schedCopy[t]).forEach(p=>{const v=schedCopy[t][p];if(v&&_isRemoved(v))delete schedCopy[t][p];});});
    /* Remove leaving/graduated students from groupRosters copy */
    const rosterCopy=JSON.parse(JSON.stringify(groupRosters));
    Object.keys(rosterCopy).forEach(g=>{Object.keys(rosterCopy[g]).forEach(p=>{if(Array.isArray(rosterCopy[g][p]))rosterCopy[g][p]=rosterCopy[g][p].filter(s=>!_isRemoved(s));});});
    const newDraft={
      weekStart:nextStart,status:"draft",
      sched:schedCopy,
      cellData:JSON.parse(JSON.stringify(cellData)),
      rooms1on1:JSON.parse(JSON.stringify(rooms1on1)),
      groupRosters:rosterCopy,
    };
    setDraftWeek(newDraft);
    /* Clear last week's absence/sub records — new draft starts fresh */
    pushSnap({absentSets:{},subsByDay:{}});
    setViewMode("draft");
  }
  function doConfirmDraft(){
    if(!draftWeek)return;
    setDraftWeek(prev=>({...prev,status:"confirmed"}));
  }
  function _doArchiveCore(silent){
    if(!silent&&!window.confirm(`Archive ${weekRangeLabel(weekStart)}?\nThis will permanently save it and cannot be undone.`))return;
    /* Convert absentSets (Map-based days) to plain objects for serialisation */
    const absentSetsPlain={};
    Object.entries(absentSets).forEach(([day,set])=>{absentSetsPlain[day]=[...set];});
    const archived={
      weekStart,weekEnd:addDaysISO(weekStart,4),label:weekRangeLabel(weekStart),
      archivedAt:new Date().toISOString(),
      sched:JSON.parse(JSON.stringify(sched)),
      cellData:JSON.parse(JSON.stringify(cellData)),
      rooms1on1:JSON.parse(JSON.stringify(rooms1on1)),
      groupRosters:JSON.parse(JSON.stringify(groupRosters)),
      absentSets:absentSetsPlain,
      subsByDay:JSON.parse(JSON.stringify(subsByDay)),
    };
    setArchives(prev=>[...prev,archived]);
    if(draftWeek){
      pushSnap({sched:JSON.parse(JSON.stringify(draftWeek.sched||{})),cellData:JSON.parse(JSON.stringify(draftWeek.cellData||{})),rooms1on1:JSON.parse(JSON.stringify(draftWeek.rooms1on1||{})),groupRosters:JSON.parse(JSON.stringify(draftWeek.groupRosters||{}))});
      setWeekStart(draftWeek.weekStart);
      setDraftWeek(null);
    }else{
      pushSnap({sched:{}});
      setWeekStart(addDaysISO(weekStart,7));
    }
    setWeekStatus("active");
    setViewMode("current");
  }
  function doArchiveAndAdvance(){_doArchiveCore(false);}
  /* Auto-archive on Saturday/Sunday if week is confirmed */
  React.useEffect(()=>{
    if(weekStatus!=="confirmed"||viewMode!=="current")return;
    const today=new Date();today.setHours(0,0,0,0);
    const fri=new Date(weekStart+"T12:00:00");fri.setDate(fri.getDate()+4);fri.setHours(0,0,0,0);
    if(today>fri)_doArchiveCore(true);
  },[weekStart,weekStatus]);
  function doClearSched(){
    if(!window.confirm("Clear ALL assignments from this schedule?"))return;
    if(isDraftView)setDraftWeek(prev=>({...prev,sched:{}}));
    else pushSnap({sched:{}});
  }

  if(!user)return<LoginPage onLogin={setUser} kanbanCards={kanbanCards} teacherMeta={teacherMeta} passwords={passwords} agencies={agencies}/>;
  const{role,name}=user;
  const roleColor={admin:"#0f172a",teacher:"#0d9488",student:"#065f46",agency:"#1a1f3c"}[role]||"#0f172a";

  /* ── Week label for header ── */
  const headerWeekLabel=isArchiveView
    ?`📦 ${archives[viewMode]?.label||""}`
    :isDraftView
      ?`📝 Draft: ${weekRangeLabel(draftWeek?.weekStart||addDaysISO(weekStart,7))}`
      :weekRangeLabel(weekStart);
  const headerStatusBadge=isArchiveView
    ?{label:"ARCHIVED",bg:"#6b7280"}
    :isDraftView
      ?{label:draftWeek?.status==="confirmed"?"CONFIRMED":"DRAFT",bg:draftWeek?.status==="confirmed"?"#0d9488":"#f59e0b"}
      :{label:weekStatus==="active"?"ACTIVE":"CONFIRMED",bg:weekStatus==="active"?"#16a34a":"#0d9488"};

  const Header=()=>(
    <div data-header="1" style={{background:roleColor,color:"white",padding:"11px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 10px rgba(0,0,0,.15)",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:24}}>🎓</span>
        <div>
          <div style={{fontSize:16,fontWeight:800}}>Hana Academy LMS</div>
          <div style={{fontSize:11,opacity:.9,display:"flex",alignItems:"center",gap:5,marginTop:1}}>
            <span>{headerWeekLabel}</span>
            <span style={{background:headerStatusBadge.bg,color:"white",fontSize:9,padding:"1px 6px",borderRadius:8,fontWeight:700,letterSpacing:.5}}>{headerStatusBadge.label}</span>
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {role==="admin"&&(
          <>
            {/* ── Schedule View Dropdown ── */}
            <div style={{position:"relative"}} data-archive-menu="1">
              <button onClick={()=>setShowArchiveMenu(v=>!v)}
                style={{padding:"5px 12px",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                {isArchiveView?"📦 Archive":isDraftView?"📝 Draft":"📋 This Week"} ▾
              </button>
              {showArchiveMenu&&(
                <div style={{position:"absolute",right:0,top:"110%",background:"white",border:"1px solid #e2e8f0",borderRadius:10,boxShadow:"0 6px 24px rgba(0,0,0,.18)",minWidth:240,zIndex:200,overflow:"hidden"}}>
                  {/* Current week */}
                  <div style={{padding:"5px 10px",fontSize:9,fontWeight:800,color:"#6b7280",background:"#f8fafc",textTransform:"uppercase",letterSpacing:1}}>Current Week</div>
                  <button onClick={()=>{setViewMode("current");setShowArchiveMenu(false);}}
                    style={{display:"block",width:"100%",textAlign:"left",padding:"9px 14px",fontSize:12,background:viewMode==="current"?"#eff6ff":"white",color:viewMode==="current"?"#1e40af":"#374151",border:"none",cursor:"pointer",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{fontWeight:700}}>{weekRangeLabel(weekStart)}</div>
                    <div style={{fontSize:10,marginTop:2}}>
                      <span style={{padding:"1px 7px",borderRadius:8,fontSize:9,fontWeight:700,background:weekStatus==="confirmed"?"#7c3aed":"#f59e0b",color:"white"}}>
                        {weekStatus==="confirmed"?"✓ CONFIRMED":"ACTIVE"}
                      </span>
                    </div>
                  </button>
                  {/* Draft week */}
                  {draftWeek&&(
                    <>
                      <div style={{padding:"5px 10px",fontSize:9,fontWeight:800,color:"#6b7280",background:"#f8fafc",textTransform:"uppercase",letterSpacing:1}}>Next Week</div>
                      <button onClick={()=>{setViewMode("draft");setShowArchiveMenu(false);}}
                        style={{display:"block",width:"100%",textAlign:"left",padding:"9px 14px",fontSize:12,background:viewMode==="draft"?"#fef9c3":"white",color:viewMode==="draft"?"#92400e":"#374151",border:"none",cursor:"pointer",borderBottom:"1px solid #f1f5f9"}}>
                        <div style={{fontWeight:700}}>{weekRangeLabel(draftWeek.weekStart)}</div>
                        <div style={{fontSize:10,marginTop:2}}>
                          <span style={{padding:"1px 7px",borderRadius:8,fontSize:9,fontWeight:700,background:draftWeek.status==="confirmed"?"#7c3aed":"#f59e0b",color:"white"}}>
                            {draftWeek.status==="confirmed"?"✓ CONFIRMED":"📝 DRAFT"}
                          </span>
                        </div>
                      </button>
                    </>
                  )}
                  {/* Archives */}
                  {archives.length>0&&(
                    <>
                      <div style={{padding:"5px 10px",fontSize:9,fontWeight:800,color:"#6b7280",background:"#f8fafc",textTransform:"uppercase",letterSpacing:1}}>Past Archives</div>
                      {[...archives].reverse().map((a,ri)=>{const idx=archives.length-1-ri;return(
                        <button key={idx} onClick={()=>{setViewMode(idx);setShowArchiveMenu(false);}}
                          style={{display:"block",width:"100%",textAlign:"left",padding:"8px 14px",fontSize:12,background:viewMode===idx?"#f0fdf4":"white",color:viewMode===idx?"#166534":"#374151",border:"none",cursor:"pointer",borderBottom:"1px solid #f8fafc"}}>
                          <div style={{fontWeight:600}}>📦 {a.label}</div>
                          <div style={{fontSize:10,color:"#9ca3af",marginTop:1}}>Archived {a.archivedAt?.slice(0,10)}</div>
                        </button>
                      );})}
                    </>
                  )}
                </div>
              )}
            </div>
            {/* ── Action buttons ── */}
            {!isArchiveView&&(
              <>
                {/* Confirm Week (current, not yet confirmed) */}
                {!isDraftView&&weekStatus==="active"&&(
                  <button onClick={doConfirmWeek}
                    style={{padding:"5px 12px",background:"rgba(124,58,237,.85)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    🔒 Confirm Week
                  </button>
                )}
                {/* Create Draft (only after confirming, only on Wednesdays) */}
                {!isDraftView&&!draftWeek&&(()=>{
                  const isWed=new Date().getDay()===3;
                  const canDraft=weekStatus==="confirmed"&&isWed;
                  const tip=weekStatus!=="confirmed"?"Confirm this week first":(!isWed?"Available on Wednesdays only":"Create next week's draft");
                  return(
                    <button onClick={canDraft?doCreateDraft:undefined}
                      title={tip}
                      style={{padding:"5px 12px",background:canDraft?"rgba(245,158,11,.85)":"rgba(156,163,175,.45)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:canDraft?"pointer":"not-allowed",fontSize:11,fontWeight:700,whiteSpace:"nowrap",opacity:canDraft?1:.7}}>
                      📝 Create Draft{!isWed&&weekStatus==="confirmed"?" (Wed)":""}
                    </button>
                  );
                })()}
                {/* Confirm Draft (when viewing draft) */}
                {isDraftView&&draftWeek?.status!=="confirmed"&&(
                  <button onClick={doConfirmDraft}
                    style={{padding:"5px 12px",background:"rgba(124,58,237,.85)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    🔒 Confirm Draft
                  </button>
                )}
                {/* Archive Week (manual, current only — Friday or later) */}
                {!isDraftView&&weekStatus==="confirmed"&&(()=>{
                  const todayD=new Date();todayD.setHours(0,0,0,0);
                  const friD=new Date(weekStart+"T12:00:00");friD.setDate(friD.getDate()+4);friD.setHours(0,0,0,0);
                  const canArchive=todayD>=friD;
                  return canArchive
                    ?<button onClick={doArchiveAndAdvance}
                        style={{padding:"5px 12px",background:"rgba(107,114,128,.75)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                        📦 Archive Week
                      </button>
                    :<div title={`Archive available from Friday (${friD.toLocaleDateString("en-US",{month:"short",day:"numeric"})})`}
                        style={{padding:"5px 12px",background:"rgba(107,114,128,.3)",border:"1px solid rgba(255,255,255,.15)",borderRadius:6,color:"rgba(255,255,255,.45)",fontSize:11,fontWeight:700,whiteSpace:"nowrap",cursor:"not-allowed",userSelect:"none"}}>
                        📦 Archive Week
                        <span style={{fontSize:9,marginLeft:5,opacity:.8}}>(Fri+)</span>
                      </div>;
                })()}
              </>
            )}
          </>
        )}
        <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700}}>{name}</div><div style={{fontSize:11,opacity:.75,textTransform:"capitalize"}}>{role}</div></div>
        <button onClick={()=>setUser(null)} style={{padding:"6px 14px",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:13}}>Logout</button>
      </div>
    </div>
  );

  if(role==="teacher")return(
    <div style={{minHeight:"100vh"}}><Header/>
      <div style={{maxWidth:920,margin:"0 auto",padding:24}}>
        <PersonalTeacherView name={name} sched={sched} absentSets={absentSets} subsByDay={subsByDay} rooms1on1={rooms1on1} studentCourses={studentCourses} selDay={selDay} setSelDay={setSelDay} messages={messages} onOpenMessenger={info=>setMessengerOpen(info)} onChangePassword={changePassword} mealPlan={mealPlan} teacherMeta={teacherMeta} mealSkips={mealSkips} setMealSkips={setMealSkips}/>
        {messengerOpen&&(()=>{const other=messengerOpen.teacher===name?messengerOpen.student:messengerOpen.teacher;return<MessengerModal currentUser={name} otherUser={other} isAdmin={false} messages={messages} onSend={sendMessage} onMarkRead={markRead} onClose={()=>setMessengerOpen(null)}/>;})()}
      </div>
    </div>
  );


  if(role==="agency")return(
    <div style={{minHeight:"100vh"}}><Header/>
      <div style={{maxWidth:1200,margin:"0 auto",padding:24}}>
        <AgencyPage agencyId={name} isAdmin={false} agencyPipeline={agencyPipeline} setAgencyPipeline={setAgencyPipeline} kanbanCards={kanbanCards} pushSnap={pushSnap} agencies={agencies} setAgencies={setAgenciesRaw}/>
      </div>
    </div>
  );

  if(role==="student")return(
    <div style={{minHeight:"100vh"}}><Header/>
      <div style={{maxWidth:920,margin:"0 auto",padding:24}}>
        <PersonalStudentView name={name} sched={sched} absentSets={absentSets} subsByDay={subsByDay} rooms1on1={rooms1on1} groupRosters={groupRosters} selDay={selDay} setSelDay={setSelDay} messages={messages} onOpenMessenger={info=>setMessengerOpen(info)} kanbanCards={kanbanCards} onChangePassword={changePassword} mealPlan={mealPlan} mealSkips={mealSkips} setMealSkips={setMealSkips}/>
        {messengerOpen&&(()=>{
          /* Group chat room (Group / Activity / Kindergarten) */
          if(messengerOpen.isGroup){
            return<MessengerModal
              currentUser={name}
              isGroup={true}
              groupKey={messengerOpen.groupKey}
              groupLabel={messengerOpen.groupLabel}
              groupMembers={messengerOpen.groupMembers}
              isAdmin={false}
              messages={messages}
              onSend={sendMessage}
              onMarkRead={markRead}
              onClose={()=>setMessengerOpen(null)}
            />;
          }
          if(messengerOpen.isGuardian){
            /* Guardian viewing child's conversation — read-only */
            return<MessengerModal
              currentUser={messengerOpen.teacher}
              otherUser={messengerOpen.student}
              isAdmin={true}
              convOverride={convKey(messengerOpen.teacher,messengerOpen.student)}
              messages={messages}
              onSend={sendMessage}
              onClose={()=>setMessengerOpen(null)}
            />;
          }
          /* Normal student own 1:1 conversation
             Use messengerOpen.student (= resolvedName from sched) as currentUser so that
             convKey matches what the teacher sees (e.g. "KIM DAM" not "DAM KIM") */
          const schedStudentName=messengerOpen.student||name;
          return<MessengerModal currentUser={schedStudentName} otherUser={messengerOpen.teacher} isAdmin={false} messages={messages} onSend={sendMessage} onMarkRead={markRead} onClose={()=>setMessengerOpen(null)}/>;
        })()}
      </div>
    </div>
  );

  // ── ADMIN
  /* For archive view: absent/sub come from the archived snapshot (converted back from array to Set) */
  const archiveAbsentRaw=isArchiveView?(archives[viewMode]?.absentSets?.[selDay]||[]):null;
  const absentSet=isArchiveView
    ?new Set(archiveAbsentRaw)
    :(absentSets[selDay]||new Set());
  const daySubs=isArchiveView
    ?(archives[viewMode]?.subsByDay?.[selDay]||{})
    :(subsByDay[selDay]||{});
  const subCount=Object.values(daySubs).reduce((s,ps)=>s+Object.keys(ps).length,0);
  function toggleAbsent(t){if(isArchiveView)return;setAbsentSets(prev=>{const n={...prev};const s=new Set(n[selDay]||[]);s.has(t)?s.delete(t):s.add(t);n[selDay]=s;return n;});}
  function setDaySubs(fn){if(isArchiveView)return;setSubsByDay(prev=>{const n={...prev};n[selDay]=fn(n[selDay]||{});return n;});}

  const PAGES=[
    {id:"management",icon:"📋",label:"Student Management"},
    {id:"studentlist",icon:"📃",label:"Current Student List"},
    {id:"schedule",icon:"📅",label:"Current Student Schedule"},
    {id:"teachers",icon:"👩‍🏫",label:"Teachers"},
    {id:"dormitory",icon:"🏨",label:"Dormitory"},
    {id:"meal",icon:"🍽️",label:"Meal Plan"},
    {id:"agency",icon:"🏢",label:"Agency Pipeline"},
    {id:"datatools",icon:"💾",label:"Data Tools"},
  ];
  const isSchedTab=schedTab==="teacher"||schedTab==="student";

  return(
    <div style={{minHeight:"100vh"}}>
      <Header/>
      {teacherPopup&&<TeacherPopupModal teacher={teacherPopup} sched={displaySched} rooms1on1={displayRooms1on1} studentCourses={studentCourses} subsByDay={subsByDay} absentSet={absentSet} selDay={selDay} pushSnap={activePushSnap} onClose={()=>setTeacherPopup(null)} mealPlan={mealPlan}/>}
      {studentDailyPopup&&<StudentDailyPopup student={studentDailyPopup} sched={displaySched} absentSet={absentSet} daySubs={daySubs} rooms1on1={displayRooms1on1} groupRosters={displayGroupRosters} selDay={selDay} pushSnap={activePushSnap} onClose={()=>setStudentDailyPopup(null)} studentData={mergedStudentData} kanbanCards={kanbanCards} mealPlan={mealPlan} mealSkips={mealSkips} setMealSkips={setMealSkips}/>}
      {messengerOpen&&messengerOpen.isAdmin&&<MessengerModal currentUser={messengerOpen.teacher} otherUser={messengerOpen.student} isAdmin={true} convOverride={convKey(messengerOpen.teacher,messengerOpen.student)} messages={messages} onSend={sendMessage} onClose={()=>setMessengerOpen(null)}/>}
      <div style={{padding:"18px 20px"}}>
        {/* Page nav — sticky below header */}
        <div className="page-nav">
          {PAGES.map(p=><button key={p.id} className={`pnb${page===p.id?" act":""}`} onClick={()=>setPage(p.id)}>{p.icon} {p.label}</button>)}
        </div>

        <div style={{paddingTop:16}}>
        {page==="management"&&<StudentManagementPage kanbanCards={kanbanCards} pushSnap={pushSnap} agencyPipeline={agencyPipeline} agencies={agencies}/>}
        {page==="studentlist"&&<CurrentStudentListPage kanbanCards={kanbanCards}/>}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={err:null,info:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error("React render error:",err,info);this.setState({info});}
  render(){
    if(this.state.err){
      return(
        <div style={{padding:32,fontFamily:"monospace",background:"#fef2f2",minHeight:"100vh"}}>
          <div style={{maxWidth:700,margin:"0 auto",background:"white",borderRadius:12,padding:24,boxShadow:"0 4px 24px rgba(0,0,0,.1)",border:"2px solid #dc2626"}}>
            <h2 style={{color:"#dc2626",marginBottom:12,fontSize:18}}>⚠️ Runtime Error</h2>
            <pre style={{background:"#f8fafc",padding:12,borderRadius:6,fontSize:12,overflow:"auto",maxHeight:300,color:"#1e293b",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
              {String(this.state.err)}
              {this.state.info?.componentStack}
            </pre>
            <button onClick={()=>this.setState({err:null,info:null})} style={{marginTop:12,padding:"8px 18px",background:"#dc2626",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontWeight:700}}>Retry</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

(async function(){await loadFromSupabase();ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);})();
