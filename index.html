  }
  function removeMember(i){if((draft.members||[]).length<=1)return;upd({members:(draft.members||[]).filter((_,j)=>j!==i)});}

  const steps=getSteps(draft);
  const TEAL="#0d9488";const TEAL_BG="#f0fdfa";const TEAL_BORDER="#99f6e4";const TEAL_MID="#5eead4";
  const B={padding:"8px 16px",borderRadius:8,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all .15s"};
  const INP={width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12.5,outline:"none",boxSizing:"border-box",background:"white",color:"#1e293b",fontFamily:"inherit"};

  async function handlePassport(i,file){
    if(!file)return;
    if(file.size>5*1024*1024)return alert("File too large (max 5MB)");
    try{
      const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
      const path="passports/pp_"+Date.now()+"_"+i+"."+ext;
      const{error:upErr}=await _sb.storage.from("hana-attachments").upload(path,file,{contentType:file.type});
      if(upErr)throw upErr;
      const{data:{publicUrl}}=_sb.storage.from("hana-attachments").getPublicUrl(path);
      updMember(i,{...draft.members[i],passportPhoto:publicUrl});
    }catch(err){
      const r=new FileReader();
      r.onload=ev=>updMember(i,{...draft.members[i],passportPhoto:ev.target.result});
      r.readAsDataURL(file);
    }
  }

  async function handleFlightTicket(file){
    if(!file)return;
    if(file.size>5*1024*1024)return alert("File too large (max 5MB)");
    try{
      const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
      const path="tickets/ticket_"+Date.now()+"."+ext;
      const{error:upErr}=await _sb.storage.from("hana-attachments").upload(path,file,{contentType:file.type});
      if(upErr)throw upErr;
      const{data:{publicUrl}}=_sb.storage.from("hana-attachments").getPublicUrl(path);
      updFlight({flightTicket:publicUrl});
    }catch(err){
      const r=new FileReader();
      r.onload=ev=>updFlight({flightTicket:ev.target.result});
      r.readAsDataURL(file);
    }
  }

function AgencyPipeline({isAdmin,agencies,kanbanCards,onCreateCard,
  agencyPipeline,setAgencyPipeline,passwords,teacherMeta}){
  const agencyId=isAdmin?null:(agencies||[]).find(a=>a.id)?.id;
  const myEntries=(isAdmin?agencyPipeline:(agencyPipeline||[]).filter(e=>e.agencyId===agencyId))||[];
  const[selId,setSelId]=React.useState(null);
  const selEntry=(myEntries||[]).find(e=>e.id===selId)||null;

  function selectEntry(e){
    setSelId(e.id);
  }

  function save(updated){
    setAgencyPipeline(p=>{const n=p.map(x=>x.id===updated.id?updated:x);lsSaveAgencyPipe(n);return n;});
  }

  function del(id){
    if(!confirm("Delete this registration?"))return;
    setAgencyPipeline(p=>{const n=p.filter(x=>x.id!==id);lsSaveAgencyPipe(n);return n;});
    if(selId===id)setSelId(null);
  }

  function createCard(entry){
    if(!entry.members||entry.members.length===0)return alert("Add at least one member first.");
    const newCard={
      id:"card_"+Date.now(),
      type:entry.cardType||"Individual",
      status:"current",
      members:(entry.members||[]).map(m=>({
        name:m.name||"",nationality:m.nationality||"",
        birthYear:m.birthYear||"",birthMonth:m.birthMonth||"",birthDay:m.birthDay||"",
        course:m.course||"",roomType:m.roomType||"",
        studyStart:m.studyStart||entry.studyStart||"",
        studyEnd:m.studyEnd||entry.studyEnd||"",
        roomNumber:m.roomNumber||"",passportPhoto:m.passportPhoto||null,
        specialRequests:m.specialRequests||"",
      })),
      studyStart:entry.studyStart||"",studyEnd:entry.studyEnd||"",
      agencyId:entry.agencyId||"",_fromPipeline:entry.id,
    };
    if(onCreateCard)onCreateCard(newCard);
    const updated={...entry,kanbanCardId:newCard.id};
    save(updated);
    alert("Student card created successfully!");
  }

  const agInitials=(isAdmin?"HQ":agencyId||"AG").replace(/\(.*\)/,"").trim().slice(0,2).toUpperCase();
  const agLabel=isAdmin?"Agency Management":agencyId;

    <div>

            const newEntry={
              id:"pipe_"+Date.now(),agencyId:agencyId||"",cardType:"Individual",

                course:"",roomType:"",studyStart:"",studyEnd:"",passportPhoto:null,specialRequests:""}],
              consultant:"",studyStart:"",studyEnd:"",
              flightInfo:{pickupRequired:true,flightNumber:"",airport:"Clark",arrivalDate:"",arrivalTime:""},
              acceptanceLetter:null,pickupLetter:null,kanbanCardId:null,
              createdAt:new Date().toISOString(),
            };
            setAgencyPipeline(p=>{const n=[...p,newEntry];lsSaveAgencyPipe(n);return n;});
            setSelId(newEntry.id);
          }}
          style={{background:AG_GOLD,color:AG_NAVY,border:"none",borderRadius:9,padding:"9px 18px",fontWeight:800,fontSize:13,cursor:"pointer"}}>
          ＋ New Registration
        </button>
      </div>
      <div style={{display:"flex",minHeight:400,borderRadius:"0 0 12px 12px",border:"1px solid #e2e8f0",overflow:"hidden"}}>
        <div style={{width:220,minWidth:220,borderRight:"1px solid #e2e8f0",background:"#f8fafc",overflowY:"auto"}}>
          {myEntries.length===0?(
            <div style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:12}}>No registrations yet.<br/>Click ＋ New Registration to start.</div>
          ):(
            <div>
              {myEntries.map(e=>{

                    <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{primaryName}{count>1?` +${count-1}`:""}</div>

const HANA_LS_KEYS=[
  "hana_kanban_v1","hana_sched_v1","hana_week_meta","hana_draft_week","hana_archives",
  "hana_celldata_v1","hana_rooms1on1_v1","hana_grouprosters_v1","hana_absentsets_v1",
  "hana_subsbyday_v1","hana_messages_v1","hana_agencies_v1","hana_agency_pipe_v1",
  "hana_teacher_meta","hana_lunch_period",
];
function DataToolsPage(){
  const[importStatus,setImportStatus]=useState(null);
  const fileRef=React.useRef(null);

  function handleExport(){
    const data={_exported:new Date().toISOString(),_version:"1"};
    HANA_LS_KEYS.forEach(k=>{
      const v=localStorage.getItem(k);
      if(v!=null)data[k]=v;
    });
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="hana_data_"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        let count=0;
        HANA_LS_KEYS.forEach(k=>{
          if(data[k]!=null){localStorage.setItem(k,data[k]);count++;}
        });
        setImportStatus({ok:true,msg:"\u2705 "+count+" data keys imported. Reloading..."});
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){
        setImportStatus({ok:false,msg:"\u274c Invalid file: "+err.message});
      }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  const cardStyle={background:"white",border:"1.5px solid #e2e8f0",borderRadius:12,padding:20,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,.06)"};
  const btnPrimary={display:"inline-flex",alignItems:"center",gap:8,padding:"10px 20px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,fontWeight:700};

  return(
    <div style={{maxWidth:640,margin:"0 auto"}}>
      <h2 style={{fontSize:18,fontWeight:800,color:"#1e3a8a",marginBottom:4}}>\ud83d\udcbe Data Tools</h2>
      <p style={{fontSize:13,color:"#6b7280",marginBottom:20}}>Export all app data for backup or sharing with another person for testing. The recipient opens the HTML file and imports the JSON.</p>

      {/* Export */}
      <div style={cardStyle}>
        <div style={{fontSize:15,fontWeight:800,color:"#1e3a8a",marginBottom:6}}>\ud83d\udce4 Export Data</div>
        <p style={{fontSize:13,color:"#475569",marginBottom:14}}>Download all student records, schedules, dormitory assignments, agency pipeline, and settings as a single JSON file. Send this file alongside <code>schedule.html</code> to share the full app state.</p>
        <button onClick={handleExport} style={{...btnPrimary,background:"#1e3a8a",color:"white"}}>\u2b07 Download hana_data.json</button>
      </div>

      {/* Import */}
      <div style={cardStyle}>
        <div style={{fontSize:15,fontWeight:800,color:"#0f766e",marginBottom:6}}>\ud83d\udce5 Import Data</div>
        <p style={{fontSize:13,color:"#475569",marginBottom:14}}>Restore data from a previously exported JSON file. <strong>This will overwrite current data</strong> and reload the page.</p>
        <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current?.click()} style={{...btnPrimary,background:"#0f766e",color:"white"}}>\u2b06 Select JSON file to import</button>
        {importStatus&&(
          <div style={{marginTop:12,padding:"8px 14px",borderRadius:8,background:importStatus.ok?"#dcfce7":"#fee2e2",color:importStatus.ok?"#166534":"#991b1b",fontSize:13,fontWeight:600}}>
            {importStatus.msg}
          </div>
        )}
      </div>

      {/* Instructions */}
      <div style={{...cardStyle,background:"#fffbeb",border:"1.5px solid #fde68a"}}>
        <div style={{fontSize:14,fontWeight:800,color:"#92400e",marginBottom:8}}>\ud83d\udce7 How to share for testing</div>
        <ol style={{margin:0,paddingLeft:20,fontSize:13,color:"#78350f",lineHeight:1.8}}>
          <li>Click <strong>"Download hana_data.json"</strong> above</li>
          <li>Email both <code>schedule.html</code> and <code>hana_data.json</code> to the tester</li>
        </ol>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   AgencyPage — wrapper around AgencyPipeline with onCreateCard + refresh polling
═════════════════════════════════════════════════════ */
function AgencyPage({agencyId,isAdmin,agencyPipeline,setAgencyPipeline,kanbanCards,pushSnap,agencies,setAgencies}){
  /* Wire up the REFRESH button defined inside AgencyPipeline */
  React.useEffect(()=>{
    window._agencyRefresh=async function(){
      try{
        const{data,error}=await _sb.from('app_data').select('data').eq('id','hana_main').single();
        if(!error&&data&&data.data){
          HANA_SYNC_KEYS.forEach(k=>{if(data.data[k]!=null)localStorage.setItem(k,data.data[k]);});
        }
      }catch(e){console.error("Agency refresh failed:",e);}
      window.location.reload();
    };
    return()=>{window._agencyRefresh=null;};
  },[]);

  /* onCreateCard: push the new card into the hist-based kanbanCards */
  function onCreateCard(newCard){
    pushSnap({kanbanCards:[...(kanbanCards||[]),newCard]});
  }

  return(
    <AgencyPipeline
      isAdmin={isAdmin}
      agencies={agencies}
      kanbanCards={kanbanCards}
      onCreateCard={onCreateCard}
      agencyPipeline={agencyPipeline}
      setAgencyPipeline={setAgencyPipeline}
    />
  );
}

  const ghostCards=React.useMemo(()=>{
    const ghosts=[];
    (agencyPipeline||[]).forEach(entry=>{
      if(!entry.kanbanCardId){
        (entry.members||[])
          .filter(m=>(m.roomNumber||(m.roomType||"").startsWith("Hevea Hotel")||(m.roomType||"").startsWith("Clover Hotel"))
            &&(m.studyStart||entry.studyStart)&&(m.studyEnd||entry.studyEnd))
          .forEach((m,mi)=>{
            ghosts.push({id:"ghost_"+entry.id+"_m"+mi,type:entry.cardType||"Individual",status:"current",
              members:[{name:m.name||"(Pending)",nationality:m.nationality||"",
                studyStart:m.studyStart||entry.studyStart,studyEnd:m.studyEnd||entry.studyEnd,
                roomNumber:m.roomNumber,roomType:m.roomType||"",roomHistory:[]}],
              _isGhost:true});
          });
      }
    });
    return ghosts;
  },[agencyPipeline]);

  const allCards=React.useMemo(()=>[...(kanbanCards||[]),...(ghostCards||[])],[kanbanCards,ghostCards]);
  const ghostCardIds=React.useMemo(()=>new Set((ghostCards||[]).map(g=>g.id)),[ghostCards]);

  /* Current occupancy: roomNumber (string) → [{name, nationality, studyEnd, isGhost}] */
  const occupancyMap=React.useMemo(()=>{
    const map={};
    const today=new Date();today.setHours(0,0,0,0);
    const toDate=s=>s?new Date(s+"T00:00:00"):null;
    const ACTIVE=["registered","current","incoming","leaving"];
    allCards.filter(c=>ACTIVE.includes(c.status)).forEach(card=>{
      (card.members||[]).forEach(m=>{
        const segs=getEffectiveRoomSegments(m);
        segs.forEach(seg=>{
          if(!seg.roomNumber)return;
          const from=toDate(seg.from),to=toDate(seg.to);
          if(!from||!to||from>today||today>to)return;
          const rn=String(seg.roomNumber);
          if(!map[rn])map[rn]=[];
          map[rn].push({name:m.name||"?",nationality:m.nationality||"",studyEnd:seg.to,cardId:card.id,isGhost:!!card._isGhost});
        });
      });
    });
    return map;
  },[allCards]);

  /* Summary stats */
  const totalRooms=DORM_SECTIONS.reduce((s,{rooms})=>s+rooms.length,0);
  const occupiedRooms=Object.keys(occupancyMap).length;
  const totalOccupants=Object.values(occupancyMap).reduce((s,arr)=>s+arr.length,0);

  return(
    <div>
      <div className="pg-wrap">
        <span className="pg-badge" style={{background:"#e0e7ff",color:"#4338ca"}}>DORMITORY</span>
        <h2 className="pg-title">🏨 Dormitory Overview</h2>
        <p className="pg-sub">Click any room to view the full occupancy timeline.</p>
        <div style={{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}}>
          {[["Total Rooms",totalRooms,"#eff6ff","#1d4ed8"],["Occupied",occupiedRooms,"#f0fdf4","#15803d"],["Vacant",totalRooms-occupiedRooms,"#faf5ff","#7c3aed"],["Current Students",totalOccupants,"#fff7ed","#c2410c"]].map(([label,val,bg,color])=>(
            <div key={label} style={{background:bg,border:`1.5px solid ${color}22`,borderRadius:10,padding:"10px 18px",minWidth:100}}>
              <div style={{fontSize:22,fontWeight:800,color}}>{val}</div>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      {DORM_SECTIONS.map(({section,rooms})=>(
        <div key={section} style={{marginBottom:24}}>
          <div style={{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:10,paddingBottom:5,borderBottom:"2px solid #e2e8f0"}}>
            {section}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {rooms.map(roomNum=>{
              const isVirtual=!!HOTEL_VIRTUAL_ROOMS[roomNum];
              const label=HOTEL_VIRTUAL_ROOMS[roomNum]||"Room "+roomNum;
              const isFam=FAMILY_ROOM_SET.has(roomNum);
              const occupants=occupancyMap[String(roomNum)]||[];
              const isEmpty=occupants.length===0;
              return(
                <div key={roomNum}
                  onClick={()=>{setTargetRoom(String(roomNum));setShowSheet(true);}}
                  style={{
                    width:isVirtual?210:148,minWidth:isVirtual?210:148,
                    border:`2px solid ${isEmpty?"#e2e8f0":isFam?"#6ee7b7":isVirtual?"#86efac":"#93c5fd"}`,
                    borderRadius:10,padding:"10px 12px",cursor:"pointer",
                    background:isEmpty?"#f8fafc":isFam?"#f0fdf4":isVirtual?"#f0fdf4":"#eff6ff",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.14)"}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}
                >
                  <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
                    <span style={{fontSize:11,fontWeight:800,color:"#1e3a8a"}}>{label}</span>
                    {isFam&&<span style={{fontSize:9,background:"#d1fae5",color:"#065f46",padding:"1px 5px",borderRadius:8,fontWeight:700}}>FAM</span>}
                    {isVirtual&&<span style={{fontSize:9,background:"#dcfce7",color:"#15803d",padding:"1px 5px",borderRadius:8,fontWeight:700}}>HOTEL</span>}
                  </div>
                  {isEmpty?(
                    <div style={{fontSize:10,color:"#9ca3af",fontStyle:"italic"}}>Vacant</div>
                  ):(
                    occupants.map((o,i)=>(
                      <div key={i} style={{fontSize:10,color:o.isGhost?"#9ca3af":"#0f172a",fontWeight:o.isGhost?400:600,display:"flex",alignItems:"center",gap:3,marginBottom:1}}>
                        {o.isGhost&&<span title="Pending pipeline">⏳</span>}
                        <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.name}</span>
                        {o.nationality&&<span style={{fontSize:9,color:"#94a3b8",flexShrink:0}}>({NAT_CODE[o.nationality]||o.nationality.slice(0,2).toUpperCase()})</span>}
                      </div>
                    ))
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {showSheet&&targetRoom&&(
        <DormitorySheetModal
          kanbanCards={allCards}
          targetRoom={targetRoom}
          onClose={()=>setShowSheet(false)}
          ghostCardIds={ghostCardIds}
        />
      )}
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   MealPage — weekly meal plan editor (v2 system)
═════════════════════════════════════════════════════ */
function MealPage({mealPlan,setMealPlan,mealDraft,setMealDraft,mealArchives,setMealArchives,kanbanCards,teacherMeta,mealSkips}){
  const[current,setCurrent_]=React.useState(lsGetMeal2Current);
  const[draft,setDraft_]=React.useState(lsGetMeal2Draft);
  const[archives,setArchives_]=React.useState(lsGetMeal2Archives);
  const[customDb,setCustomDb]=React.useState(lsGetFoodDbCustom);
  const[viewMode,setViewMode]=React.useState("current");
  const[editCell,setEditCell]=React.useState(null);
  const[inputVal,setInputVal]=React.useState("");
  const[suggestions,setSuggestions]=React.useState([]);
  const inputRef=React.useRef(null);

  const isArchive=typeof viewMode==="number";
  const isDraft=viewMode==="draft";
  const displayData=isArchive?archives[viewMode]:isDraft?draft:current;
  const weekPlan=displayData?.plan||{};

  function saveCurrent(v){setCurrent_(v);lsSaveMeal2Current(v);}
  function saveDraft(v){setDraft_(v);lsSaveMeal2Draft(v);}
  function saveArchives(v){setArchives_(v);lsSaveMeal2Archives(v);}

  function getVal(day,path){
    const parts=path.split(".");
    let v=weekPlan[day]||emptyMealDay();
    for(const p of parts)v=v?.[p];
    return v||"";
  }
  function setVal(day,path,val){
    if(isArchive)return;
    function setDeep(obj,keys,v){
      if(!keys.length)return v;
      const[k,...rest]=keys;
      return{...(obj||{}),[k]:setDeep(obj?.[k],rest,v)};
    }
    const newPlan={...weekPlan,[day]:{...emptyMealDay(),...(weekPlan[day]||{})}};
    newPlan[day]=setDeep(newPlan[day],path.split("."),val);
    const newData={...(displayData||emptyWeekMeal("2026-05-25")),plan:newPlan};
    if(isDraft)saveDraft(newData);
    else saveCurrent(newData);
  }

  function startEdit(rowId,day){
    const row=MEAL_ROWS.find(r=>r.id===rowId);
    if(!row)return;
    const cur=getVal(day,row.path);
    setEditCell({rowId,day,path:row.path});
    setInputVal(cur);
    setSuggestions(getMealRowOptions(row,customDb));
    setTimeout(()=>inputRef.current?.focus(),30);
  }
  function commitEdit(val){
    if(!editCell)return;
    setVal(editCell.day,editCell.path,val!==undefined?val:inputVal.trim());
    setEditCell(null);setSuggestions([]);
  }
  function addToCustomDb(){
    const val=inputVal.trim();
    if(!val||!editCell)return;
    const row=MEAL_ROWS.find(r=>r.id===editCell.rowId);
    if(!row)return;
    setCustomDb(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(row.dbCat==="nightSnack"){
        if(!next.nightSnack)next.nightSnack=[];
        if(!next.nightSnack.includes(val))next.nightSnack.push(val);
      }else{
        if(!next[row.dbCat])next[row.dbCat]={};
        if(!next[row.dbCat][row.dbField])next[row.dbCat][row.dbField]=[];
        if(!next[row.dbCat][row.dbField].includes(val))next[row.dbCat][row.dbField].push(val);
      }
      lsSaveFoodDbCustom(next);
      return next;
    });
    setSuggestions(prev=>[...prev,val].filter((x,i,a)=>a.indexOf(x)===i));
  }

  function doCreateDraft(){
    if(draft&&!window.confirm("Overwrite existing draft?"))return;
    const nextStart=addDaysISO(current?.weekStart||"2026-05-25",7);
    saveDraft({...emptyWeekMeal(nextStart),status:"draft"});
    setViewMode("draft");
  }
  function doArchive(){
    if(!window.confirm("Archive this week's meal plan?"))return;
    const toArc={...current,archivedAt:new Date().toISOString(),label:weekRangeLabel(current?.weekStart||"")};
    const newArcs=[...archives,toArc];
    saveArchives(newArcs);
    if(draft){saveCurrent({...draft,status:"active"});saveDraft(null);}
    else saveCurrent(emptyWeekMeal(addDaysISO(current?.weekStart||"2026-05-25",7)));
    setViewMode("current");
  }

  /* Group MEAL_ROWS by group label */
  const rowGroups=React.useMemo(()=>{
    const groups=[];
    const seen=new Set();
    MEAL_ROWS.forEach(row=>{
      if(!seen.has(row.group)){seen.add(row.group);groups.push({group:row.group,gLabel:row.gLabel,rows:[]});}
      groups.find(g=>g.group===row.group).rows.push(row);
    });
    return groups;
  },[]);

  /* ── Meal headcount per day ──────────────────────────────────────
     Formula: current+leaving+incoming students (non-commuters)
              + teachers with that meal enabled
              − anyone who pressed Skip for that day/slot            */
  const mealCounts=React.useMemo(()=>{
    const studentNames=new Set(
      (kanbanCards||[]).filter(c=>["current","leaving","incoming"].includes(c.status))
        .flatMap(c=>(c.members||[]).filter(m=>m.name&&m.roomType!=="Commuter").map(m=>m.name))
    );
    const tmList=Object.entries(teacherMeta||{}).map(([n,m])=>({name:n,bf:!!(m?.meals?.breakfast),lu:!!(m?.meals?.lunch),di:!!(m?.meals?.dinner)}));
    const res={};
    MEAL_DAYS.forEach(mKey=>{
      const skipDay=mealSkips?.[mKey]||{};
      const skipBf=Object.values(skipDay).filter(v=>v?.breakfast===true).length;
      const skipLu=Object.values(skipDay).filter(v=>v?.lunch===true).length;
      const skipDi=Object.values(skipDay).filter(v=>v?.dinner===true).length;
      res[mKey]={
        breakfast:Math.max(0,studentNames.size+tmList.filter(t=>t.bf).length-skipBf),
        lunch:Math.max(0,studentNames.size+tmList.filter(t=>t.lu).length-skipLu),
        dinner:Math.max(0,studentNames.size+tmList.filter(t=>t.di).length-skipDi),
      };
    });
    return res;
  },[kanbanCards,teacherMeta,mealSkips]);

  const WKND=new Set(["Sat","Sun"]);
  const filteredSug=React.useMemo(()=>
    editCell?suggestions.filter(s=>s.toLowerCase().includes(inputVal.toLowerCase())&&s!==inputVal).slice(0,8):[]
  ,[suggestions,inputVal,editCell]);

  const thStyle={padding:"8px 6px",fontWeight:700,fontSize:11,textAlign:"center",whiteSpace:"nowrap"};
  const dayBg=d=>WKND.has(d)?"#0f172a":"#1e3a8a";

  return(
    <div>
      {/* Header */}
      <div className="pg-wrap" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <span className="pg-badge" style={{background:"#fef9c3",color:"#713f12"}}>MEAL PLAN</span>
          <h2 className="pg-title">🍽️ Weekly Meal Plan</h2>
          <p className="pg-sub">
            {current?.weekStart?weekRangeLabel(current.weekStart):""}
            {isDraft&&draft?.weekStart?" · Draft: "+weekRangeLabel(draft.weekStart):""}
            {isArchive&&archives[viewMode]?.label?" · "+archives[viewMode].label:""}
          </p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {!isDraft&&!isArchive&&(
            <button onClick={doCreateDraft} style={{padding:"7px 14px",background:"#7c3aed",color:"white",border:"none",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>📝 Create Draft</button>
          )}
          {!isArchive&&(
            <button onClick={doArchive} style={{padding:"7px 14px",background:"#0d9488",color:"white",border:"none",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>📦 Archive Week</button>
          )}
          <select value={viewMode} onChange={e=>{const v=e.target.value;setViewMode(v==="current"||v==="draft"?v:Number(v));}}
            style={{padding:"6px 10px",borderRadius:7,border:"1.5px solid #e2e8f0",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            <option value="current">📋 Current</option>
            {draft&&<option value="draft">📝 Draft</option>}
            {[...archives].reverse().map((a,i)=>(
              <option key={i} value={archives.length-1-i}>📦 {a.label||weekRangeLabel(a.weekStart||"")}</option>
            ))}
          </select>
        </div>
      </div>

      {isArchive&&(
        <div style={{marginBottom:10,padding:"8px 14px",background:"#f3f4f6",borderRadius:8,fontSize:12,color:"#6b7280",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>📦 Viewing archived: {archives[viewMode]?.label||""}</span>
          <button onClick={()=>setViewMode("current")} style={{background:"none",border:"none",color:"#2563eb",cursor:"pointer",fontWeight:700,fontSize:12}}>← Current</button>
        </div>
      )}

      {/* Grid */}
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e2e8f0",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
        <table style={{borderCollapse:"collapse",minWidth:"100%",fontSize:11}}>
          <thead>
            <tr>
              <th style={{...thStyle,width:110,minWidth:110,textAlign:"left",padding:"8px 10px",background:"#1e3a8a",color:"white",position:"sticky",left:0,zIndex:5}}>Row</th>
              {MEAL_DAYS.map(d=>(
                <th key={d} style={{...thStyle,minWidth:120,background:dayBg(d),color:"white"}}>
                  {d}
                  {WKND.has(d)&&<div style={{fontSize:9,opacity:.7,fontWeight:400}}>JC Style</div>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rowGroups.map((grp,gi)=>(
              <React.Fragment key={grp.group}>
                {grp.gLabel&&(
                  <tr>
                    <td style={{padding:"6px 10px",fontWeight:800,fontSize:11,color:"#1e3a8a",background:"#eff6ff",borderTop:"2px solid #bfdbfe",letterSpacing:.5,position:"sticky",left:0,zIndex:3,whiteSpace:"nowrap"}}>
                      {grp.gLabel}
                    </td>
                    {MEAL_DAYS.map(d=>{
                      const slot={breakfast:"breakfast",lunch:"lunch",dinner:"dinner",snack:"dinner",brunch:"breakfast"}[grp.group]||null;
                      const cnt=slot?mealCounts?.[d]?.[slot]:null;
                      const isWkd=WKND.has(d);
                      return(
                        <td key={d} style={{background:"#eff6ff",borderTop:"2px solid #bfdbfe",textAlign:"center",padding:"3px 2px",minWidth:120}}>
                          {cnt!=null?(
                            <span style={{fontSize:9,fontWeight:700,color:isWkd?"#92400e":"#1e40af",background:isWkd?"#fef9c3":"#dbeafe",padding:"2px 7px",borderRadius:9,whiteSpace:"nowrap"}}>
                              👥 {cnt}
                            </span>
                          ):null}
                        </td>
                      );
                    })}
                  </tr>
                )}
                {grp.rows.map((row,ri)=>(
                  <tr key={row.id} style={{background:ri%2===0?"#fff":"#f8fafc"}}>
                    <td style={{padding:"6px 10px",fontWeight:600,color:"#374151",fontSize:11,position:"sticky",left:0,background:ri%2===0?"#fff":"#f8fafc",borderRight:"2px solid #e2e8f0",zIndex:2,whiteSpace:"nowrap"}}>
                      {row.label}
                    </td>
                    {MEAL_DAYS.map(d=>{
                      const isWknd=WKND.has(d);
                      const isDisabled=(isWknd&&row.disabledOnWknd)||(!isWknd&&row.wdDisabled);
                      const bg=isWknd?(row.wkndBg||"#fef9c3"):(row.wdBg||"white");
                      const color=isWknd?(row.wkndColor||"#92400e"):(row.wdColor||"#1e293b");
                      const val=getVal(d,row.path);
                      const isEditing=editCell?.rowId===row.id&&editCell?.day===d;
                      return(
                        <td key={d} style={{background:bg,padding:0,position:"relative",verticalAlign:"top"}}>
                          {isDisabled?(
                            <div style={{padding:"6px 8px",color:"#9ca3af",fontSize:10}}>—</div>
                          ):isEditing?(
                            <div style={{position:"relative"}}>
                              <div style={{display:"flex",alignItems:"stretch"}}>
                                <input ref={inputRef} value={inputVal}
                                  onChange={e=>setInputVal(e.target.value)}
                                  onBlur={()=>setTimeout(commitEdit,160)}
                                  onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();commitEdit();}if(e.key==="Escape"){setEditCell(null);setSuggestions([]);}}}
                                  style={{flex:1,minWidth:0,padding:"5px 8px",border:"2px solid #3b82f6",borderRight:"none",borderRadius:0,fontSize:11,outline:"none",background:"white",color:"#0f172a"}}/>
                                <button
                                  onMouseDown={e=>{e.preventDefault();addToCustomDb();}}
                                  title="Add to food database"
                                  style={{padding:"0 8px",background:"#3b82f6",color:"white",border:"2px solid #3b82f6",borderLeft:"none",cursor:"pointer",fontSize:15,fontWeight:800,flexShrink:0,lineHeight:1}}>+</button>
                              </div>
                              {filteredSug.length>0&&(
                                <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1px solid #bfdbfe",borderRadius:"0 0 8px 8px",boxShadow:"0 6px 16px rgba(0,0,0,.12)",zIndex:100,maxHeight:160,overflowY:"auto"}}>
                                  {filteredSug.map((s,i)=>(
                                    <div key={i}
                                      onMouseDown={()=>commitEdit(s)}
                                      style={{padding:"5px 10px",cursor:"pointer",fontSize:11,color:"#1e293b",borderBottom:"1px solid #f1f5f9"}}
                                      onMouseEnter={e=>e.currentTarget.style.background="#eff6ff"}
                                      onMouseLeave={e=>e.currentTarget.style.background="white"}>
                                      {s}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          ):(
                            <div
                              onClick={()=>!isArchive&&startEdit(row.id,d)}
                              style={{padding:"6px 8px",color:val?color:"#94a3b8",cursor:isArchive?"default":"text",minHeight:28,fontSize:11,fontWeight:val?500:400,lineHeight:1.4}}>
                              {val||(!isArchive&&<span style={{fontSize:9,opacity:.45}}>+</span>)}
                              {isWknd&&row.wkndNote&&<span style={{fontSize:8,color,opacity:.7,marginLeft:3}}>[{row.wkndNote}]</span>}
                            </div>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════════════════
   LocalStorage persistence
   ════════════════════════════════════════════════════════════════════ */
const LS_KEY="hana_kanban_v1";
const LS_PASSWORDS_KEY="hana_passwords_v1";
function lsLoadPasswords(){try{return JSON.parse(localStorage.getItem(LS_PASSWORDS_KEY)||"{}");}catch(e){return{};}}
function lsSavePasswords(obj){localStorage.setItem(LS_PASSWORDS_KEY,JSON.stringify(obj));}
function lsLoadKanban(){try{return JSON.parse(localStorage.getItem(LS_KEY)||"[]");}catch(e){return[];}}
function lsSaveKanban(arr){localStorage.setItem(LS_KEY,JSON.stringify(arr));}
const LS_PIPE_KEY="hana_agency_pipe_v1";
function lsLoadAgencyPipe(){try{return JSON.parse(localStorage.getItem(LS_PIPE_KEY)||"[]");}catch(e){return[];}}
const LS_TEACHER_META_KEY="hana_teacher_meta";
function lsLoadTeacherMeta(){try{return JSON.parse(localStorage.getItem(LS_TEACHER_META_KEY)||"{}");}catch(e){return{};}}
function lsSaveTeacherMeta(obj){localStorage.setItem(LS_TEACHER_META_KEY,JSON.stringify(obj));}

/* ══ Login Component ══ */
function Login({onLogin,kanbanCards,teacherMeta,passwords,agencies}){
  const[u,setU]=React.useState("");
  const[pw,setPw]=React.useState("");
  const[err,setErr]=React.useState("");
  const USERS=React.useMemo(()=>{
    const users=[];
    /* Admin */
    users.push({username:"admin",password:passwords["admin"]||"admin123",role:"admin",name:"Admin"});
    /* Teachers */
    (teacherMeta?Object.entries(teacherMeta):[]).forEach(([name,meta])=>{
      const uname=meta.username||(name.toLowerCase().replace(/[^a-z0-9]/g,"_"));
      users.push({username:uname,password:passwords[uname]||passwords[name]||"teacher123",role:"teacher",name,teacherId:name});
    });
    /* Students */
    (kanbanCards||[]).forEach(card=>{
      (card.members||[]).forEach(m=>{
        if(m.loginId)users.push({username:m.loginId,password:m.loginPassword||passwords[m.loginId]||"hana123",role:"student",name:m.name,cardId:card.id});
      });
    });
    /* Agencies */
    (agencies||[]).forEach(ag=>{
      if(ag.id)users.push({username:ag.id.toLowerCase().replace(/\s+/g,"_"),password:passwords[ag.id]||"agency123",role:"agency",name:ag.name||ag.id,agencyId:ag.id});
    });
    return users;
  },[kanbanCards,teacherMeta,passwords,agencies]);
  function submit(e){e.preventDefault();const f=USERS.find(x=>x.username===u.toLowerCase()&&x.password===pw);f?onLogin(f):setErr("Invalid username or password.");}
  return(
    <div className="lw">
      <div className="lc">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:44,marginBottom:6}}>🎓</div>
          <h1 style={{fontSize:24,fontWeight:800,color:"#1e3a8a"}}>Hana Academy</h1>
          <p style={{color:"#6b7280",fontSize:13,marginTop:4}}>Learning Management System</p>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}><label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5}}>Username</label><input className="li" value={u} onChange={e=>setU(e.target.value)} placeholder=""/></div>
          <div style={{marginBottom:14}}><label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5}}>Password</label><input className="li" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder=""/></div>
          {err&&<div style={{color:"#dc2626",fontSize:13,marginBottom:10}}>{err}</div>}
          <button type="submit" className="lb">Login</button>
        </form>

      </div>
    </div>
  );
}

function App(){
  /* ── Auth ── */
  const[user,setUser]=React.useState(null);

  /* ── Core scheduling state (hist-based undo/redo) ── */
  /* Fix 2: every lsGet call is individually guarded so a corrupt localStorage

  const[hist,setHist]=React.useState(()=>{
    try{

      return{
        hist:[{
          kanbanCards:(()=>{try{return lsLoadKanban()||[];}catch(e){return[];}})(),
          sched:(()=>{try{return lsGetSched()||{};}catch(e){return{};}})(),

          absentSets:(()=>{try{return lsGetAbsentSets()||{};}catch(e){return{};}})(),
          subsByDay:(()=>{try{return lsGetSubsByDay()||{};}catch(e){return{};}})(),
          cellData:(()=>{try{return lsGetCellData()||{};}catch(e){return{};}})(),

      };
    }catch(e){

      return{hist:[{kanbanCards:[],sched:{},weekStart:"2026-05-26",weekStatus:"active",rooms1on1:{},groupRosters:{},absentSets:{},subsByDay:{},cellData:{}}],hIdx:0};
    }
  });
  const{kanbanCards,sched,rooms1on1,groupRosters,absentSets,subsByDay,cellData,weekStart,weekStatus}=hist.hist[hist.hIdx];
  const hIdx=hist.hIdx;

  /* ── Non-undoable state ── */
  const[draftWeek,setDraftWeek]=React.useState(()=>{try{return lsGetDraft();}catch{return null;}});
  const[archives,setArchivesRaw]=React.useState(()=>{try{return lsGetArchives()||[];}catch{return[];}});
  const[passwords,setPasswords]=React.useState(()=>{try{return lsLoadPasswords();}catch{return{};}});
  const[agencies,setAgenciesRaw]=React.useState(()=>{try{return lsGetAgencies()||[];}catch{return[];}});
  const[agencyPipeline,setAgencyPipeline]=React.useState(()=>{try{return lsLoadAgencyPipe()||[];}catch{return[];}});
  const[teacherMeta,setTeacherMeta]=React.useState(()=>{try{return lsLoadTeacherMeta()||{};}catch{return{};}});
  const[viewMode,setViewMode]=React.useState("current");
  const[showArchiveMenu,setShowArchiveMenu]=React.useState(false);
  const[selDay,setSelDay]=React.useState(()=>{const d=new Date().getDay();return DAYS[Math.max(0,Math.min(d-1,4))]||"Monday";});
  const[dragSrc,setDragSrc]=React.useState(null);
  const[dropTarget,setDropTarget]=React.useState(null);
  const[lunchPeriod,setLunchPeriod_]=React.useState(()=>{try{return JSON.parse(localStorage.getItem("hana_lunch_period")||"null");}catch{return null;}});
  const[dormSheetRoom,setDormSheetRoom]=React.useState(null);
  const[showDormSheet,setShowDormSheet]=React.useState(false);
  const[page,setPage]=React.useState("schedule");
  const[showAddCard,setShowAddCard]=React.useState(false);
  const[editCard,setEditCard]=React.useState(null);
  const[selectedCardId,setSelectedCardId]=React.useState(null);
  const[activeTab,setActiveTab]=React.useState("board");
  const[schedTab,setSchedTab]=React.useState("teacher");
  const[messages,setMessages_]=React.useState(()=>{try{return lsGetMessages()||{};}catch{return{};}});
  const[notifications,setNotifications]=React.useState([]);
  const[showPwMgr,setShowPwMgr]=React.useState(false);
  const[syncStatus,setSyncStatus]=React.useState("idle");
  const[teacherPopup,setTeacherPopup]=React.useState(null);
  const[studentDailyPopup,setStudentDailyPopup]=React.useState(null);
  const[messengerOpen,setMessengerOpen]=React.useState(null);
  const[showAutoAssign,setShowAutoAssign]=React.useState(false);
  const[mealPlan,setMealPlan_]=React.useState(lsGetMealPlan);
  const[mealDraft,setMealDraft_]=React.useState(null);
  const[mealArchives,setMealArchives_]=React.useState(()=>[]);
  const[mealSkips,setMealSkips_]=React.useState(()=>{try{return JSON.parse(localStorage.getItem("hana_meal_skips_v1")||"{}");}catch{return{};}});
  const syncRef=React.useRef(null);

  /* ── Derived from viewMode ── */
  const isArchiveView=typeof viewMode==="number";
  const isDraftView=viewMode==="draft";

  /* ── Non-hist helper setters ── */
  function setArchives(fn){setArchivesRaw(prev=>{const next=typeof fn==="function"?fn(prev):fn;lsSaveArchives(next);return next;});}
  function setAgencies(fn){setAgenciesRaw(prev=>typeof fn==="function"?fn(prev):fn);}
  function setLunchPeriod(v){setLunchPeriod_(v);localStorage.setItem("hana_lunch_period",JSON.stringify(v));}
  function setMessages(v){setMessages_(v);lsSaveMessages(v);}
  function setMealPlan(v){setMealPlan_(v);lsSaveMealPlan(v);}
  function setMealDraft(v){setMealDraft_(v);}
  function setMealArchives(v){setMealArchives_(v);}
  function setMealSkips(fn){setMealSkips_(prev=>{const next=typeof fn==="function"?fn(prev):fn;localStorage.setItem("hana_meal_skips_v1",JSON.stringify(next));return next;});}
  function pushNotif(msg,type="info"){const id=Date.now();setNotifications(n=>[...n,{id,msg,type}]);setTimeout(()=>setNotifications(n=>n.filter(x=>x.id!==id)),4000);}

  /* ── Hist-based setters ── */
  function pushSnap(changes){
    setHist(({hist,hIdx})=>{
      const next={...hist[hIdx],...changes};
      const trimmed=hist.slice(0,hIdx+1);
      const newHist=[...trimmed,next].slice(-60);
      return{hist:newHist,hIdx:newHist.length-1};
    });
  }
  function setSched(fn){pushSnap({sched:typeof fn==="function"?fn(sched):fn});}
  function setRooms1on1(fn){pushSnap({rooms1on1:typeof fn==="function"?fn(rooms1on1):fn});}
  function setAbsentSets(fn){pushSnap({absentSets:typeof fn==="function"?fn(absentSets):fn});}
  function setSubsByDay(fn){pushSnap({subsByDay:typeof fn==="function"?fn(subsByDay):fn});}
  function setCellData(fn){pushSnap({cellData:typeof fn==="function"?fn(cellData):fn});}
  function setGroupRosters(fn){pushSnap({groupRosters:typeof fn==="function"?fn(groupRosters):fn});}
  function setWeekStart(s){pushSnap({weekStart:s});}
  function setWeekStatus(s){pushSnap({weekStatus:s});}

  /* ── Undo/redo ── */
  const canUndo=hIdx>0;
  const canRedo=hIdx<hist.hist.length-1;
  function undo(){setHist(h=>({...h,hIdx:Math.max(0,h.hIdx-1)}));}
  function redo(){setHist(h=>({...h,hIdx:Math.min(h.hist.length-1,h.hIdx+1)}));}

  /* ── Teacher meta effect ── */
  React.useEffect(()=>{
    lsSaveTeacherMeta(teacherMeta);
    const extras=Object.keys(teacherMeta).filter(t=>teacherMeta[t]?.isExtra&&!TEACHERS_BASE.includes(t));
    TEACHERS=[...TEACHERS_BASE,...extras];
    const maxCode=Math.max(0,...Object.values(TEACHER_CODE),...extras.map(t=>teacherMeta[t]?.code||0));
    extras.forEach(t=>{if(!TEACHER_CODE[t])TEACHER_CODE[t]=teacherMeta[t]?.code||maxCode+1;});
  },[teacherMeta]);

  /* ── Persistence effects ── */
  React.useEffect(()=>{lsSaveKanban(kanbanCards);},[kanbanCards]);
  React.useEffect(()=>{lsSaveSched(sched);},[sched]);
  React.useEffect(()=>{lsSaveCellData(cellData);},[cellData]);
  React.useEffect(()=>{lsSaveRooms1on1(rooms1on1);},[rooms1on1]);
  React.useEffect(()=>{lsSaveGroupRosters(groupRosters);},[groupRosters]);
  React.useEffect(()=>{lsSaveAbsentSets(absentSets);},[absentSets]);
  React.useEffect(()=>{lsSaveSubsByDay(subsByDay);},[subsByDay]);
  React.useEffect(()=>{lsSaveWeekMeta({weekStart,weekStatus});},[weekStart,weekStatus]);
  React.useEffect(()=>{lsSaveDraft(draftWeek);},[draftWeek]);

  /* ── Undo/redo keyboard ── */
  React.useEffect(()=>{
    function onKey(e){
      if((e.ctrlKey||e.metaKey)&&e.key==="z"&&!e.shiftKey){e.preventDefault();undo();}
      if((e.ctrlKey||e.metaKey)&&(e.key==="y"||(e.shiftKey&&e.key==="Z"))){e.preventDefault();redo();}
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[undo,redo]);

  /* ── Archive menu outside click ── */
  React.useEffect(()=>{
    if(!showArchiveMenu)return;
    function onDoc(e){if(!e.target.closest('[data-archive-menu="1"]'))setShowArchiveMenu(false);}
    document.addEventListener("mousedown",onDoc);
    return()=>document.removeEventListener("mousedown",onDoc);
  },[showArchiveMenu]);

  /* ── Archive core helper (MUST be before login gate — referenced by useEffect below) ── */
  function _doArchiveCore(silent){
    if(!silent&&!window.confirm("Archive "+weekRangeLabel(weekStart)+"?\nThis will permanently save it and cannot be undone."))return;
    const absentSetsPlain={};
    Object.entries(absentSets||{}).forEach(([day,s])=>{absentSetsPlain[day]=[...(s instanceof Set?s:[])];});
    const archived={weekStart,weekEnd:addDaysISO(weekStart,4),label:weekRangeLabel(weekStart),archivedAt:new Date().toISOString(),sched:JSON.parse(JSON.stringify(sched)),cellData:JSON.parse(JSON.stringify(cellData)),rooms1on1:JSON.parse(JSON.stringify(rooms1on1)),groupRosters:JSON.parse(JSON.stringify(groupRosters)),absentSets:absentSetsPlain,subsByDay:JSON.parse(JSON.stringify(subsByDay))};
    setArchives(prev=>[...prev,archived]);
    if(draftWeek){
      pushSnap({sched:JSON.parse(JSON.stringify(draftWeek.sched||{})),cellData:JSON.parse(JSON.stringify(draftWeek.cellData||{})),rooms1on1:JSON.parse(JSON.stringify(draftWeek.rooms1on1||{})),groupRosters:JSON.parse(JSON.stringify(draftWeek.groupRosters||{})),weekStart:draftWeek.weekStart,weekStatus:"active"});
      setDraftWeek(null);
    }else{
      pushSnap({sched:{},weekStart:addDaysISO(weekStart,7),weekStatus:"active"});
    }
    setViewMode("current");
  }
  /* ── Auto-archive on weekend if confirmed (MUST be before login gate — hooks order) ── */
  React.useEffect(()=>{
    if(!user)return;
    const dow=new Date().getDay();
    if((dow===6||dow===0)&&weekStatus==="confirmed"&&viewMode==="current")_doArchiveCore(true);
  },[user]);

  /* ── Computed student/teacher data (MUST be before login gate — hooks order) ── */
  const activeStudents=React.useMemo(()=>{
    const statuses=isDraftView?["current","incoming"]:["current","leaving","incoming"];
    const names=(kanbanCards||[]).filter(c=>statuses.includes(c.status)).flatMap(c=>(c.members||[]).map(m=>m.name).filter(Boolean));
    return[...new Set(names)];
  },[kanbanCards,isDraftView]);
  STUDENTS=activeStudents.length?activeStudents:STUDENTS_INITIAL;

  const studentCourses=React.useMemo(()=>{
    const map={};
    (kanbanCards||[]).forEach(card=>{
      (card.members||[]).forEach(m=>{if(m.name)map[m.name]={type:card.type||card.cardType||"Individual",groupName:card.name||""};});
    });
    return map;
  },[kanbanCards]);

  const mergedStudentData=React.useMemo(()=>{
    const map={};
    (kanbanCards||[]).forEach(card=>{
      (card.members||[]).forEach(m=>{
        if(m.name)map[m.name]={...m,cardId:card.id,cardType:card.type||card.cardType||"Individual",status:card.status,groupName:card.name||""};
      });
    });
    return map;
  },[kanbanCards]);

  const allCardsForDorm=React.useMemo(()=>{
    const ghosts=[];
    (agencyPipeline||[]).forEach(entry=>{
      if(!entry.kanbanCardId){
        (entry.members||[]).filter(m=>(m.roomNumber||m.roomType?.startsWith("Hevea Hotel")||m.roomType?.startsWith("Clover Hotel"))&&(m.studyStart||entry.studyStart)&&(m.studyEnd||entry.studyEnd))
          .forEach((m,mi)=>{ghosts.push({id:"ghost_"+entry.id+"_m"+mi,type:entry.cardType||"Individual",status:"current",
            members:[{name:m.name||"(Pending)",nationality:m.nationality||"",studyStart:m.studyStart||entry.studyStart,studyEnd:m.studyEnd||entry.studyEnd,roomNumber:m.roomNumber,roomType:m.roomType||"",roomHistory:[]}],_isGhost:true});});
      }
    });
    return[...(kanbanCards||[]),...ghosts];
  },[kanbanCards,agencyPipeline]);

  /* ── LOGIN GATE (all hooks must be above this) ── */
  if(!user)return<Login onLogin={setUser} kanbanCards={kanbanCards} teacherMeta={teacherMeta} passwords={passwords} agencies={agencies}/>;

  /* ── Post-login derived ── */
  const{role,name}=user;
  const noSave=()=>{};

  const canSaveSched=role==="admin"||role==="sched_editor";
  const safePush=role==="admin"?pushSnap:noSave;
  const roleColor={admin:"#0f172a",teacher:"#0d9488",student:"#065f46",agency:"#1a1f3c",viewer:"#4b5563",sched_editor:"#1d4ed8"}[role]||"#0f172a";

  /* ── Display data (archive/draft/current) ── */
  const displaySched=isArchiveView?(archives[viewMode]?.sched||{}):isDraftView?(draftWeek?.sched||{}):sched;
  const displayCellData=isArchiveView?(archives[viewMode]?.cellData||{}):isDraftView?(draftWeek?.cellData||{}):cellData;

  function pushDraftSnap(changes){

      if(k==="sched"||k==="cellData"||k==="rooms1on1"||k==="groupRosters")draftFields[k]=v;
      else mainFields[k]=v;

  }

  /* ── Active setters (draft-aware) ── */
  const activePushSnap=canSaveSched?(isDraftView?pushDraftSnap:pushSnap):noSave;
  const activeSetSched=isDraftView
    ?(fn=>setDraftWeek(prev=>{if(!prev)return prev;const s=typeof fn==="function"?fn(prev.sched):fn;return{...prev,sched:s};}))
    :setSched;

    if(isArchiveView)return;

      setDraftWeek(prev=>{if(!prev)return prev;const cur=prev.rooms1on1||rooms1on1;const next=typeof fn==="function"?fn(cur):fn;return{...prev,rooms1on1:next};});

  /* ── Workflow actions ── */

  function doCreateDraft(){
    if(weekStatus!=="confirmed"){alert("Please confirm this week's schedule first before creating a draft.");return;}
    if(draftWeek&&!window.confirm("A draft already exists. Overwrite it?"))return;
    const nextStart=addDaysISO(weekStart,7);
    const _sortKey=s=>s.toLowerCase().split(/\s+/).sort().join(" ");
    const removedNames=new Set((kanbanCards||[]).filter(c=>c.status==="leaving"||c.status==="graduated").flatMap(c=>(c.members||[]).map(m=>m.name).filter(Boolean)));
    const removedKeys=new Set([...removedNames].map(_sortKey));
    const _isRemoved=n=>removedNames.has(n)||removedKeys.has(_sortKey(n));
    const schedCopy=JSON.parse(JSON.stringify(sched));
    Object.keys(schedCopy).forEach(t=>{Object.keys(schedCopy[t]).forEach(p=>{const v=schedCopy[t][p];if(v&&_isRemoved(v))delete schedCopy[t][p];});});
    const rosterCopy=JSON.parse(JSON.stringify(groupRosters));
    Object.keys(rosterCopy).forEach(g=>{Object.keys(rosterCopy[g]).forEach(p=>{if(Array.isArray(rosterCopy[g][p]))rosterCopy[g][p]=rosterCopy[g][p].filter(s=>!_isRemoved(s));});});
    setDraftWeek({weekStart:nextStart,status:"draft",sched:schedCopy,cellData:JSON.parse(JSON.stringify(cellData)),rooms1on1:JSON.parse(JSON.stringify(rooms1on1)),groupRosters:rosterCopy});
    pushSnap({absentSets:{},subsByDay:{}});
    setViewMode("draft");
  }
  function doConfirmDraft(){if(!draftWeek)return;setDraftWeek(prev=>({...prev,status:"confirmed"}));}
  function doArchiveAndAdvance(){_doArchiveCore(false);}
  function doClearSched(){
    if(!window.confirm("Clear ALL assignments from this schedule?"))return;
    if(isDraftView)setDraftWeek(prev=>({...prev,sched:{}}));
    else pushSnap({sched:{}});
  }

  /* ── Messaging ── */
  function convKey(a,b){return[a,b].sort().join("||");}
  function sendMessage(conv,text,file){
    const key=typeof conv==="string"?conv:convKey(conv.a,conv.b);
    const msg={id:Date.now(),sender:name,text,file:file||null,ts:new Date().toISOString(),readBy:[name]};
    setMessages(prev=>{const n={...prev};n[key]=[...(n[key]||[]),msg];return n;});
  }
  function markRead(conv){
    const key=typeof conv==="string"?conv:convKey(conv.a,conv.b);

  }

    setPasswords(prev=>{const n={...prev,[targetName]:newPw};lsSavePasswords(n);return n;});
  }

  /* ── Week header labels ── */
  const headerWeekLabel=isArchiveView
    ?("📦 "+(archives[viewMode]?.label||""))
    :isDraftView
      ?("📝 Draft: "+weekRangeLabel(draftWeek?.weekStart||addDaysISO(weekStart,7)))
      :weekRangeLabel(weekStart);
  const headerStatusBadge=isArchiveView
    ?{label:"ARCHIVED",bg:"#6b7280"}
    :isDraftView
      ?{label:draftWeek?.status==="confirmed"?"CONFIRMED":"DRAFT",bg:draftWeek?.status==="confirmed"?"#0d9488":"#f59e0b"}
      :{label:weekStatus==="active"?"ACTIVE":"CONFIRMED",bg:weekStatus==="active"?"#16a34a":"#0d9488"};

  /* ── Header component ── */
  const Header=()=>(
    <div data-header="1" style={{background:roleColor,color:"white",padding:"11px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 10px rgba(0,0,0,.15)",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:24}}>🎓</span>
        <div>
          <div style={{fontSize:16,fontWeight:800}}>Hana Academy LMS</div>
          <div style={{fontSize:11,opacity:.9,display:"flex",alignItems:"center",gap:5,marginTop:1}}>
            <span>{headerWeekLabel}</span>
            <span style={{background:headerStatusBadge.bg,color:"white",fontSize:9,padding:"1px 6px",borderRadius:8,fontWeight:700,letterSpacing:.5}}>{headerStatusBadge.label}</span>
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {(role==="admin"||isViewerLike)&&(
          <>
            <div style={{position:"relative"}} data-archive-menu="1">
              <button onClick={()=>setShowArchiveMenu(v=>!v)}
                style={{padding:"5px 12px",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                {isArchiveView?"📦 Archive":isDraftView?"📝 Draft":"📋 This Week"} ▾
              </button>
              {showArchiveMenu&&(
                <div style={{position:"absolute",right:0,top:"110%",background:"white",border:"1px solid #e2e8f0",borderRadius:10,boxShadow:"0 6px 24px rgba(0,0,0,.18)",minWidth:240,zIndex:200,overflow:"hidden"}}>
                  <div style={{padding:"5px 10px",fontSize:9,fontWeight:800,color:"#6b7280",background:"#f8fafc",textTransform:"uppercase",letterSpacing:1}}>Current Week</div>
                  <button onClick={()=>{setViewMode("current");setShowArchiveMenu(false);}}
                    style={{width:"100%",textAlign:"left",padding:"8px 14px",border:"none",background:(!isArchiveView&&!isDraftView)?"#eff6ff":"white",fontSize:13,cursor:"pointer",fontWeight:(!isArchiveView&&!isDraftView)?700:400,color:(!isArchiveView&&!isDraftView)?"#1d4ed8":"#374151"}}>
                    {"📋 "+weekRangeLabel(weekStart)+" "+(weekStatus==="confirmed"?"✓":"")}
                  </button>
                  {draftWeek&&(
                    <>
                      <div style={{padding:"5px 10px",fontSize:9,fontWeight:800,color:"#6b7280",background:"#f8fafc",textTransform:"uppercase",letterSpacing:1}}>Draft</div>
                      <button onClick={()=>{setViewMode("draft");setShowArchiveMenu(false);}}
                        style={{width:"100%",textAlign:"left",padding:"8px 14px",border:"none",background:isDraftView?"#fff7ed":"white",fontSize:13,cursor:"pointer",fontWeight:isDraftView?700:400,color:isDraftView?"#92400e":"#374151"}}>
                        {"📝 "+weekRangeLabel(draftWeek.weekStart)+" "+(draftWeek.status==="confirmed"?"✓":"(draft)")}
                      </button>
                    </>
                  )}
                  {(archives||[]).length>0&&(
                    <>
                      <div style={{padding:"5px 10px",fontSize:9,fontWeight:800,color:"#6b7280",background:"#f8fafc",textTransform:"uppercase",letterSpacing:1}}>Archives</div>
                      <div style={{maxHeight:180,overflowY:"auto"}}>
                        {[...(archives||[])].reverse().map((a,i)=>{const realIdx=(archives||[]).length-1-i;return(
                          <button key={realIdx} onClick={()=>{setViewMode(realIdx);setShowArchiveMenu(false);}}
                            style={{width:"100%",textAlign:"left",padding:"8px 14px",border:"none",background:viewMode===realIdx?"#f0fdf4":"white",fontSize:12,cursor:"pointer",color:viewMode===realIdx?"#15803d":"#374151"}}>
                            {"📦 "+a.label}
                          </button>
                        );})}
                      </div>
                    </>
                  )}
                  {role==="admin"&&(
                    <div style={{borderTop:"1px solid #f1f5f9",padding:"8px 10px",display:"flex",gap:6,flexWrap:"wrap"}}>
                      {!isDraftView&&!draftWeek&&weekStatus==="confirmed"&&(()=>{
                        const isWed=new Date().getDay()===3;
                        return isWed
                          ?<button onClick={()=>{doCreateDraft();setShowArchiveMenu(false);}} style={{padding:"4px 10px",background:"#7c3aed",color:"white",border:"none",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>📝 Create Draft</button>
                          :<span style={{fontSize:10,color:"#9ca3af"}}>Draft available Wednesdays</span>;
                      })()}
                      {(()=>{
                        const dow=new Date().getDay();
                        const isFriPlus=dow>=5||dow===0;
                        return isFriPlus
                          ?<button onClick={()=>{doArchiveAndAdvance();setShowArchiveMenu(false);}} style={{padding:"4px 10px",background:"#0d9488",color:"white",border:"none",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>📦 Archive Week</button>
                          :<div title="Archive available from Friday" style={{padding:"4px 10px",background:"rgba(107,114,128,.3)",border:"1px solid rgba(255,255,255,.15)",borderRadius:5,color:"rgba(255,255,255,.45)",fontSize:11,fontWeight:700,cursor:"not-allowed",userSelect:"none"}}>{"📦 Archive Week"}<span style={{fontSize:9,marginLeft:4,opacity:.8}}>(Fri+)</span></div>;
                      })()}
                    </div>
                  )}
                </div>
              )}
            </div>
            {role==="admin"&&!isArchiveView&&(
              <>
                {!isDraftView&&weekStatus==="active"&&(
                  <button onClick={doConfirmWeek}
                    style={{padding:"5px 12px",background:"rgba(124,58,237,.85)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    🔒 Confirm Week
                  </button>
                )}
                {isDraftView&&draftWeek?.status!=="confirmed"&&(
                  <button onClick={doConfirmDraft}
                    style={{padding:"5px 12px",background:"rgba(13,148,136,.85)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    ✓ Confirm Draft
                  </button>
                )}
                {isDraftView&&draftWeek?.status==="confirmed"&&(
                  <button onClick={doArchiveAndAdvance}
                    style={{padding:"5px 12px",background:"rgba(16,185,129,.85)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    📦 Go Live
                  </button>
                )}
              </>
            )}
          </>
        )}
        <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700}}>{name}</div><div style={{fontSize:11,opacity:.75,textTransform:"capitalize"}}>{role}</div></div>
        <button onClick={()=>setUser(null)} style={{padding:"6px 14px",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,color:"white",cursor:"pointer",fontSize:13}}>Logout</button>
      </div>
    </div>
  );

  if(role==="teacher")return(
    <div style={{minHeight:"100vh"}}><Header/>
      <div style={{maxWidth:920,margin:"0 auto",padding:24}}>
        <PersonalTeacherView name={name} sched={sched} absentSets={absentSets} subsByDay={subsByDay} rooms1on1={rooms1on1} studentCourses={studentCourses} selDay={selDay} setSelDay={setSelDay} messages={messages} onOpenMessenger={info=>setMessengerOpen(info)} onChangePassword={changePassword} mealPlan={mealPlan} teacherMeta={teacherMeta} mealSkips={mealSkips} setMealSkips={setMealSkips}/>
        {messengerOpen&&(()=>{const other=messengerOpen.teacher===name?messengerOpen.student:messengerOpen.teacher;return<MessengerModal currentUser={name} otherUser={other} isAdmin={false} messages={messages} onSend={sendMessage} onMarkRead={markRead} onClose={()=>setMessengerOpen(null)}/>;})()}

    </div>
  );

  if(role==="agency")return(
    <div style={{minHeight:"100vh"}}><Header/>
      <div style={{maxWidth:1200,margin:"0 auto",padding:24}}>
        <AgencyPage agencyId={name} isAdmin={false} agencyPipeline={agencyPipeline} setAgencyPipeline={setAgencyPipeline} kanbanCards={kanbanCards} pushSnap={pushSnap} agencies={agencies} setAgencies={setAgenciesRaw}/>
      </div>
    </div>
  );

  if(role==="student")return(
    <div style={{minHeight:"100vh"}}><Header/>
      <div style={{maxWidth:920,margin:"0 auto",padding:24}}>
        <PersonalStudentView name={name} sched={sched} absentSets={absentSets} subsByDay={subsByDay} rooms1on1={rooms1on1} groupRosters={groupRosters} selDay={selDay} setSelDay={setSelDay} messages={messages} onOpenMessenger={info=>setMessengerOpen(info)} kanbanCards={kanbanCards} onChangePassword={changePassword} mealPlan={mealPlan} mealSkips={mealSkips} setMealSkips={setMealSkips}/>

          if(messengerOpen.isGuardian)return<MessengerModal currentUser={messengerOpen.teacher} otherUser={messengerOpen.student} isAdmin={true} messages={messages} onSend={sendMessage} onMarkRead={markRead} onClose={()=>setMessengerOpen(null)}/>;
          return<MessengerModal currentUser={name} otherUser={messengerOpen.teacher} isAdmin={false} messages={messages} onSend={sendMessage} onMarkRead={markRead} onClose={()=>setMessengerOpen(null)}/>;
        })()}
      </div>
    </div>
  );


  // ── ADMIN
  /* For archive view: absent/sub come from the archived snapshot (converted back from array to Set) */
  const archiveAbsentRaw=isArchiveView?(archives[viewMode]?.absentSets?.[selDay]||[]):null;
  const absentSet=isArchiveView
    ?new Set(archiveAbsentRaw)
    :(absentSets[selDay]||new Set());
  const daySubs=isArchiveView
    ?(archives[viewMode]?.subsByDay?.[selDay]||{})
    :(subsByDay[selDay]||{});
  const subCount=Object.values(daySubs).reduce((s,ps)=>s+Object.keys(ps).length,0);
  function toggleAbsent(t){if(isArchiveView)return;setAbsentSets(prev=>{const n={...prev};const s=new Set(n[selDay]||[]);s.has(t)?s.delete(t):s.add(t);n[selDay]=s;return n;});}

  const PAGES=[
    {id:"management",icon:"📋",label:"Student Management"},
    {id:"studentlist",icon:"📃",label:"Current Student List"},
    {id:"schedule",icon:"📅",label:"Current Student Schedule"},
    {id:"teachers",icon:"👩‍🏫",label:"Teachers"},
    {id:"dormitory",icon:"🏨",label:"Dormitory"},
    {id:"meal",icon:"🍽️",label:"Meal Plan"},

      {studentDailyPopup&&<StudentDailyPopup student={studentDailyPopup} sched={displaySched} absentSet={absentSet} daySubs={daySubs} rooms1on1={displayRooms1on1} groupRosters={displayGroupRosters} selDay={selDay} pushSnap={activePushSnap} onClose={()=>setStudentDailyPopup(null)} studentData={mergedStudentData} kanbanCards={kanbanCards} mealPlan={mealPlan} mealSkips={mealSkips} setMealSkips={setMealSkips}/>}
      {messengerOpen&&messengerOpen.isAdmin&&<MessengerModal currentUser={messengerOpen.teacher} otherUser={messengerOpen.student} isAdmin={true} convOverride={convKey(messengerOpen.teacher,messengerOpen.student)} messages={messages} onSend={sendMessage} onClose={()=>setMessengerOpen(null)}/>}

        <div style={{paddingTop:16}}>
        {page==="management"&&<StudentManagementPage kanbanCards={kanbanCards} pushSnap={safePush} agencyPipeline={agencyPipeline} agencies={agencies}/>}
        {page==="studentlist"&&<CurrentStudentListPage kanbanCards={kanbanCards}/>}
        {page==="teachers"&&<TeacherListPage sched={displaySched} teacherMeta={teacherMeta} setTeacherMeta={setTeacherMeta} passwords={passwords}/>}
        {page==="dormitory"&&<DormitoryPage kanbanCards={kanbanCards} pushSnap={safePush} agencyPipeline={agencyPipeline} agencies={agencies}/>}
        {page==="meal"&&<MealPage mealPlan={mealPlan} setMealPlan={setMealPlan} mealDraft={mealDraft} setMealDraft={setMealDraft} mealArchives={mealArchives} setMealArchives={setMealArchives} kanbanCards={kanbanCards} teacherMeta={teacherMeta} mealSkips={mealSkips}/>}
        {page==="agency"&&<AgencyPage agencyId={null} isAdmin={true} agencyPipeline={agencyPipeline} setAgencyPipeline={setAgencyPipeline} kanbanCards={kanbanCards} pushSnap={safePush} agencies={agencies} setAgencies={setAgenciesRaw}/>}
        

        {page==="schedule"&&(
          <>
            {/* Archive / Draft banner */}
            {(isArchiveView||isDraftView)&&(
              <div style={{background:isArchiveView?"#f3f4f6":"#fffbeb",border:`1.5px solid ${isArchiveView?"#9ca3af":"#fbbf24"}`,borderRadius:8,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:12,fontWeight:700,color:isArchiveView?"#6b7280":"#92400e"}}>
                  {isArchiveView?`📦 Viewing archived schedule: ${archives[viewMode]?.label}`:`📝 Editing draft: ${weekRangeLabel(draftWeek?.weekStart||"")} — ${draftWeek?.status==="confirmed"?"Confirmed, ready to go live":"Draft mode"}`}
                </span>
                <div style={{display:"flex",gap:6}}>
                  {isDraftView&&draftWeek?.status!=="confirmed"&&<button onClick={doConfirmDraft} style={{padding:"4px 10px",background:"#0d9488",color:"white",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>✓ Confirm Draft</button>}
                  {!isArchiveView&&!isDraftView&&<button onClick={doClearSched} style={{padding:"4px 10px",background:"#ef4444",color:"white",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>🗑 Clear Schedule</button>}
                  <button onClick={()=>setViewMode("current")} style={{padding:"4px 10px",background:"#1e40af",color:"white",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>← Current Week</button>
                </div>
              </div>
            )}
            {/* Schedule page header */}
            <div className="pg-wrap" style={{marginBottom:16}}>
              <span className="pg-badge" style={{background:"#e0e7ff",color:"#4338ca"}}>WEEKLY SCHEDULE</span>
              <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div>
                  <h2 className="pg-title">Current Student Schedule</h2>
                  <p className="pg-sub">Teacher &amp; student timetables for the current week</p>
                </div>
              </div>
            </div>
            {/* Day bar — always visible (archive = read-only navigation; current = editable) */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isArchiveView?8:14}}>
              <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>Day:</span>
              <DayBar selDay={selDay} setSelDay={setSelDay} color={isArchiveView?"#6b7280":"#0d9488"}/>
              {isArchiveView&&(absentSet.size>0||subCount>0)&&(
                <span style={{fontSize:11,color:"#6b7280",background:"#f3f4f6",border:"1px solid #e2e8f0",borderRadius:8,padding:"3px 10px",fontWeight:600}}>
                  {absentSet.size>0&&`🚫 ${absentSet.size} absent`}
                  {absentSet.size>0&&subCount>0&&" · "}
                  {subCount>0&&`🔄 ${subCount} sub${subCount>1?"s":""}`}
                </span>
              )}
            </div>
            {/* Absence panel — hide in archive (read-only, shown as badge above) */}
            {!isArchiveView&&<AbsencePanel absentSet={absentSet} onToggle={toggleAbsent} subCount={subCount}/>}
            {/* Unified tab bar */}
            <div className="tab-bar" style={{display:"flex",alignItems:"center"}}>
              <button className="tbb" onClick={()=>setSchedTab("teacher")} style={{color:schedTab==="teacher"?"#0d9488":"#9ca3af",borderBottom:schedTab==="teacher"?"3px solid #0d9488":"3px solid transparent"}}>👩‍🏫 Teacher Schedule</button>
              <button className="tbb" onClick={()=>setSchedTab("student")} style={{color:schedTab==="student"?"#0d9488":"#9ca3af",borderBottom:schedTab==="student"?"3px solid #0d9488":"3px solid transparent"}}>📚 Student Schedule</button>
              {/* ⚡ Auto Schedule — only when student tab active and not archive */}
              {schedTab==="student"&&!isArchiveView&&(
                <button onClick={()=>setShowAutoAssign(true)}
                  style={{marginLeft:8,padding:"4px 12px",borderRadius:6,border:"1.5px solid #a5b4fc",background:"#eef2ff",color:"#4338ca",cursor:"pointer",fontSize:11,fontWeight:800,display:"flex",alignItems:"center",gap:4}}>
                  ⚡ Auto Schedule
                </button>
              )}
              {/* Undo / Redo — only for current (non-archive) view */}
              {!isArchiveView&&!isDraftView&&(
                <div style={{display:"flex",gap:4,marginLeft:10,alignItems:"center",borderLeft:"1px solid #e2e8f0",paddingLeft:10}}>
                  <button onClick={undo} disabled={!canUndo} title="Undo (Ctrl+Z)"
                    style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #e2e8f0",background:canUndo?"white":"#f8fafc",
                      color:canUndo?"#374151":"#d1d5db",cursor:canUndo?"pointer":"not-allowed",fontSize:15,fontWeight:700,lineHeight:1}}>
                    ↩
                  </button>
                  <button onClick={redo} disabled={!canRedo} title="Redo (Ctrl+Y)"
                    style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #e2e8f0",background:canRedo?"white":"#f8fafc",
                      color:canRedo?"#374151":"#d1d5db",cursor:canRedo?"pointer":"not-allowed",fontSize:15,fontWeight:700,lineHeight:1}}>
                    ↪
                  </button>
                  <span style={{fontSize:10,color:"#94a3b8",whiteSpace:"nowrap"}}>{hIdx}/{hist.hist.length-1}</span>
                </div>
              )}
              {/* Clear schedule button for current week */}
              {!isArchiveView&&!isDraftView&&(
                <button onClick={doClearSched} title="Clear all schedule assignments"
                  style={{marginLeft:6,padding:"4px 10px",borderRadius:6,border:"1.5px solid #fca5a5",background:"#fef2f2",color:"#dc2626",cursor:"pointer",fontSize:11,fontWeight:700}}>
                  🗑 Clear
                </button>
              )}
              <div style={{flex:1}}/>
              <button className="tbb" onClick={()=>setSchedTab("rooms1on1")} style={{color:schedTab==="rooms1on1"?"#1e3a8a":"#9ca3af",borderBottom:schedTab==="rooms1on1"?"3px solid #1e3a8a":"3px solid transparent",fontSize:13}}>🏫 1on1 Classrooms</button>
              <button className="tbb" onClick={()=>setSchedTab("roomsGroup")} style={{color:schedTab==="roomsGroup"?"#166534":"#9ca3af",borderBottom:schedTab==="roomsGroup"?"3px solid #166534":"3px solid transparent",fontSize:13}}>👥 Group/Activity/Kinder</button>
            </div>
            {isSchedTab&&<Legend/>}
            {showAutoAssign&&(
              <AutoAssignModal
                sched={displaySched}
                groupRosters={displayGroupRosters}
                studentData={mergedStudentData}
                kanbanCards={kanbanCards}
                teacherMeta={teacherMeta}
                cellData={displayCellData}
                onApply={(newSched,newRosters)=>{activePushSnap({sched:newSched,groupRosters:newRosters});}}
                onClose={()=>setShowAutoAssign(false)}
              />
            )}
            {schedTab==="teacher"&&<TeacherScheduleGrid sched={displaySched} cellData={displayCellData} groupRosters={displayGroupRosters} selDay={selDay} subsByDay={subsByDay} absentSet={absentSet} daySubs={daySubs} rooms1on1={displayRooms1on1} studentData={mergedStudentData} pushSnap={activePushSnap} isAdmin onTeacherClick={setTeacherPopup} messages={messages} onOpenMessenger={setMessengerOpen}/>}
            {schedTab==="student"&&<StudentScheduleGrid sched={displaySched} setSched={activeSetSched} absentSet={absentSet} daySubs={daySubs} isAdmin rooms1on1={displayRooms1on1} onStudentClick={setStudentDailyPopup} groupRosters={displayGroupRosters} studentData={mergedStudentData} kanbanCards={kanbanCards}/>}
            {schedTab==="rooms1on1"&&<OneOnOneClassroomsPage rooms1on1={displayRooms1on1} setRooms1on1={setDisplayRooms1on1}/>}
            {schedTab==="roomsGroup"&&<GroupClassroomsPage cellData={displayCellData} groupRosters={displayGroupRosters} setGroupRosters={setGroupRosters} selDay={selDay} studentData={mergedStudentData}/>}
            {isSchedTab&&<div style={{marginTop:10,fontSize:11,color:"#94a3b8"}}>✓ Both schedules sync in real-time. Room assignments are managed in the 1on1 / Group Classrooms tabs.</div>}
          </>
        )}
        </div>{/* end paddingTop wrapper */}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={err:null,info:null,stack:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){
    console.error("React render error:",err,info);
    this.setState({info,stack:err?.stack||String(err)});
  }
  render(){
    if(this.state.err){
      const msg=String(this.state.err);
      const stack=this.state.stack||"";
      const cstack=this.state.info?.componentStack||"";
      /* Extract first few lines of JS stack for quick diagnosis */
      const stackLines=stack.split("\n").slice(0,8).join("\n");
      /* Copy to clipboard helper */
      const copyAll=()=>{
        const txt=`ERROR: ${msg}\n\nJS STACK:\n${stack}\n\nCOMPONENT STACK:\n${cstack}`;
        navigator.clipboard?.writeText(txt).catch(()=>{});
      };
      return(
        <div style={{padding:24,fontFamily:"monospace",background:"#fff1f2",minHeight:"100vh"}}>
          <div style={{maxWidth:900,margin:"0 auto",background:"white",borderRadius:12,padding:28,boxShadow:"0 4px 32px rgba(220,38,38,.18)",border:"2.5px solid #dc2626"}}>
            <h2 style={{color:"#dc2626",marginBottom:8,fontSize:20,fontWeight:800}}>⚠️ Hana LMS — Runtime Error</h2>
            <p style={{color:"#6b7280",fontSize:12,marginBottom:12}}>아래 전체 내용을 개발자에게 복사하여 전달해 주세요.</p>
            {/* Error message — always visible */}
            <div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:6,padding:"10px 14px",marginBottom:10}}>
              <div style={{color:"#991b1b",fontWeight:800,fontSize:13,marginBottom:3}}>🔴 Error Message</div>
              <div style={{color:"#dc2626",fontSize:13,fontWeight:600,wordBreak:"break-all"}}>{msg}</div>
            </div>
            {/* JS Stack — first 8 lines always open for easy copy */}
            {stack&&(
              <details open style={{marginBottom:10}}>
                <summary style={{cursor:"pointer",fontWeight:700,fontSize:11,color:"#6b7280",marginBottom:4}}>JS Stack (first 8 lines)</summary>
                <pre style={{margin:0,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:4,padding:"8px 10px",fontSize:10,overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all",color:"#374151"}}>{stackLines}</pre>
              </details>
            )}
            {cstack&&(
              <details style={{marginBottom:10}}>
                <summary style={{cursor:"pointer",fontWeight:700,fontSize:11,color:"#6b7280",marginBottom:4}}>Component Stack</summary>
                <pre style={{margin:0,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:4,padding:"8px 10px",fontSize:10,overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all",color:"#374151"}}>{cstack}</pre>
              </details>
            )}
            <button onClick={copyAll} style={{marginTop:8,padding:"7px 18px",background:"#dc2626",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:12}}>📋 Copy All to Clipboard</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
window.addEventListener("error",function(e){console.error("Global error:",e.error||e.message);});
window.addEventListener("unhandledrejection",function(e){console.error("Unhandled rejection:",e.reason);});
