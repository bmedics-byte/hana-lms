function StudentListPage({sched,studentData,setStudentData,rooms1on1}){
  const[q,setQ]=useState("");
  const[fNat,setFNat]=useState("");
  const[fCourse,setFCourse]=useState("");
  const[fRoomType,setFRoomType]=useState("");
  const[editStudent,setEditStudent]=useState(null);
  const[schedPopup,setSchedPopup]=useState(null);

  const list=STUDENTS.filter(s=>{
    if(q&&!s.toLowerCase().includes(q.toLowerCase()))return false;
    const d=studentData[s]||{};
    if(fNat&&d.nationality!==fNat)return false;
    if(fCourse&&d.course!==fCourse)return false;
    if(fRoomType&&d.roomType!==fRoomType)return false;
    return true;
  });

  const hasFilter=fNat||fCourse||fRoomType;
  return(
    <div>
      <div className="pg-wrap" style={{marginBottom:14}}>
        <span className="pg-badge" style={{background:"#d1fae5",color:"#065f46"}}>ENROLLED STUDENTS</span>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <h2 className="pg-title">Student List</h2>
            <p className="pg-sub"><span style={{fontWeight:700,color:"#0d9488"}}>{list.length}</span> of <span style={{fontWeight:700}}>{STUDENTS.length}</span> students shown</p>
          </div>
          <input className="sb" placeholder="🔍 Search student name..." value={q} onChange={e=>setQ(e.target.value)} style={{maxWidth:220}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <select className="flt" value={fNat} onChange={e=>setFNat(e.target.value)}>
          <option value="">🌍 All Nationalities</option>
          {NATIONALITIES.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <select className="flt" value={fCourse} onChange={e=>setFCourse(e.target.value)}>
          <option value="">📖 All Courses</option>
          {COURSE_LIST.map(cat=><optgroup key={cat.cat} label={`── ${cat.cat} ──`}>{cat.courses.map(c=><option key={c} value={c}>{c}</option>)}</optgroup>)}
        </select>
        <select className="flt" value={fRoomType} onChange={e=>setFRoomType(e.target.value)}>
          <option value="">🏠 All Room Types</option>
          {ROOM_TYPES.map(rt=><option key={rt} value={rt}>{rt}</option>)}
        </select>
        {hasFilter&&<button className="rst-btn" onClick={()=>{setFNat("");setFCourse("");setFRoomType("");}}>✕ Clear Filters</button>}
        <span style={{fontSize:12,color:"#9ca3af",marginLeft:4}}>{list.length} shown</span>
      </div>
      {schedPopup&&<StudentSchedulePopup student={schedPopup} sched={sched} rooms1on1={rooms1on1} nationality={(studentData[schedPopup]||{}).nationality} onClose={()=>setSchedPopup(null)}/>}
      {editStudent&&<StudentEditModal student={editStudent} data={studentData[editStudent]||{}} onSave={form=>{setStudentData(prev=>({...prev,[editStudent]:form}));setEditStudent(null);}} onClose={()=>setEditStudent(null)}/>}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table className="lt">
            <thead>
              <tr>
                <th style={{width:36}}>#</th>
                <th style={{minWidth:150}}>Student Name</th>
                <th style={{minWidth:110}}>Personal Schedule</th>
                <th style={{minWidth:50,textAlign:"center"}}>Age</th>
                <th style={{minWidth:90}}>Nationality</th>
                <th style={{minWidth:170}}>Study Period</th>
                <th style={{minWidth:170}}>Course</th>
                <th style={{minWidth:130}}>Room Type</th>
                <th style={{minWidth:80,textAlign:"center"}}>Room No.</th>
                <th style={{width:60}}></th>
              </tr>
            </thead>
            <tbody>
              {list.map((s,i)=>{
                const d=studentData[s]||{};
                const wc=weekCount(d.studyStart,d.studyEnd);
                const courseColor=getCourseColor(d.course);
                return(
                  <tr key={s}>
                    <td style={{color:"#9ca3af"}}>{i+1}</td>
                    <td style={{fontWeight:600}}>{s}</td>
                    <td><button className="sched-btn" onClick={()=>setSchedPopup(s)}>📋 This Week</button></td>
                    <td style={{textAlign:"center"}}>{(()=>{const a=getKoreanAge(d.birthYear);return a!==null?<span style={{fontWeight:600}}>{a}</span>:<span style={{color:"#d1d5db"}}>—</span>;})()}</td>
                    <td>{d.nationality?<span style={{fontSize:11,fontWeight:600,padding:"2px 8px",background:"#f1f5f9",borderRadius:8,color:"#374151"}}>{d.nationality}</span>:<span style={{color:"#d1d5db",fontSize:11}}>—</span>}</td>
                    <td>
                      {d.studyStart&&d.studyEnd?(
                        <div style={{fontSize:11}}>
                          <div style={{color:"#374151",marginBottom:2}}>{d.studyStart} ~ {d.studyEnd}</div>
                          {wc>0&&<span className="week-b">{wc} wks</span>}
                        </div>
                      ):<span style={{color:"#d1d5db",fontSize:11}}>—</span>}
                    </td>
                    <td>{d.course?<span className="course-tag" style={{background:courseColor,color:"#374151"}}>{d.course}</span>:<span style={{color:"#d1d5db",fontSize:11}}>—</span>}</td>
                    <td style={{fontSize:11,fontWeight:600}}>{d.roomType||<span style={{color:"#d1d5db"}}>—</span>}</td>
                    <td style={{textAlign:"center"}}>{d.roomNumber?<span style={{fontWeight:700,color:"#1e40af"}}>{d.roomNumber}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                    <td><button className="edit-btn" onClick={()=>setEditStudent(s)}>✏️ Edit</button></td>
                  </tr>
                );
              })}
              {list.length===0&&<tr><td colSpan={10} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No results found</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   TeacherEditModal
═════════════════════════════════════════════════════ */
function TeacherEditModal({teacher,meta,onSave,onDelete,onClose}){
  const isNative=teacher.includes("(N)");
  const[name,setName]=useState(teacher);
  const[specialties,setSpecialties]=useState(meta?.specialties||[]);
  const[status,setStatus]=useState(meta?.status||"active");
  const[resignDate,setResignDate]=useState(meta?.resignDate||"");
  const[meals,setMeals]=useState(meta?.meals||{breakfast:false,lunch:false,dinner:false});
  function toggleSpec(s){setSpecialties(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);}
  function toggleMeal(m){setMeals(p=>({...p,[m]:!p[m]}));}
  const STATUS_OPTS=[
    {v:"active",l:"Active",bg:"#d1fae5",fg:"#166534"},
    {v:"upcoming",l:"Upcoming",bg:"#dbeafe",fg:"#1e40af"},
    {v:"resigning",l:"Resigning",bg:"#fee2e2",fg:"#b91c1c"},
    {v:"on_leave",l:"On Leave",bg:"#fef9c3",fg:"#92400e"}
  ];
  return ReactDOM.createPortal(
    <div className="t-modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="t-modal-wrap" onClick={e=>e.stopPropagation()}>
        <button className="t-modal-close" onClick={onClose}>✕</button>
        <div style={{clear:"both"}}/>
        <div className="t-modal">
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <span style={{fontSize:20}}>{isNative?"🌎":"🇵🇭"}</span>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:"#1e3a8a"}}>{teacher}</div>
              <div style={{fontSize:11,color:"#6b7280"}}>{isNative?"Native Teacher":"Filipino Teacher"}</div>
            </div>
          </div>

          {/* If extra teacher, allow renaming */}
          {meta?.isExtra&&(
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:5,textTransform:"uppercase",letterSpacing:".4px"}}>Teacher Name</label>
              <input className="fi" value={name} onChange={e=>setName(e.target.value)} style={{width:"100%"}}/>
            </div>
          )}

          {/* Employment Status */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:7}}>Employment Status</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {STATUS_OPTS.map(o=>{
                const sel=status===o.v;
                return(
                  <button key={o.v} onClick={()=>{setStatus(o.v);if(o.v!=="resigning")setResignDate("");}}
                    style={{padding:"5px 13px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",
                      border:`2px solid ${sel?o.fg:"#e2e8f0"}`,background:sel?o.bg:"white",color:sel?o.fg:"#9ca3af"}}>
                    {o.l}
                  </button>
                );
              })}
            </div>
            {status==="resigning"&&(
              <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                <label style={{fontSize:11,fontWeight:700,color:"#b91c1c",whiteSpace:"nowrap"}}>Resignation Date:</label>
                <input type="date" lang="en" value={resignDate} onChange={e=>setResignDate(e.target.value)}
                  style={{padding:"4px 8px",border:"1.5px solid #fca5a5",borderRadius:6,fontSize:12,color:"#b91c1c",fontWeight:600}}/>
              </div>
            )}
          </div>

          {/* Specialties */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>
              Class Specialties
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {TEACHER_SPECIALTIES.map(s=>{
                const sel=specialties.includes(s);
                const st=SPECIALTY_STYLE[s]||{bg:"#f1f5f9",fg:"#374151"};
                return(
                  <button key={s} onClick={()=>toggleSpec(s)}
                    style={{padding:"6px 13px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",
                      border:`2px solid ${sel?st.fg:"#e2e8f0"}`,
                      background:sel?st.bg:"white",
                      color:sel?st.fg:"#9ca3af"}}>
                    {sel?"✓ ":""}{s}
                  </button>
                );
              })}
            </div>
            {specialties.length===0&&(
              <div style={{marginTop:8,fontSize:11,color:"#9ca3af"}}>No specialties selected yet — select the class types this teacher can handle.</div>
            )}
          </div>

          {/* Meal Preferences */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>
              🍽️ Meal Preferences
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[
                {k:"breakfast",l:"🌅 Breakfast",time:"7:30–8:30",bg:"#f1f5f9",fg:"#334155"},
                {k:"lunch",l:"☀️ Lunch",time:"",bg:"#f0fdf4",fg:"#166534"},
                {k:"dinner",l:"🌙 Dinner",time:"5:35–6:15",bg:"#faf5ff",fg:"#6d28d9"},
              ].map(m=>{
                const sel=meals[m.k];
                return(
                  <button key={m.k} onClick={()=>toggleMeal(m.k)}
                    style={{padding:"7px 14px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",
                      border:`2px solid ${sel?m.fg:"#e2e8f0"}`,
                      background:sel?m.bg:"white",
                      color:sel?m.fg:"#9ca3af"}}>
                    {sel?"✓ ":""}{m.l}
                    {m.time&&<span style={{fontSize:9,fontWeight:500,marginLeft:4,opacity:.75}}>{m.time}</span>}
                  </button>
                );
              })}
            </div>
            {!meals.breakfast&&!meals.lunch&&!meals.dinner&&(
              <div style={{marginTop:6,fontSize:11,color:"#9ca3af"}}>No meals selected — teacher eats off-campus.</div>
            )}
          </div>

          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>onSave(name.trim(),specialties,status,resignDate,meals)} style={{flex:1,padding:10,background:"#1e40af",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Save</button>
            <button onClick={onClose} style={{padding:"10px 18px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:13}}>Cancel</button>
            {meta?.isExtra&&(
              <button onClick={onDelete} style={{padding:"10px 13px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,cursor:"pointer",fontSize:13}}>🗑 Delete</button>
            )}
          </div>
        </div>
      </div>
    </div>,document.body
  );
}

/* ═════════════════════════════════════════════════════
   TeacherListPage
═════════════════════════════════════════════════════ */
function TeacherListPage({sched,teacherMeta,setTeacherMeta,passwords}){
  const[q,setQ]=useState("");
  const[editTeacher,setEditTeacher]=useState(null);
  const[showAddForm,setShowAddForm]=useState(false);
  const[newName,setNewName]=useState("");
  const[newIsNative,setNewIsNative]=useState(false);

  /* Combined list: base teachers + extras */
  const allTeachers=useMemo(()=>{
    const extras=Object.keys(teacherMeta).filter(t=>teacherMeta[t]?.isExtra&&!TEACHERS_BASE.includes(t));
    return[...TEACHERS_BASE,...extras];
  },[teacherMeta]);

  const list=allTeachers.filter(t=>t.toLowerCase().includes(q.toLowerCase()));

  function getSpecialties(t){return teacherMeta[t]?.specialties||[];}

  function handleSave(teacher,newName,specialties,status,resignDate,meals){
    setTeacherMeta(prev=>{
      const next={...prev};
      const isExtra=!TEACHERS_BASE.includes(teacher);
      const extra={status:status||"active",...(resignDate?{resignDate}:{}),...(meals?{meals}:{})};
      /* If renamed (extra teacher) */
      if(isExtra&&newName&&newName!==teacher){
        next[newName]={...next[teacher],specialties,isExtra:true,...extra};
        delete next[teacher];
      } else {
        next[teacher]={...(next[teacher]||{}),specialties,...extra,...(isExtra?{isExtra:true}:{})};
      }
      return next;
    });
    setEditTeacher(null);
  }

  function handleDelete(teacher){
    if(!window.confirm(`Delete teacher "${teacher}"? This will not remove their schedule assignments.`))return;
    setTeacherMeta(prev=>{const next={...prev};delete next[teacher];return next;});
    setEditTeacher(null);
  }

  function handleAdd(){
    const name=newName.trim();
    if(!name)return;
    const finalName=newIsNative&&!name.includes("(N)")?`${name} (N)`:name;
    if(allTeachers.includes(finalName)){alert("A teacher with this name already exists.");return;}
    const maxCode=Math.max(0,...Object.values(TEACHER_CODE));
    setTeacherMeta(prev=>({...prev,[finalName]:{isExtra:true,specialties:[],code:maxCode+1}}));
    setNewName("");setShowAddForm(false);setNewIsNative(false);
  }

  return(
    <div>
      {editTeacher&&(
        <TeacherEditModal
          teacher={editTeacher}
          meta={teacherMeta[editTeacher]||{}}
          onSave={(nm,sp,st,rd,ml)=>handleSave(editTeacher,nm,sp,st,rd,ml)}
          onDelete={()=>handleDelete(editTeacher)}
          onClose={()=>setEditTeacher(null)}
        />
      )}

      <div className="pg-wrap">
        <span className="pg-badge" style={{background:"#fce7f3",color:"#be185d"}}>TEACHING STAFF</span>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <h2 className="pg-title">Teacher List</h2>
            <p className="pg-sub"><span style={{fontWeight:700,color:"#0d9488"}}>{list.length}</span> teachers · Filipino &amp; Native speakers</p>
          </div>
          <div className="pg-toolbar">
            <input className="sb" placeholder="🔍 Search teacher..." value={q} onChange={e=>setQ(e.target.value)}/>
            <button onClick={()=>setShowAddForm(p=>!p)}
              style={{padding:"9px 20px",background:"#0d9488",color:"white",border:"none",borderRadius:20,fontWeight:700,cursor:"pointer",fontSize:13,whiteSpace:"nowrap",boxShadow:"0 3px 12px rgba(13,148,136,.3)"}}>
              + Add Teacher
            </button>
          </div>
        </div>
      </div>

      {/* Add Teacher form */}
      {showAddForm&&(
        <div style={{marginBottom:16,padding:"14px 18px",background:"#f0fdfa",borderRadius:14,border:"1.5px solid #99f6e4",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <input className="fi" placeholder="Teacher name..." value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")handleAdd();if(e.key==="Escape")setShowAddForm(false);}}
            style={{flex:"1 1 180px",minWidth:140}}/>
          <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,color:"#1e40af",cursor:"pointer",whiteSpace:"nowrap"}}>
            <input type="checkbox" checked={newIsNative} onChange={e=>setNewIsNative(e.target.checked)}/>
            Native (N)
          </label>
          <button onClick={handleAdd}
            style={{padding:"7px 14px",background:"#1e40af",color:"white",border:"none",borderRadius:7,fontWeight:700,cursor:"pointer",fontSize:12}}>
            Add
          </button>
          <button onClick={()=>{setShowAddForm(false);setNewName("");setNewIsNative(false);}}
            style={{padding:"7px 12px",background:"white",color:"#6b7280",border:"1px solid #e2e8f0",borderRadius:7,cursor:"pointer",fontSize:12}}>
            Cancel
          </button>
        </div>
      )}

      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <table className="lt">
          <thead>
            <tr>
              <th style={{minWidth:160}}>Teacher Name</th>
              <th style={{whiteSpace:"nowrap"}}>ID / PW</th>
              <th style={{width:80,textAlign:"center"}}>Type</th>
              <th style={{width:120,textAlign:"center"}}>Status</th>
              <th style={{width:110,textAlign:"center"}}>Weekly Periods</th>
              <th>Specialties</th>
              <th style={{width:60}}></th>
            </tr>
          </thead>
          <tbody>
            {list.map(t=>{
              const ps=sched[t]||{};
              const cnt=Object.keys(ps).length;
              const isNative=t.includes("(N)");
              const isExtra=!!teacherMeta[t]?.isExtra;
              const specs=getSpecialties(t);
              return(
                <tr key={t}>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontWeight:700,fontSize:13}}>{t.replace(" (N)","")}</span>
                      {isExtra&&<span style={{fontSize:9,background:"#fef9c3",color:"#92400e",border:"1px solid #fde68a",borderRadius:4,padding:"1px 5px",fontWeight:700}}>NEW</span>}
                    </div>
                  </td>
                  <td style={{fontSize:11}}><code style={{color:"#1e40af",fontWeight:700}}>{t.toLowerCase().replace(/[\s()]/g,"")}</code><span style={{color:"#6b7280",marginLeft:4}}>/ {(passwords&&passwords[t])||teacherMeta[t]?.password||"hana123"}</span></td>
                  <td style={{textAlign:"center"}}>
                    <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:10,
                      background:isNative?"#fee2e2":"#dbeafe",color:isNative?"#b91c1c":"#1e40af"}}>
                      {isNative?"Native":"Filipino"}
                    </span>
                  </td>
                  <td style={{textAlign:"center"}}>
                    {(()=>{
                      const st=teacherMeta[t]?.status||"active";
                      const rd=teacherMeta[t]?.resignDate;
                      const today=new Date();today.setHours(0,0,0,0);
                      const isPast=rd&&new Date(rd)<=today;
                      const C={active:["#d1fae5","#166534"],upcoming:["#dbeafe","#1e40af"],resigning:["#fee2e2","#b91c1c"],on_leave:["#fef9c3","#92400e"]};
                      const L={active:"Active",upcoming:"Upcoming",resigning:isPast?"Left":`Resigning${rd?" "+rd:""}`,on_leave:"On Leave"};
                      const[bg,fg]=C[st]||C.active;
                      return<span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:bg,color:fg,whiteSpace:"nowrap"}}>{L[st]||"Active"}</span>;
                    })()}
                  </td>
                  <td style={{textAlign:"center"}}>
                    <span style={{background:cnt===0?"#f1f5f9":"#eff6ff",color:cnt===0?"#9ca3af":"#1d4ed8",
                      borderRadius:10,padding:"3px 10px",fontWeight:700,fontSize:13}}>
                      {cnt} period{cnt!==1?"s":""}
                    </span>
                  </td>
                  <td>
                    {specs.length===0
                      ?<span style={{color:"#d1d5db",fontSize:11,cursor:"pointer"}} onClick={()=>setEditTeacher(t)}>Click Edit to assign specialties</span>
                      :<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {specs.map(s=>{
                          const st=SPECIALTY_STYLE[s]||{bg:"#f1f5f9",fg:"#374151"};
                          return<span key={s} style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:st.bg,color:st.fg,border:`1px solid ${st.fg}30`}}>{s}</span>;
                        })}
                      </div>
                    }
                  </td>
                  <td>
                    <button onClick={()=>setEditTeacher(t)}
                      style={{padding:"4px 10px",fontSize:11,fontWeight:700,background:"#f0f9ff",color:"#0369a1",border:"1.5px solid #bae6fd",borderRadius:6,cursor:"pointer"}}>
                      Edit
                    </button>
                  </td>
                </tr>
              );
            })}
            {list.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No teachers found</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   ChangePasswordWidget
═════════════════════════════════════════════════════ */
function ChangePasswordWidget({name,onChangePassword}){
  const[show,setShow]=useState(false);
  const[nw,setNw]=useState("");const[conf,setConf]=useState("");const[err,setErr]=useState("");
  function doChange(){
    if(nw.length<4){setErr("Minimum 4 characters");return;}
    if(nw!==conf){setErr("Passwords do not match");return;}
    onChangePassword&&onChangePassword(name,nw);
    setShow(false);setNw("");setConf("");setErr("");
    alert("Password changed successfully.");
  }
  if(!show)return<button onClick={()=>setShow(true)} style={{fontSize:11,padding:"3px 10px",background:"none",border:"1px solid #d1d5db",borderRadius:5,cursor:"pointer",color:"#6b7280",marginTop:6}}>🔒 Change Password</button>;
  return(
    <div style={{marginTop:8,padding:10,background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0"}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-end"}}>
        <input type="password" value={nw} onChange={e=>setNw(e.target.value)} placeholder="New password" style={{padding:"5px 8px",border:"1.5px solid #e2e8f0",borderRadius:5,fontSize:12,width:140}}/>
        <input type="password" value={conf} onChange={e=>setConf(e.target.value)} placeholder="Confirm" style={{padding:"5px 8px",border:"1.5px solid #e2e8f0",borderRadius:5,fontSize:12,width:100}}/>
        <button onClick={doChange} style={{padding:"5px 12px",background:"#1e40af",color:"white",border:"none",borderRadius:5,cursor:"pointer",fontSize:12,fontWeight:700}}>Change</button>
        <button onClick={()=>{setShow(false);setNw("");setConf("");setErr("");}} style={{padding:"5px 10px",background:"none",border:"1px solid #d1d5db",borderRadius:5,cursor:"pointer",fontSize:12,color:"#6b7280"}}>Cancel</button>
      </div>
      {err&&<div style={{color:"#dc2626",fontSize:11,marginTop:4}}>{err}</div>}
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   PersonalTeacherView
═════════════════════════════════════════════════════ */
function PersonalTeacherView({name,sched,absentSets,subsByDay,rooms1on1,studentCourses,selDay,setSelDay,messages,onOpenMessenger,onChangePassword,mealPlan,teacherMeta,mealSkips,setMealSkips}){
  const myPs=sched[name]||{};
  const absent=(absentSets[selDay]||new Set()).has(name);
  const mySubs=subsByDay[selDay]?.[name]||{};
  /* Periods where I'm acting as a substitute for another teacher */
  const subsForMe=useMemo(()=>{
    const out={};
    Object.entries(subsByDay[selDay]||{}).forEach(([absentT,periods])=>{
      Object.entries(periods).forEach(([pkey,subT])=>{
        if(subT===name)out[pkey]=absentT;
      });
    });
    return out;
  },[subsByDay,selDay,name]);
  const hasAnyCls=Object.keys(myPs).length>0||Object.keys(subsForMe).length>0;
  return(
    <div>
      <div className="card" style={{marginBottom:16,background:absent?"#fef2f2":"white"}}>
        <div style={{fontSize:20,fontWeight:800,color:"#1e40af"}}>👋 Welcome, {name}</div>
        {absent?<p style={{marginTop:6,color:"#dc2626",fontWeight:600,fontSize:14}}>⚠ You are marked absent today.</p>:<p style={{marginTop:6,color:"#6b7280",fontSize:14}}>{selDay} class schedule.</p>}
        <ChangePasswordWidget name={name} onChangePassword={onChangePassword}/>
        {Object.keys(subsForMe).length>0&&!absent&&(
          <p style={{marginTop:4,color:"#b45309",fontWeight:600,fontSize:13}}>🔄 You have {Object.keys(subsForMe).length} substitute period(s) today.</p>
        )}
      </div>
      <DayBar selDay={selDay} setSelDay={setSelDay} color="#1e40af"/>
      {/* Teacher meal schedule — based on meal preferences + skip buttons */}
      {(()=>{
        const myMeals=teacherMeta?.[name]?.meals||{};
        const hasAnyPref=myMeals.breakfast||myMeals.lunch||myMeals.dinner;
        if(!hasAnyPref)return null;
        const mKey=dayToMealKey(selDay);
        const dayMeal=mealPlan?.plan?.[mKey]||{};
        const isWeekend=selDay==="Saturday"||selDay==="Sunday";
        const skips=(mealSkips?.[mKey]?.[name])||{};
        function toggleSkip(slot){
          if(!setMealSkips)return;
          setMealSkips(prev=>{
            const n=JSON.parse(JSON.stringify(prev));
            if(!n[mKey])n[mKey]={};if(!n[mKey][name])n[mKey][name]={};
            n[mKey][name][slot]=!n[mKey][name][slot];
            return n;
          });
        }
        const slots=[];
        if(!isWeekend){
          if(myMeals.breakfast)slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"7:30 – 8:30",
            menu:(()=>{const p=[dayMeal.breakfast?.items,dayMeal.breakfast?.soup].filter(Boolean);if(p.length)p.push("+ Bread & Jam");return p.join(" · ")||null;})()});
          if(myMeals.lunch)slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:"",
            menu:(()=>{const d=dayMeal.lunch||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          if(myMeals.dinner)slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:35 – 6:15",
            menu:(()=>{const d=dayMeal.dinner||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
        }else{
          /* Weekend: brunch only (for teachers who eat any meal) */
          slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",
            menu:dayMeal.brunchSoup?`Rice, Soup & Kimchi · ${dayMeal.brunchSoup}`:"Rice, Soup & Kimchi"});
        }
        if(slots.length===0)return null;
        return(
          <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#0d9488",marginBottom:10}}>🍽️ Today's Meals</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {slots.map(s=>{
                const skipped=!!skips[s.key];
                return(
                  <div key={s.key} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,background:skipped?"#f9fafb":"#f0fdfa",border:`1.5px solid ${skipped?"#e2e8f0":"#99f6e4"}`,opacity:skipped?.7:1,transition:"all .15s"}}>
                    <span style={{fontSize:16,flexShrink:0}}>{s.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                        <span style={{fontSize:12,fontWeight:800,color:skipped?"#9ca3af":"#0d9488"}}>{s.label}</span>
                        {s.time&&<span style={{fontSize:10,color:"#64748b",background:"#e2e8f0",padding:"1px 7px",borderRadius:8}}>{s.time}</span>}
                        {skipped&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fee2e2",padding:"1px 7px",borderRadius:8}}>SKIP</span>}
                      </div>
                      <div style={{fontSize:11,color:skipped?"#9ca3af":"#374151"}}>{s.menu||<span style={{fontStyle:"italic",color:"#9ca3af"}}>Menu not set</span>}</div>
                    </div>
                    <button onClick={()=>toggleSkip(s.key)}
                      style={{flexShrink:0,padding:"4px 10px",borderRadius:8,border:`1.5px solid ${skipped?"#6b7280":"#f87171"}`,background:skipped?"#6b7280":"white",color:skipped?"white":"#dc2626",fontSize:10.5,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
                      {skipped?"↩ Undo":"Skip"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <table className="ps-t">
          <thead><tr style={{background:"#1e40af",color:"white"}}><th>Period</th><th>Time</th><th>Room</th><th>Student / Class</th><th>Status</th></tr></thead>
          <tbody>
            {!hasAnyCls&&<tr><td colSpan={5} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No classes this week.</td></tr>}
            {PERIODS.map(p=>{
              const pkey=pk(p.i);
              const assign=myPs[pkey];
              const absentFor=subsForMe[pkey]; /* I'm subbing for this teacher */
              if(!assign&&!absentFor)return null;

              /* ── Substitute row: use absent teacher's room ── */
              if(absentFor){
                const absentAssign=sched[absentFor]?.[pkey]||"—";
                const room=findRoom1on1(absentFor,p.i,rooms1on1); /* absent teacher's room */
                return(
                  <tr key={p.i} style={{background:"#fef9c3"}}>
                    <td style={{fontWeight:700}}>{p.label}</td>
                    <td style={{color:"#6b7280"}}>{p.time}</td>
                    <td>{room?<span style={{fontWeight:700,color:"#b45309"}}>{roomLabel(room)}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                    <td>
                      <div style={{fontSize:10,color:"#9a3412",fontWeight:600,marginBottom:2}}>🔄 Sub for <b>{absentFor}</b></div>
                      <span style={{fontWeight:600,fontSize:12}}>{absentAssign}</span>
                    </td>
                    <td><span style={{background:"#fed7aa",color:"#9a3412",padding:"2px 8px",borderRadius:10,fontWeight:700,fontSize:12}}>Substituting</span></td>
                  </tr>
                );
              }

              /* ── Regular own assignment ── */
              const sub=mySubs[pkey];
              const room=findRoom1on1(name,p.i,rooms1on1);
              const isStudent=STUDENTS.includes(assign);
              const cKey=isStudent?convKey(name,assign):null;
              const unread=cKey?getUnreadCount(messages||{},cKey,name):0;
              return(
                <tr key={p.i} style={{background:absent&&sub?"#fef9c3":"white"}}>
                  <td style={{fontWeight:700}}>{p.label}</td><td style={{color:"#6b7280"}}>{p.time}</td>
                  <td>{room?<span style={{fontWeight:700,color:"#7c3aed"}}>{roomLabel(room)}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                  <td>
                    {isStudent?(
                      <button onClick={()=>onOpenMessenger&&onOpenMessenger({teacher:name,student:assign})}
                        style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:700,color:"#1e40af",fontSize:13,textDecoration:"underline",textDecorationColor:"#93c5fd"}}>{assign}</span>
                        {unread>0?(
                          <span style={{background:"#dc2626",color:"white",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px",lineHeight:1.4}}>
                            {unread}
                          </span>
                        ):(
                          <span style={{color:"#93c5fd",fontSize:13}}>💬</span>
                        )}
                      </button>
                    ):assign}
                  </td>
                  <td>{absent&&sub?<span style={{background:"#fef9c3",color:"#b45309",padding:"2px 8px",borderRadius:10,fontWeight:700,fontSize:12}}>Sub: {sub}</span>:absent&&!sub?<span style={{color:"#dc2626",fontSize:12}}>⚠ Unassigned</span>:<span style={{color:"#16a34a",fontSize:12}}>✓</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── Guardian helper: find children of a guardian in family cards ── */
function getGuardianChildren(name,kanbanCards){
  if(!kanbanCards)return[];
  const out=[];
  kanbanCards.forEach(card=>{
    if(card.type!=="Group/Family")return;
    const isGuard=card.members.some(m=>m.name===name&&m.isGuardian);
    if(!isGuard)return;
    card.members.forEach(m=>{if(m.name!==name)out.push(m.name);});
  });
  return out;
}

/* ═════════════════════════════════════════════════════
   PersonalStudentView
═════════════════════════════════════════════════════ */
function PersonalStudentView({name,sched,absentSets,subsByDay,rooms1on1,groupRosters,selDay,setSelDay,messages,onOpenMessenger,kanbanCards,onChangePassword,mealPlan,mealSkips,setMealSkips}){
  const stuSched=useMemo(()=>buildStudentSched(sched),[sched]);
  const absentSet=absentSets[selDay]||new Set();
  const daySubs=subsByDay[selDay]||{};
  const guardianChildren=useMemo(()=>getGuardianChildren(name,kanbanCards),[name,kanbanCards]);
  const isGuardian=guardianChildren.length>0;
  const [activeTab,setActiveTab]=useState(name);

  /* Find the student's current assigned room from kanban cards.
     Normalizes "SEO,BOEUN" ↔ "SEO BOEUN" etc. for matching. */
  function getStudentRoom(sName){
    if(!kanbanCards||!sName)return null;
    const nn=(sName||"").toLowerCase().replace(/[,\s]+/g," ").trim();
    const today=new Date().toISOString().slice(0,10);
    for(const card of kanbanCards){
      for(const m of card.members||[]){
        const mn=(m.name||"").toLowerCase().replace(/[,\s]+/g," ").trim();
        if(mn!==nn)continue;
        /* Check roomHistory segments first, then fall back to roomNumber */
        const segs=getEffectiveRoomSegments(m);
        const cur=segs.find(s=>s.from<=today&&s.to>=today);
        const rn=cur?.roomNumber||m.roomNumber||null;
        if(rn)return rn;
        /* Hotel students have no room number — return hotel name from roomType */
        const rt=m.roomType||"";
        if(rt.startsWith("Hevea Hotel"))return"Hevea Hotel";
        if(rt.startsWith("Clover Hotel"))return"Clover Hotel";
        return null;
      }
    }
    return null;
  }

  /* Shared schedule-table renderer for self AND guardian children */
  function renderScheduleTable(studentName,guardianView){
    /* Use flexible resolver so "KIM DAM" ↔ "DAM KIM" both work */
    const resolvedName=resolveSchedName(studentName,stuSched);
    const ps=stuSched[resolvedName]||{};
    /* Also resolve group/activity assignments for this student */
    const grpAssign=buildGroupAssignments(resolvedName,sched,groupRosters);
    const headerBg=guardianView?"#0f766e":"#166534";
    const hasSomething=Object.keys(ps).length>0||Object.keys(grpAssign).length>0;
    const studentRoom=guardianView?getStudentRoom(studentName):null; /* guardian only — own room shown in header */
    return(
      <>
      {studentRoom&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"7px 14px",background:"#dbeafe",borderRadius:10,fontSize:13,fontWeight:700,color:"#1e40af"}}>
          🏠 Room {studentRoom}
          <span style={{fontSize:11,fontWeight:400,color:"#3b82f6"}}>(current assignment)</span>
        </div>
      )}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <table className="ps-t">
          <thead>
            <tr style={{background:headerBg,color:"white"}}>
              <th>Period</th><th>Time</th><th>Class</th><th>Room</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            {!hasSomething&&(
              <tr><td colSpan={5} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No classes assigned.</td></tr>
            )}
            {PERIODS.map(p=>{
              const pkey=pk(p.i);
              const teacher=ps[pkey];
              const grp=grpAssign[pkey];
              if(!teacher&&!grp)return null;

              /* ── 1:1 class row ── */
              if(teacher){
                const isAbs=absentSet.has(teacher);
                const sub=daySubs[teacher]?.[pkey];
                const room=rooms1on1?findRoom1on1(teacher,p.i,rooms1on1):null;
                const cKey=convKey(resolvedName,teacher);
                const unread=getUnreadCount(messages||{},cKey,resolvedName);
                const totalMsgs=(messages||{})[cKey]?.length||0;
                return(
                  <tr key={p.i} style={{background:isAbs&&sub?"#fef9c3":isAbs&&!sub?"#fef2f2":"white"}}>
                    <td style={{fontWeight:700}}>{p.label}</td>
                    <td style={{color:"#6b7280"}}>{p.time}</td>
                    <td>
                      <button
                        onClick={()=>onOpenMessenger&&onOpenMessenger(
                          guardianView
                            ?{teacher,student:resolvedName,isGuardian:true,guardianName:name}
                            :{teacher,student:resolvedName}
                        )}
                        style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"inline-flex",alignItems:"center",gap:5}}>
                        {isAbs&&sub
                          ?<span><span className="orig-s" style={{marginRight:6}}>{teacher}</span><b style={{color:"#b45309"}}>{sub}</b></span>
                          :<span style={{fontWeight:600,color:"#1e40af",textDecoration:"underline",textDecorationColor:"#93c5fd",fontSize:13}}>{teacher}</span>
                        }
                        {guardianView
                          ?totalMsgs>0
                            ?<span style={{background:"#e0e7ff",color:"#3730a3",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px",lineHeight:1.4,flexShrink:0}}>💬{totalMsgs}</span>
                            :<span style={{color:"#c7d2fe",fontSize:12,flexShrink:0}}>💬</span>
                          :unread>0
                            ?<span style={{background:"#dc2626",color:"white",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px",lineHeight:1.4,flexShrink:0}}>{unread}</span>
                            :<span style={{color:"#93c5fd",fontSize:12,flexShrink:0}}>💬</span>
                        }
                      </button>
                    </td>
                    <td>{room?<span style={{fontWeight:700,color:isAbs&&sub?"#b45309":"#7c3aed",fontSize:12}}>{roomLabel(room)}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                    <td>{isAbs&&sub?<span style={{background:"#fef9c3",color:"#b45309",padding:"2px 8px",borderRadius:10,fontWeight:700,fontSize:12}}>🔄 Sub</span>:isAbs&&!sub?<span style={{color:"#dc2626",fontSize:12}}>⚠ TBD</span>:<span style={{color:"#16a34a",fontSize:12}}>✓</span>}</td>
                  </tr>
                );
              }

              /* ── Group / Activity / Kindergarten class row ── */
              if(grp){
                const{kind,roomKey,teacher:grpTeacher,label}=grp;
                const isAct=kind==="activity";
                const isKdr=kind==="kinder";
                const rowBg=isAct?"#f0fdf4":isKdr?"#fdf4ff":"#eff6ff";
                const badgeBg=isAct?"#059669":isKdr?"#7c3aed":"#2563eb";
                const gk=grpKey(roomKey,pkey);
                const unread=getUnreadCount(messages||{},gk,resolvedName);
                const members=(groupRosters||{})[roomKey]?.[pkey]||[];
                const allMembers=grpTeacher?[...members,grpTeacher]:members;
                return(
                  <tr key={p.i} style={{background:rowBg}}>
                    <td style={{fontWeight:700}}>{p.label}</td>
                    <td style={{color:"#6b7280"}}>{p.time}</td>
                    <td>
                      <button
                        onClick={()=>onOpenMessenger&&onOpenMessenger({
                          isGroup:true,
                          groupKey:gk,
                          groupLabel:label,
                          groupMembers:allMembers,
                        })}
                        style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"inline-flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{background:badgeBg,color:"white",borderRadius:6,fontSize:10,fontWeight:800,padding:"2px 7px",flexShrink:0}}>{isAct?"Activity":isKdr?"Kinder":"Group"}</span>
                        <span style={{fontWeight:600,color:badgeBg,fontSize:13}}>{label}</span>
                        {grpTeacher&&<span style={{fontSize:11,color:"#64748b",flexShrink:0}}>👤 {grpTeacher}</span>}
                        {unread>0
                          ?<span style={{background:"#dc2626",color:"white",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px",lineHeight:1.4,flexShrink:0}}>{unread}</span>
                          :<span style={{color:"#93c5fd",fontSize:12,flexShrink:0}}>💬</span>
                        }
                      </button>
                    </td>
                    <td><span style={{color:"#d1d5db"}}>—</span></td>
                    <td><span style={{color:"#16a34a",fontSize:12}}>✓</span></td>
                  </tr>
                );
              }
              return null;
            })}
          </tbody>
        </table>
      </div>
      </>
    );
  }

  const ownResolvedName=resolveSchedName(name,stuSched);
  const ownPs=stuSched[ownResolvedName]||{};
  const ownHasAbs=Object.values(ownPs).some(t=>absentSet.has(t));

  /* ── Family tab bar (guardian + children) ── */
  const familyTabs=isGuardian?[{key:name,label:"👑 "+name,isParent:true},...guardianChildren.map(c=>({key:c,label:"👤 "+c,isParent:false}))]:[];
  const tabPerson=isGuardian?activeTab:name;
  const tabIsParent=isGuardian&&activeTab===name;

  /* Absence badge for a given person */
  function personHasAbs(pName){
    const r=resolveSchedName(pName,stuSched);
    const ps=stuSched[r]||{};
    return Object.values(ps).some(t=>absentSet.has(t));
  }

  return(
    <div>
      {/* ── Header card ── */}
      <div className="card" style={{marginBottom:16,background:isGuardian?"#eff6ff":"white"}}>
        <div style={{fontSize:20,fontWeight:800,color:isGuardian?"#1e40af":"#166534"}}>
          {isGuardian?"👨‍👩‍👧 Welcome, "+name+" (Guardian)":"📚 Welcome, "+name}
        </div>
        <ChangePasswordWidget name={name} onChangePassword={onChangePassword}/>
        {!isGuardian&&(()=>{
          const room=getStudentRoom(name);
          return room
            ?<div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:8,background:"#dbeafe",color:"#1e40af",borderRadius:10,padding:"5px 14px",fontSize:14,fontWeight:800}}>
                🏠 Room {room}
              </div>
            :null;
        })()}
        {isGuardian
          ?<p style={{marginTop:6,color:"#4b5563",fontSize:14}}>
              Family account — {selDay}
            </p>
          :ownHasAbs
            ?<p style={{marginTop:6,color:"#b45309",fontWeight:600,fontSize:14}}>⚠ Your teacher is absent today. Please check for a substitute.</p>
            :<p style={{marginTop:6,color:"#6b7280",fontSize:14}}>{selDay} class schedule.</p>
        }
      </div>

      {/* ── Family tab bar (guardian mode only) ── */}
      {isGuardian&&(
        <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
          {familyTabs.map(tab=>{
            const active=activeTab===tab.key;
            const hasAbs=personHasAbs(tab.key);
            const tabRoom=getStudentRoom(tab.key); // show room for both guardian + children
            return(
              <button key={tab.key} onClick={()=>setActiveTab(tab.key)}
                style={{
                  padding:"7px 14px",borderRadius:"8px 8px 0 0",border:"1.5px solid",
                  borderColor:active?(tab.isParent?"#1e40af":"#0f766e"):"#e2e8f0",
                  borderBottom:active?"none":"1.5px solid #e2e8f0",
                  background:active?(tab.isParent?"#eff6ff":"#f0fdfa"):"white",
                  color:active?(tab.isParent?"#1e40af":"#0f766e"):"#6b7280",
                  fontWeight:active?800:500,fontSize:13,cursor:"pointer",
                  display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",
                  boxShadow:active?"0 -2px 6px rgba(0,0,0,.06)":"none",
                  position:"relative",top:active?1:0
                }}>
                {tab.label}
                {tabRoom&&<span style={{fontSize:10,background:active?"#bfdbfe":"#e0e7ff",color:"#1e40af",borderRadius:5,padding:"1px 6px",fontWeight:800}}>🏠{tabRoom}</span>}
                {hasAbs&&<span style={{fontSize:10,background:"#fee2e2",color:"#dc2626",borderRadius:5,padding:"1px 5px",fontWeight:700}}>⚠</span>}
              </button>
            );
          })}
        </div>
      )}

      <DayBar selDay={selDay} setSelDay={setSelDay} color={isGuardian?(tabIsParent?"#1e40af":"#0f766e"):"#166534"}/>

      {/* ── Meal schedule — shows on all tabs (parent + child) ── */}
      {(()=>{
        const mKey=dayToMealKey(selDay);
        const dayMeal=mealPlan?.plan?.[mKey]||{};
        /* tabPerson = child name when guardian views child tab; own name otherwise */
        const mealStudent=tabPerson;
        const card=kanbanCards?.find(c=>c.members?.some(m=>m.name===mealStudent));
        const isJunior=card?.type==="Junior Camp";
        const isWeekend=selDay==="Saturday"||selDay==="Sunday";
        const skips=(mealSkips?.[mKey]?.[mealStudent])||{};
        function toggleSkip(slot){
          if(!setMealSkips)return;
          setMealSkips(prev=>{
            const n=JSON.parse(JSON.stringify(prev));
            if(!n[mKey])n[mKey]={};if(!n[mKey][mealStudent])n[mKey][mealStudent]={};
            n[mKey][mealStudent][slot]=!n[mKey][mealStudent][slot];
            return n;
          });
        }
        const slots=[];
        if(!isWeekend){
          /* ── Weekday meals ── */
          slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"7:30 – 8:30",menu:(()=>{const p=[dayMeal.breakfast?.items,dayMeal.breakfast?.soup].filter(Boolean);p.push("+ Bread & Jam");return p.join(" · ");})()});
          slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:isJunior?"11:50 – 12:35":"12:35 – 1:25",menu:(()=>{const d=dayMeal.lunch||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.fruit)p.push(`[Fruit] ${d.fruit}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:35 – 6:15",menu:(()=>{const d=dayMeal.dinner||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          if(isJunior)slots.push({key:"eveningSnack",icon:"🍕",label:"Evening Snack",time:"7:50 – 8:30",menu:dayMeal.nightSnack||null});
        }else if(isJunior){
          /* ── JC weekend: all 4 meals ── */
          slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"8:00 – 9:00 am",menu:dayMeal.breakfast?.soup?`Rice, Soup & Kimchi · ${dayMeal.breakfast.soup} · + Bread & Jam`:"Rice, Soup & Kimchi · + Bread & Jam"});
          slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",menu:dayMeal.brunchSoup?`Rice, Soup & Kimchi · ${dayMeal.brunchSoup}`:"Rice, Soup & Kimchi"});
          slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:"12:00 – 1:00 pm",menu:(()=>{const d=dayMeal.lunch||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:00 – 6:00 pm",menu:(()=>{const d=dayMeal.dinner||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
        }else{
          /* ── Regular weekend: brunch only ── */
          slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",menu:dayMeal.brunchSoup?`Rice, Soup & Kimchi · ${dayMeal.brunchSoup}`:"Rice, Soup & Kimchi"});
        }
        if(slots.length===0)return null;
        return(
          <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#0d9488",marginBottom:10}}>🍽️ Today's Meals</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {slots.map(s=>{
                const skipped=!!skips[s.key];
                return(
                  <div key={s.key} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,background:skipped?"#f9fafb":"#f0fdfa",border:`1.5px solid ${skipped?"#e2e8f0":"#99f6e4"}`,opacity:skipped?.7:1,transition:"all .15s"}}>
                    <span style={{fontSize:16,flexShrink:0}}>{s.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                        <span style={{fontSize:12,fontWeight:800,color:skipped?"#9ca3af":"#0d9488"}}>{s.label}</span>
                        <span style={{fontSize:10,color:"#64748b",background:"#e2e8f0",padding:"1px 7px",borderRadius:8}}>{s.time}</span>
                        {skipped&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fee2e2",padding:"1px 7px",borderRadius:8}}>SKIP</span>}
                      </div>
                      <div style={{fontSize:11,color:skipped?"#9ca3af":"#374151"}}>{s.menu||<span style={{fontStyle:"italic",color:"#9ca3af"}}>Menu not set</span>}</div>
                    </div>
                    {!isJunior&&(
                    <button onClick={()=>toggleSkip(s.key)}
                      style={{flexShrink:0,padding:"4px 10px",borderRadius:8,border:`1.5px solid ${skipped?"#6b7280":"#f87171"}`,background:skipped?"#6b7280":"white",color:skipped?"white":"#dc2626",fontSize:10.5,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
                      {skipped?"↩ Undo":"Skip"}
                    </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── Schedule content: either own (non-guardian) or active tab (guardian) ── */}
      {!isGuardian&&renderScheduleTable(name,false)}
      {isGuardian&&renderScheduleTable(tabPerson,!tabIsParent)}
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   MessengerModal
   • 1:1 mode: teacher ↔ student
   • Group mode (isGroup=true): all class members share one room
   • File sharing: images / docs / video ≤ 500 KB (base64)
   isAdmin=true → read-only view for admin oversight
═════════════════════════════════════════════════════ */
function MessengerModal({currentUser,otherUser,isAdmin,isGroup,groupKey,groupLabel,groupMembers,messages,onSend,onMarkRead,onClose,convOverride}){
  const cKey=isGroup?groupKey:(convOverride||convKey(currentUser,otherUser));
  const conv=messages[cKey]||[];
  const[text,setText]=useState("");
  const[filePreview,setFilePreview]=useState(null); // {name,type,data,size}
  const[fileTooLarge,setFileTooLarge]=useState(false);
  const bottomRef=React.useRef(null);
  const fileRef=React.useRef(null);

  React.useEffect(()=>{if(!isAdmin&&onMarkRead)onMarkRead(cKey,currentUser);},[]);
  React.useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[conv.length]);

  function handleFile(e){
    const file=e.target.files?.[0];if(!file)return;
    setFileTooLarge(false);
    if(file.size>500*1024){setFileTooLarge(true);e.target.value="";return;}
    const reader=new FileReader();
    reader.onload=()=>setFilePreview({name:file.name,type:file.type,data:reader.result,size:file.size});
    reader.readAsDataURL(file);
    e.target.value="";
  }

  function sendMsg(){
    if(!text.trim()&&!filePreview)return;
    onSend(cKey,currentUser,text.trim()||null,filePreview||null);
    setText("");setFilePreview(null);setFileTooLarge(false);
  }

  const headerBg=isGroup?"#0d9488":"#1e40af";

  function renderMsgBubble(msg){
    const self=msg.from===currentUser;
    const isImg=msg.file&&msg.file.type.startsWith("image/");
    const isVid=msg.file&&msg.file.type.startsWith("video/");
    return(
      <div key={msg.id} style={{display:"flex",flexDirection:"column",alignItems:self?"flex-end":"flex-start",maxWidth:"100%"}}>
        {(!self||isGroup)&&<div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:2,paddingLeft:2,paddingRight:2}}>{msg.from}</div>}
        <div style={{
          maxWidth:260,overflow:"hidden",
          borderRadius:self?"16px 16px 4px 16px":"16px 16px 16px 4px",
          background:self?"#1e40af":"white",
          color:self?"white":"#1e293b",
          boxShadow:"0 1px 4px rgba(0,0,0,.1)",
          fontSize:13,lineHeight:1.45,wordBreak:"break-word"
        }}>
          {isImg&&<img src={msg.file.data} alt={msg.file.name} style={{display:"block",maxWidth:220,maxHeight:200,width:"100%",objectFit:"contain"}}/>}
          {isVid&&<video src={msg.file.data} controls style={{display:"block",maxWidth:220,maxHeight:160,width:"100%"}}/>}
          {msg.file&&!isImg&&!isVid&&(
            <div style={{padding:"9px 13px"}}>
              <a href={msg.file.data} download={msg.file.name} style={{color:self?"#bfdbfe":"#1e40af",textDecoration:"underline",fontSize:12}}>
                📎 {msg.file.name} <span style={{opacity:.7}}>({Math.round(msg.file.size/1024)}KB)</span>
              </a>
            </div>
          )}
          {msg.text&&<div style={{padding:"9px 13px"}}>{msg.text}</div>}
        </div>
        <div style={{fontSize:9,color:"#94a3b8",marginTop:2,paddingLeft:2,paddingRight:2}}>
          {new Date(msg.ts).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}
          {isAdmin&&<span style={{marginLeft:6,fontWeight:600}}>{msg.from}</span>}
        </div>
      </div>
    );
  }

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:2000,display:"flex",alignItems:"flex-end",justifyContent:"flex-end",padding:24}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:380,maxHeight:"82vh",display:"flex",flexDirection:"column",background:"white",borderRadius:18,boxShadow:"0 12px 48px rgba(0,0,0,.3)",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"14px 16px",background:headerBg,color:"white",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexShrink:0}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:14,fontWeight:800}}>
              {isGroup?"👥 "+groupLabel:isAdmin?`💬 ${currentUser} ↔ ${otherUser}`:"💬 Chat with "+otherUser}
            </div>
            <div style={{fontSize:11,opacity:.8,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {isAdmin?"👁 Admin — read only":isGroup?(groupMembers||[]).join(", "):currentUser}
            </div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",fontSize:18,cursor:"pointer",borderRadius:8,padding:"4px 8px",lineHeight:1,flexShrink:0}}>✕</button>
        </div>
        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"14px 12px",display:"flex",flexDirection:"column",gap:6,background:"#f1f5f9"}}>
          {conv.length===0&&(
            <div style={{textAlign:"center",color:"#94a3b8",fontSize:12,marginTop:50,fontStyle:"italic"}}>아직 메시지가 없습니다</div>
          )}
          {conv.map(msg=>renderMsgBubble(msg))}
          <div ref={bottomRef}/>
        </div>
        {/* File preview strip */}
        {filePreview&&(
          <div style={{padding:"8px 12px",background:"#f8fafc",borderTop:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            {filePreview.type.startsWith("image/")?<img src={filePreview.data} style={{width:40,height:40,objectFit:"cover",borderRadius:6}}/>:<span style={{fontSize:22}}>📎</span>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{filePreview.name}</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>{Math.round(filePreview.size/1024)}KB</div>
            </div>
            <button onClick={()=>setFilePreview(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#9ca3af",flexShrink:0,padding:0}}>✕</button>
          </div>
        )}
        {fileTooLarge&&(
          <div style={{padding:"6px 14px",background:"#fef2f2",borderTop:"1px solid #fecaca",fontSize:11,color:"#dc2626",flexShrink:0}}>
            ⚠ 파일이 500KB를 초과합니다. Google Drive 또는 링크로 공유해주세요.
          </div>
        )}
        {/* Input — hidden for admin */}
        {!isAdmin&&(
          <div style={{padding:"10px 12px",borderTop:"1px solid #e2e8f0",display:"flex",gap:8,background:"white",flexShrink:0,alignItems:"center"}}>
            <input type="file" ref={fileRef} onChange={handleFile} accept="image/*,video/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt" style={{display:"none"}}/>
            <button onClick={()=>fileRef.current?.click()} title="파일 첨부 (최대 500KB)"
              style={{background:"#f1f5f9",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"7px 9px",cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0,color:"#64748b"}}>📎</button>
            <input
              value={text} onChange={e=>setText(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}
              placeholder="메시지 입력..."
              style={{flex:1,padding:"9px 14px",borderRadius:22,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",background:"#f8fafc"}}
              autoFocus
            />
            <button onClick={sendMsg} disabled={!text.trim()&&!filePreview}
              style={{padding:"9px 16px",borderRadius:22,background:(text.trim()||filePreview)?headerBg:"#e2e8f0",color:(text.trim()||filePreview)?"white":"#9ca3af",border:"none",cursor:(text.trim()||filePreview)?"pointer":"default",fontWeight:700,fontSize:13,flexShrink:0,transition:"background .15s"}}>
              전송
            </button>
          </div>
        )}
      </div>
    </div>,
    document.body
  );
}

function makeLoaText(entry){
  const MON=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const MONFULL=["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  const names=entry.members.map(m=>(m.name||"").toUpperCase()).filter(Boolean).join(" / ")||"___";
  const dobs=entry.members.map(m=>{
    if(!m.birthMonth&&!m.birthDay&&!m.birthYear)return"N/A";
    const mon=MON[(parseInt(m.birthMonth)||1)-1]||"";
    return`${mon},${String(m.birthDay||"").padStart(2,"0")},${m.birthYear||""}`;
  }).join(" / ");
  const country=(entry.members[0]?.nationality||"TAIWAN").toUpperCase();
  function fmtD(s){if(!s)return"___";const[y,mo,d]=s.split("-");return`${MONFULL[(parseInt(mo)||1)-1]},${parseInt(d)},${y}`;}
  const prog=[...new Set(entry.members.map(m=>m.course).filter(Boolean))].join(", ").toUpperCase()||"___";
  const{start:_s,end:_e}=entryDates(entry);
  const start=fmtD(_s);const end=fmtD(_e);
  return`NAME OF STUDENT : ${names}
DATE OF BIRTH : ${dobs}
COUNTRY : ${country}

This document certifies that the above mentioned applicant has been into HANA for the following program;

Program: ${prog}
Duration: ${start} ~ ${end}

We look forward to seeing you as a student of HANA. If you have any questions, please do not hesitate to contact us.

HANA Academy. Lot 3-2a CutCut. Friendship Highway. Angeles City. Philippines
Tel. 0926 727 4196

Sincerely,`;
}

function makePickupText(entry){
  const fl=entry.flightInfo||{};
  const names=entry.members.map(m=>m.name||"").filter(Boolean);
  const disp=(names[0]||"___")+(names.length>1?`+${names.length-1}`:"");
  const AIRPORTS={"Clark":"clark airport","Manila1":"NAIA Terminal 1","Manila2":"NAIA Terminal 2","Manila3":"NAIA Terminal 3"};
  const airLabel=AIRPORTS[fl.airport]||fl.airport||"___";
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let dateDisp=fl.arrivalDate||"___";
  if(fl.arrivalDate){const d=new Date(fl.arrivalDate+"T00:00:00");dateDisp=`${fl.arrivalDate} (${DAYS[d.getDay()]})`;}
  return`[ Pick-up Information ]

Flight info Arrival Time and Date\t${fl.flightNumber||"___"} / ${dateDisp} ${fl.arrivalTime||""} / ${airLabel}
PERSONAL INFORMATION\t${disp}

Welcome To HANA Academy
Contact : 0926 727 4196 (Mr Bryan,Ko) 0966 633 8642 (Driver, Joel)`;
}

/* ── Agency pipeline helpers ── */
const STEP_COLORS=["#0d9488","#2563eb","#0891b2","#16a34a"];
const AG_NAVY="#1a1f3c";
const AG_GOLD="#c9a84c";
const AG_GOLD_BG="rgba(201,168,76,.13)";
const AG_GOLD_BORDER="rgba(201,168,76,.35)";
const STEP_LABELS=["Form","LOA","Pickup","Card"];

/* Compute overall date range across all members (member dates take priority over entry-level) */
function entryDates(e){
  const starts=(e.members||[]).map(m=>m.studyStart).filter(Boolean).sort();
  const ends=(e.members||[]).map(m=>m.studyEnd).filter(Boolean).sort();
  return{
    start:starts[0]||e.studyStart||"",
    end:ends[ends.length-1]||e.studyEnd||""
  };
}
function getSteps(e){
  const{start,end}=entryDates(e);
  const s1=!!(start&&end&&e.members?.some(m=>m.name));
  const s2=!!e.acceptanceLetter?.confirmed;
  const s3=e.flightInfo?.pickupRequired?!!e.pickupLetter?.confirmed:!!(e.flightInfo?.arrivalDate);
  const s4=!!e.kanbanCardId;
  return[s1,s2,s3,s4];
}

      <div style={{fontSize:12,fontWeight:700,color:active?"white":"#1a1f3c",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:2}}>{names}</div>

        {steps.map((done,i)=>(
          <div key={i} style={{width:17,height:17,borderRadius:"50%",
            background:done?(active?AG_GOLD:STEP_COLORS[i]):(active?"rgba(255,255,255,.1)":"#e8eaf2"),
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,

/* ═══════════════════════════════════════════════════════
   MealCellPopup — inline edit popup for table cell
═══════════════════════════════════════════════════════ */
function MealCellPopup({value,options,onSave,onClose,onAddToDb,accentColor}){
  const[q,setQ]=useState("");
  const[val,setVal]=useState(value||"");
  const ref=useRef(null);
  const accent=accentColor||"#0d9488";
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))onClose();}
    setTimeout(()=>document.addEventListener("mousedown",h),0);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const filtered=q?options.filter(o=>o.toLowerCase().includes(q.toLowerCase())):options;
  const valTrimmed=val.trim();
  const isNewItem=valTrimmed&&!options.includes(valTrimmed);
  return(
    <div ref={ref} style={{position:"absolute",top:"100%",left:0,zIndex:500,background:"white",border:"1.5px solid #e2e8f0",borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.18)",minWidth:240,maxWidth:310,padding:8}}>
      <input value={val} onChange={e=>setVal(e.target.value)} placeholder="Type or select…"
        style={{width:"100%",padding:"5px 8px",borderRadius:6,border:`1.5px solid ${accent}`,fontSize:11.5,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:5}}
        onKeyDown={e=>{if(e.key==="Enter"){onSave(val);onClose();}if(e.key==="Escape")onClose();}}
        autoFocus/>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search DB…"
        style={{width:"100%",padding:"4px 8px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:11,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:4,color:"#6b7280"}}/>
      <div style={{maxHeight:150,overflowY:"auto"}}>
        {filtered.length===0&&<div style={{padding:"6px 8px",color:"#9ca3af",fontSize:11}}>No results</div>}
        {filtered.map(o=>(
          <button key={o} onClick={()=>{setVal(o);}}
            style={{display:"block",width:"100%",textAlign:"left",padding:"5px 8px",border:"none",borderRadius:5,background:val===o?`${accent}18`:"white",color:val===o?accent:"#374151",fontSize:11,cursor:"pointer",fontWeight:val===o?700:400}}>
            {val===o?"✓ ":""}{o}
          </button>
        ))}
      </div>
      {isNewItem&&onAddToDb&&(
        <div style={{margin:"5px 0 2px",padding:"4px 8px",background:"#f0fdf4",borderRadius:6,fontSize:10.5,color:"#166534",display:"flex",alignItems:"center",gap:6}}>
          <span style={{flex:1}}>Add <b>"{valTrimmed}"</b> to DB?</span>
          <button onClick={()=>{onAddToDb(valTrimmed);onSave(valTrimmed);onClose();}}
            style={{padding:"2px 8px",borderRadius:5,border:"1px solid #86efac",background:"#dcfce7",color:"#166534",fontSize:10,cursor:"pointer",fontWeight:700}}>+ Add & Save</button>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:5,gap:4}}>
        <button onClick={()=>{onSave("");onClose();}} style={{padding:"3px 10px",borderRadius:6,border:"1px solid #fecaca",background:"white",color:"#dc2626",fontSize:10.5,cursor:"pointer",fontWeight:700}}>✕ Clear</button>
        <button onClick={()=>{onSave(val);onClose();}} style={{padding:"3px 10px",borderRadius:6,border:"none",background:accent,color:"white",fontSize:10.5,cursor:"pointer",fontWeight:700}}>Save</button>
      </div>
    </div>
  );
}

function AddToDbPopup({row,onAdd,onClose,accent}){
  const[val,setVal]=useState("");
