/* ─────────────────────────────────────────────────────
   hasPeriodConflict — checks if any of the given students
   already have a class at toPeriod (used for horizontal drag).
   srcTeacher/srcPeriod/srcRoomKey = source cell being moved
   (excluded from the check so a cell doesn't conflict with itself).
───────────────────────────────────────────────────── */
function hasPeriodConflict(students,toPeriod,sched,cellData,groupRosters,selDay,srcTeacher,srcPeriod,srcRoomKey){
  if(!students||!students.length)return false;
  const sk=s=>s.toLowerCase().split(/\s+/).sort().join(' ');
  const stuKeys=new Set(students.map(sk));
  /* 1on1 assignments across all teachers at toPeriod */
  for(const[t,ps]of Object.entries(sched)){
    const asgn=ps[toPeriod];
    if(!asgn)continue;
    /* Skip the source cell itself (same teacher & same period) */
    if(t===srcTeacher&&toPeriod===srcPeriod)continue;
    const meta=(cellData?.[selDay]?.[t]?.[toPeriod])||{};
    const ct=meta.classType;
    /* Only check 1on1-style cells (not group/activity/kinder) */
    if(!ct||ct==="Individual"||(ct!=="Group Class"&&ct!=="Activity Class"&&ct!=="Kindergarten")){
      if(stuKeys.has(sk(asgn)))return true;
    }
  }
  /* Group / Activity / Kinder rosters at toPeriod */
  for(const[roomKey,periods]of Object.entries(groupRosters||{})){
    /* If vertical move (same period), skip the source room — it's being moved, not doubled */
    if(toPeriod===srcPeriod&&roomKey===srcRoomKey)continue;
    const roster=periods[toPeriod];
    if(!roster||!roster.length)continue;
    if(roster.some(s=>stuKeys.has(sk(s))))return true;
  }
  return false;
}

/* ═════════════════════════════════════════════════════
   TeacherScheduleGrid
═════════════════════════════════════════════════════ */
function TeacherScheduleGrid({sched,cellData,groupRosters,selDay,subsByDay,absentSet,daySubs,rooms1on1,studentData,pushSnap,isAdmin,onTeacherClick,messages,onOpenMessenger}){
  const[editCell,setEditCell]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const dragRef=useRef(null);
  /* Evening periods 13/14: show only when assignments exist */
  const eveningDefs=PERIODS_EXTENDED.filter(p=>p.i===13||p.i===14);
  const hasEvening=eveningDefs.some(p=>{
    const key=pk(p.i);
    if(Object.values(sched).some(ps=>!!ps[key]))return true;
    if(cellData&&selDay){const dd=cellData[selDay]||{};if(Object.values(dd).some(td=>!!td[key]))return true;}
    if(groupRosters&&Object.values(groupRosters).some(r=>!!r[key]))return true;
    return false;
  });
  const activePeriods=hasEvening?[...PERIODS,...eveningDefs]:PERIODS;
  function handleDrop(toTeacher,toPeriod){
    const src=dragRef.current;
    if(!src)return;
    /* Dropped on itself — no-op */
    if(src.teacher===toTeacher&&src.period===toPeriod)return;
    const val=(sched[src.teacher]||{})[src.period];
    /* Source must have a value; target must be empty */
    if(!val||(sched[toTeacher]||{})[toPeriod])return;
    /* For cross-period moves, check student schedule conflicts */
    if(src.period!==toPeriod&&src.students&&src.students.length>0){
      if(hasPeriodConflict(src.students,toPeriod,sched,cellData,groupRosters,selDay,src.teacher,src.period,src.roomKey))return;
    }
    const ns=JSON.parse(JSON.stringify(sched));
    delete ns[src.teacher][src.period];
    if(!ns[toTeacher])ns[toTeacher]={};
    ns[toTeacher][toPeriod]=val;
    const nc=JSON.parse(JSON.stringify(cellData||{}));
    const srcMeta=nc[selDay]?.[src.teacher]?.[src.period];
    if(srcMeta){
      if(!nc[selDay])nc[selDay]={};
      if(!nc[selDay][toTeacher])nc[selDay][toTeacher]={};
      nc[selDay][toTeacher][toPeriod]=srcMeta;
      if(nc[selDay]?.[src.teacher])delete nc[selDay][src.teacher][src.period];
    }
    const snapData={sched:ns,cellData:nc};
    /* For cross-period group/activity/kinder moves, migrate the roster entry */
    if(src.period!==toPeriod&&src.roomKey){
      const nr=JSON.parse(JSON.stringify(groupRosters||{}));
      if(nr[src.roomKey]){
        const roster=nr[src.roomKey][src.period];
        if(roster){nr[src.roomKey][toPeriod]=roster;delete nr[src.roomKey][src.period];}
      }
      snapData.groupRosters=nr;
    }
    pushSnap(snapData);
    dragRef.current=null;setDragOver(null);
  }
  return(
    <div className="sw">
      {editCell&&<TeacherCellModal teacher={editCell.teacher} period={editCell.period} selDay={selDay} sched={sched} subsByDay={subsByDay} rooms1on1={rooms1on1} absentSet={absentSet} cellData={cellData} groupRosters={groupRosters} studentData={studentData} pushSnap={pushSnap} onClose={()=>setEditCell(null)} isAdmin={isAdmin} messages={messages} onOpenMessenger={onOpenMessenger}/>}
      <table className="st" style={{tableLayout:"fixed"}}>
        <thead><tr style={{background:"#1e3a8a",color:"white"}}>
          <th style={{textAlign:"left",width:145,padding:"8px 12px",position:"sticky",left:0,background:"#0d9488",zIndex:10}}>Teacher</th>
          {activePeriods.map(p=><th key={p.i} style={{width:88,borderLeft:p.i===13?"3px solid #fbbf24":undefined}}><div>{p.label}</div><div style={{fontSize:9,opacity:.8,fontWeight:400}}>{p.time}</div>{p.i===13&&<div style={{fontSize:8,fontWeight:800,color:"#fbbf24",letterSpacing:.5,marginTop:1}}>EVENING</div>}</th>)}
        </tr></thead>
        <tbody>
          {TEACHERS.map(teacher=>{
            const isAbsent=absentSet.has(teacher);
            const tSubs=daySubs[teacher]||{};
            return(
              <tr key={teacher}>
                <td className={`cn cn-t${isAbsent?" cn-absent":""}`}>
                  <span className="name-link" onClick={()=>onTeacherClick&&onTeacherClick(teacher)} style={{fontSize:12,fontWeight:700,cursor:onTeacherClick?"pointer":"default"}}>{teacher}</span>
                  {isAbsent&&<span className="bad-abs">ABSENT</span>}
                  {Object.values(rooms1on1).some(ps=>Object.values(ps).includes(teacher))&&
                    <div style={{fontSize:9,color:"#7c3aed",marginTop:1}}>
                      {Object.entries(rooms1on1).filter(([,ps])=>Object.values(ps).includes(teacher)).slice(0,2).map(([rm])=>roomLabel(rm)).join(" · ")}
                    </div>
                  }
                </td>
                {activePeriods.map(p=>{
                  const key=pk(p.i);
                  const orig=sched[teacher]?.[key]||null;
                  const sub=tSubs[key]||null;
                  const meta=cellData?.[selDay]?.[teacher]?.[key]||{};
                  const isDO=dragOver?.teacher===teacher&&dragOver?.period===key;
                  const isConflict=isDO&&dragOver?.conflict;
                  const canDrag=!!(isAdmin&&orig&&!isAbsent);
                  const baseCls=sub?"csub":isAbsent&&orig?"cab":cellCls(orig);
                  if(!isAdmin){
                    return(
                      <td key={p.i} className={baseCls} style={p.i===13?{borderLeft:"3px solid #c9a84c"}:undefined}>
                        <div className="ci">
                          {sub&&<div className="sub-b">SUB</div>}
                          {isAbsent&&orig&&<div className={sub?"":"orig-s"}>{orig}</div>}
                          <span style={{fontSize:11}}>{sub||orig||<span style={{color:"#d1d5db"}}>—</span>}</span>
                        </div>
                      </td>
                    );
                  }
                  return(
                    <td key={p.i}
                      className={`ct ${baseCls}${isDO&&!isConflict?" drag-over":isDO&&isConflict?" drag-over-conflict":""}`}
                      style={p.i===13?{borderLeft:"3px solid #c9a84c"}:undefined}
                      draggable={canDrag}
                      title={canDrag?"Drag ↕↔ to move · Click to edit":"Click to edit"}
                      onDragStart={canDrag?()=>{
                        const meta=cellData?.[selDay]?.[teacher]?.[key]||{};
                        const ct=meta.classType;
                        let students=[],roomKey=null;
                        if(ct==="Group Class"&&meta.groupRoom){
                          roomKey="Group "+meta.groupRoom;
                          students=groupRosters?.[roomKey]?.[key]||[];
                        }else if(ct==="Activity Class"&&meta.activityGroup){
                          roomKey="Activity "+meta.activityGroup;
                          students=groupRosters?.[roomKey]?.[key]||[];
                        }else if(ct==="Kindergarten"){
                          roomKey="Kindergarten";
                          students=groupRosters?.["Kindergarten"]?.[key]||[];
                        }else{
                          students=orig?[orig]:[];
                        }
                        dragRef.current={teacher,period:key,students,roomKey};
                      }:undefined}
                      onDragEnd={()=>{dragRef.current=null;setDragOver(null);}}
                      onDragOver={e=>{
                        const src=dragRef.current;
                        if(!src)return;
                        /* Don't highlight the source cell itself */
                        if(src.teacher===teacher&&src.period===key)return;
                        let conflict=false;
                        if(!!orig){
                          /* Target already occupied — always a conflict */
                          conflict=true;
                        }else if(src.period!==key&&src.students&&src.students.length>0){
                          /* Cross-period move: check student schedule conflicts */
                          conflict=hasPeriodConflict(src.students,key,sched,cellData,groupRosters,selDay,src.teacher,src.period,src.roomKey);
                        }
                        e.preventDefault();
                        setDragOver({teacher,period:key,conflict});
                      }}
                      onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOver(null);}}
                      onDrop={e=>{e.preventDefault();handleDrop(teacher,key);}}
                      onClick={()=>setEditCell({teacher,period:p})}
                    >
                      {(()=>{
                        /* For 1on1 types: only show meta when a student is actually assigned.
                           Group / Activity / Kindergarten use groupRosters so always show. */
                        const isGroupType=meta.classType==="Group Class"||meta.classType==="Activity Class"||meta.classType==="Kindergarten";
                        const showMeta=!!meta.classType&&(isGroupType||!!orig||!!sub);
                        return(
                        <div className="ci">
                          {sub&&<div className="sub-b">SUB</div>}
                          {isAbsent&&orig&&<div className={sub?"":"orig-s"}>{orig}</div>}
                          {showMeta&&<div className="cell-meta">
                            {meta.classType==="Activity Class"
                              ?`Act. Grp ${meta.activityGroup||""}`
                              :meta.classType==="Group Class"&&meta.subType
                                ?`${meta.subType}`
                                :meta.classType}
                          </div>}
                          <span style={{fontSize:11}}>{sub||(isGroupType?null:orig)||(!isGroupType&&!orig?<span style={{color:"#d1d5db"}}>—</span>:null)}</span>
                          {showMeta&&meta.classType==="Activity Class"&&meta.activitySchedule?.[selDay]&&(
                            <div className="cell-sub-meta">{meta.activitySchedule[selDay]}</div>
                          )}
                          {showMeta&&meta.classType==="Group Class"&&meta.subType&&meta.gradeLevel&&(
                            <div className="cell-sub-meta">{meta.gradeLevel}</div>
                          )}
                          {showMeta&&meta.classType!=="Activity Class"&&meta.classType!=="Group Class"&&meta.subType&&!meta.groupRoom&&(
                            <div className="cell-sub-meta">{meta.subType}</div>
                          )}
                        </div>
                        );
                      })()}
                    </td>
                  );
                })}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   StudentDailyPopup  (click student name → daily schedule)
═════════════════════════════════════════════════════ */
function StudentDailyPopup({student,sched,absentSet,daySubs,rooms1on1,groupRosters,selDay,pushSnap,onClose,studentData,kanbanCards,mealPlan,mealSkips,setMealSkips}){
  const stuSched=useMemo(()=>buildStudentSched(sched),[sched]);
  const grpAssign=useMemo(()=>buildGroupAssignments(student,sched,groupRosters),[student,sched,groupRosters]);
  const myPs=stuSched[student]||{};
  const hasCls=Object.keys(myPs).length>0||Object.keys(grpAssign).length>0;
  /* Course summary for header */
  const memberData=studentData?.[student]||null;
  const counts=useMemo(()=>computeStudentCounts(student,sched,groupRosters),[student,sched,groupRosters]);
  const spec=useMemo(()=>student&&kanbanCards?getTransferAdjustedSpec(student,memberData,kanbanCards):getEffectiveSpec(memberData),[student,memberData,kanbanCards]);
  /* Build spec label: "Junior A (P4, PG2, Act2)" — only non-zero categories */
  const specLabel=useMemo(()=>{
    if(!spec)return null;
    const parts=[];
    if((spec.ph||0)>0)parts.push("P"+spec.ph);
    if((spec.na||0)>0)parts.push("N"+spec.na);
    if((spec.pg||0)>0)parts.push("PG"+spec.pg);
    if((spec.ng||0)>0)parts.push("NG"+spec.ng);
    if((spec.act||0)>0)parts.push("Act"+spec.act);
    const course=memberData?.course||"";
    return{name:getCourseShort(course),parts};
  },[spec,memberData]);
  const natCode=memberData?.nationality?NAT_CODE[memberData.nationality]||"":"";
  return(
    <div className="t-modal-bg" onClick={onClose}>
      <div className="t-modal" style={{position:"relative",maxWidth:600}} onClick={e=>e.stopPropagation()}>
        <button className="close-btn" onClick={onClose}>✕</button>
        <h3>📋 {student}{natCode?<span style={{fontSize:13,fontWeight:600,color:"#9ca3af",marginLeft:6}}>({natCode})</span>:null} — {selDay}</h3>
        {memberData?.course&&(
          <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:10,padding:"6px 12px",background:"#f0f4ff",borderRadius:8,border:"1px solid #c7d2fe"}}>
            <span style={{fontSize:12,fontWeight:800,color:"#1e3a8a"}}>
              {memberData.course==="Customized"
                ?(specLabel?.parts?.length>0?"Customized ("+specLabel.parts.join(", ")+")":"Customized")
                :getCourseShort(memberData.course)||memberData.course}
            </span>
            <CourseCompletionBadge counts={counts} memberData={memberData} student={student} kanbanCards={kanbanCards} inline/>
          </div>
        )}
        {!hasCls
          ?<p style={{color:"#9ca3af",textAlign:"center",padding:20}}>No classes assigned.</p>
          :<div style={{overflowX:"auto"}}>
            <table className="t-tbl">
              <thead><tr><th>Period</th><th>Time</th><th>Class</th><th>Teacher</th><th>Room</th><th>Status</th></tr></thead>
              <tbody>
                {PERIODS_EXTENDED.map(p=>{
                  const pkey=pk(p.i);
                  const teacher=myPs[pkey];
                  const grp=!teacher?grpAssign[pkey]:null;
                  if(!teacher&&!grp)return null;
                  /* Group / Kinder / Activity row */
                  if(grp){
                    const{label,teacher:gt,kind,roomKey}=grp;
                    const bg=kind==="kinder"?"#fef9c3":kind==="activity"?"#ede9fe":"#d1fae5";
                    const fg=kind==="kinder"?"#92400e":kind==="activity"?"#6b21a8":"#166534";
                    return(
                      <tr key={p.i} style={{background:bg}}>
                        <td style={{fontWeight:700}}>{p.label}</td>
                        <td style={{color:"#6b7280"}}>{p.time}</td>
                        <td><span style={{fontWeight:700,color:fg,fontSize:11}}>{label}</span></td>
                        <td style={{fontSize:11,color:"#6b7280"}}>{gt||"—"}</td>
                        <td><span style={{fontWeight:700,color:fg,fontSize:11}}>{roomKey||"—"}</span></td>
                        <td><span style={{color:"#16a34a",fontSize:11}}>✓ Present</span></td>
                      </tr>
                    );
                  }
                  /* 1on1 row */
                  const isAbs=absentSet.has(teacher);
                  const sub=daySubs[teacher]?.[pkey];
                  const room=findRoom1on1(teacher,p.i,rooms1on1);
                  const subRoom=sub?findRoom1on1(sub,p.i,rooms1on1):null;
                  return(
                    <tr key={p.i} style={{background:isAbs&&sub?"#fef9c3":isAbs&&!sub?"#fef2f2":"white"}}>
                      <td style={{fontWeight:700}}>{p.label}</td>
                      <td style={{color:"#6b7280"}}>{p.time}</td>
                      <td><span style={{fontSize:11,color:"#6b7280"}}>1on1</span></td>
                      <td>
                        {isAbs&&sub
                          ?<div><div className="orig-s" style={{fontSize:11}}>{teacher}</div><b style={{color:"#b45309"}}>{sub}</b></div>
                          :<span style={{fontWeight:600}}>{teacher}</span>}
                      </td>
                      <td>
                        {/* Always show the original (absent) teacher's room — sub goes to that room */}
                        {room?<span style={{fontWeight:700,color:isAbs&&sub?"#b45309":"#7c3aed",fontSize:11}}>{roomLabel(room)}</span>:<span style={{color:"#d1d5db"}}>—</span>}
                      </td>
                      <td>
                        {isAbs&&sub
                          ?<div style={{lineHeight:1.7}}>
                            <div style={{fontSize:11,color:"#dc2626",fontWeight:700}}>🚫 {teacher} — Absent</div>
                            <div style={{fontSize:11,color:"#b45309",fontWeight:700}}>🔄 {sub} — Substituted</div>
                          </div>
                          :isAbs&&!sub
                          ?<span style={{color:"#dc2626",fontSize:11}}>⚠ TBD</span>
                          :<span style={{color:"#16a34a",fontSize:11}}>✓ Present</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        }
        {/* ── Meal Schedule Section ── */}
        {(()=>{
          const mKey=dayToMealKey(selDay);
          const dayMeal=mealPlan?.plan?.[mKey]||{};
          const card=kanbanCards?.find(c=>c.members?.some(m=>m.name===student));
          const isJunior=card?.type==="Junior Camp";
          const isWeekend=selDay==="Saturday"||selDay==="Sunday";
          const skips=(mealSkips?.[mKey]?.[student])||{};
          function toggleSkip(slot){
            if(!setMealSkips)return;
            setMealSkips(prev=>{
              const n=JSON.parse(JSON.stringify(prev));
              if(!n[mKey])n[mKey]={};if(!n[mKey][student])n[mKey][student]={};
              n[mKey][student][slot]=!n[mKey][student][slot];
              return n;
            });
          }
          /* Build meal slots for this student type + day */
          const slots=[];
          if(!isWeekend){
            /* ── Weekday meals ── */
            slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"7:30 – 8:30",data:dayMeal.breakfast,renderMenu:d=>{const parts=[d?.items,d?.soup].filter(Boolean);parts.push("+ Bread & Jam");return parts.join(" · ");}});
            slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:isJunior?"11:50 – 12:35":"12:35 – 1:25",data:dayMeal.lunch,renderMenu:d=>{if(!d)return null;const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.fruit)p.push(`[Fruit] ${d.fruit}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.length?p:null;}});
            slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:35 – 6:15",data:dayMeal.dinner,renderMenu:d=>{if(!d)return null;const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.length?p:null;}});
            if(isJunior)slots.push({key:"eveningSnack",icon:"🍕",label:"Evening Snack",time:"7:50 – 8:30",data:{ns:dayMeal.nightSnack},renderMenu:d=>d?.ns||null});
          }else{
            if(isJunior){
              /* ── JC weekend: all 4 meals ── */
              slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"8:00 – 9:00 am",data:dayMeal.breakfast,renderMenu:d=>d?.soup?`Rice, Soup & Kimchi · ${d.soup} · + Bread & Jam`:"Rice, Soup & Kimchi · + Bread & Jam"});
              slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",data:{bs:dayMeal.brunchSoup},renderMenu:d=>d?.bs?`Rice, Soup & Kimchi · ${d.bs}`:"Rice, Soup & Kimchi"});
              slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:"12:00 – 1:00 pm",data:dayMeal.lunch,renderMenu:d=>{if(!d)return null;const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.length?p:null;}});
              slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:00 – 6:00 pm",data:dayMeal.dinner,renderMenu:d=>{if(!d)return null;const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.length?p:null;}});
            }else{
              /* ── Regular weekend: brunch only ── */
              slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",data:{bs:dayMeal.brunchSoup},renderMenu:d=>d?.bs?`Rice, Soup & Kimchi · ${d.bs}`:"Rice, Soup & Kimchi"});
            }
          }
          if(slots.length===0)return null;
          return(
            <div style={{marginTop:16,borderTop:"2px solid #f0fdfa",paddingTop:14}}>
              <div style={{fontSize:11,fontWeight:800,color:"#0d9488",textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>🍽️ Meal Schedule — {selDay}</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {slots.map(slot=>{
                  const menu=slot.renderMenu(slot.data);
                  const skipped=!!skips[slot.key];
                  return(
                    <div key={slot.key} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 12px",borderRadius:10,background:skipped?"#f9fafb":"#f0fdfa",border:`1.5px solid ${skipped?"#e2e8f0":"#99f6e4"}`,opacity:skipped?.7:1,transition:"all .15s"}}>
                      <div style={{fontSize:16,flexShrink:0,paddingTop:1}}>{slot.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                          <span style={{fontSize:12,fontWeight:800,color:skipped?"#9ca3af":"#0d9488"}}>{slot.label}</span>
                          <span style={{fontSize:10,color:"#64748b",background:"#e2e8f0",padding:"1px 7px",borderRadius:8}}>{slot.time}</span>
                          {skipped&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fee2e2",padding:"1px 7px",borderRadius:8}}>SKIP</span>}
                        </div>
                        {menu?(
                          Array.isArray(menu)
                            ?<div style={{display:"flex",flexDirection:"column",gap:1}}>{menu.map((m,i)=><span key={i} style={{fontSize:11,color:skipped?"#9ca3af":"#374151",lineHeight:1.5}}>{m}</span>)}</div>
                            :<span style={{fontSize:11,color:skipped?"#9ca3af":"#374151"}}>{menu}</span>
                        ):<span style={{fontSize:11,color:"#9ca3af",fontStyle:"italic"}}>Menu not set</span>}
                      </div>
                      {!isJunior&&(
                      <button onClick={()=>toggleSkip(slot.key)}
                        style={{flexShrink:0,padding:"4px 10px",borderRadius:8,border:`1.5px solid ${skipped?"#6b7280":"#f87171"}`,background:skipped?"#6b7280":"white",color:skipped?"white":"#dc2626",fontSize:10.5,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
                        {skipped?"↩ Undo":"Skip"}
                      </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12,gap:8}}>
          <div style={{fontSize:11,color:"#94a3b8"}}>Room numbers are assigned in the 1on1 Classrooms page.</div>
          {hasCls&&(
            <button onClick={()=>{
              if(!window.confirm(`Clear all schedule for ${student}?`))return;
              const n=JSON.parse(JSON.stringify(sched));
              Object.keys(n).forEach(t=>{
                Object.keys(n[t]).forEach(p=>{if(n[t][p]===student)delete n[t][p];});
              });
              pushSnap({sched:n});
              onClose();
            }} style={{padding:"6px 14px",background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fecaca",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>
              🗑 Clear All
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   Schedule Completeness Helpers
═════════════════════════════════════════════════════ */
function getGroupRoomKey(schedVal){
  if(!schedVal)return null;
  if(schedVal==="Kindergarten")return"Kindergarten";
  const m=schedVal.match(/^(Group [A-F])/);
  return m?m[1]:null;
}
function getCourseShort(course){
  const M={
    "Junior Course A (Activity)":"Junior A",
    "Junior Course B (Academic)":"Junior B",
    "Junior Course C (Intensive)":"Junior C",
    "HANA KINDERGARTEN (FULL DAY)":"Kinder FD",
    "HANA KINDERGARTEN (HALF DAY)":"Kinder HD",
    "LIGHT ESL":"Light ESL","GENERAL ESL":"Gen ESL",
    "NATIVE ESL":"Native ESL","NATIVE ONLY":"Native Only",
    "TOEIC":"TOEIC","IELTS":"IELTS",
    "Guardian":"Guardian","Guardian LIGHT":"Guard.Light",
    "Golf Intensive":"Golf Int.","Golf Leisure":"Golf Lei.",
    "Senior Course":"Senior","Senior Course (2pax Couple)":"Senior 2pax",
    "No Class":"No Class","Customized":"Custom",
  };
  return M[course]||course||"";
}
function computeStudentCounts(student,sched,groupRosters){
  let ph=0,na=0,pg=0,ng=0,act=0;
  Object.entries(sched||{}).forEach(([teacher,periods])=>{
    const isN=teacher.includes("(N)");
    Object.values(periods).forEach(v=>{if(v===student){isN?na++:ph++;}});
  });
  Object.entries(groupRosters||{}).forEach(([roomKey,periods])=>{
    const isAct=roomKey.startsWith("Activity ");
    const isGrp=roomKey.startsWith("Group ")||roomKey==="Kindergarten";
    if(!isAct&&!isGrp)return;
    Object.entries(periods).forEach(([pKey,studs])=>{
      if(!studs||!studs.includes(student))return;
      if(isAct){act++;}
      else{
        let nativeTeacher=false;
        for(const[t,tp]of Object.entries(sched||{})){
          const v=tp[pKey];if(!v)continue;
          if(getGroupRoomKey(v)===roomKey){nativeTeacher=t.includes("(N)");break;}
        }
        nativeTeacher?ng++:pg++;
      }
    });
  });
  return{ph,na,pg,ng,act};
}
function getEffectiveSpec(memberData){
  if(!memberData)return null;
  const course=memberData.course||"";
  if(course==="Customized"&&memberData.customSpec){
    const cs=memberData.customSpec;
    return{ph:cs.ph||0,na:cs.na||0,pg:cs.pg||0,ng:cs.ng||0,act:cs.act||0};
  }
  if((course==="LOW SEASON JUNIOR CAMP"||course==="PEAK SEASON JUNIOR CAMP")&&memberData.campLevel){
    return COURSE_SPECS[memberData.campLevel]||null;
  }
  return COURSE_SPECS[course]||null;
}
function getTransferAdjustedSpec(student,memberData,kanbanCards){
  const baseSpec=getEffectiveSpec(memberData);
  if(!baseSpec)return null;
  let inPH=0,inNA=0,outPH=0,outNA=0;
  const fCard=(kanbanCards||[]).find(c=>
    c.type==="Group/Family"&&c.members.some(m=>m.name===student)
  );
  if(fCard){
    const me=fCard.members.find(m=>m.name===student);
    (me?.noClassTransfers||[]).forEach(t=>{outPH+=(t.ph||0);outNA+=(t.na||0);});
    fCard.members.filter(m=>m.name!==student).forEach(m=>{
      (m.noClassTransfers||[]).filter(t=>t.toName===student).forEach(t=>{
        inPH+=(t.ph||0);inNA+=(t.na||0);
      });
    });
  }
  return{
    ph:Math.max(0,(baseSpec.ph||0)+inPH-outPH),
    na:Math.max(0,(baseSpec.na||0)+inNA-outNA),
    pg:baseSpec.pg||0,ng:baseSpec.ng||0,act:baseSpec.act||0
  };
}
function computeShortfalls(counts,spec){
  if(!spec)return null;
  /* 1on1 with 2PH=1Native equivalency */
  const specEq=(spec.ph||0)+(spec.na||0)*2;
  const actEq=(counts.ph||0)+(counts.na||0)*2;
  const sh1=(spec.na||0)>0&&(counts.na||0)<(spec.na||0)?Math.max(0,(spec.na||0)-(counts.na||0)):0;
  const sh1ph=Math.max(0,specEq-actEq-(sh1*2));
  const totalShort1=Math.max(0,specEq-actEq);
  const shPG=Math.max(0,(spec.pg||0)-(counts.pg||0));
  const shNG=Math.max(0,(spec.ng||0)-(counts.ng||0));
  const shAct=Math.max(0,(spec.act||0)-(counts.act||0));
  return{totalShort1,sh1,sh1ph:totalShort1-sh1*2>0?totalShort1-sh1*2:0,shPG,shNG,shAct,total:totalShort1+shPG+shNG+shAct};
}
/* ─── CourseCompletionBadge ───
   수업 포인트 가치: PG=1, P=2, NG=2, N=4, Activity=1.5
   동일한 총 포인트이면 수업 종류가 달라도 ✓
─────────────────────────────── */
function CourseCompletionBadge({counts,memberData,student,kanbanCards,inline}){
  if(!counts||!memberData)return null;
  const spec=student&&kanbanCards?getTransferAdjustedSpec(student,memberData,kanbanCards):getEffectiveSpec(memberData);
  if(!spec)return null;
  /* Point totals */
  const actPts=(counts.ph||0)*2+(counts.na||0)*4+(counts.pg||0)*1+(counts.ng||0)*2+(counts.act||0)*1.5;
  const reqPts=(spec.ph||0)*2+(spec.na||0)*4+(spec.pg||0)*1+(spec.ng||0)*2+(spec.act||0)*1.5;
  const diff=actPts-reqPts;
  const ml=inline?3:5;
  const fmt=v=>{const s=(+v).toFixed(1);return s.endsWith('.0')?s.slice(0,-2):s;};
  if(Math.abs(diff)<0.01)return(
    <span style={{marginLeft:ml,fontSize:10,fontWeight:800,color:"#166534",background:"#d1fae5",borderRadius:5,padding:"1px 6px",verticalAlign:"middle"}}>✓</span>
  );
  if(diff<0)return(
    <span style={{marginLeft:ml,fontSize:9,fontWeight:800,color:"#dc2626",background:"#fee2e2",borderRadius:5,padding:"1px 5px",verticalAlign:"middle",whiteSpace:"nowrap"}}>▼{fmt(Math.abs(diff))}</span>
  );
  return(
    <span style={{marginLeft:ml,fontSize:9,fontWeight:800,color:"#2563eb",background:"#dbeafe",borderRadius:5,padding:"1px 5px",verticalAlign:"middle",whiteSpace:"nowrap"}}>▲{fmt(diff)}</span>
  );
}

/* Build per-period group/activity/kinder assignments for a student */
function buildGroupAssignments(student,sched,groupRosters){
  const out={};
  Object.entries(groupRosters||{}).forEach(([roomKey,periods])=>{
    const isAct=roomKey.startsWith("Activity ");
    const isGrp=roomKey.startsWith("Group ")||roomKey==="Kindergarten";
    if(!isAct&&!isGrp)return;
    Object.entries(periods).forEach(([pKey,studs])=>{
      if(!studs||!studs.includes(student))return;
      /* Find the teacher assigned to this room in sched */
      let teacher=null;
      for(const[t,tp]of Object.entries(sched||{})){
        const v=tp[pKey];if(!v)continue;
        if(isAct&&v===roomKey){teacher=t;break;}
        if(isGrp&&getGroupRoomKey(v)===roomKey){teacher=t;break;}
      }
      const isNative=teacher?.includes("(N)");
      if(isAct) out[pKey]={kind:"activity",roomKey,teacher,label:roomKey};
      else if(roomKey==="Kindergarten") out[pKey]={kind:"kinder",roomKey,teacher,label:"Kindergarten"};
      else out[pKey]={kind:"group",roomKey,teacher,isNative,
        label:roomKey+" · "+(isNative?"Native":"PH")};
    });
  });
  return out;
}
/* ─── Auto-Assign Helpers ─────────────────────────── */
function isTeacherAvailable(teacher,teacherMeta){
  const tm=teacherMeta[teacher]||{};
  if(tm.status==="upcoming")return false;
  if(tm.status==="on_leave")return false;
  if(tm.status==="resigning"&&tm.resignDate){
    const today=new Date();today.setHours(0,0,0,0);
    if(new Date(tm.resignDate)<=today)return false;
  }
  return true;
}
function autoAssignCore(students,sched,groupRosters,studentData,kanbanCards,teacherMeta,lunchPeriod,cellData){
  const skipPeriod=lunchPeriod||6; /* default: 6th period = lunch */
  const newSched=JSON.parse(JSON.stringify(sched));
  const newRosters=JSON.parse(JSON.stringify(groupRosters||{}));
  const preview=[];   /* [{student,type,desc}] */
  const issues=[];    /* [{student,issue}] */

  const allActive=TEACHERS.filter(t=>isTeacherAvailable(t,teacherMeta));
  const phTch=allActive.filter(t=>!t.includes("(N)"));
  const naTch=allActive.filter(t=>t.includes("(N)"));

  function studOccupied(student){
    const occ=new Set();
    Object.values(newSched).forEach(ps=>Object.entries(ps).forEach(([k,v])=>{if(v===student)occ.add(k);}));
    Object.values(newRosters).forEach(ps=>Object.entries(ps).forEach(([k,arr])=>{if(arr&&arr.includes(student))occ.add(k);}));
    return occ;
  }
  function teacherOccupied(t){
    const occ=new Set();
    Object.keys(newSched[t]||{}).forEach(k=>{if(newSched[t][k])occ.add(k);});
    return occ;
  }
  function gapScore(pidx,occ){
    const prev=pk(pidx-1),next=pk(pidx+1);
    if(occ.has(prev)&&occ.has(next))return 3;
    if(occ.has(prev)||occ.has(next))return 1;
    return 0;
  }

  students.forEach(student=>{
    const memberData=studentData[student];
    if(!memberData){issues.push({student,issue:"No member data"});return;}
    const spec=(kanbanCards&&getTransferAdjustedSpec(student,memberData,kanbanCards))||getEffectiveSpec(memberData);
    if(!spec){issues.push({student,issue:"No course spec"});return;}

    const counts=computeStudentCounts(student,newSched,newRosters);
    let needPg=Math.max(0,(spec.pg||0)-(counts.pg||0));
    let needNg=Math.max(0,(spec.ng||0)-(counts.ng||0));
    let needAct=Math.max(0,(spec.act||0)-(counts.act||0));
    let needPh=Math.max(0,(spec.ph||0)-(counts.ph||0));
    let needNa=Math.max(0,(spec.na||0)-(counts.na||0));

    const socc=studOccupied(student);

    /* ── 1. PH Group ── */
    for(const p of PERIODS){
      if(needPg<=0)break;
      if(p.i===skipPeriod)continue;
      const pKey=pk(p.i);
      if(socc.has(pKey))continue;
      const entries=Object.entries(newSched).filter(([t,ps])=>phTch.includes(t)&&ps[pKey]&&getGroupRoomKey(ps[pKey]));
      entries.sort(([,a],[,b])=>{
        const ra=getGroupRoomKey(a[pKey]),rb=getGroupRoomKey(b[pKey]);
        return(newRosters[rb]?.[pKey]||[]).length-(newRosters[ra]?.[pKey]||[]).length;
      });
      for(const[t,ps] of entries){
        const roomKey=getGroupRoomKey(ps[pKey]);
        if(!roomKey)continue;
        const roster=newRosters[roomKey]?.[pKey]||[];
        if(roster.length>=6||roster.includes(student))continue;
        if(!newRosters[roomKey])newRosters[roomKey]={};
        newRosters[roomKey][pKey]=[...roster,student];
        socc.add(pKey);
        preview.push({student,type:"PH Group",desc:`${roomKey} P${p.i} (${t})`});
        needPg--;break;
      }
    }
    if(needPg>0)issues.push({student,issue:`${needPg} PH Group slot(s) — no available group room`});

    /* ── 2. Native Group ── */
    for(const p of PERIODS){
      if(needNg<=0)break;
      if(p.i===skipPeriod)continue;
      const pKey=pk(p.i);
      if(socc.has(pKey))continue;
      const entries=Object.entries(newSched).filter(([t,ps])=>naTch.includes(t)&&ps[pKey]&&getGroupRoomKey(ps[pKey]));
      entries.sort(([,a],[,b])=>{
        const ra=getGroupRoomKey(a[pKey]),rb=getGroupRoomKey(b[pKey]);
        return(newRosters[rb]?.[pKey]||[]).length-(newRosters[ra]?.[pKey]||[]).length;
      });
      for(const[t,ps] of entries){
        const roomKey=getGroupRoomKey(ps[pKey]);
        if(!roomKey)continue;
        const roster=newRosters[roomKey]?.[pKey]||[];
        if(roster.length>=6||roster.includes(student))continue;
        if(!newRosters[roomKey])newRosters[roomKey]={};
        newRosters[roomKey][pKey]=[...roster,student];
        socc.add(pKey);
        preview.push({student,type:"Native Group",desc:`${roomKey} P${p.i} (${t})`});
        needNg--;break;
      }
    }
    if(needNg>0)issues.push({student,issue:`${needNg} Native Group slot(s) — no available group room`});

    /* ── 3. Activity ── */
    for(const p of PERIODS){
      if(needAct<=0)break;
      if(p.i===skipPeriod)continue;
      const pKey=pk(p.i);
      if(socc.has(pKey))continue;
      /* Collect activity slots: value "Activity X" (direct) or "ACTIVITY CLASS" (look up cellData) */
      const entries=Object.entries(newSched).filter(([t,ps])=>{
        if(!allActive.includes(t))return false;
        const v=ps[pKey];
        if(typeof v!=="string")return false;
        if(v.startsWith("Activity "))return true;
        if(v==="ACTIVITY CLASS"){
          /* find activityGroup from any day's cellData */
          if(!cellData)return false;
          return DAYS.some(d=>cellData[d]?.[t]?.[pKey]?.classType==="Activity Class"&&cellData[d]?.[t]?.[pKey]?.activityGroup);
        }
        return false;
      });
      /* Resolve the actual roomKey (Activity A/B/…) for each entry */
      function resolveActRoom(t,pKey2){
        const v=newSched[t]?.[pKey2];
        if(typeof v==="string"&&v.startsWith("Activity "))return v;
        if(v==="ACTIVITY CLASS"&&cellData){
          for(const d of DAYS){
            const ag=cellData[d]?.[t]?.[pKey2]?.activityGroup;
            if(ag)return"Activity "+ag;
          }
        }
        return null;
      }
      entries.sort(([ta],[tb])=>{
        const ra=resolveActRoom(ta,pKey),rb=resolveActRoom(tb,pKey);
        return(newRosters[rb]?.[pKey]||[]).length-(newRosters[ra]?.[pKey]||[]).length;
      });
      for(const[t] of entries){
        const roomKey=resolveActRoom(t,pKey);
        if(!roomKey)continue;
        const roster=newRosters[roomKey]?.[pKey]||[];
        if(roster.length>=20||roster.includes(student))continue;
        if(!newRosters[roomKey])newRosters[roomKey]={};
        newRosters[roomKey][pKey]=[...roster,student];
        socc.add(pKey);
        preview.push({student,type:"Activity",desc:`${roomKey} P${p.i} (${t})`});
        needAct--;break;
      }
    }
    if(needAct>0)issues.push({student,issue:`${needAct} Activity slot(s) — no available activity room`});

    /* ── 4. PH 1:1 (gap-minimizing) ── */
    for(let i=0;i<needPh;i++){
      let best=null,bestScore=-Infinity;
      for(const t of phTch){
        const tocc=teacherOccupied(t);
        for(const p of PERIODS){
          if(p.i===skipPeriod)continue;
          const pKey=pk(p.i);
          if(newSched[t]?.[pKey])continue;
          if(socc.has(pKey))continue;
          const score=gapScore(p.i,tocc)+Math.random()*0.001;
          if(score>bestScore){bestScore=score;best={t,pKey,p};}
        }
      }
      if(best){
        if(!newSched[best.t])newSched[best.t]={};
        newSched[best.t][best.pKey]=student;
        socc.add(best.pKey);
        preview.push({student,type:"PH 1:1",desc:`${best.t} P${best.p.i}`});
      }else{issues.push({student,issue:"PH 1:1 — no available slot"});break;}
    }

    /* ── 5. Native 1:1 (gap-minimizing) ── */
    for(let i=0;i<needNa;i++){
      let best=null,bestScore=-Infinity;
      for(const t of naTch){
        const tocc=teacherOccupied(t);
        for(const p of PERIODS){
          if(p.i===skipPeriod)continue;
          const pKey=pk(p.i);
          if(newSched[t]?.[pKey])continue;
          if(socc.has(pKey))continue;
          const score=gapScore(p.i,tocc)+Math.random()*0.001;
          if(score>bestScore){bestScore=score;best={t,pKey,p};}
        }
      }
      if(best){
        if(!newSched[best.t])newSched[best.t]={};
        newSched[best.t][best.pKey]=student;
        socc.add(best.pKey);
        preview.push({student,type:"Native 1:1",desc:`${best.t} P${best.p.i}`});
      }else{issues.push({student,issue:"Native 1:1 — no available slot"});break;}
    }
  });

  return{newSched,newRosters,preview,issues};
}

function AutoAssignModal({sched,groupRosters,studentData,kanbanCards,teacherMeta,cellData,onApply,onClose}){
  const TYPE_COLOR={
    "PH 1:1":["#dbeafe","#1e40af"],
    "Native 1:1":["#ede9fe","#6b21a8"],
    "PH Group":["#d1fae5","#166534"],
    "Native Group":["#fce7f3","#9d174d"],
    "Activity":["#e0f2fe","#0369a1"],
  };

  /* Find students with incomplete assignments */
  const incoming=useMemo(()=>{
    return STUDENTS.filter(s=>{
      const md=studentData[s];
      if(!md?.course)return false;
      const spec=(kanbanCards&&getTransferAdjustedSpec(s,md,kanbanCards))||getEffectiveSpec(md);
      if(!spec)return false;
      const counts=computeStudentCounts(s,sched,groupRosters);
      const req=(spec.ph||0)*2+(spec.na||0)*4+(spec.pg||0)+(spec.ng||0)*2+(spec.act||0)*1.5;
      const act=(counts.ph||0)*2+(counts.na||0)*4+(counts.pg||0)+(counts.ng||0)*2+(counts.act||0)*1.5;
      return act<req;
    });
  },[sched,groupRosters,studentData,kanbanCards]);

  function getMissingLabel(s){
    const md=studentData[s];if(!md)return"";
    const spec=(kanbanCards&&getTransferAdjustedSpec(s,md,kanbanCards))||getEffectiveSpec(md);
    if(!spec)return"";
    const c=computeStudentCounts(s,sched,groupRosters);
    const parts=[];
    if((spec.ph||0)>(c.ph||0))parts.push(`${(spec.ph||0)-(c.ph||0)}×PH`);
    if((spec.na||0)>(c.na||0))parts.push(`${(spec.na||0)-(c.na||0)}×NA`);
    if((spec.pg||0)>(c.pg||0))parts.push(`${(spec.pg||0)-(c.pg||0)}×PG`);
    if((spec.ng||0)>(c.ng||0))parts.push(`${(spec.ng||0)-(c.ng||0)}×NG`);
    if((spec.act||0)>(c.act||0))parts.push(`${(spec.act||0)-(c.act||0)}×Act`);
    return parts.join(", ");
  }

    try{return parseInt(localStorage.getItem("hana_lunch_period")||"6",10);}catch{return 6;}

    setResult(r);setStep(2);
  }
  function handleConfirm(){
    onApply(result.newSched,result.newRosters);
    onClose();
  }

  /* Group preview by student */
  const previewByStu=useMemo(()=>{
    if(!result)return{};
    const m={};
    result.preview.forEach(({student,type,desc})=>{
      if(!m[student])m[student]=[];
      m[student].push({type,desc});
    });
    return m;

    <div className="t-modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"white",borderRadius:14,padding:22,width:"min(600px,95vw)",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.18)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>

          </div>

                  </div>

        {step===2&&result&&(

                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {Object.entries(previewByStu).map(([stu,items])=>(
                    <div key={stu} style={{padding:"8px 12px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0"}}>
                      <div style={{fontWeight:700,fontSize:12,color:"#166534",marginBottom:5}}>{stu}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {items.map((it,i)=>{
                          const[bg,fg]=TYPE_COLOR[it.type]||["#f1f5f9","#374151"];
                          return<span key={i} style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:bg,color:fg}}>{it.type}: {it.desc}</span>;
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* Issues */}
            {result.issues.length>0&&(
              <div style={{marginBottom:14,padding:"10px 14px",background:"#fff7ed",borderRadius:8,border:"1px solid #fed7aa"}}>
                <div style={{fontSize:12,fontWeight:800,color:"#b45309",marginBottom:6}}>⚠ {result.issues.length} unresolved — manual assignment needed</div>
                {result.issues.map((x,i)=>(
                  <div key={i} style={{fontSize:11,color:"#92400e",marginBottom:2}}>• <strong>{x.student}</strong>: {x.issue}</div>
                ))}
              </div>
            )}
            {result.preview.length===0&&result.issues.length===0&&(
              <div style={{textAlign:"center",padding:"20px 0",color:"#9ca3af",fontSize:13}}>No changes needed.</div>
            )}
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={()=>setStep(1)} style={{padding:"10px 16px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:13}}>← Back</button>
              {result.preview.length>0&&(
                <button onClick={handleConfirm} style={{flex:1,padding:"10px 0",background:"#166534",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>✓ Confirm & Apply</button>
              )}
              <button onClick={onClose} style={{padding:"10px 16px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:13}}>Cancel</button>
            </div>
          </>
        )}
      </div>
    </div>,document.body
  );
}

/* ═════════════════════════════════════════════════════
   StudentScheduleGrid
═════════════════════════════════════════════════════ */
function StudentScheduleGrid({sched,setSched,absentSet,daySubs,isAdmin,rooms1on1,onStudentClick,groupRosters,studentData,kanbanCards}){
  const stuSched=useMemo(()=>buildStudentSched(sched),[sched]);
  /* Evening periods 13/14: show only when assignments exist */
  const hasEvening=useMemo(()=>{
    const eveningKeys=[pk(13),pk(14)];
    if(Object.values(sched).some(ps=>eveningKeys.some(k=>!!ps[k])))return true;
    if(groupRosters&&Object.values(groupRosters).some(r=>eveningKeys.some(k=>!!r[k])))return true;
    return false;
  },[sched,groupRosters]);
  const activePeriods=hasEvening?PERIODS_EXTENDED:PERIODS;
  /* Pre-compute group/activity assignments per student per period */
  const allGroupAssign=React.useMemo(()=>{
    const res={};
    STUDENTS.forEach(s=>{res[s]=buildGroupAssignments(s,sched,groupRosters);});
    return res;
  },[sched,groupRosters]);
  /* Pre-compute counts for all students */
  const allCounts=React.useMemo(()=>{
    const res={};
    STUDENTS.forEach(s=>{res[s]=computeStudentCounts(s,sched,groupRosters);});
    return res;
  },[sched,groupRosters]);
  function reassign(student,pidx,newT){const key=pk(pidx);setSched(prev=>{const n=JSON.parse(JSON.stringify(prev));for(const t of Object.keys(n)){if(n[t][key]===student)delete n[t][key];}if(newT){if(!n[newT])n[newT]={};n[newT][key]=student;}return n;});}
  return(
    <div className="sw">
      <table className="st">
        <thead><tr style={{background:"#166534",color:"white"}}>
          <th style={{textAlign:"left",minWidth:145,padding:"8px 12px",position:"sticky",left:0,background:"#0d9488",zIndex:10}}>Student</th>
          {activePeriods.map(p=><th key={p.i} style={{minWidth:80,borderLeft:p.i===13?"3px solid #c9a84c":undefined}}><div>{p.label}</div><div style={{fontSize:9,opacity:.8,fontWeight:400}}>{p.time}</div>{p.i===13&&<div style={{fontSize:8,fontWeight:800,color:"#fbbf24",letterSpacing:.5,marginTop:1}}>EVENING</div>}</th>)}
        </tr></thead>
        <tbody>
          {STUDENTS.map(student=>(
            <tr key={student}>
              <td className="cn cn-s">
                <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:3}}>
                  <span className="name-link" style={{fontSize:12,fontWeight:700}} onClick={()=>onStudentClick&&onStudentClick(student)}>{student}</span>
                  {(()=>{const code=NAT_CODE[studentData?.[student]?.nationality];return code?<span style={{fontSize:10,fontWeight:600,color:"#9ca3af"}}>({code})</span>:null;})()}
                  <CourseCompletionBadge counts={allCounts[student]} memberData={studentData?.[student]} student={student} kanbanCards={kanbanCards} inline/>
                </div>
              </td>
              {activePeriods.map(p=>{
                const pKey=pk(p.i);
                const teacher=stuSched[student]?.[pKey]||null;
                const grpAssign=!teacher?allGroupAssign[student]?.[pKey]:null;
                /* Group / Activity / Kindergarten cell */
                const eveningBorder=p.i===13?{borderLeft:"3px solid #c9a84c"}:{};
                if(grpAssign){
                  const{kind,label,teacher:gt,isNative}=grpAssign;
                  const bg=kind==="activity"?"#ede9fe":kind==="kinder"?"#fef9c3":"#d1fae5";
                  const fg=kind==="activity"?"#6b21a8":kind==="kinder"?"#92400e":isNative?"#7c3aed":"#166534";
                  return(
                    <td key={p.i} style={{background:bg,textAlign:"center",padding:"3px 4px",verticalAlign:"middle",...eveningBorder}}>
                      <div style={{fontSize:10,fontWeight:800,color:fg,lineHeight:1.3}}>{label}</div>
                      {gt&&<div style={{fontSize:9,color:"#6b7280",marginTop:1}}>{gt}</div>}
                    </td>
                  );
                }
                /* 1on1 cell (existing behavior) */
                const isTA=teacher&&absentSet.has(teacher);
                const sub=teacher&&daySubs[teacher]?.[pKey];
                if(isAdmin){const avail=freeTeachers(sched,p.i,teacher,daySubs,absentSet);return<DropdownCell key={p.i} value={teacher} subValue={sub||undefined} options={avail} onSelect={v=>reassign(student,p.i,v)} isAbsentOrig={isTA&&!sub} isSub={!!(isTA&&sub)} extraStyle={eveningBorder}/>;}
                return<DropdownCell key={p.i} value={teacher} subValue={sub||undefined} isAbsentOrig={isTA&&!sub} isSub={!!(isTA&&sub)} readOnly extraStyle={eveningBorder}/>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   OneOnOneClassroomsPage
═════════════════════════════════════════════════════ */
function OneOnOneClassroomsPage({rooms1on1,setRooms1on1}){
  const[filter,setFilter]=useState("");
  function assign(room,pidx,teacher){const key=pk(pidx);setRooms1on1(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n[room])n[room]={};if(teacher===null)delete n[room][key];else n[room][key]=teacher;return n;});}
  function fillAll(room,teacher){setRooms1on1(prev=>{const n=JSON.parse(JSON.stringify(prev));n[room]={};if(teacher)PERIODS.forEach(p=>{n[room][pk(p.i)]=teacher;});return n;});}
  const visibleWings=WINGS.map(w=>({...w,rooms:w.rooms.filter(r=>!filter||r.includes(filter))})).filter(w=>w.rooms.length>0);
  return(
    <div>
      <div className="pg-wrap" style={{marginBottom:14}}>
        <span className="pg-badge" style={{background:"#e0e7ff",color:"#4338ca"}}>CLASSROOMS</span>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <h2 className="pg-title">1on1 Classrooms</h2>
            <p className="pg-sub">50 rooms total — assign teachers by period</p>
          </div>
          <input className="sb" placeholder="🔍 Search room number..." value={filter} onChange={e=>setFilter(e.target.value)}/>
        </div>
      </div>
      {/* Wing legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
        {WINGS.filter(w=>w.name!=="Other").map(w=>(
          <span key={w.name} style={{padding:"3px 12px",borderRadius:10,fontSize:12,fontWeight:700,background:w.color,color:w.hdr,border:`1.5px solid ${w.hdr}30`}}>
            {w.name} · Room {w.rooms[0]}–{w.rooms[w.rooms.length-1]}
          </span>
        ))}
      </div>
      <div style={{marginBottom:10,fontSize:12,color:"#6b7280"}}>
        Click a cell → assign teacher &nbsp;|&nbsp; <span style={{color:"#7c3aed",fontWeight:700}}>📌 Fill All Periods</span> assigns one teacher to all periods in that room.
      </div>
      <div className="sw">
        <table className="rm-tbl">
          <thead><tr style={{background:"#1e3a8a",color:"white"}}>
            <th style={{minWidth:90,position:"sticky",left:0,background:"#1e3a8a",zIndex:10}}>Room</th>
            {PERIODS.map(p=><th key={p.i} style={{minWidth:80}}><div>{p.label}</div><div style={{fontSize:9,opacity:.8,fontWeight:400}}>{p.time}</div></th>)}
          </tr></thead>
          <tbody>
            {visibleWings.map(wing=>(
              <React.Fragment key={wing.name}>
                {/* Wing header row */}
                <tr>
                  <td colSpan={12} style={{background:wing.hdr,color:"white",fontWeight:800,fontSize:12,padding:"6px 14px",position:"sticky",left:0}}>
                    🏢 {wing.name} &nbsp;—&nbsp; Room {wing.rooms[0]}–{wing.rooms[wing.rooms.length-1]}
                  </td>
                </tr>
                {wing.rooms.map(room=>(
                  <tr key={room} style={{background:wing.color}}>
                    <td className="rm-name" style={{background:wing.color}}>
                      <div style={{fontSize:13,fontWeight:700}}>#{room}</div>
                      <div style={{fontSize:9,color:wing.hdr,fontWeight:600}}>{wing.name}</div>
                    </td>
                    {PERIODS.map(p=>{
                      const key=pk(p.i);const val=rooms1on1[room]?.[key]||null;
                      return(
                        <DropdownCell key={p.i} value={val}
                          options={TEACHERS}
                          onSelect={v=>assign(room,p.i,v)}
                          fillAllLabel="Fill All Periods"
                          onFillAll={t=>fillAll(room,t)}
                        />
                      );
                    })}
                  </tr>
                ))}
              </React.Fragment>
            ))}
            {visibleWings.length===0&&<tr><td colSpan={12} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No rooms found</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   GroupClassroomsPage  — Periods as rows, 12 room/activity columns
   Linked read-only from cellData; student add/remove via groupRosters
═════════════════════════════════════════════════════ */
function GroupClassroomsPage({cellData,groupRosters,setGroupRosters,selDay,studentData}){
  const[editCell,setEditCell]=useState(null);

  function getTeachers(periodKey,colId){
    const dayData=cellData?.[selDay]||{};
    return Object.entries(dayData).filter(([,ps])=>{
      const c=ps[periodKey];if(!c)return false;
      if(colId==="Kindergarten")return c.classType==="Kindergarten";
      if(colId.startsWith("Group "))return c.classType==="Group Class"&&c.groupRoom===colId.slice(6);
      if(colId.startsWith("Activity "))return c.classType==="Activity Class"&&c.activityGroup===colId.slice(9);
      return false;
    }).map(([t])=>t);
  }
  /* for activity columns: show today's activity name */
  function getActivityLabel(periodKey,colId){
    if(!colId.startsWith("Activity "))return null;
    const group=colId.slice(9);
    const dayData=cellData?.[selDay]||{};
    for(const[,ps] of Object.entries(dayData)){
      const c=ps[periodKey];
      if(c?.classType==="Activity Class"&&c.activityGroup===group&&c.activitySchedule?.[selDay]){
        return c.activitySchedule[selDay];
      }
    }
    return null;
  }
  /* full weekly activitySchedule for a given activity column/period */
  function getActivitySchedule(periodKey,colId){
    if(!colId.startsWith("Activity "))return null;
    const group=colId.slice(9);
    // activitySchedule is propagated to all days, so check any day
    for(const dayKey of Object.keys(cellData||{})){
      const dayData=cellData[dayKey]||{};
      for(const[,ps] of Object.entries(dayData)){
        const c=ps[periodKey];
        if(c?.classType==="Activity Class"&&c.activityGroup===group&&c.activitySchedule){
          return c.activitySchedule;
        }
      }
    }
    return null;
  }
  function getStudents(periodKey,colId){return groupRosters?.[colId]?.[periodKey]||[];}
  function saveStudents(periodKey,colId,sts){
    setGroupRosters(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      if(!n[colId])n[colId]={};
      if(sts.length>0)n[colId][periodKey]=sts;
      else{delete n[colId][periodKey];}
      return n;
    });
  }
  const maxFor=col=>col==="Kindergarten"?20:col.startsWith("Activity ")?30:6;

  return(
    <div>
      <div style={{marginBottom:12}}>
        <h2 style={{fontSize:18,fontWeight:800,color:"#166534",marginBottom:4}}>👥 Group / Activity / Kinder</h2>
        <div style={{fontSize:12,color:"#6b7280"}}>Teachers auto-linked from Teacher Schedule (set class type in each cell). Click a cell to manage students.</div>
      </div>
      {/* Legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {GROUP_ROOM_COLS.map(c=>(
          <span key={c} style={{padding:"2px 10px",borderRadius:10,fontSize:11,fontWeight:700,background:GRC_BG_COLOR[c]||"#e2e8f0",color:GRC_HDR_COLOR[c]||"#374151"}}>{c}</span>
        ))}
      </div>
      <div className="sw">
        <table className="rm-tbl">
          <thead>
            <tr style={{background:"#166534",color:"white"}}>
              <th style={{minWidth:70,position:"sticky",left:0,background:"#166534",zIndex:10,textAlign:"center"}}>Period</th>
              {GROUP_ROOM_COLS.map(col=>(
                <th key={col} style={{minWidth:100,background:GRC_HDR_COLOR[col]||"#166534",color:"white"}}>
                  <div style={{fontSize:10,fontWeight:700}}>{col}</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {PERIODS_EXTENDED.map(p=>(
              <tr key={p.i}>
                <td className="rm-name" style={{textAlign:"center",background:"#f8fafc"}}>
                  <div style={{fontSize:12,fontWeight:700}}>{p.label}</div>
                  <div style={{fontSize:9,color:"#6b7280"}}>{p.time}</div>
                </td>
                {GROUP_ROOM_COLS.map(col=>{
                  const key=pk(p.i);
                  const teachers=getTeachers(key,col);
                  const students=getStudents(key,col);
                  const actLabel=getActivityLabel(key,col);
                  const hasContent=teachers.length>0||students.length>0;
                  return(
                    <td key={col}
                      className={hasContent?"ct":""}
                      onClick={()=>hasContent&&setEditCell({col,period:p})}
                      style={{background:hasContent?GRC_BG_COLOR[col]||"#f0fdf4":"white",verticalAlign:"middle",cursor:hasContent?"pointer":"default"}}>
                      <div className="gc-cell">
                        {actLabel&&(
                          <div style={{fontSize:9,fontWeight:700,color:GRC_HDR_COLOR[col]||"#1e40af",lineHeight:1.3,marginBottom:1}}>
                            🏃 {actLabel}
                          </div>
                        )}
                        {teachers.length>0?(
                          <div style={{fontSize:9,fontWeight:600,color:"#374151",lineHeight:1.4}}>{teachers.join(", ")}</div>
                        ):hasContent?(
                          <div style={{fontSize:9,color:"#9ca3af"}}>No teacher</div>
                        ):null}
                        {students.length>0&&(
                          <div style={{fontSize:9,color:"#6b7280",marginTop:2}}>👤 {students.length}/{maxFor(col)}</div>
                        )}
                        {!hasContent&&<span style={{color:"#e2e8f0",fontSize:11}}>—</span>}
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Student edit popup */}
      {editCell&&ReactDOM.createPortal(
        <div className="ed-bg" onClick={e=>{if(e.target===e.currentTarget)setEditCell(null);}}>
          <div className="ed-box" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <h3 style={{fontSize:15,fontWeight:800,color:GRC_HDR_COLOR[editCell.col]||"#166534"}}>{editCell.col} · {editCell.period.label}</h3>
                <div style={{fontSize:11,color:"#6b7280"}}>
                  {editCell.period.time}
                  {(()=>{const al=getActivityLabel(pk(editCell.period.i),editCell.col);return al&&<span style={{marginLeft:6,fontWeight:700,color:GRC_HDR_COLOR[editCell.col]||"#374151"}}>· {al} {ACTIVITY_LOCATION[al]||""}</span>;})()}
                </div>
              </div>
              <button onClick={()=>setEditCell(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#6b7280",lineHeight:1}}>✕</button>
            </div>
            {/* Teachers (read-only from cellData) */}
            {(()=>{const ts=getTeachers(pk(editCell.period.i),editCell.col);return ts.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>Teachers (linked from Schedule)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {ts.map(t=><span key={t} style={{padding:"3px 10px",borderRadius:12,background:"#dbeafe",color:"#1d4ed8",fontSize:12,fontWeight:600}}>{t}</span>)}
                </div>
              </div>
            );})()}
            {/* Weekly activity schedule — only for Activity columns */}
            {(()=>{
              const actSched=getActivitySchedule(pk(editCell.period.i),editCell.col);
              if(!actSched)return null;
              const acColor=GRC_HDR_COLOR[editCell.col]||"#1e40af";
              const acBg=GRC_BG_COLOR[editCell.col]||"#dbeafe";
              return(
                <div style={{marginBottom:14,border:`1px solid ${acBg}`,borderRadius:8,overflow:"hidden"}}>
                  <div style={{background:acColor,color:"white",padding:"5px 10px",fontSize:10,fontWeight:800,letterSpacing:".4px",textTransform:"uppercase"}}>
                    📅 Weekly Activity Schedule — {editCell.col}
                  </div>
                  {DAYS.map((day,di)=>{
                    const act=actSched[day]||"";
                    const isToday=day===selDay;
                    const loc=act?ACTIVITY_LOCATION[act]||"":"";
                    return(
                      <div key={day} style={{
                        display:"flex",alignItems:"center",gap:8,padding:"6px 10px",
                        background:isToday?acBg:di%2===0?"#fafafa":"white",
                        borderBottom:di<4?"1px solid #f1f5f9":"none"}}>
                        <div style={{
                          minWidth:62,fontSize:11,fontWeight:isToday?800:600,
                          color:isToday?acColor:"#374151",
                          display:"flex",alignItems:"center",gap:3}}>
                          {isToday&&<span style={{fontSize:9,color:acColor}}>▶</span>}
                          {day.slice(0,3)}
                          {isToday&&<span style={{fontSize:9,background:acColor,color:"white",borderRadius:4,padding:"1px 4px",marginLeft:2}}>TODAY</span>}
                        </div>
                        {act?(
                          <>
                            <span style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?acColor:"#374151",flex:1}}>{act}</span>
                            <span style={{fontSize:10,color:"#6b7280",whiteSpace:"nowrap"}}>{loc}</span>
                          </>
                        ):(
                          <span style={{fontSize:11,color:"#d1d5db",fontStyle:"italic"}}>— not set —</span>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })()}
            <GroupRosterEditor
              students={getStudents(pk(editCell.period.i),editCell.col)}
              studentData={studentData}
              maxStudents={maxFor(editCell.col)}
              onSave={sts=>{saveStudents(pk(editCell.period.i),editCell.col,sts);setEditCell(null);}}
            />
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   AbsencePanel

/* ═════════════════════════════════════════════════════
   StudentSchedulePopup
═════════════════════════════════════════════════════ */
function StudentSchedulePopup({student,sched,rooms1on1,nationality,onClose}){
  const stuSched=useMemo(()=>buildStudentSched(sched),[sched]);
  const myPs=stuSched[student]||{};
  const hasCls=Object.keys(myPs).length>0;
  const greet=NATIONALITY_GREETING[nationality]||NATIONALITY_GREETING["Other"];
  return(
    <div className="ed-bg" onClick={onClose}>
      <div className="ed-box" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h3 style={{fontSize:16,fontWeight:800,color:"#166534"}}>📋 {student} — This Week</h3>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#6b7280",lineHeight:1}}>✕</button>
        </div>
        {/* 국적별 인사말 */}

          <span style={{fontSize:22}}>{greet.flag}</span>

function StudentEditModal({student,data,onSave,onClose}){

    const d=new Date(v);const day=d.getDay();
    if(day!==0)d.setDate(d.getDate()+(7-day)%7);
    setForm(p=>({...p,studyStart:(()=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${dd}`;})(),studyEnd:""}));
  }
  function applySaturday(v){
    const d=new Date(v);const day=d.getDay();
    const diff=(6-day+7)%7;d.setDate(d.getDate()+diff);
    setForm(p=>({...p,studyEnd:(()=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${dd}`;})()}));

                <option value="">— Year —</option>
                {Array.from({length:new Date().getFullYear()-1939},(_,i)=>new Date().getFullYear()-i).map(y=><option key={y} value={String(y)}>{y}</option>)}
              </select>
              <select className="fi" style={{flex:1.2}} value={form.birthMonth||""} onChange={e=>setForm(p=>({...p,birthMonth:e.target.value}))}>

          <div className="fg">
            <label>Nationality</label>

function TeacherEditModal({teacher,meta,onSave,onDelete,onClose}){

  const[specialties,setSpecialties]=useState(meta?.specialties||[]);
  const[status,setStatus]=useState(meta?.status||"active");

  const[meals,setMeals]=useState(meta?.meals||{breakfast:false,lunch:false,dinner:false});
  function toggleSpec(s){setSpecialties(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);}
  function toggleMeal(m){setMeals(p=>({...p,[m]:!p[m]}));}
  const STATUS_OPTS=[
    {v:"active",l:"Active",bg:"#d1fae5",fg:"#166534"},
    {v:"upcoming",l:"Upcoming",bg:"#dbeafe",fg:"#1e40af"},

    {v:"on_leave",l:"On Leave",bg:"#fef9c3",fg:"#92400e"}

                    style={{padding:"5px 13px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",
                      border:`2px solid ${sel?o.fg:"#e2e8f0"}`,background:sel?o.bg:"white",color:sel?o.fg:"#9ca3af"}}>
                    {o.l}

                );
              })}
            </div>
            {status==="resigning"&&(
              <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                <label style={{fontSize:11,fontWeight:700,color:"#b91c1c",whiteSpace:"nowrap"}}>Resignation Date:</label>
                <input type="date" lang="en" value={resignDate} onChange={e=>setResignDate(e.target.value)}
                  style={{padding:"4px 8px",border:"1.5px solid #fca5a5",borderRadius:6,fontSize:12,color:"#b91c1c",fontWeight:600}}/>
              </div>
            )}
          </div>

          {/* Specialties */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>
              Class Specialties
            </div>

              {TEACHER_SPECIALTIES.map(s=>{

              {[
                {k:"breakfast",l:"🌅 Breakfast",time:"7:30–8:30",bg:"#f1f5f9",fg:"#334155"},
                {k:"lunch",l:"☀️ Lunch",time:"",bg:"#f0fdf4",fg:"#166534"},

                  </button>
                );

            </div>
            {!meals.breakfast&&!meals.lunch&&!meals.dinner&&(
              <div style={{marginTop:6,fontSize:11,color:"#9ca3af"}}>No meals selected — teacher eats off-campus.</div>
            )}
          </div>

          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>onSave(name.trim(),specialties,status,resignDate,meals)} style={{flex:1,padding:10,background:"#1e40af",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Save</button>
            <button onClick={onClose} style={{padding:"10px 18px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:13}}>Cancel</button>
            {meta?.isExtra&&(
              <button onClick={onDelete} style={{padding:"10px 13px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,cursor:"pointer",fontSize:13}}>🗑 Delete</button>
            )}
          </div>
        </div>
      </div>
    </div>,document.body
  );
}

/* ═════════════════════════════════════════════════════
   TeacherListPage

function TeacherListPage({sched,teacherMeta,setTeacherMeta,passwords}){
  const[q,setQ]=useState("");
  const[editTeacher,setEditTeacher]=useState(null);
  const[showAddForm,setShowAddForm]=useState(false);
  const[newName,setNewName]=useState("");
  const[newIsNative,setNewIsNative]=useState(false);

  /* Combined list: base teachers + extras */
  const allTeachers=useMemo(()=>{
    const extras=Object.keys(teacherMeta).filter(t=>teacherMeta[t]?.isExtra&&!TEACHERS_BASE.includes(t));
    return[...TEACHERS_BASE,...extras];
  },[teacherMeta]);

  const list=allTeachers.filter(t=>t.toLowerCase().includes(q.toLowerCase()));

  function getSpecialties(t){return teacherMeta[t]?.specialties||[];}

  function handleSave(teacher,newName,specialties,status,resignDate,meals){
    setTeacherMeta(prev=>{
      const next={...prev};
      const isExtra=!TEACHERS_BASE.includes(teacher);
      const extra={status:status||"active",...(resignDate?{resignDate}:{}),...(meals?{meals}:{})};
      /* If renamed (extra teacher) */
      if(isExtra&&newName&&newName!==teacher){
        next[newName]={...next[teacher],specialties,isExtra:true,...extra};
        delete next[teacher];
      } else {
        next[teacher]={...(next[teacher]||{}),specialties,...extra,...(isExtra?{isExtra:true}:{})};
      }
      return next;
    });
    setEditTeacher(null);
  }

  function handleDelete(teacher){
    if(!window.confirm(`Delete teacher "${teacher}"? This will not remove their schedule assignments.`))return;
    setTeacherMeta(prev=>{const next={...prev};delete next[teacher];return next;});
    setEditTeacher(null);
  }

  function handleAdd(){
    const name=newName.trim();
    if(!name)return;
    const finalName=newIsNative&&!name.includes("(N)")?`${name} (N)`:name;
    if(allTeachers.includes(finalName)){alert("A teacher with this name already exists.");return;}
    const maxCode=Math.max(0,...Object.values(TEACHER_CODE));

/* ═════════════════════════════════════════════════════
   ChangePasswordWidget
═════════════════════════════════════════════════════ */
function ChangePasswordWidget({name,onChangePassword}){
  const[show,setShow]=useState(false);
  const[nw,setNw]=useState("");const[conf,setConf]=useState("");const[err,setErr]=useState("");
  function doChange(){
    if(nw.length<4){setErr("Minimum 4 characters");return;}
    if(nw!==conf){setErr("Passwords do not match");return;}
    onChangePassword&&onChangePassword(name,nw);
    setShow(false);setNw("");setConf("");setErr("");
    alert("Password changed successfully.");
  }
  if(!show)return<button onClick={()=>setShow(true)} style={{fontSize:11,padding:"3px 10px",background:"none",border:"1px solid #d1d5db",borderRadius:5,cursor:"pointer",color:"#6b7280",marginTop:6}}>🔒 Change Password</button>;
  return(
    <div style={{marginTop:8,padding:10,background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0"}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-end"}}>
        <input type="password" value={nw} onChange={e=>setNw(e.target.value)} placeholder="New password" style={{padding:"5px 8px",border:"1.5px solid #e2e8f0",borderRadius:5,fontSize:12,width:140}}/>
        <input type="password" value={conf} onChange={e=>setConf(e.target.value)} placeholder="Confirm" style={{padding:"5px 8px",border:"1.5px solid #e2e8f0",borderRadius:5,fontSize:12,width:100}}/>
        <button onClick={doChange} style={{padding:"5px 12px",background:"#1e40af",color:"white",border:"none",borderRadius:5,cursor:"pointer",fontSize:12,fontWeight:700}}>Change</button>
        <button onClick={()=>{setShow(false);setNw("");setConf("");setErr("");}} style={{padding:"5px 10px",background:"none",border:"1px solid #d1d5db",borderRadius:5,cursor:"pointer",fontSize:12,color:"#6b7280"}}>Cancel</button>
      </div>
      {err&&<div style={{color:"#dc2626",fontSize:11,marginTop:4}}>{err}</div>}
    </div>
  );
}

/* ═════════════════════════════════════════════════════
   PersonalTeacherView

function PersonalTeacherView({name,sched,absentSets,subsByDay,rooms1on1,studentCourses,selDay,setSelDay,messages,onOpenMessenger,onChangePassword,mealPlan,teacherMeta,mealSkips,setMealSkips}){
  const myPs=sched[name]||{};
  const absent=(absentSets[selDay]||new Set()).has(name);
  const mySubs=subsByDay[selDay]?.[name]||{};
  /* Periods where I'm acting as a substitute for another teacher */
  const subsForMe=useMemo(()=>{
    const out={};
    Object.entries(subsByDay[selDay]||{}).forEach(([absentT,periods])=>{
      Object.entries(periods).forEach(([pkey,subT])=>{
        if(subT===name)out[pkey]=absentT;
      });
    });

  },[subsByDay,selDay,name]);
  const hasAnyCls=Object.keys(myPs).length>0||Object.keys(subsForMe).length>0;

    <div>
      <div className="card" style={{marginBottom:16,background:absent?"#fef2f2":"white"}}>

        {absent?<p style={{marginTop:6,color:"#dc2626",fontWeight:600,fontSize:14}}>⚠ You are marked absent today.</p>:<p style={{marginTop:6,color:"#6b7280",fontSize:14}}>{selDay} class schedule.</p>}
        <ChangePasswordWidget name={name} onChangePassword={onChangePassword}/>
        {Object.keys(subsForMe).length>0&&!absent&&(
          <p style={{marginTop:4,color:"#b45309",fontWeight:600,fontSize:13}}>🔄 You have {Object.keys(subsForMe).length} substitute period(s) today.</p>
        )}
      </div>
      <DayBar selDay={selDay} setSelDay={setSelDay} color="#1e40af"/>
      {/* Teacher meal schedule — based on meal preferences + skip buttons */}
      {(()=>{
        const myMeals=teacherMeta?.[name]?.meals||{};
        const hasAnyPref=myMeals.breakfast||myMeals.lunch||myMeals.dinner;
        if(!hasAnyPref)return null;
        const mKey=dayToMealKey(selDay);
        const dayMeal=mealPlan?.plan?.[mKey]||{};
        const isWeekend=selDay==="Saturday"||selDay==="Sunday";
        const skips=(mealSkips?.[mKey]?.[name])||{};
        function toggleSkip(slot){
          if(!setMealSkips)return;
          setMealSkips(prev=>{
            const n=JSON.parse(JSON.stringify(prev));
            if(!n[mKey])n[mKey]={};if(!n[mKey][name])n[mKey][name]={};
            n[mKey][name][slot]=!n[mKey][name][slot];
            return n;
          });
        }
        const slots=[];
        if(!isWeekend){
          if(myMeals.breakfast)slots.push({key:"breakfast",icon:"🌅",label:"Breakfast",time:"7:30 – 8:30",
            menu:(()=>{const p=[dayMeal.breakfast?.items,dayMeal.breakfast?.soup].filter(Boolean);if(p.length)p.push("+ Bread & Jam");return p.join(" · ")||null;})()});
          if(myMeals.lunch)slots.push({key:"lunch",icon:"☀️",label:"Lunch",time:"",
            menu:(()=>{const d=dayMeal.lunch||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
          if(myMeals.dinner)slots.push({key:"dinner",icon:"🌙",label:"Dinner",time:"5:35 – 6:15",
            menu:(()=>{const d=dayMeal.dinner||{};const p=[];if(d.main)p.push(`[M] ${d.main}`);if(d.veg)p.push(`[V] ${d.veg}`);if(d.egg)p.push(`[Egg] ${d.egg}`);if(d.side)p.push(`[Side] ${d.side}`);if(d.soup)p.push(`[Soup] ${d.soup}`);return p.join(" · ")||null;})()});
        }else{
          /* Weekend: brunch only (for teachers who eat any meal) */
          slots.push({key:"brunch",icon:"🌊",label:"Brunch",time:"9:00 – 11:00 am",
            menu:dayMeal.brunchSoup?`Rice, Soup & Kimchi · ${dayMeal.brunchSoup}`:"Rice, Soup & Kimchi"});
        }
        if(slots.length===0)return null;
        return(
          <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#0d9488",marginBottom:10}}>🍽️ Today's Meals</div>

                    <span style={{fontSize:16,flexShrink:0}}>{s.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                        <span style={{fontSize:12,fontWeight:800,color:skipped?"#9ca3af":"#0d9488"}}>{s.label}</span>
                        {s.time&&<span style={{fontSize:10,color:"#64748b",background:"#e2e8f0",padding:"1px 7px",borderRadius:8}}>{s.time}</span>}
                        {skipped&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700,background:"#fee2e2",padding:"1px 7px",borderRadius:8}}>SKIP</span>}

                      style={{flexShrink:0,padding:"4px 10px",borderRadius:8,border:`1.5px solid ${skipped?"#6b7280":"#f87171"}`,background:skipped?"#6b7280":"white",color:skipped?"white":"#dc2626",fontSize:10.5,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
                      {skipped?"↩ Undo":"Skip"}
                    </button>
                  </div>
                );

            </div>
          </div>
        );
      })()}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <table className="ps-t">
          <thead><tr style={{background:"#1e40af",color:"white"}}><th>Period</th><th>Time</th><th>Room</th><th>Student / Class</th><th>Status</th></tr></thead>
          <tbody>
            {!hasAnyCls&&<tr><td colSpan={5} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No classes this week.</td></tr>}
            {PERIODS.map(p=>{
              const pkey=pk(p.i);
              const assign=myPs[pkey];
              const absentFor=subsForMe[pkey]; /* I'm subbing for this teacher */
              if(!assign&&!absentFor)return null;

              /* ── Substitute row: use absent teacher's room ── */
              if(absentFor){
                const absentAssign=sched[absentFor]?.[pkey]||"—";
                const room=findRoom1on1(absentFor,p.i,rooms1on1); /* absent teacher's room */

                  <tr key={p.i} style={{background:"#fef9c3"}}>
